body:
  text: 敬軒文集卷二十二明薛瑄撰墓志銘明故奉議大夫山東按察司僉事崔公墓志銘山東按察僉事崔公卒于官將返葬故鄉其弟理奉公行狀請銘于其兄同官河東薛瑄謹按狀公諱碧字仲玉永平昌黎人大父彥名祖妣齊氏彥名有隱德鄉人嘗被兵無食彥名以其家積穀千餘石貸與之食兵息取劵焚棄一無所責償父得母齊氏生四子長即公次叔琮次叔璘次即理公少有美質大父母父母特愛之遣充縣庠弟子員習經史舉業中永樂十五年鄉試登辛丑進士第宣德初拜交址道監察御史立事舉職強幹不屈籍籍有聲逮國家推恩例封父得文林郎交址道監察御史母齊氏封孺人時公大父母俱髙年安好無恙父母又皆顯受褒錫公嘗衣繡歸省于家祖子孫三世一門夀慶光顯鄉邦以為榮正統紀元調行在江西道監察御史明年為廷臣薦擢升今職分巡部屬剔濯姦垢振挈紀綱事以無墜竟積勞成疾以卒正統四年十二月二十三日也享年四十又九矣先是公有疾因念大夫人已卒大父父母俱年老在故鄉不得朝夕見愈憂思不置遣理往迎之既而大父暨御史君俱弗克來獨母孺人至公輿疾迎郊外相持感泣不已疾遂增革公初娶張氏早卒贈孺人再娶劉氏泰州同知浩之長女封孺人公存日嘗命理之子善聚後已公沒理如其命善聚甫四嵗幼不任事理奉公柩歸以正統五年四月初二日葬于故里司家庒鵲鳯山之先塋銘曰胡豐其始胡嗇其終命實為之嗟嗟乎崔公滎澤令張宗原墓志銘宗原諱本姓張氏濟南歷城人祖子敬父直卿咸以善人稱衍慶種德以及宗原宗原生異凡兒其父尤器愛之遣充郡博士弟子員即刻志務學兩經師授習舉子業兼明書春秋經在庠序時固已見稱于人丁外艱家居平原令禮延訓諸子弟洪武二十六年遂以春秋魁六郡士明年疾弗獲預試春官遂入太學益師友天下文儒之選者以廣其學三十年中乙榜授山西應州學正宗原以師道自勵率五鼓而作進諸生誨以務學成已成物之道正身率下嚴毅清苦雖隆寒盛暑不少易其勤厥後北方罷學改署浙江奉化縣學其教人如在應州時固無怠永樂紀元仍任應州學正五年編管薊之豐潤宗原雖居畎畝中恆以士節自持不少貶以求合簡出入正容體雖市井負販望之知敬有所不合者亦知其為端謹士而不敢慢易也居數年志益堅行益修名益著有以宗原應詔舉者遂起自布衣賜冠帶往使川蜀未幾丁內艱服闋擇授河南滎澤令宗原時年已六十餘矣以其素所蓄積施于為邑正已以束吏行恕以及民驅遊惰悉歸之南畝治姦民告訐尤無狀者中州習俗男婦無目者多彈琵琶道鄙俚歌揚載道男女聚聽通宵不止禮度悉愆耕織或廢宗原立皆禁絶瞽者皆去境內風俗頓變宗原尤重育才時就校庠令諸生執經問難從容教語士皆知奮宗原始至人疑其拘儒迂執不間於政而不知明體適用正儒者事宗原能推行之不數年邑里富庶士民信服正統改元宗原朝正京師因引年還鄉里時從士大夫同休致者徜徉里閭衣冠偉肅鬢眉皓然後生小子莫不望之起敬郡邑士子或執書史就問其門者甚衆而藩臬大臣亦皆禮下之都指揮李公進武而好儒時延宗原于家講説春秋大義泛及古人臣之盡節盡忠者李公聽之欣欣忘倦而士大夫因是以重李公云宗原生於某年某月某日卒於某年某月某日於乎士於為學或不得其方以至終身顛倒迷繆鮮克自立者往往有之宗原乃能自少至老於學獨得古人之遺意為師而能淑諸人為邑而能惠於物卒至完節歸老於家厯考其事豈復有恨哉宗原娶王氏生二男三女男曰顒曰俯女皆適良族葬得期曰某年某月某日卜得地曰某山某水某原李公以其子狀來請銘則為之銘曰有學有行有事有業壯仕老休旋履罔缺考終耆年歸于其穴鐫石幽墟以著永極故孺人王氏墓志銘孺人姓王氏太原陽曲人其上世多顯者以譜牒散失莫考其詳獨孺人之父能甫卓卓有立克世其家繼善儲慶實鍾孺人乃生而端秀少而靜淑長而孝慈姆教不勞而婉娩能聽女工克巧而績製惟勤以至佐長者視事親之具禮相祀事女行細大靡不能勵及笄擇所適得縣人朱守益乃故家子遂以歸之孺人入朱門饋禮既舉公姑胥賀婦道日修長幼咸悅尤能以勤儉相其配故家計雖裕而費出不冗鄉人有匱乏來假貸於守益者孺人即罄所有以助施豫雖求者屢至無厭色遂得享有多福子女蕃茂孺人又能自其嬰時悉教之以正其長子紱者生有美質孺人勸守益遣之就學既入郡庠孺人夫婦尤能嚴家庭之訓不數年紱果以學行有進登名薦書遊于太學今皇上在潛邸時慎選官屬紱為吏部所推擇即授典寶未幾守益即世孺人哀毁若不能生者乃率諸子盡悴以襄葬事遂絶膏沐屏服飾者數十年益以禮義善道誨諸子使永守益之慶而光朱氏之門紱既服除上特升湖廣道監察御史僅三載又升大理寺丞因得以御史秩恩敕贈守益如紱之職孺人受今封命下紱即具冠服往奉孺人榮溢家門歡傳閭里而孺人逝矣孺人生洪武已未沒在景泰癸酉十二月二十五日享年七十有五孺人生四子長即寺丞君次曰旺曰綬曰纓女一人適邑人髙名孫男七人曰瓛曰瑢曰璘曰㻞曰理曰琮曰瑶瓛中癸酉鄉榜寺丞君聞孺人訃歸謀葬事乃奉其友刑部侍郎周君之狀纍然喪服來請曰不肖孤卜以景泰五年三月某日祔葬母孺人于新村先子御史公之塋敢乞銘則為之銘曰有令女德惟孺人是持有良厥配惟孺人是歸有繁厥子惟孺人是儀女婦母道惟孺人咸宜故能享有多福而考終于期茲孺人之安藏鐫幽石以永貽明故正議大夫資治尹刑部左侍郎孔公墓志銘公諱文英字世傑系出宣聖之裔大父諱彥明娶曹氏父志學娶蔣氏自彥明值宋季兵作徙家武安再徙邯鄲父志學又徙陕西安化縣遂家焉比再世皆積行隱德弗耀于時志學生五子次即公也公生有美質其父遣入縣庠從良師友習舉子業中永樂十五年鄉試登辛丑科進士宣德元年初知江西廬陵縣未幾以事至京師擢任浙江道監察御史三年纍奉璽書巡視北直𨽻民瘼事訖條奏所以消弭之方大荷寵賚值浙江黃岩有健訟者搆揑齊民三千人相聚譸張為非公奉敕諭俾往體量鞫問公至則取其文狀究察端緒所自起遂得其所以構造者皆羅織之詞一訊衆情皆服立遣詿連之衆獨械首訟一夫來京處治人皆交口以明果稱之十年丁內艱正統紀元廷臣奉詔選能御史分理天下軍政公以廷臣薦乃驛召至京改河南道奉敕清理江西軍伍九年滿考升支五品俸仍理前事正統五年升湖廣按察使九年丁外艱部屬軍民狀公公平之迹相率訴御史乞留御史會奏得旨報可奪情起復涖事後以事至京師景泰紀元今皇上詔擇有文武才謀可鎮邊關者吏部以公名上遂升大理寺卿俾奉敕鎮守紫荆關及提督緣邊軍務公至練兵有法設險有要弛置得宜關備大飭內外晏然無警軍民皆得以樂生興事六年春上以刑部左侍郎員缺且邊關無事乃驛召公補其缺次年為景泰七年二月二十八日卒于官詔如例遣官諭祭修墳安葬公生當洪武甲戌五月初七日卒是年月日蓋甲子一周又三嵗矣公娶陳氏生子男四曰宇曰宗曰宙曰宏女四孫男三公性資溫厚居家孝友接人謙和於世利淡然寡嗜好既力學尤通吏事登科為名進士治邑為賢令尹出入風憲綱紀卓然鎮守邊關事功就緒入二秋官庶獄明慎其行已歷官大節可見如此又歷仕清朝荷國家舉推恩之典贈其祖通議大夫大理寺卿祖妣淑人封其父文林郎監察御史贈通議大夫大理寺卿母封孺人贈淑人公加授正議大夫資治尹陳氏封孺人至淑人實有三世疏封之榮公既沒又荷聖朝褒恤之典諭祭有文窀穸有造其可謂有光前後善始善終者矣公之子宗將以某年月日奉公柩葬于某山之原乃奉公狀纍然喪服來乞銘則為之銘曰有璞必追有木必材孰人之瑰而用與違君惟其魁孔牒世輝有胎有胚有敷有為所持不回所職不隳所積既徽所成惟丕祖考逺綏嗣慶世纍甲子訖推幽銘永垂故沈彥正墓志銘君姓沈氏諱本字彥正姑蘇人也沈之先出𥅆季代有顯人歷宋齊梁陳隋唐尤盛在梁有沈約者文學伏一時仕至侍中蓋君之逺祖云厥後月湖仕宋提刑庫官階迪功郎於君為曾祖月湖生正卿仕元浙江仁和縣典史正卿生君考諱原業儒不仕君少以行義稱嘗構雙桂堂率兄弟以奉親親沒每至葬所輒攀松以泣已而復為瞻松卷求名公言以揄其志君昆弟二人已為長嘗喟曰吾先世聞人纍纍逮先君子雖斂德不耀而所以望我後人甚巨吾以經紀門户事於文儒業已無及幸吾弟慧而敏誠使其有立以紹先志吾可無憾俾其弟贄郡先生以稟學焉其後果克成就如君所謂君於逢掖士尤加敬延賔客必豐殽盛飲極歡而罷家頗饒資人以匱告則周之無吝色在鄉里能卑身遜言以下人故尤得衆譽咸謂其善行出於資性云君娶馬氏生四子男二人曰旒曰闕女二人曰淑清淑安皆適良族君享年六十有五以疾卒于京師文明之寓館子旒奉其喪南還道過滎陽時君弟復方為滎陽令能而辨始由貢士知湖廣蘄水後調是邑以君之沒於外哭之踰時而哀遂卜葬期曰良卜地亦惟良乃泣而謂余曰吾兄將以年月日歸祔于吳縣太平鄉薦福山之先塋吾縻于職不得親視其窆悲曷可勝敢以狀請豫銘銘曰允矣沈君不華以質行由內修善斯外及有弟孔彰有嗣孔立甲子一周五不滿七興化廓然可謂無戚言祔先塋言厝玄宅礱石鑱詞以著永極故處士楊君師魯墓志銘處士姓楊諱曾字師魯世為河津舊家其大父天錫官至監事家牒不存莫考其詳天錫生三子曰元曰亨曰利元無子亨仕元國子學録生希先仕元絳州學正利生二子長繼先次紹先紹先生二子曰曾師魯曰侃師冉師魯即處士也處士生而資質端重不妄嬉戲少與其弟學益進聲日彰駸駸有仕進之漸處士曰弟為忠兄為孝各行其志可矣乃退處龍門之故居日以省視先塋飭敬時祀教誨子孫為事未幾其弟師冉果以學行貢諸南宫初授湖廣黃州府教授就升推官處士兩寓書戒之曰天地間生人至衆能享官秩者幾何郡庠風化之首府推理刑之司二者皆匪易職汝其勉之其弟克遵教戒遂以文雅明慎見稱於時而卒逺悔尤以終其祿於官次處士享年五十有五終於正寢其配劉固無恙處士二子長曰峙次曰闕女闕人皆適良族處士殁後闕年其子峙以內外教謹又克進於學遂中永樂二十一年鄉貢進士因念其家世積行之深先人衍慶之逺而已得籍其餘澤而獲薦書之光榮獨墓無刻詞大懼不任顯揚之意遂述其行來徴銘於余銘曰有浚其源有引其流謙謙處士讓顯樂修進退兩榮於行為優後嗣本德銘以闡幽侍御趙君墓志銘君諱寬字子裕姓趙氏河南汝寧人髙祖誠贈開封府知府曽大父志善贈吏部尚書大父好德吏部尚書父毅工部侍郎兼詹事府少詹事惟君先祖考四世生仕沒贈皆顯有名位積善餘慶以及君躬君少而聰頴長而俊爽壯而恢達讀書為良子弟登科為名進士列官為才御史其所勵操捐行惟先德之忠孝是肖是嗣推其心蓋甚將有為而皆弗克自必也饗年四十以宣德六年十一月十三日卒於京師厥配謀以君之柩歸適君之弟敏來遂以君之柩歸卜吉於宣德七年月日祔葬於鶴莊之先塋君所娶尹氏生二女一男女素英桂枝男通闕君於兄弟為次兄曰恭弟曰信曰敏敏好學而文與余為庚子舉子君與余為辛丑進士敏以余與其兄弟皆同年且相好也遂狀其事來求余為銘銘曰或衍其源而不昌其流或豐其才而不騁其遊命實尸之銘以慰幽山東按察司僉事楊潤妻陳孺人墓志銘孺人諱秀瑛姓陳氏山東按察司僉事楊公伯玉之妻江西瑞州府髙安處士仲同之長女也孺人之生淑慎端靜天性孝友雅異凡女處士為擇所宜配得僉憲公之賢又為同邑遂以歸之孺人入門恪修婦道既逮事僉憲公太夫人趙氏至事其舅松溪處士如其父事其姑吳夫人如其母處娣姒如其弟妹而又以砥節學力惟僉憲公是贊是勸楊氏閨庭雍睦而整肅僉憲公業修而行立者孺人皆與有助焉及太夫人松溪處士吳夫人相繼沒先後孺人相僉憲公治喪祭如儀良多鄉邦尤稱道之僉憲公既釋服遂由鄉薦登永樂乙未進士第拜浙江道監察御史值國家舉推恩之典遂贈松溪處士如僉憲之職吳夫人與孺人同封于時孺人從僉憲公官居京師有貨獄者窺僉憲公出密齎白金百兩來懇孺人孺人遽命其長子蕃執送官卒正以法宣德四年僉憲公修職舉事有聲繼又荷國家推恩僉憲公進秩奉政大夫而孺人已病矣孺人疾既革適其子蕃至自江南是夕卒正統二年十月日也享年五十有三矣孺人生子男曰蕡曰芾曰蔚與蕃為四人女二人慕貞永貞皆未適人孫男曰顯孫女曰遇真明年為正統三年僉憲公命蕃以一舟載孺人柩南歸將以是年月日葬於其縣萬石鄉道士岡鳯山錦水間從趙夫人兆次乃狀孺人行實求為之銘銘曰於乎孺人為女賢于父母惟德之貞為婦宜于其家惟德之馨故有貴於夫而命服在躬有積其後而子孫繼承有考其終而歸于窆封是宜銘以掩幽而永著厥聲故奉直大夫蒲州知州張公墓志銘天順二年七月十七日致仕奉直大夫蒲州知州張公卒於其家之正寢八月初吉其長子鼎以公狀遣其弟鼐來乞志銘葬按狀公諱亷字惟清世為陜西西安咸寧人公髙祖德用仕元翰林學士承旨曾祖思忠祖恭諒考秉文三世皆蓄善弗耀秉文娶范氏生公有美質自童稚時已不好戲異凡兒父母鍾愛特甚方十二嵗即遣入郡學從師友習舉子業二十二領永樂癸卯鄉薦入太學僅三年以才中時用不次選擢刑部照磨未幾改除山西臨汾縣丞佐政有聲調蒲州判官用保升知州事蒲為大州事劇難治公既正職蒞事乃剗刮積弊以身率人自家及官皆有撿飭條法教民作業以時與民以信凡賦調不督而集極力扶植柔善於豪強則重加繩抑不少貸尤知為州急務修舉學政如有不及寅恭祀典壇場祠宇悉皆修治蒞事數十年無非法一事以擾其屬縣豫嘗使西蜀道過其州見其廳治落然無事惟聞誦讀聲問之則曰課吏讀律使知畏法其不暇遊惰耳若公者可謂能其職矣蒲去咸寧甚近時公父母俱康強乃迎致就養極其娛奉及二親先後沒世俱葬祭盡禮又可謂能其子矣公丁內艱時蒲之軍民合詞保留又可見其為人所愛慕焉及謝事去時方年五十有二家居惟教子孫與宗族朋舊過從為事他無所勞其心又可謂能安於退休者公娶王氏生三子曰鼎曰鼐曰鼒鼎嘗從豫學中癸酉鄉貢方待會試于家女三長適咸寧士人傅珍次適蒲州守禦正千戶石洵季適千户孫達享年五十有七三子皆在側鼎洎其二弟以是年九月初三日葬于韋曲從先兆也嗚呼公之行已始終無玷如此是可銘已銘曰或早其發而疾其萎或惠在人而不及私或豐於前而嗇其垂不萎於早不偏於施有躬其裕有後其貽胡終無憾公其咸之墓表汾隂阡表河津古河東地我先世自得姓以來即居之鮮有徙寓四方者故族屬蕃大不下數十百家沒而葬于汾隂之南坡者封樹纍纍焉我先考教諭公既卒於河內官次其年冬孤子瑄扶柩還鄉里明年為宣德元年遂以正月十一日葬于南坡之先塋前三日自他窆啓先妣齊氏柩以禮祔又二年瑄服徐入朝授廣東道監察御史瑄竊惟先公先妣鞠育之勤教戒之嚴慶澤之深而藐末不肖乃有今茲之光榮先公先妣既相繼即世而欲以微祿致滫瀡之奉固皆無及是以獨居靜處追慕音容展轉歔欷痛心泣血而莫知所措因念昔之君子追惟其親而不能自已者必有纂述之詞勒之金石以發揚先德若柳子之紀其先侍御歐陽公之表瀧岡是已顧小子瑄曷敢自附於前賢然念大恩之莫報抱終天之大戚而所以表述先德之心出於悲思繾綣之餘而不能自己者亦竊冀其萬一焉是用托取先公歷官行已之詳敘次如左先公生於元季甫七嵗先大父即授以四書先公誦習晝夜不輟比十餘嵗皆能暗記不漏一言既而以選拔為縣郡弟子員益肆力於經史子集諸書時國家肇運興創百度以元季科目文字過於冗衍而古賦乃詞章之流遂定新式皆從簡約而古賦易之以論文格既新士多病於舊習而卒莫能變獨先公以經理充為舉業即合其程度先進老生皆推讓之而後學小子有所述作學官儒師必悉令先公為之刪潤焉洪武甲子行科舉先公以書經應山西鄉試一往即領薦明年為洪武十八年試南宫授北平真定府元氏縣儒學教諭年二十九矣時建學未久士荒於習先公以身率之時束以教條比及九年而諸生行業可觀者衆官滿赴闕太祖髙皇帝詔吏部擇儒官可備顧問者吏部以二十員名上而先公與焉每旦禮官引入敘立於丹陛內百官退乃退太祖髙皇帝當御奉天門命諸儒臣講五經先公講書大禹謨音暢義明克動宸聽及罷流輩咸推道焉凡三閲月仍授河南開封府鄭州滎陽縣教諭其先校官以教無成績罷去先公深念教法隳弛無以稱育材意乃擇諸生之秀者列之别室為定程法以嚴督之餘亦因其資使進於學先公率以五鼓而作終日為諸生盡所以誘勸磨礱之道或至日中未食亦不知倦也如是者五年諸生業已就緒以北方罷學改官四川馬湖府平夷長官司吏目其地古西南蕃去中國絶逺時瑄輩皆幼先公㩦持以行水陸間關萬里既至其處則人皆苗獠雜類野無良田率芟山而火之側耕危穫茍以給食江流迅暴每盛夏水漲則舟楫不通商旅殆絶官無廨宇俸無儲積先公不以其地僻惡介意欣然結茅以居資以衣食克己守約一毫無所私於人或至食不繼纍日怡如也先妣復能薄衣食安貧淡以助其亷於上下以賄交者一切閉絶惟於民事則盡心焉若飢渴之於飲食故人雖苗獠亦皆心服而樂道之永樂紀元詔諸改官者悉從舊明年冬復任滎陽舊生卒賴成就而資任用者比迹相望任滿移官玉田勤誨如在元氏滎陽時固無怠人才亦不減於昔九年為永樂十七年徙教鄢陵丁先大父憂去官繼丁大母憂家居五年起復為河內教諭到官未久仁宗皇帝御極朝京師歸道病輿至任卒洪熙元年三月初一日也享年七十有一矣嗚呼我先公自讀書應舉入仕一聽之自然未嘗少屈以干人歷官三十餘年教人治民必勤必盡不以秩卑祿薄而分外有一毫僥冀心是雖不得大行於時而操持施措亦可概見矣先公天資謹厚簡淡寡欲幼即不妄嬉戲在庠序端坐終日出入造次以禮自持交友未嘗至於變色每休假歸入里門恭謹過甚見老少咸接以敬讓無毫髮矜傲態鄉里父老至今談先輩在庠序有行義者必舉先公為首其在元氏迎大父母就養極恭順之道俸廪餘資一錢尺帛皆歸之大父母室而已無私積於宗族尤極念恤於子孫尤極慈愛事上恭而不諛處僚友和而不比奉身極儉一毳襪或數年不易食取充腹而不屑於滋味衣取雅潔而終身無文繡器用粗朴而不求華巧衾褥用大布為之不厭所至廨宇因其故而無所增飭雖或支撑隘陋風雨不蔽而居之裕然囊篋不問有無惟於為學為教則汲汲若不及至白首皆然與衆會集或縱酒喧嘵已獨默然靜處若無所聞者性不喜酒飲不過三爵教人以身先之每日常以雞鳴而起未有至旦而出者教瑄輩為學以正心修身為切要瑄少性急易怒嘗大書于窗曰暴怒猶有亦宜戒之瑄自是痛自克治而不敢恣戒家人衣食以省儉或見飲食稍豐必顰蹙曰汝等不知農作之艱難而乃如是其為學以仁義道德為本析經義以先儒氏説為主為文詞以理勝而不為浮靡論道以三綱五常為大而異端邪怪之説無以干其思嗚呼我先公處心制行為學之正自少至老無所矯易又可見矣重以大父母義方之訓培於前先妣嫓德之賢助於內故居易履順保節逺尤永終官祿歸祔先塋誠所謂善始善終者矣而小子瑄又以庚子河南鄉試忝登辛丑進士第始仕即叨清要所謂鞠育之勞教戒之嚴慶澤之深誠不可誣而罔極之恩既無所報用敢僭托歷官行已之實流涕頓顙表於墓次以明我先公承休於躬衍慶于後者尚未已而我後之人當恪恭孝思永永服膺先德以求無忝所本云敬軒文集卷二十二
