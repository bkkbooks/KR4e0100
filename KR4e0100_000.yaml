body:
  text: 敬軒文集目録别集類五明卷一賦古詩卷二古詩歌卷三歌行卷四絶句卷五絶句卷六律詩卷七律詩卷八律詩卷九律詩卷十律詩卷十一雜著卷十二書卷十三序卷十四序卷十五序卷十六序卷十七序卷十八記卷十九記卷二十哀辭祭文卷二十一碑卷二十二墓志銘墓表卷二十三墓表行狀卷二十四針銘贊章奏臣等謹案敬軒文集二十四卷明薛瑄撰其門人關西張鼎所編初瑄集未有刋本瑄孫刑部員外郎禥以藁付常州同知謝庭桂雕板未竟而罷𢎞治己酉監察御史暢亨得其稿於毗陵朱氏鼎又從亨得之字句舛訛多非其舊因重為校正凡三易稿而成書共得詩文一千七百篇釐為二十四卷鼎自為序引朱子贊程子布帛之文菽粟之味二語為比殆無愧詞考自北宋以來號為大儒者朱子之外率不留意於文章如邵子擊壤集之類道學家謂之正宗詩家究謂之別派相沿至莊昶之流遂以太極圖兒大先生帽子髙送我兩包陳福建還他一匹好南京等句命為風雅嫡派雖羽翼之者大言劫制究不足以厭服人心明代醇儒瑄為第一而其文章雅正具有典型絶不以語録方言縱情破格其詩如玩一齋之類亦間涉理路而大致沖淡髙秀吐言天拔往往有陶韋之風蓋有德有言瑄足當之然後知徒以明理載道為詞常談俚語無不可以入文者猶客氣矣乾隆四十三年五月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀敬軒文集原序布帛之文菽粟之味朱子嘗以是而贊程子矣布帛可以常衣菽粟可以常食聖賢著述立言亦猶是也舍此則竒怪隱僻不經於世若左氏浮誇莊周荒唐是已君子所不與焉先師敬軒薛先生有見於此故其著述立言淺近平易使人易知豈竒怪隱僻不經於世者所可擬哉先生名瑄字德溫别號敬軒世為山西河津人自幼篤信好古博學善記所著有讀書録續讀書録河汾詩集行於世惟文集則先生孫前刑部員外郎禥曽託前常州同知謝庭桂板刋未就今年夏四月前監察御史暢亨先生同鄉謫官陜右道過鎮陽豫因訪前集暢曰某於毗陵朱氏得之矣豫喜而閲之但舛訛非原本矣因倣唐昌黎集校正編輯總千七百篇分為二十四卷凡三易稿始克成編於戲先生文集流落江南二十餘年今傳於世豈非其數有所待與先生永樂庚子河南鄉試第一登辛丑進士宣德丁未初授行在廣東道監察御史正統丙辰擢山東按察司提學僉事升大理寺左右少卿以獄事詿誤間居七年正統己巳用言官薦左遷大理寺丞景泰庚午奉敕總督松潘糧餉事竣升南京大理寺卿未幾改北京大理寺天順丁丑升禮部右侍郎兼翰林院學士入內閣轉左侍郎越五月以疾在告懇乞休致通前章三上方得俞允時年六十九矣天順甲申夏六月終於家朝廷遣官諭祭為營葬事贈禮部尚書諡文清豫嘗記先生設教河汾一時及門之士雲集川滙鼎方十五六先生格言至論耳濡目染猶能憶其一二惜乎少年不及向學大抵先生剛方正大以聖賢為師處已接物不詭隨不屈撓講論經書窮究義理自一身一心推之至於萬事萬物然後約之以歸於一其餘子史百家靡不淹貫究竟至極尤邃於性理之學周易太極圖西銘近思録未嘗釋手常瞑目端坐思索有得欣然見於顔面其學蓋已至於樂之之地矣言動舉止悉合規度可為人法辭受取豫一決於義終日衣冠危坐望之儼然可畏雖燕間亦然居家孝弟忠信對妻子如嚴賓及至接人和氣可掬不語人以其所未至嘗以程門教人居敬窮理接引後學晚年造詣髙明踐履篤實益至純熟其詩文平易沖淡渾成不假雕刻誠所謂布帛菽粟切於民生日用而不可缺者也讀者自當得之豫早侍几席壯歷宦途老無所得追思誨諭不可及也先生歷官政績載在國史其風節道德自有天下後世公論在不敢私𢎞治已酉夏五月端陽門人關西張鼎序
