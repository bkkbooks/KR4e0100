body:
  text: 敬軒文集目録别集類五明巻一賦古詩巻二古詩歌巻三歌行巻四絶句巻五絶句巻六律詩巻七律詩巻八律詩巻九律詩巻十律詩巻十一雜著巻十二書巻十三序巻十四序巻十五序巻十六序巻十七序巻十八記巻十九記巻二十哀辭祭文巻二十一碑巻二十二墓誌銘墓表巻二十三墓表行狀巻二十四箴銘贊章奏臣等謹案敬軒文集二十四巻明薛瑄撰其門人闗西張鼎所編初瑄集未有刋本瑄孫刑部員外郎禥以藁付常州同知謝庭桂雕板未竟而罷𢎞治己酉監察御史暢亨得其稿於毘陵朱氏鼎又從亨得之字句舛訛多非其舊因重為校正凡三易稿而成書共得詩文一千七百篇釐為二十四巻鼎自為序引朱子贊程子布帛之文菽粟之味二語為比殆無愧詞考自北宋以来號為大儒者朱子之外率不留意於文章如邵子擊壤集之類道學家謂之正宗詩家究謂之別派相沿至莊㫤之流遂以太極圖兒大先生帽子髙送我兩包陳福建還他一疋好南京等句命為風雅嫡派雖羽翼之者大言刼制究不足以厭服人心明代醇儒瑄為第一而其文章雅正具有典型絶不以語録方言縱情破格其詩如翫一齋之類亦間涉理路而大致冲澹髙秀吐言天拔往往有陶韋之風蓋有徳有言瑄足當之然後知徒以明理載道為詞常談俚語無不可以入文者猶客氣矣乾隆四十三年五月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀敬軒文集原序布帛之文菽粟之味朱子嘗以是而賛程子矣布帛可以常衣菽粟可以常食聖賢著述立言亦猶是也舎此則竒怪隠僻不經於世若左氏浮誇莊周荒唐是已君子所不與焉先師敬軒薛先生有見於此故其著述立言淺近平易使人易知豈竒怪隠僻不經於世者所可擬哉先生名瑄字德温别號敬軒世為山西河津人自幼篤信好古博學善記所著有讀書録續讀書録河汾詩集行於世惟文集則先生孫前刑部員外郎禥曽託前常州同知謝庭桂板刋未就今年夏四月前監察御史暢亨先生同郷謫官陜右道過鎮陽予因訪前集暢曰某於毘陵朱氏得之矣予喜而閱之但舛訛非原本矣因倣唐昌黎集校正編輯總千七百篇分為二十四巻凡三易稿始克成編於戲先生文集流落江南二十餘年今傳於世豈非其數有所待與先生永樂庚子河南郷試第一登辛丑進士宣德丁未初授行在廣東道監察御史正統丙辰擢山東按察司提學僉事陞大理寺左右少卿以獄事詿誤閒居七年正統己巳用言官薦左遷大理寺丞景泰庚午奉勅總督松潘糧餉事竣陞南京大理寺卿未幾改北京大理寺天順丁丑陞禮部右侍郎兼翰林院學士入内閣轉左侍郎越五月以疾在告懇乞休致通前章三上方得俞允時年六十九矣天順甲申夏六月終於家朝廷遣官諭祭為營葬事贈禮部尚書謚文清予嘗記先生設教河汾一時及門之士雲集川滙鼎方十五六先生格言至論耳濡目染猶能憶其一二惜乎少年不及向學大抵先生剛方正大以聖賢為師處已接物不詭隨不屈撓講論經書窮究義理自一身一心推之至於萬事萬物然後約之以歸於一其餘子史百家靡不淹貫究竟至極尤䆳於性理之學周易太極圖西銘近思録未嘗釋手常瞑目端坐思索有得欣然見於顔面其學盖已至於樂之之地矣言動舉止悉合規度可為人法辭受取予一决於義終日衣冠危坐望之儼然可畏雖燕閒亦然居家孝弟忠信對妻子如嚴賓及至接人和氣可掬不語人以其所未至嘗以程門教人居敬窮理接引後學晚年造詣髙明踐履篤實益至純熟其詩文平易冲澹渾成不假雕刻誠所謂布帛菽粟切於民生日用而不可缺者也讀者自當得之予早侍几席壯歴宦途老無所得追思誨諭不可及也先生歴官政績載在國史其風節道德自有天下後世公論在不敢私𢎞治已酉夏五月端陽門人關西張鼎序
