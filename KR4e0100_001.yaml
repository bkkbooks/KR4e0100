body:
  text: 敬軒文集卷一明薛瑄撰賦黃河賦吾觀黃河之渾渾兮乃元氣之萃蒸濬洪源於西極兮注天脈於滄瀛貫后土之厖博兮杳玄溝之晶明過積石而左轉兮龍門呀而峻傾薄太華而東鶩兮撼砥柱之峥嶸入大陸而北徙兮迷不辨夫九河之故形經兩海而紀衆流兮擅浮沈之濯靈覽頺波而懷明德兮又何莫非姒氏所經營登崑崙而俯視兮固倣佛其初迹馭髙風而騁望兮遂周遊其曲直何末流之混濁兮始清澄而湜湜羌淡灔而徐趨兮勢沄沄而自得觸險石以鬭暴兮詫雷轟而轂擊天宇擴其沆漭兮渺上下之玄黃霧雨霪霪而滃集兮混邃古之洪荒微風蕩拂而渙散兮天機組織其文章頺猋浩而洶湧兮百怪垂涎而簸揚腥雲濁浪以蕩汨兮恍忽顛倒夫舟航靈曜升而赫照兮乘正色於中央望舒在御而下臨兮列宿涵泳其光芒若乃震秉符以行令兮百谷淫淫其凍釋山澤沮洳以上氣兮增滉漾之洋溢魚龍乘濤以變化兮杳莫測其所極祝融載節以南屆兮雷雨奮逹以滂沛潢支流而股合兮百川奔而來會木輪囷而漂拔兮蔽雲日而淘汰狂瀾洶而嚙岸兮塊土焉塞夫衝潰霜戒嚴而木脫兮少昊執矩以司秋洲渚緬邈而石出兮始殺湍而安流霰雪紛其四集兮顓頊乘坎以奮神大塊噫氣而摩軋兮流澌下而龍鱗層冰橫絶而山委兮河伯驅石以梁津羌險夷而明晦兮變朝暮與四時飈風起而衝木兮蟒怪駭其難推覩圓方之一氣兮恆來往而密移昔尼父之歎逝兮跨百世而罕知顧川流之有本兮與終古以為期啓龍圖而玩六一兮悟主宰之所為喟余心之未純兮感道妙之如斯聊誦言以自明兮庶晝夜之靡虧虛庵賦為僉憲泰和劉咸作觀堪輿之槖籥兮恆噓炎而吸寒漠空洞而容納兮神化繼出而源源混真精之微密兮生人物於兩間何此氣之雜糅兮異明暗與強孱物擾擾而並進兮慨中虛之委填雖暫空而還塞兮又何以納夫清言聖覽兹之蔽濁兮啓象告之幽玄上呀然之澤水兮下安安之崇山山中闢以承澤兮澤下浸以潺湲覩咸虛之受益兮知中私之可刋有君子之好古兮質清明而粹完窺羲皇而求索兮仰姬孔以援扳肇佳名以爰錫兮寓虛庵而頤顔闢混沌以為室兮鍵太素以為關列沖淡而為榻兮鋪恬靜而為莞幕天宇之廓落兮鏡止水之澄灣延皓月以為友兮抱虛明之團團撫瑶琴而寫中素兮清風去而徐還步逍遙而徙倚兮悟達人之大觀飲太和而療渴兮味道腴以充餐佩文史之璜琚兮服禮義之衣冠不先物而內植兮恆洞逹而平寬理無微而不藴兮善無入而不安知靜存而動出兮合大化之循環守此度之益敦兮諒感通之何難顧余質之中窒兮慕夫人之間間願相從於廣宇兮長依倚而盤桓雪賦維月之孟陽兮氣栗烈而嚴凝嵗忽忽而遒盡兮閟升降之機扃相重隂之藴杳兮霰雪下而縱橫何玄冥之工巧兮鏤六出之竒形初揮霍而散漫兮遂漠漠而無窮乍大荒之微堊兮久川谷而俱盈灑長松之落落兮玉龍夭矯而騫騰逐回飈而入竹兮磕金石之琤琤被嶔崟之絶巘兮若天吳起立而海波傾訝城闉之方啓兮敞馮夷之幽宫捲前簾而凝睇兮懸旒玉於簷楹九臯之鶴橫空而逺逝兮惟聞夫戞然之長鳴舞瑶臺之佚女兮迷不覩夫綽約之冶容疑地媪之效瑞兮圭璧磊落而晶熒豈清都紫微之既春兮梨花飛絮而交零載瑶車而駕玉虬兮將逺觀夫九野與八紘遵渤澥而東鶩兮渺萬里之滄溟登九疑而瞰南極兮祝融不炳耀其銛鋒循流沙而涉弱水兮歷峥嶸之長冰臨大漠而睨中土兮山川紆曲而齊同天地混融而為一兮又孰别夫濁與清乃旋輈而息駕兮獨惝恍於中庭四方上下皆在我闥兮擴靈府之宏澄探元化於終古兮聊向風而抽情亂曰洪鈞斡運一氣孔遒兮四時相沓而翕闢何由兮陽以隂肅恩若仇兮閴寂無餘而發爛莫收兮蟲牟降伏三白肇休兮嵗薦若兹我將何求兮自修賦皇降豫以衆美兮實清明而粹全胡賦質之不猶兮乃蔽昧而強孱自有識而發憤兮窺前修之閫關誦古訓之數數兮服至理之拳拳雖苦心而極力兮猶未從容乎矩步忽內怛而自修兮吾知其故善既復而或失兮怠與敬其交鶩心暫開而或蔽兮理與欲其紛互此實進退之機兮肇千里於跬步茍決擇之不勇兮將邪贏而正負蓋必於敬於理而保持兮於怠於欲其屏去既經心以自明兮復誦言以自固庶成性之存存兮全上天之所賦思本賦吾行年之匪少兮胡貿貿而靡思善惡原於杪忽兮寖千里其逺而木油油而上聳兮波沄沄而載馳託后土之鴻厖兮本大化之無涯肇總總之衆物兮咸資始於天淵矧含靈之物秀兮孰有不自其先先昭列而在上兮子孫繩其在下或一日而不思兮將原竭而本仆或廣植而不食其穫兮或勤施而不責所負渺河流之汪淫兮潤實漸於遐土啓我人以坦途兮闢我人以大户既登名於薦書兮復顯仕於朝列念積纍之艱難兮恆拳拳而恐失服聖賢之明訓兮索衆妙於微賾仰皇昊之賦畀兮保天理於晷刻謹余識之昭昭兮匪他岐之敢惑潔余身之皓皓兮豈外物之能涅是惟顧本源以自修兮若見親於羮牆行斯百而靡虧兮體毫髮而匪傷堅此志之罔替兮愛此言之不忘敦忠孝而日新兮庶末盛而流長古詩禱雨效韓體盛夏將幾月亢旱何赫炎山澤不通氣水雷更深潛畢亦無所為徒聞挂銀蟾豐隆久喑默列缺寧窺覘螻蟻閉深穴老蛟遁幽潭凡此衆隂類畏避何安恬而獨哆口箕簸揚助飛廉微雲稍欲布驅逐無毫纎隂氣歘將合極力故攪撏蓬蓬太虛內日夕恣併兼既迎望舒轡復送羲和驂遂使平田中百物如燒燖吏民紛祈禱土梗空巍巖擊鼓神弗聞旱氣轉覺添焚巫果何計暴尫信虛談我欲欵上帝上訴箕風讒狂吹既清息長舌亦收緘得使隂陽和坐見雨露霑枯稿總滋遂沛澤皆濡淹室家合飽足兒女無喃喃永荷神力慈式歌大化覃抱此雖自竒臨期復凝瞻玩一齋為栁克新賦靜觀一理大寥閴竟難言惟於流行際特達見本根胡為岐路雜靈妙日已昏玄聖發曽子濓溪啓程昆後哲總超悟殊途集同門吾友展禽裔古道性所敦乃作玩一齋遊處資操存極力屏羣欲篤志收竒勳斂兹義理微芟彼枝葉繁始知千萬緒無不會心源了此匪為易仰視有蒼玄舞陽阻雨留宿清曉發昆陽緑野散朝旭夾道禾黍長泥潦淹馬足東行得平岡舞陽忽在目入自西郭門兩街喜多竹爽氣拂征衣清風戞鳴玉便覺人境偏似有太古俗阻雨留憲臺倏忽經再宿永日覽圖書清宵散華燭念此居處崇內顧王程速敢不勉忠勤而胡遂安欲比邑足名賢王常韓韶炳相續明發登前途回首憶髙躅宿信陽慈氏寺有懷趙侍御二首禪室絶清灑夜景何寥寥白月墮簷隙涼飈拂林梢有客不能寐起坐心勞焦所懷同心友相去一何遙開門望天宇露冷河漢髙恨無雙羽翰奮飛共遊遨秉燭遂至旦詩成還獨謡山寺月皎皎流光入簾帷神清不成寐起視夜何其天漢漸回轉參斗亦西移庭草泫繁露林竹生涼颸撫景念良友渺在天一涯會面曽幾日成此逺别離冉冉易寒暑悠悠隔山陂豈無他人好中情詎能知所願得歡晤以慰平生思舟行野湖中湖水與天平波濤亦何壯我舟駕長風逺破萬里浪玉節方在斯百怪誰敢傍明登嶽陽樓八荒應在望疊前少小心好竒斯遊嵗方壯雲帆拂遙天畫舫壓髙浪青山歷歷過可見不可傍明泊洞庭湖還當極遐望龍陽山行遇雨二首楚山饒古木楚水繞竒石林霏暗不開石瀨瀉何急久行路欲迷嵐雨互蒸濕陟降童僕勞竟日未遑息向晚落葉多攬轡更駐立嵗晚山行深山中水重疊叢篁夾溪橋橋斷橫槎接隂雨竟連朝雲林黯一色虛風忽泠然蕭蕭墜黃葉撫景復何為內顧逺遊客宿山亭山深郵舍孤入門晚色靜四顧足喬林蕭蕭北風徑向夕起重霏窗户倏已暝燃松代秉燭明暗光靡定草草具杯酌何暇梨果飣乃知山林趣足發逺遊興天明登前山清風滿蘿徑瀟湘八景余少時聞瀟湘八景之清致而未得一遊也今年冬來湖南始得親歷而詳覽之遂為八詩以寫其趣山市晴嵐雨來萬壑昏雨過千岫出晴旭楚人家蛾眉晝生緑看看如有情餘光逺相逐洞庭秋月西風淨晚煙天水逺相接瓊樓玉宇深炯炯涵虛白夜久風露寒一曲湘靈瑟平沙落雁霜清秋水落風過人迹平飛飛隨陽鳥相呼下寒汀向夕聚儔侣月映蘆花明煙寺晚鐘夕照下山門清音出煙霧暝壑一僧還側佇尋歸路月上楚天寬霜落洞庭樹瀟湘夜雨兩岸叢篁濕一夕波浪生孤燈蓬底宿江雨篷背鳴南來北往客同聽不同情江村暮雪落落漁樵家蒼蒼起煙霧岸滑移釣舟沙平失歸路似有凌波人盈盈月中去漁村落照釣艇收晚緡歸鴉集疏栁天風吹彩霞明月映江口孤村一笛橫萬慮復何有逺浦帆歸翩翩投極浦漠漠背殘照水柵歌竹枝清風激幽調歸舟漸覺稀錯莫尚凝眺微恙不出客居養微疴久與人事疏早起無所為盥櫛讀我書我書有真味寧比膏與腴膏腴常有厭真味諒難如自得復誰告撫心但躊躇泊舟貽溪宿陽樓山下三首泊舟清江滸肩輿渡回溪微徑入叢篠蒙籠行欲迷轉步忽開曠溪田間髙卑傍水野航小連林茅屋低適遂情景豁寧覺人俗非山堂稍曛黑冥冥子規啼草堂傍溪谷瀟灑無塵埃隱几流水去開牖青山來客情既虛靜逺目何曠哉弭節得周覽外慮仍侵懷村落日已暝山氓猶未回念此不能寐逺抱殊難裁窈窕入清溪側徑何紆曲魚梁截奔流雪瀨漱寒玉空翠濕人衣霧雨滿新竹路窮上野航前登得平陸日暮煙火迷似向桃源宿舟中聞蟬扁舟泛湘水水碧風日晴適有異鄉感忽聞衆蟬鳴凄切篁竹茂斷續楓林青家園舊喜聽客裏難為情時節知已易逺遊心緒驚因念衆兒女依依候門庭雖云憫中私尤當顧王程湘江舟中湛湛湘水緑夾岸叢篁多挽舟逆水上南風起微波嘉此晴霄景逍遙玩江沱沙渚曠緬邈雲岫紛嵯峩逺目為舒暢客意將如何濯纓吾所愛聊為扣舷歌至襄城襄城古名邑山水殊清妍我遊適已再入境心欣然憲府絶瀟灑乃在城東偏停驂得所止景靜俗慮捐修竹滿堂後翠柏當庭前攀折將有贈聊比志節堅念之不能已長謡遂成篇望諸葛草廬我行迫王程訪古少暇日曉出南陽門馬渡消河急舉目眺西岡林木半蒼碧有祠中巖峩云是孔明室使我心慨然攬轡久瞻立憶當炎祚衰四海皆橫溢姦豪競虎吞孰知順與逆公時獨悠然放歌聊自適及來耕隆中日以老所益髙視千古人管樂自儔匹有時發中懷長嘯獨抱膝寧知卧龍姿還為冰鑑識賢哉劉豫州三顧何汲汲問以當世事指掌皆歷歷自兹出茅廬魚水情尤密後來大業興益見前籌力公心果何如是欲靖羣賊復漢還舊都志願乃終畢奈何逢厄運終匪智能及五夜星隕營三軍淚沾臆至今五大原悲風尚蕭瑟遂使英雄士遺恨無終極今來望公廬咫尺不暫即園井定依然遺像想猶昔平林渺寒煙長巒帶古色所貴賢者居孰不仰遺迹鞭馬復南行回想猶未釋朗誦出師表沈思八陳石浩浩天壤間竒才難再得他年擬重來更當展良覿襄陽道中曉醉新野縣午入襄陽境迢遞岡坂長曲折溪流靜入村竹青青便覺異風景惟時霜雪繁嵗晏北風冷中私且撥捐壯觀極馳騁日暮臨漢江窮源思方永扁舟過須臾波濤任奔猛逺行足險夷吾心良獨省登峴山停舟漢水濱跨馬陟峴首漢北渺川原漢南足林藪山水兩回環地氣蓄不走城北一掌中名勝良不偶紅樓杳難即粉堞粲可取虛白瞰逺沙疏翠俯髙栁栁外居人家向背各開牖美哉風景竒詩興濃於酒下馬復山行遺壘髙培塿嵗久悉荒殘戰骨亦枯朽緬思前代爭南北此樞紐典午窺併吞元宋竭攻守兵連歷嵗時良田生宿莽力屈或不支乃為強者有而雖富土疆竟莫絶稂莠明運開萬方稽顙惟恐後浩浩江漢間一洗舊昏垢詩傳二南俗人享百年夀乃知皇力尊澤及生靈厚小臣職觀風登覽匪外誘所願歌升平彌億萬年久峴山羊公祠峴首羊公祠周圍帶草莽重是古名卿舍舟聊一上雪消江路滑氣暖神扉敞捫碑澀蘚痕搴帷綴蛛網字隱不可讀風流猶在想想當公昔年跨馬此登賞顧彼山常存身滅足悵怏寧知千載餘公名蔽天壤遂使山增輝過者悉瞻仰足明仁厚澤不與時世往我來復何為作詩踵遺響遊習家池谷口一徑入蒼山四邊開中有習池水水碧無纎埃泉源初噴薄交流遂瀠洄飛鳥鏡中度行雲天外來微風一蕩拂林影久徘徊寒光空心性俯玩何悠哉愛此不能去載歌寫中懷遊君山寺為愛湖中山遂尋山下路躋攀轉幽邃澗谷亦回互石蹬足莓苔青林雜煙霧前林如有窮嵐嶺乍分布招提壓重湖千里周一顧孤峯四無根形氣自依附山僧復導我窈窕更徐步疏籬野蔓懸老圃寒泉注徑轉山房深重與絶境遇白雲簷外生清風竹間度庭花雜無名嵗晏色猶故澄心得妙觀忘言契良晤愛此林壑清遂薄塵俗務重來待何時尚子畢嫁娶洞庭遇雨孤舟行何遲嵗晚洞庭雨跳波亂明珠隨風揚細縷雲霧失君山波浪連吳楚莫唱斑竹枝别思滿南浦青草湖即事洞庭方始過青草又相續水落湖地寬冬暖草芽緑遊目解孤悶即事忘拘束艤棹觀魚罶援弓射鴻鵠取笑復何為聊爾徇人俗雨後臨雙池時雨夜來歇雙沼朝欲平香草何瑣雜芊蔚繞岸生修竹瀉風露圓荷貼青萍顧此好修客覽彼衆物榮徘徊撫雕檻徙倚當素屏採掇終有贈緬焉起深誠雜詠六首巖巖泰山石靄靄石上雲須臾遍八極霖雨竟朝曛功成不言利收斂不盈分致此豈云逺舉目窺嶙峋溶溶緑池水上有嘉樹林白鳥來何方集此清池潯毛羽粲霜雪和鳴激流音可見不可即徒勞觀者心一舉沖青天虞羅諒難尋江漢豈云廣一葦可以航山嶽豈云大吾將陟周行淇水有菉竹澧浦多蘭芳既自抱孤節還應發幽香合并會有時逺抱非俗量皇天無私厚一雨萬物滋朝樹泫膏沐庶草紛凄其青陽舒景曜谷風扇和熙逺遊涉獻嵗寧不感良時惟山有竒石惟水有漣漪吾心諒誰告耿耿徒自知悠悠世間物邂逅貴有時後來安劉者往日吹簫兒向非附青雲汨沒將何為蒼蒼霜雪幹豈無大厦姿山深少蹊徑匠石慎所遺古劍匪新器古瑟匪新音雖無適俗態知已在所尋充子佩服美感子淡泊心韞櫝固有待無悶良可欽新笋方池錦萍滿花草被四阿生意一何盛新笋池上多緑苔已穿透粉籜方包羅鋭若毛遂頴森如羽林戈朝玩夕已髙舊竹時復過相期保堅節嵗寒心靡他會同院中會同古巒服市邑何蕭條霜臺絶清僻道院無俗囂芳草滋新茸髙栁垂長條石砌滿苔色可以慰逍遙行翳涼景肅顧望白雲迢塵羈豈能紲何用山林招溆浦雜詠三首山縣孟冬交草木盡黃落官署何嚴嚴寒雨灑寥廓讀書三十年志願常異豁柏府既先登憲節復早握蠻荒過三秋征科愧才弱所願採蘭芷聊以比葵藿深念方在兹無欲自欣樂辰沅異風土十月足霪雨竟日復通宵清響徹烏府久客厭聞之晏坐默不語經世志未酬讀書心獨苦往事感中懷良辰復誰許悠悠付深期取適自容與溆浦絶小邑昔無名士遊我何秉憲節來此乃淹留庭前髙木落屋背荒山秋公廳靜苔色風雨寒颼颼離别感時節得無念中州深衷如可致過是非所求山館稅駕日亭午愛此山館清藩籬翳嘉木但聞幽鳥鳴開門逺翠來白雲望中生便覺臞者肥似有戰勝情野蔬足充餐作詩紀兹行渡雙溪雙溪始合流崖渚遂經復洄潭一鏡平秋影空寒緑野渡得孤航山家帶喬木適意方自兹前呵戒僮僕撫景重悠然誰能和斯曲沅州元夜五溪古荒服連延列邊墉自從啓明運便已變華風民俗競佳節適與中州同我來一何久三見春燈紅竊食飽官廪曽無分寸功豈不愧伐檀還應感飛蓬今夕復何夕列炬當庭中行翳修竹枝吟對梅花叢玩此嵗寒物舒我天遊蹤言歸即當歸挂席湖江東贈趙彬黔中山水竒産物亦秀異丹砂色光炯黃金質精粹碧舂石汰淘汞煉土騰萃其他楩楠樟挺特皆偉器因念上天公造物無私智不應山水靈而獨鍾斯類朅來客沅州果愜向所意趙子生其間不與凡猥厠神完骨亦清最得二五祕卓從少小日即負逺大志蠻荒乏師友買書自從事子集聖賢文左右悉堆置抽覽無停晷一一欲強記晝誦聲聒鄰夜諷響穿市寒暑忘冷熱飢渴失滋味停蓄才思深馳騁筆鋒利出語動驚人縉紳悉推避勤苦凡幾年鋭氣久仍肆邇來加斂收精識亦超詣雅欲求本根不獨誇文字我昔從先人壯遊滿天地邂逅多賢豪殊趨各同志談論隨有得皆足飭昧稚自忝臺閣官遂攬湖襄轡方懼過不聞深恐德將墜忽於僻逺中得子喜不寐我愚藉子砭我失任子刺所以愛子心誠實不虛偽觀彼物怪瑰時尚亟搜致况賢治之禎尤為國上瑞四門方洞開四目方逺視明堂要梁棟法駕用騏驥子當寧厥需會起靡天翅題太極圖大小圈十箇都在一圈上如是究竟言一圈也無象古詩十二首爰初闢清濁悠悠千萬年三墳既已失古道茫昧然神聖既有作人文漸開宣義軒御元極堯虞運中天粲粲河洛祕密密精一傳太和良自兹玄功竟難言萬理如何即寤歎窺遺編窈然觀化始本自同一初聖者惟其性大道蟠皇輿云何千古後岐路如錙銖西學外形器玄宗暢清虛滔天勢方漲捧土誠為愚不有諸老力生民竟為魚寄語後來人慎莫迷所趨行鴻暢逺澤鳴條沛時雨白旄一以麾九鼎奠中土三后同一功休明諒難伍云何王風頺故宫滿禾黍大雅遂寥寥遺音獨凄楚悠哉復悠哉白雲在髙阜水火非無功焦溺亦由此所以玄天機千載莫能理君子得其操小人迷所止四海豈不遙發軔良自邇泰山豈不髙舉足不踰咫薰風愜民心簧竹蕩人耳善惡反手間胡不慎其始七百卜公旦萬世期咸嬴豈不同所願天道有虧盈岐山麟鳳集函谷虎豹爭趨舍乃如此大運焉得并蓬萊舟始泛博浪車已驚遂使三秦士不獨驪山坑已矣勿復言九宇皆炎精靄靄商山雲招之正徘徊冥鴻一以縱畢弋胡為哉寧知羸豕壯蹢躅多毒猜沈沈辟榖子為謀一何乖向非平勃力炎靈遂如灰獨有周南篇歌之有好懷山空魍魎出天黑鴟鳥鳴姬轍既東邁岐路殊縱橫青牛適西域大鵬抵南溟談天竟何益刺股徒首兵紛紛險譎輩瑣瑣難具名有若迷方客甘心棘與荆不有仁義篇何由覩天明吾意六籍外尚多古人書一朝秦熖裂焚蕩無遺餘掇拾煨燼者補綴誠區區訛缺固已多盡信寧非愚獨有羣聖心昭哉難翳如多謝宋諸老萬世開迷途季子多黃金張儀富秦土腐鼠爭飢鳶鹿豕競貪虎周道久已非王綱如綴縷巖巖養氣翁鳴鳳獨髙舉圓方遍九州周覽無定所天飈激和音雲漢濯文羽大道今依然捭闔安足數日月自有明隂陽自有行萬物紛變化人事更衰榮云胡道術裂瞑目談丹經泛海竟茫然樓居亦虛名自古良若兹擾擾將何營聖人無曲行大道無邪岐云何周轍東驅車迷所馳楊朱學仁義莊老尚無為申韓首法俑蘇張倡危機遂令千載下道術日以支憔悴莫之恱淳朴諒難追此語匪為誑書上有其辭易莫易玄穹簡莫簡坤土聖心本虛明條達無曲阻如何末學差﨑嶇躓榛莽二者袪除之明白可深覩多謝古老心相將踐斯語秋日雜詠四首庭樹生秋風微涼入衾枕久客得無思逺意復誰諗道腴足充餐天和可當飲以兹撥離憂僻好安所稟大義自古來旋履吾已審翻翻髙荷葉秋雨生微涼豈不懷逺道撫時坐空堂何以為我歡簡册多遺芳古人不可作古道不可忘兹理將無厭欲語墮渺茫安得忘言子相與傾一觴亭亭紫玉竹爾節豈不堅託根自有地勿羞桃李顔桃李固妍好爾節重自保請看君子心浮雲湛秋昊粲粲黃金花繞砌顔色好豈不重所思焉得致逺道逺道不可忘感時歷炎涼人心豈此異保爾秋節香述懷少小習書史政自賴先德十五慈見背四十嚴永訣追思鞠育恩俯仰肝腸熱中心恆拳拳每懼有遺失早忝科第登中厠縉紳列榮耀既連綿聲名頗烜赫小子心不然自顧真有缺國恩未酬報孝祀久虧越祇命湖湘間久載憲府筆一往三年餘及歸有華髮家室寄中原無産給衣食大兒亟假田農作不遺力次男失學慣遊惰無儔匹三子雖孱懦芻牧無休息昌子最癡小奔走百不識寒即索母衣飢則索母食老妻亦何為頻年苦煎迫上以奉繼姑下以撫兒婢執㸑色焦稿補綴眼昏澀我雖官在朝蓬梗真浪迹及歸苦告訴數子俱未室生理况蕭條僑寓亦何益我復對三歎此乃共所恤顧我有王程尚敢懷私適勉強數日留慷慨一旦出悠悠離蓬茅行行向金闕路從黃河過舟自衛水發舟中忽有懷所懷何歷歷吾聞古人言老窮當固節况我筋力強所願豈契濶誓將篤忠貞于以守清白上隆唐虞治下布雨露澤祖禰如有神光賁亦行及拜恩省先塋勒石紀世烈栽桑汾水南廣土中條北既足紓困頓還可樹逺業男女各婚嫁親戚共周急此事良可期援筆聊自釋臺中歸習僻已成性於人懶將迎日暮臺中歸掩户親一燈但取書笑樂不顧俗重輕自得復誰語兹道將吾成一室奉使三年歸京華營一室一室陋且偏入門惟四壁豈不憂窶貧所貴稱達人家無倉廪儲心有宇宙春蝜蝂復蝜蝂顛𡨕不知返周道能摧輪不在羊腸坂惟河有天源惟山有崑崙擾擾勿重陳宴坐思探元題思顔卷零零雨露滋肅肅霜氣寒時物代榮悴君子感所觀所觀一何苦時運靡終古俯仰天地寬思父復思母夢寐如見之溫溫金玉姿行坐或可覩冉冉霜雪絲春風若在室機杼倚虛壁咳唾落珠璣琴瑟當窗急顛倒將無厭而不間毫纎幽感鬼神泣明被日月霑所以永言者誠孝不容假朂子勤蓼莪短章代風雅古詩二首驪珠出九淵炫晃稀世寶緘藏俟良價賞識待終老云胡知者稀衆道魚目好君子復何憂溫明但自保津人善操舟慣捷輕洪淵來濟者誰子濡溺幾不全顛倒受嗤薄中懷詎能宣請陳經濟略視彼蠛蠓然夜坐二首銀燭一寸光照我千古心心事諒誰語秉筆空沈吟幽懷載草草妙思彌愔愔豈無揚子雲視昔猶視今滄海豈不大井蛙良自餘至言豈不美俗士恆苦拘賢哉顔氏子妙領非真愚若人不可即郢質將焉如讀陶詩靖節一何髙理鑿時運表返耕甘苦飢棄世樂枯稿所以見諸詩淡泊出天造掩卷思其人清風起林杪示兒我祖自奚仲奕代河東居家本尚儒素業豈羞寒虛先君紹前烈奮迹由詩書勤勤教諸子為善樂有餘藐孤欽誨言而敢忘斯須憶從向學日爰自丱角初吟哦竟朝昏誦習忘飢劬收斂心自得放佚已不趨周旋恐失墜日奉庭闈娛立年忝科名嚴訓尤渠渠進學固無怠即仕其慎諸承歡曽幾何風木俄悲吁追慕復何及首疾心更愈中間趨明詔皇渥彌寰區祿有不家食官有臺閣居循才覺孱弱索報知蔑如以兹寵若驚自治如災畬更念汝四子賦質各有殊當思祖澤長勿貽汝父虞汝父豈可師不有賢聖歟孝友亟敦勵心性勿填淤匪善人莫交匪義財莫需止酒戒狂誕窒欲謹湛孺從欲劇墜石放言甚奔車言多必招戾惡積終隕軀人生有定分造化司柄樞窮達由天然富貴非人且斂迹甚勿競閉户宜自慮但使德學充不愧金璧儲達即思致澤樂即思賢儒小子敬所植永久期無逾新燕髙堂新燕子當晝語喧聒雙雙葺舊巢銜泥自寥廓巢成去還來莫負明年約楚楚者誰子楚楚者誰子意氣何軼人居若無儔匹獨步莫敢親姬公雖大聖尤尚吐握勤此道久已非擾擾勿重陳翩翩誰氏子翩翩誰氏子鞍馬殊輝光入門佚興發促步登髙堂妖姬列左右哀彈送清觴酩酊百不憂但願白日長答趙彬十首余知趙君將十年矣近又會於京師惜乎余力不能振之也雖然君子求其在我者而已用舍遲速非所汲汲况如君者又當待振與否能為之輕重者哉余近有山東之行君以十詩見貺反覆誦玩益知其所存之不苟但稱許區區者有所愧耳情不能已輒依來章以答其意云美人生南國艷色世所稀明眸一回顧草木生光輝我行重嗟惜便欲携同歸贈以青玉案貢之黃金扉如何久契濶此念將無違右答冀北生騏驥仙山有髙梧玄圃足修竹飄然九苞鳳下覽遂所欲流音散天飈文彩絢朝旭泰和良在兹瑞牒光前録右答青青嶺上松層雲生岱宗時雨遍東海杏壇宛如昨聖人教猶在况當時運熙文風盛而藹翹翹士林英無不生光彩我行亦有為棫朴詩當采右答屈軼生堯庭峩峩憲府臺鬱鬱臺中柏顧我樗散姿繆作乘驄客悠悠今幾年區區竟何益寧知憂窶貧但自保貞白中復荷寵光分符海東域得觀鄒魯風載霑詩禮澤皇仁一以敷菁莪共欣恱猶有江湖心時將戀天闕右答泰山何巖巖馳車出都門遙遙指齊魯念子不能别對景獨容與垂楊裊薰風輕塵裛朝雨仰視雲間翼分飛無定所丈夫方有為離憂寧足苦願保金玉躬潛修繼前古右答扶桑日初出鷦鷯在一枝鯨雕起千里達人足大觀曲士焉足擬所以君子言觀海難為水大哉天地間舉目皆至理努力探化元髙歌望吾子右答丹砂生楚國天運行不息君子恆法之乾乾不自己汲汲非所私仁義存諸身有蓄必有施既非淺俗觀當負逺大期吾子安厥需彚進寧非宜右答日月易流邁丹山有文羽和鳴向青霄滄溟有潛鱗一夕摶扶搖如何賢達士甘心向漁樵諒懷肥遁志恐負山林嘲休明盛夔契于焉共逍遙右答珊瑚生海底吾觀天地大萬物同一源如何末學差坐此枝葉繁鉛華滅素質雕蟲失本根憶昔南遊日得子同晤言圖畫發幽祕身心契真元邈哉追前修此道期共敦右答天道久不講古來賢哲士用舍皆無心所以窮達間一節良可欽趙子不浪出客居時光臨矢心永無斁感子金玉音右答古人重見處敬軒文集卷一
