body:
  text: 敬軒文集巻十六明薛瑄撰序送僉都御史李公陞秩序景泰元年春聖天子作新政治大簡賢能擢任都憲以巡撫方隅肅清部屬于時貴州方用兵討叛苖四川給兵餉率取道播州以往播之四境皆宻邇賊巢蠻獠往往乘勢結黨類據險阻以剽刼餽運甚至蜂屯蟻聚攻城邑掠傳馬焚民舎以流毒逺邇播州幾將危不可守糧道殆至阻絶今僉都御史李公時任四川憲副聞播州告急即馳往救之及至指授將帥方畧嚴立賞罰以忠義激士卒之氣或潜擣賊巢而乘其虚或分擊賊衆以弱其勢將士奮力屢戰屢捷兵氣既銳羣蠻潰散因遣人四出大布朝廷恩信開其自新之路由是林蠻峒蜑懾威感恵狐䑕遁服不日而冦跡殆絶播境落然向之危者全阻者通餽運安行無警故使貴之將士食足得以成討叛之功者皆公全播之力也事聞朝廷因遣使賫勑就陞今職且俾巡撫四川凡軍旅政事皆得以便宜處治時瑄來董餉適㑹其有陞秩之命因竊念瑄昔自内臺出僉山東按察時公已自由進士擢官御史是後雖絶不相㑹者二十餘年而公風紀聞望揚乎内而振乎外者則隠然嘗接聴聞瑄去年起家承乏大理忝與在朝公卿之末議聞其論天下外臺得風憲之體者每以公為稱首且以其未得重用為嘆今兹公既陞秩有都憲之榮又受命有方隅之寄朝論之公斯為允愜雖然公全播之功固大迹其所以成此功者由其忠賢之實素所蓄積者非一日也然古之賢人君子於己功愈大而賢愈彰公負俊偉傑特之才必以古之大賢君子自處愈勵其功愈勉其賢又將躋崇庸參大政决大事樹大功於天下垂聲譽於無窮是豈特立功名於一時而己哉瑄樂道人之善而祝其有大就者也故書此為公贈栢臺春霽序自漢以來風紀之署或曰御史府或曰内外臺即今之察院也臺曰栢臺或樹栢於臺也栢臺曰春霽春者發生之時霽者光明之日也泰和羅君承彦由名進士為才御史名其巻曰栢臺春霽得無意乎人皆知秋冬為收歛之時雪霜為慘肅之氣而不知陽春光明發生之機實兆於此也御史之職其立於朝則毅色正言以論天下政事之得失以察大小百官之邪正其巡歴部屬則剔拔姦蠧扶植善良以澄肅一方之官吏内外之疑獄秋官之不能辯按察之不能理郡縣之不能决者皆歸之御史為之直其枉雪其寃故其任綱紀耳目之重峻拔風厲端方凝肅持三尺以明天討真若秋冬之候雪霜之為氣凜然之可畏也然囘幹政事之得失進退百官之邪正含痛茹寃者為之洗濯剔白變翕聚之機為亨泰光明之氣象此羅君以栢臺春霽名巻者為有意也君今年夏領節來按川蜀間以其巻示余且求為序余既論其梗概於前矣川蜀去京師萬里屬吏清白汚濁之狀小民幽逺隠伏之情與夫積年滯獄之不得疏理者皆巡歴之所當急也君以是自名其巻殆見行臺所至清白顯而貪濁黜幽隠達而滯獄清如春和景霽而川蜀之民咸被其煦育之恵燭耀之光風紀之振孰有過於此乎雖然是特一方之政耳君方年富而志强氣清而才銳自是歴階以升推栢臺春霽之意於内臺於天下施之無不達則人被其澤者其有窮乎若徒以憲署春和景明優㳺自適而不以先務為急則非所望於君亦非君之意也贈僉都御史李公平蠻序敘之筠髙戎珙四縣民雜華戎僻居山谷景泰元年春其編户之蠻民與永寧諸蠻聞討貴州叛苖川蜀之精兵悉發以往乃潜相誘結乘勢為亂逺和邇應蜂屯蟻聚不可爬梳既焚刼山谷諸縣遂散其醜類東掠江安納溪南攻永寧官民廬舎男女財畜多被其焚毁搶虜近賊城郭皆閉門警守軍民率徙家奔竄全蜀為之騷然不寧于時四川三司調集民兵自敘以達納溪沿江列營壘為防守之計涉春及夏屯戍既久無能决策進兵者上乃遣使賫璽書命都察院左僉都御史李公督軍討之且聴以便宜從事時公方董播州之役聞命即馳至江口歛諸屯戍民兵為一以其未閑教也亟命諸將練習之逾月知其可用乃先遣知鄉導者入蠻境以觀地勢咸以下羅計扼賊衝要且糧道便利可以駐兵公即率諸軍進據其地公觀地圖烏䝉芒部二府當諸蠻寨之後且其與叛蠻為類不有以結之蠻賊急走其地將連謀為我敵矣乃遺二府土官重錦各一純使拒賊後實解散其謀也又遣一軍屯江口為下羅計之聲援戎筠皆分兵為犄角之勢部分已定乃集將佐議攻取之計皆謂公規畫審宻如此賊已在術中矣以兵擊之易若摧枯拉朽耳公曰不然討蠻冦當用長謀逺筭先布威信以招徠之尚有不服誅之未晩且蠻賊比之禽獸勝之不為武惟不戰而使之來降計之上者也方今天子聖神仁明且璽書許以便宜從事雖曰督軍致討實欲以徳懐柔之也遂掲榜出令曰諸叛蠻有能自拔來降者貰其罪負固不悛者兵誅無貸時未幾蠻首聞令來降者踵至公復勞以酒食遣轉告諸蠻之未聞令者三月之間蠻首悉詣軍門請降盡還其虜掠之老小公乃陳兵集諸蠻諭之曰天朝總統萬國威令所加無强不服爾蠻乃無故相率為亂以王法言之必誅不赦惟聖天子神武慈仁以爾蠻𡨕頑無知故不忍即加誅滅略爾既往之愆開爾自生之路自此以往當謹守約束共饗太平若仍懐反側即誅無遺種羣蠻皆惶汗伏地曰願永遵條教不敢再萌前惡公即散遣羣蠻使各還其居罷黜諸縣官之貪暴無狀者選賢能為令佐以招徠撫摩流散瘡痍之民蠻冦既平逺邇之心遂以寧輯師還四川軍民父老填郭溢郛懽呼前後迎公以入藩臬都閫文武大吏咸賀公之成功公曰是役也皆聖天子之威徳將士之用命某何功之有藩臬都閫諸公既相與言曰惟此敘功實僉都公之成公又推而弗居其賢愈不可及不可無文以張其事乃相率來求余辭以贈之予謂僉都公伐敘蠻兵不刓刃而坐致一方之寧息是雖聖天子之明能委任公以便宜之柄然非公深知懐柔為上䇿其孰能宣布聖天子丕休顯徳哉及羣公賀其成功又推讓而不居誠得大易勞而不伐有功而不徳之義矣且僉都公之美績如此將見朝廷陞賚之命不日而下寵冠方隅名光史䇿雖欲辭之不可得也贈四川大㕘楊伯玉序人之㑹合出處豈偶然哉盖皆有理存乎其間也正統紀元之夏余自内臺出僉山東按察事一時多君子之僚同官楊君伯玉與余情好尤篤不數年間伯玉任滿陞四川㕘議余亦誤䝉朝廷拔擢承乏大理少卿正統七年伯玉朝覲京師余得與之一㑹又明年余以不能厥官放歸田里遂躬耕河汾之間分將與世終老無聞西望川蜀江山萬里雖欲與伯玉再㑹知其必不可得已前年冬余復起家為大理丞無幾何即有川蜀董運之命復得與伯玉㑹于此夫以余之老劣無能退耕田野伯玉之精明練達叅佐大藩出處途異相去萬里已謂兹㑹之必不可得而乃今得之所謂有理存乎其間者信不誣也且理者天而已孟氏以行使止尼皆歸諸天其不以是哉今伯玉九年考滿余亦上章乞老于朝伯玉既將東去余得報亦且北歸矣後來㑹合又未可必余與伯玉亦惟皆聴於理之自然復何容心於其間哉伯玉敭歴内外風紀之司陟叅大藩旬宣之政其處心其操行其事業其聞望卓卓在人耳目今兹考績之行自有重用老成之典在固無庸於贅言姑序余與伯玉之㑹合出處皆有理存乎其間者以識别送鄭侍郎歸省序景泰三年春南京刑部侍郎鄭景陽以其尊府侍郎公年及八十有四上章乞歸省於家詔允其請戒行有期京師士大夫與景陽逰者咸屬予序以贈其行予與景陽為同年進士知景陽為尤深景陽自給事中累陞秋官左右侍郎值聖朝舉推恩之典其尊府兩受褒封之榮皆如景陽之秩今景陽之歸去其家廬之舒城水行不滿千里想其升堂展省之際命服在躬樽俎在席昆弟在列子孫環擁於先後親朋盈集于庭闈以次奉觴而祝其尊府之壽考康寧者内外同然一辭循循秩秩愉愉怡怡徳音和氣藹於鄭氏一門天下之榮且樂孰有過於此乎雖然景陽之尊府所以有此榮樂者夫豈無所自哉盖由徳為之基也余嘗聞景陽之尊府好讀書急於行義惟以孝弟忠信教其子孫而語不及私利其子孫又能恭順敬畏而不忘其義方之訓居家脩徳于其鄉為仕脩徳於其官孝弟忠信之行充諸内而達於外故景陽得以荷朝廷之寵光其尊府得以饗子孫之榮養貴富以徳致故其事有足稱者使其無徳以為之基雖有如昔人貴出一時禄厚萬鍾備軒冕三牲以奉其親者人將以為幸而致亦何足道哉景陽行矣展省之餘其尚遄歸官署益擴其尊府之訓専心一志脩其徳而盡其職推而為國家之偉績著而為刑期無刑之事功始終一節惟徳是崇又將播之聲詩勒之金石垂之後世于以顯揚其尊府之徳譽於無窮又豈特快榮樂于一鄉一時而已哉予弗獲辭所屬遂書此以贈之送陳僉憲永言序皇明内設都察院各道外設按察司以綱紀百僚作興政治御史憲司官為朝廷監司耳目之寄得其人則綱紀以振百司以肅而天下之政治為之興起列聖相承咸重兹選御史必於進士及有望儒臣擢任憲司有缺員必於御史有操為者陞用之而凡吏胥雜進之才皆不得預焉風紀之職厥惟重哉陳君永言以名進士任南京山西道監察御史操守堅正於衆之所嗜好者輕如鴻毛不為區區外物動其中逮兹歴職五年清白之節始終如一日其疏時政雪寃抑剔姦蠧撫善柔擊豪暴皆以公平剛毅行之而無所囘互曲撓不惟風紀振于畿甸而為文武庶司之所稱揚雖一時同官咸推以為不易及其於耳目之寄殆無愧矣哉由是聲名著於兩京適陜西僉憲有缺員天官即具述永言所以能官之狀于朝上即陞前職詔使便道之官繡衣諸公相率來請余序其行夫風紀之重永言之能余固已言之矣今兹闗陜之行永言但當益思所任之重愈勵其節而以其已誠于内臺者擴行於方岳之間政事有壅滯必思所以達之刑讞有寃抑必思有以伸之姦蠧在所當去柔良在所當植强暴在所當擊與凡風紀之當為者以次脩舉而無替其前日公平剛毅之心行見風紀振於闗陜者將倍於南京矣近年方岳藩臬之臣有聲績入而為列卿都憲大僚往往有之誠使永言之聲實著於闗陜流于天朝其入膺重用之漸盖可期哉送朱知府赴任序古者封建五等之國分土不過百里下乃五十里而止耳後世列郡土地之大者方千里小者亦不下六七百里其視古之侯國盖加數等生齒之繁動以萬計而凡禮樂教化之宣布法度綱紀之防範民業在所敦厚浮末在所懲抑官吏在所廉察盜賊在所消弭與夫租稅儲積軍國之需疆域城郭保障之方皆萃於郡守之一身得其人則百政備舉方千百里之民相與熙然以寧不得其人則庶事墮弛人有不得其所者多矣是則今之列郡重於古之分土者較然明甚以是國家選用郡守必於耳目近侍六卿之屬有才賢聞望者擢任之南京山東道監察御史朱廷儀為天官推選遂受朝命陞知湖廣常徳府事將行其内臺同官諸公偕來請余文以贈之夫郡守寄託之甚重朝廷選用之匪輕余固已言之矣余聞廷儀以其尊府國子先生希亮家庭之教其講夫脩己治人之道必以古聖賢為師法故廷儀自舉進士登風憲振綱紀去貪猾雪寃滯恤民隠以及巡歴部屬閱練軍士靡不正已以正人由是能聲赫然彰著於兩京盖推其家庭之學見諸行事者如此今兹之行常徳為荆南之大郡襟黔巫而帶江湖方百里盖八九民庶散於山谷川澤之間所謂禮樂教化刑政綱紀之宣布防範民事吏治冦盜之廉理清肅以至錢穀封畧之區畫廷儀行將次第舉行而無遺又豈待於余言哉然風紀民牧事體雖殊而治理則一廷儀疇昔之振風紀既以正已為先今其綂一郡之民布一郡之政獨不在正已為本乎已正而左右僚吏正屬部正以至庶事無一之不正則事脩于几席之上而人得於湖山之外所謂千里之民熙然相與以寧者有必然矣古之賢諸侯多入而輔朝政漢之郡守有治績者或徵為相天朝在廷大臣有缺亦於外郡守有能聲者陟用之夫以廷儀之賢固安於所職而無僥望之心然使他日政績茂著聲名揚播則公論有所歸廷儀雖欲緩入用之期其可得哉是為序送于知府赴任序大理古南詔之地唐虞三代不及以貢賦漢唐宋歴代不登於版圖惟我皇明有天下徳威誕敷無逺弗届由是南詔之地列為雲南布政司而大理則為雲南之大府八九十年之間朝廷禮樂教化之所漸被而南徼之俗稍變而有華風然以其地去京師萬餘里尚有獷悍未盡革者故視中國諸郡為難治朝廷選用牧守必於風憲近侍中有操持幹局練達時俗者俾往踐其任由是南京户科給事于廷玉為天官所推薦有知大理之行命既下南京通政司叅議李震偕黄門諸公來請序其事以贈余謂大理為雲南大府地控諸畨人雜苗獠其視中國諸郡雖曰難治然地有險易之殊而心無彼此之間廷玉誠能正已心以正其左右以正其屬吏以正其編民凡典章法度為治之具無非心之正以推行之則彼獷悍之難治者皆將各以其心而體廷玉之心不勞於刑法之嚴峻智術之籠絡自皆感化於正而相安於無事之域又何難之不易哉使不能以正心為本而徒騁乎刑法智術之末以强其人之必從雖易治如鄒魯之民亦將扞格而不可化況逺人乎夫不遇盤根錯節無以别利器廷玉由名進士列官近侍者有年今既以操持幹局練達時俗之行之才為朝廷之所簡擢以牧逺郡之民必能正心以為政如前所云者則彼難治者將不見其難而但見其易于以樹柔逺之佳政於南服流清淑之令譽于天朝則考績之公論有在廷玉雖欲辭崇髙之峻步其可得哉是為序送劉知府赴任序景泰三年秋南京刑部湖廣司員外郎劉茂先以吏部移檄知四川重慶府事將行其闔部同官來言於余曰茂先老成士也為永樂甲午山東舉子初授監察御史兩任開封彰徳府惟一叅都督府戎政五轉而陞秩秋官敭厯中外者四十餘年矣持身謹飭無愆尤之及所至俱有聲績近為大臣所推薦受朝命陞知大府吏部檄俾便道之官行有日矣願先生一言以張之余惟今方岳之間旬宣有藩垣監司有按察皆挈治民之大綱而已至於郡守則於治民尤親而重者其政自府而達之州由州而達之縣民之休戚係於州縣郡得其人必能正已以廉問州縣吏治之得失能其官者奬勵而舉揚之貪虐病民者條奏而黜罷之使州縣之吏舉稱其職則小民遂樂生興事之願無愁苦歎息之聲而藩垣不勞於旬宣按察不形於糾劾而一郡大治矣故自漢唐宋以來選用牧守率難其人朝廷近年尤重兹任往往選臺閣之臣有名望者出知列郡夫其任之也難則其責之也重得與兹選者其可不思所以副朝廷選任之意而盡其職哉今茂先以老成練達之才受知重臣拔自郎官出知大府誠欲盡其職而副委任之意惟能推余所謂正已以廉問州縣吏治得失之言以行之則千里之民䝉其恵於下藩臬二司安其賢於上而重慶之治績將冠於川蜀之列郡矣茂先其勉之哉是為序送楊恒健先生歸徽州序景泰二年冬禮部尚書楊彦謐承詔調南京大司冦余亦奉命承乏大理與彦謐偕來之官彦謐道語其家故錢唐先考尚書公洪武間教諭星子叔父侍先祖就養後尚書公以教有成績兩任邵武徽州教授丁先祖憂服闋遂家于徽州于時某與弟宜俱幼鞠於叔父教以經史諸書遂皆有成立某登進士第歴任秋官陞侍郎再陞禮部尚書今調官于兹弟宜亦由科第為御史每念其兄弟所以累荷朝廷之寵擢得至顯官饗有厚禄者皆先尚書公之積善餘慶今叔父之教育大恩先尚書公既早世養已不逮矣今叔父家居康寧吾不可以無報彦謐之官明年九月遂迎其叔父自徽至南京其叔父即恒健先生也于時彦謐同逰在京諸卿大夫皆往拜先生于門彦謐旦夕啓告定省承顔温色所以怡其心志致其甘㫖之奉者靡所不至盖移其欲孝尚書公者以孝先生也居凡幾月適彦謐之弟宜衣繡持節亦使廣南道過南京乃得拜先生於彦謐之官舎叔姪兄弟遂一時之㑹合天下榮且樂何以加於此哉既而先生將歸徽州諸卿大夫咸謂余宜為文以贈其行余惟彦謐嘗談其先尚書公之世徳始終以及其叔父恒徤先生之鞠育教誨而克有今兹之光榮盖皆感念存殁仁孝慈良之性發於心而見於辭者及先生就彦謐之迎養彦謐又盡其所事之誠孝如此先生有猶子如彦謐者固已充然而樂無不至矣又適彦謐之弟宜衣繡持節便道省謁則其樂又何如哉先生今之歸也其子姪之仕者既能秉公正廉清之道盡忠孝於國家其子孫之處者必皆習禮義退讓之教盡忠孝於鄉里忠孝之行萃於楊氏之一門不惟可為鄉邦之矜式亦可垂諸後世而為忠孝勸矣雖然京師去徽不滿千里今先生之歸興雖切而彦謐孝養之心未巳也時和景良先生尚數來逰以慰彦謐之心則慈孝之風益可仰也是為序送鄧大叅赴任序景泰三年冬福建鎮守大臣走驛馬上章闕下以福建布政司左叅議員缺乞選老成持重有施為者來任其職前四年時福建境内冦賊竊發流刼為患雖官軍討捕久已寧息而民困於輸給掊歛尤甚數年之間凋瘵尚未盡復而危疑在所當安故大臣奏欲布政司叅佐得人如此之急且重盖以安民之政出於旬宣也鄧君不二由名進士兩任刑部主事陞南京刑部山東司郎中凡十餘年持身敬謹不妄有所為用法平而恕凡事情之盤錯難析者不二剖决之立得其理所謂老成持重有施為者不二真其人也先是大司冦楊公應詔薦舉賢而在下僚者以不二為首章上未幾適福建缺官奏亦至天官乃具履純之行于朝上遂擢為福建布政司左叅議且使馳驛之任命下秋官與不二交逰者來請余文以贈之余嘗竊念我太祖髙皇帝混一華夏仁義禮樂之澤涵養煦育無間逺邇八九十年之間海宇民物熙然寧息惟時福建之民即前日之民也何前之感恱誠服者如彼而近年之冦賊竊發者如此雖其弄兵假息之誅不容貸然為之長而司方隅牧民之政者其可不求其故耶往事既已然矣今不二藴所有負所望當大臣奏請之急為司冦天官之知荷聖天子之明陞貳旬宣其可不思所以盡其心哉必當推其在秋官素所蓄積施為者於大藩潔已以正左右俾大小之事無一不出於正持正道以臨下欲民之安必先去其病民者大而貪殘守令在所當黜小而豪猾吏民在所當治牧守得人豪猾歛迹小民無朘削脂膏之苦無吞噬兼併之害則向之凋瘵可以復而危疑無不安庶有以廣國家涵養煦育之澤如前時而連東南數郡之民莫不樂生興事室家相安方將頌太平之治歌旬宣之良不暇又豈復有近年之患哉不二之政績既著於南服其聲譽自流於朝右又將躋崇庸叅大政而所施者詎止方隅而已乎余以諸君之請不獲已既祝規之又期望之是為序送黄僉憲之任序聖朝外設按察司以綱紀方岳之庶務廉察百司之邪正與凡時政之得失生民之休戚皆得以直言而無隠其職分行事與内都察院各道相表裏官之亷明忠良者得以舉揚而奸貪廢事者有司自六品以下皆即逮治五品以上及武職則奏請擒拏隨其情之重輕謫罷懲艾之按察闗乎政體之大而受夫委任之重如此居其官者其可不思所以盡其職哉南京雲南道監察御史黄君廷永領福建之貢元登進士髙第學知有用自任風紀潔已正人持公用法直言正論深達憲體之宜故其聲譽振敭乎兩京值朝廷大明黜陟遣大臣巡考藩臬諸司之不職罷斥之由是按察多缺員廷永遂荷朝命陟僉浙江憲事且俾便道之官戒行有期其同官諸君重廷永之去偕求言以序其行夫按察與内臺相表裏闗乎政體之大受夫委任之重余固已前言之廷永以内風紀之職陟外風紀之司今之往也余知其閑於所職譬之車走坂舟順流駃騠之騁康莊鷙鳥之便順風庖丁之㳺刃無餘地師曠之審樂無遺音凡憲職之宜行者將無絲毫留滯繆錯之患亦奚待於余言雖然余尚有告焉勤於前而怠於後者人情之常竊見古今號稱名士大夫或能建名節於壯年而不免計豐約於晚嵗故曰官怠於宦成廷永賢者必無是失尤願始終其心始終其職始終其節則年愈進而望愈隆任愈久而績愈茂異時歴階以膺顯擢其將以其振風紀於一方者推之於逺大恵及生民光於邦家不惟著顯譽於一時又將垂英聲於無窮矣余知廷永之賢能受盡言故於諸君請序其行也舉風紀之重既頌之於前而復規之於後云贈凌大叅之任序聖天子臨御之四年大明黜陟之典以作興政治乃勑遣大臣巡考天下方岳郡縣大小百司廉明有為者奏陟之濁闇冗懦者罷斥之由是藩臬多缺員南京刑部郎官凌文琬老成練達乃為天官所推擇以其名聞於朝陞湖廣布政司叅議湖廣為天下之大藩東北與京畿河南相接西南連黔蜀貴播嶺南及諸溪峒地大以逺故其租稅之入兵土之出倍於他藩而凡條章之宣布吏治之得失民生之休戚盜賊之清弭以至撫柔蠻苗之方皆於布政司是責文琬為天官之所推選朝廷之所陞擢佐此大藩其任重而匪輕也明矣今茲之任宜何如以盡其職乎必當念厥今布政司總統千里之土地吏民盖與古方伯之任相埒其僚有使有叅政以及叅議皆髙品大官也夫其秩之崇則其責愈重所謂租賦兵甲條章吏治民隠弭盜安邊之庶政既萃於旬宣之司文琬欲盡其職所當盡心於是蚤夜勤志審度其先後緩急之宜次第而舉行之使方隅百事理治於上庶民安生於下斯無愧於旬宣而可追擬方伯之任不然一方之政弛即一方之民不得其所旬宣既罔稱方伯亦難擬夫何免於誚讓之及哉文琬發身舉子必習於脩已治人之學又三為卿屬必閑於為政設施之方今兹寵擢而膺重寄殆見其必能以公㓕私庶政畢舉以是而盡旬宣之職以是而擬方伯之任他時政績茂著聲譽流播陟明之典將有所歸叅佐云乎哉文琬陞秩之命既下且俾便道之官行有日其同官王公載合凡法從交逰來求余文以贈之余雖未獲交文琬而知其處心行已之詳然以天官遴拔之公聖朝陞擢之峻與其朋好惜别之勤則其為人必有可取也無疑遂書此以塞諸君之請而道文琬之行敬軒文集巻十六
