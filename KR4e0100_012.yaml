body:
  text: 敬軒文集卷十二眀薛瑄撰書答陳文原先生書廣文陳先生足下前在覃懷令嗣洎孫髙二生至䝉手書示慰以先人即世致祭且賻憫恤憂愛之情溢于言表且以徐孺子郭林宗之事為喻展讀再三歔欷流涕于以見賢人君子篤於始終而為此超絶之義奬譽之詞也感德其可勝言雖然孺子南州髙士林宗漢之賢者孺子生芻之喻林宗固足以當之矣若孤子之無狀不仁不孝獲罪神眀降兹酷罰而又故鄉千里未即歸葬羇居南北禮節多廢賢士大夫不即擯斥而棄絶之幸矣尚何古人之敢望哉孤子固不足言而足下之義殆無愧于孺子焉蓋自後世風靡俗失至有門生故吏于其師長之喪尚不加戚于心况于交遊之泛泛者乎足下與先人非有門生故吏師長之義特以滎陽一邂逅間即傾懷相與逮兹見背乃不逺數百里遣子若生緘詞致哀既祭且賻其于孺子之義又豈逺哉是不惟先人及孤子存沒感德而所謂門生故吏薄于所終者聞足下之風亦可愧矣承書即當裁答因來河南收拾行李遂爾稽謾今遣舍弟専往拜禮臨紙不勝哽塞馳戀之至伏惟諒察論取友為學答周秉忠書秉忠司訓足下前枉書并詩三章即宜奉答涉春入夏小有私冗遂爾一向稽怠及今重取書詩讀之往復究玩乃有以見足下善於交道甚有似于古人也又有以知足下力于進修蓋有出于後人也嘗觀古人之取友必擇其可者相與遊處出入往來誨喻偲偲然一歸之于義而所以交贊更修浸灌滋助為益甚大故其德業成就光眀俊偉咸有以立于當時而聞諸後世孔子所謂友以輔仁易所謂君子以朋友講習者此也後之人則不然于閎博誠直之良友則忌其賢踈而不親而獨取夫側僻固陋圓和軟熟與已不齟齬者為契合羣居旅逰攩㧙嬉戲道說鄙俚常事不講不學不規不告靡靡然牽率淪胥為愚下之歸此古之交者所以日益而後之交者所以日損也足下以眀敏之識自始與僕相見及後往來過從每語必及於學學必以古道相期勉今詩中復有多君啓迪之語顧僕何足以當此但足下博于納善過見收采是以云云見及耳僕因謂足下交道甚有似于古人者此其一端也又如為學一事本其分內自少至老蓋無止期雖大聖如孔子猶忘食忘憂不知老之將至後之君子其不逮聖人亦已逺矣然方其未得所欲時莫不汲汲然務速以求之曰我善於為學一旦得所欲矣即盡棄其向之所為若無絲毫關諸心者人或問之則曰我非不好學也其如公私多事何僕謂為此言者蓋其立心之初本不為己不過勉强涉獵以求濟其欲耳既得所欲則學于我何有宜其托此以自詭也不然使其真有好學之心不以窮達而易其志則酬應公私之餘有一時之暇即一時可學也有一日之暇即一日可學也以至一月一嵗無不皆然子夏所謂學優則仕仕優則學正如此耳又何公私多事之足妨哉既不能然則少之所修者皆不足以為壯之所資此聖益聖愚亦愚而道德事業益相遼絶而不相及也足下年富氣鋭雖當群弟子請業問難之煩府衛文武交遊之盛冠蓋往來將迎之勤一不以是自撓而稍得休暇即執卷吟誦紬思乎義理之微而沉潛乎聖賢之奧慎察乎言行之間而震發乎六藝之音故見于詩文者渾朴古老駸駸乎漸有作者步驟比向所見者萬萬有加僕以是謂足下進修有出于後人者不其信乎夫以眀敏之識見而知取友之益以富强之年力而篤進修之功誠持此道而不變焉則他日所至又豈淺末者可得而量哉僕忝科名以來奔走東西少得親賢之益舊學荒失百不一存追顧前言良可增愧獨于汨汨中忽見有如足下者能穎然進于此因是有所感發而輒復陳其固陋然己不勉而勉人又君子之所不與冀足下略其下體而熟之復之固之密之以需所就而果有以見古人之可及而不但出于後人也瑄悚息再拜與楊秀才書楊生進道秀才足下先君子未官河內時先曽與生相識于時生固有相親之心矣其後先君子官河內生遂朝夕相親而心愈篤及先君子沒世舊有别業在滎陽因往治裝生遂徒步相從時秋雨積潦大河北壖尤甚生泥行三十里水行十餘里跋涉良苦而略無愠色其冬瑄扶先人柩西歸生送至孟津西山下流涕為别大事訖瑄來滎陽省老母生復自河內來留月餘既去而往來書問不絶瑄惟人之所急惟利與勢而已生于瑄非有二者可趨而乃殷勤稠密相從不厭如此非篤于為義而好衆人之不好者能爾邪行念方將上京師愧無以為意因略陳其固陋以為生朂瑄七八嵗時侍先君子左右聞其稱古之人某為大儒今之人某為偉士因竊自私記于心曰彼亦人耳人而學人蓋無不可及之理也其時瑄雖有志于是顧方屬對偶習聲詩而尚未知所以為學也又六七年先君子見可教遂授以四書及他聖賢書曰此為學之要也汝其勉之瑄拜受所教遂發奮篤専于誦習晝不足則繼之以夜夜坐倦則置書枕側而卧閲之或有達旦未巳者至于行立出入起居飲食不諷諸口則思諸心雖人事膠擾未嘗一日而易其為學之志也如是者積十餘年然後若有以察夫聖賢千言萬語之理無不散見于天地萬物之中而天地萬物之理無不統㑹于此心微密之地自是以來澄治源本而恆懼夫邪慮以淆之篤専修習而不敢以他好奪之積之既久間因以其中之欲發者發而為文辭則但覺來之之甚易若或有物以出之于內而迫之于外也其後以先君子命從試于有司一往即得之仰希大儒偉士雖不敢及然韓子所謂在進士中粗為知讀經書者竊以為近似焉今退居又六七年矣中間遭值大故哀痛悲傷之餘尚懼頑愚荒怠以負先君子之大訓因時取向所授書而溫繹之但覺意味之愈切理趣之愈深蓋有得于心而不能形諸言者矣此瑄之所以自少及長凡勤苦僅得而猶不敢自己者此也今觀生之于瑄求之可謂勤矣然徐察生之志則所慕者科名之未得所急者文詞之不足是以求之愈勞而得之愈難也瑄以謂不若且置此汲汲欲得之心取四書與凡聖賢書若瑄十六七以後時又加力焉則他日蓄積之深無所不有以其餘施之于辭則析理精切而不差措諸事則典實而可行于以應有司之所求可一舉足得之矣又何科名文辭之足患哉此乃不求之求實為學之要法也不然涉獵記誦愈勉愈難從使得之亦何益于人已哉鄙見如此惟深加思勞毋以斯言為迂而虛用其勤幸甚答湖廣左布政使李琦書瑄書復左轄相公閣下今年春吳户部公至承三月十六日手書示問并寄字帖藥方一一祇領訖伏惟閣下以魁竒之資宏博之學超邁之識加以踐厯清要久更事任敦裕老成之名允孚衆聽乃者暫輟班行旬宣江漢上為國家之所倚重下為列郡之所具瞻英聲峻節渢渢乎實在荆山之南矣瑄以章句之儒濫側風紀自祗命湖南嵗月云邁治效蔑聞仰瞻髙義益增愧赧所恃者不欺暗室一事期不負素願與所學耳以閣下于今為先輩成德故敢輒一道其志兹因户部公歸便率此奉復并致謝忱更冀若時保攝為國自重不宣瑄再拜答侍御王子沂書瑄頓首復書侍御子沂足下専人至得八月初一日手書偹知體中不佳第以逺道不得即造奉問為愧承喻訪醫一節沅州衛有一老醫頗熟方書拯療頻有效者已令收拾藥劑與同來人起程前去到日伏望髙眀指示商度用藥勿責近功徐圖其效為妙僕又念韓公有曰將息之道當先理其心又頥養之要節喜怒最急蓋心體虛則內有主而外邪自不能入喜怒節則氣和平而內疾自不能生伏惟足下老成眀理之士此皆了然胸中而行之熟者固不待僕之煩言但區區懇愛則願更加意焉凡百語默動作起居飲食皆當寬坦其心調節其氣勿使思慮喜怒與疾氣交戰並爭則小小之恙可不藥而减矣不然藥劑雖良氣稍失和則凝氷焦火恐未易收功也恃在眷私故敢冒罄其狂言惟加察納幸甚瑄再拜與王給事惟善書瑄頓首給事閣下去秋歸時承顧送腆賻感德殊深即日伏惟起居佳勝雖在哀中豈勝馳仰瑄亡母柩尚在淺土以新窆未可即動移又叔父先來存視亦歿于是兩喪未舉皆人子之大事疇昔忠厚之誨敢不服膺前喻作尊府君處士哀辭謹具録别紙附寄但愧蕪淺不能有所發揮耳照察不宣與羅劉張李陳謝侍御頓首寅契列位侍御閣下瑄以菲才濫厠寅末蒙誨蒙愛極深極厚非筆舌所能騰喻及遭先母亡又承髙文哀挽此又刻心不能忘者亡母柩尚在淺土歸葬在開嵗秋冬間人便率此奉字以代忱報不宣與太守李太亨書太亨足下承以知己之薦受聖天子眀命領東南大郡又降璽書褒諭使之乘傳之官千載一遇良在于斯凡百有志孰不興起足下以卓越之資超絶之識清白之行而藴蓄其竒老其才者將三十年一旦復見用于世將攄發其所有見于政事之間赫赫之聲行復播於朝右矣蓋天將大用其人必先拂鬱空乏其心體雖七十猶未至耄老足下困乏久而通年雖髙而視聽筋力未衰晚景功名政恐尚有進于千里之寄者惟遲之幸甚瑄與足下忘年之契白首之交義當出祖以道其行第臺中多事薄晚方歸故専令小子淳奉簡以代叙别到官政暇時惠清教尤幸心照不宣再與李太亨書瑄奉書老友太守先生足下自京師一别又十五年矣江南冀北相望邈然向風引領豈勝悵怏僕昔在田里時逺辱手書見示并勞和僕所寄詩展讀再四益深悚企中間乏便人因循未及奉書通問為罪為罪僕自罷歸日與老農夫為伍耕田藝麻築室種樹分將沒齒草野已絶望于功名富貴矣不意去年九月初五日驛使到門催迫上路十月初七日又蒙恩命擢官大理供職以來無毫髮報答抑衰邁老醜强顔班行有愧古人出處之義多矣方將上章懇返初服曽未遂所圖復有川蜀滇南督餽之行于今年二月初九日奔馳上道北山勒移能無厚顔緬想足下輕舟短棹葛巾藜杖徜徉湖山之樂益使人馳望耿耿不能為懷前教令作所著書序文尚未草創候南還之日尚當勉圖奉寄僕自前歸鄉里喪第四子子婦三人孫二人是皆命也奈何奈何有律詩四首用舊韻皆二年前所作録别紙奉上僕又近苦臂痛眼花縷縷私情所欲言者甚衆非紙筆所能盡尚乞心照不宣復李太亨書復書太守太亨足下今年正月得去年二月手書既承眷譽之過兼以官守見喻幸甚其中有宜復者不可但已切觀君子于名位大小閒劇皆不在已惟隨其所居為所當為處之以義而不咈乎時之宜斯古所謂不器者然也若曰某職吾能安之某職吾不屑為焉則是不能隨所遇而裁之以義顧拘于有用之器矣伏惟足下以年德之髙處此劇郡猥日從事于文書訴訟逄迎候伺間似非長者所宜然揚州為東南之大府頥指之吏自州長令丞以下莫不承望其風裁所部比屋百千萬之民又皆守率其教條大丈夫官至郡守其任亦重矣哉足下尚爾云云者豈其中真有不自得者邪抑姑設此謙虛之言以自誑也若果有不自得尤望足下宏古人之髙義因其位而為所當為不以外之欣戚小小者動其心則不器之君子非古人之所得専而在足下矣足下其然之否乎比有江淮往來者似聞足下有落落難合之意此無足怪古之人或然足下其益磨去圭角委曲接之以義于所不知者默焉勿與之尚口勝待小人尤嚴于自治則于事之大小似無難處者矣足下又然之否乎恃在白首交遊故敢披露盡言如此若鄙見有未是閣下其復之去年九月在泰安州燈下忽念缺然久不奉問似有望于足下者遂成律詩一首及今得書乃知足下眷愛不忘我久矣因録前詩附寄以見區區以小人之心為君子期也更冀照察不宣復李原德書瑄復書李公閣下辱書纍數百言大意以道學顯晦見推為念詞志髙逺􅒯出恆人所見竊惟此道出于天而賦于人全盡于聖賢凡六經四書以及周程張朱之說無非眀此而已號稱儒士而讀聖賢之書者曷嘗不欲眀是道體是道行是道推是道于人哉若讀其書而舍其道乃先儒買樹還珠之喻非真讀書者也瑄自少時嘗有志于此非敢自謂能與是道也但覺心之所存言之所發身之所履小有違理即一日若不能安其身此蓋出于道之不能自己者豈敢借擬古人而以道學自居哉閣下過與乃亦云云徒使瑄撫已增愧耳若以是聲號于人必且見怪見鄙不斥之以為狂即笑之以為迂矣深願閣下不以云云者布于人也往年河汾之㑹漫語及此亦六經孔曽思孟周程張朱之書世儒之所共讀共談者耳非瑄之所獨見也閣下遽爾云云豈以瑄誠講于是哉而今而後更願閣下以衆人視瑄或欲往來講切是道但當熟讀凡聖賢之書一字一義灼見下落而體之心體之身繼之以勿怠則推之久者不外是而所學皆為實理雖不言道而道即在是矣顧瑄有志于是而未能也閣下其察之人行匆匆奉答言不能盡意閣下其復之瑄再拜答司封趙主事子聰書瑄復書子聰年契足下去年秋官張公來承手書惠問展讀再四辭義懇欵厚德其曷敢忘但稱道云云則非瑄之所敢當第因每年巡厯所部稽于奉答愧歉尤深伏惟足下纍世以來詩書是襲德善是崇繼忠繼孝進而登顯仕獲重譽者代不乏人至足下又以學行之美誕繼家聲凡在交逰孰不歆仰况瑄與令先兄侍御為同年進士與足下為同年舉人兼兩同年之好是宜企慕之私又非他比但愧瑄年來學不加進德不加修有負先侍御以洎足下素所知耳足下或以為尚可規教時及誨言尤幸餘非所敢望秋官公還率此奉復照察不宣戒子書人之所以異于禽獸者倫理而已何謂倫父子君臣夫婦長幼朋友五者之倫序是也何謂理即父子有親君臣有義夫婦有别長幼有序朋友有信五者之天理是也于倫理眀而且盡始得稱為人之名茍倫理一失雖具人之形其實與禽獸何異哉蓋禽獸所知者不過渴飲飢食雌雄牝牡之欲而已其於倫理則蠢然無知也故其于飲食雌雄牝牡之欲既足則飛鳴躑躅群逰旅宿一無所為若人但知飲食男女之欲而不能盡父子君臣夫婦長幼朋友之倫理即暖衣飽食終日嬉戲逰蕩與禽獸無别矣聖賢憂人之陷于禽獸也如此其得位者則修道立教使天下後世之人皆盡此倫理其不得位者則著書垂訓亦欲天下後世之人皆盡此倫理是則聖賢窮達雖異而君師萬世之心則一而已汝曹既得天地之理氣凝合父祖之一氣流傳生而為人矣其可不思所以盡其人道乎欲盡人道必當于聖賢修道之教垂世之典若小學若四書若六經之類誦讀之講貫之思索之體認之反求諸日用人倫之間聖賢所謂父子當親吾則于父子求所以盡其親聖賢所謂君臣當義吾則於君臣求所以盡其義聖賢所謂夫婦有别吾則于夫婦思所以有其别聖賢所謂長幼有序吾則于長幼思所以有其序聖賢所謂朋友有信吾則于朋友思所以有其信于此五者無一而不致其精微曲折之詳則日用身心自不外乎倫理庶幾稱其人之名得免流于禽獸之域矣其或飽暖終日無所用心縱其耳目口鼻之欲肆其四體百骸之安耽嗜於非禮之聲色臭味淪溺于非禮之私欲宴安身雖有人之形行實禽獸之行仰貽天地凝形賦理之羞俯為父母流傳一氣之玷將何以自立于世哉汝曹其勉之敬之竭其心力以全倫理乃吾之至望也答李賢司封書瑄奉書司封李先生足下自河汾之㑹即相知不相忘者十餘年矣非以志同氣合而然邪及瑄來山東又承手書切磨斯道益荷知己之不忘也前年至京師極欲面悉凡紙筆所不盡者未幾又歸山東回想風度豈勝悵怏去年春左方伯王公來又承書見示首論居敬窮理之功次喻所得之大終及省察之要義利之分而謙謙又若不敢與于斯者益見足下所志者皆古人之志所求者皆古人之道與汲汲于尋常之所爭者相去百千等矣第書㫖宏博未易了悉僅取其中三四條奉答于右伏惟擇焉是道之大原于天具於人心散于萬事萬物非格物致知則不能眀其理故大學之教以是二者居八條目之首然非此心大段虛眀寧靜則昏昧放逸又無以為格物致知之本程夫子所謂涵養須用敬進學則在致知者正欲居敬窮理交互用力以進于道也足下論為學之道首及于此誠得程夫子教人之要㫖矣又能尋此而進焉他日所至其可量乎足下又謂忠孝大節固不敢虧聖賢細膩工夫决不能到乃足下自謙之辭耳朱夫子有言愈細密愈廣大愈謹確愈髙眀是則大節固所當盡而細膩工夫或者亦不可不勉也足下入謂動作毫釐小差忽不知墮于為利之域矣足下省察工夫至此已極為親切更加以精辨持守之力必能為已而不為人也為義而不為利也伏惟足下氣清而才敏識髙而志篤切切焉恆以是道是知是行是相講磨為務所謂汲汲于尋常之所爭無以干其中譬之入海者既識江河之正道又得舟楫之利器循焉而不已其至也不難矣孟子所謂豪傑之才朱子所謂百世之下神㑹而心得者百千年間豈無其人乎非瑄所敢知也瑄愚僻無他才能獨于為學一事實非他好所能尚但乏眀師友以正其是非以此不敢果于自定耳年來忽得髙眀如足下者數見教示誠孤陋中之一幸也繼自今往尤有望于足下矣近者右方伯王公云得足下書且附問瑄以為人少知者瑄以謂學求分內事耳知不知何與于已哉但足下見愛之過云然耳往年舟中有懷足下律詩三十韻近日所述敬吟一首具録别紙并謝奉答之稽慢伏冀照察不宣與李匡都御史書瑄奉書都憲李公行幕成都一别又數月矣慕仰之私與時俱切即日伏惟駐節山間部分諸將必有竒策以羈叛蠻之首溪峒行且落然無警矣鄙意猶以為蠢茲醜類與其振威武以服其外不若布誠信以結其心髙眀以為何如勉而行之大功可立况此小冦烏足置齒頰哉瑄自永寧至瀘州感暑瘧寒熱大作數日幾不可支今雖稍愈正氣尚未完復猶恃粥以保養耳餽運一事猥承公牒悚息尤深但邊衛武夫不諒鄙意致此有煩言耳茲敢輒用公牒干瀆左右想發封為一笑也凡百瑄所不及更冀見教為幸子路人告之以過則喜瑄雖不敏常奉教于君子矣率此奉狀伏惟照亮不宣答李都御史書瑄書復都憲李公足下専人至持手書見示首叙向日鄙作之贈追念蕪陋之辭祇增愧耳奚足以言詩文哉且承喻招徠叛亂戎獠次第欵服虜去人口大半放還尤可見足下能布朝廷之恩信不煩一㦸不勞一兵從容指麾使一方反側異類感德革面唯唯來歸自非足下平日忠信鬱于中而發于外安能致彼孚化之若是乎瑄近日遣小吏奉書往中間亦謾陳振威武以服其外不若布誠信以結其心觀足下此舉蓋先得我心之同然矣君子行事適機宜尤使人敬慕之無己也昔趙充國討叛羌緩于攻戰但撫其渠魁而坐使其黨類解散湟中既安振旅而還朱子大書于綱目以美其績以此見安邊境治蠻疆蓋以懷柔為先不以攻戰為貴也足下此行深得安邊之計垂聲竹帛又豈多讓于古人邪瑄近日賤體失養感瘧疾連發數日方已足下遣専人垂問感德其又可忘足下師還有期㑹晤非逺縷縷餘情尚容面布人還先此奉復尚冀照察不宣與李都御史書近日江安驛丞持梨果自山中來又承垂問感德愈深恭審足下體中亦小不佳想行即平豫大抵山中林嵐蓊鬱無所發泄其氣最能中人日來殘暑蒸熱亦能為癘足下體中不佳豈以是二者邪不然或積勞軍旅之事所致也瑄少多與名醫往來頗諳醫道大抵感冒之疾三日之前只宜用辛凉之藥發散三日之後宜和解有內證可下則下之切不可用乾姜附子諸性熱之藥若服熱藥則病勢必增蓋感冒始終只是熱疾也俗醫不知此理謂在表為陽為熱在裏為隂為寒失之逺矣外此即是雜病有方可療亦宜慎擇其藥性之良者用之以足下髙眀必了然於此固不待瑄之瀆言然私意亦欲少致懇耳又朱子與黃子耕書曰凡病中一切事放下専以存心養氣為務跏趺靜坐目視鼻端注心臍腹之下久自溫暖即漸見功效矣此亦調攝之一端也瑄疾雖平復尚未任勞相去數程未得趨問為愧良多兹遣専人以代申問之敬尚冀為國自重不具答閻禹錫書瑄再拜書復廣文先生禹錫足下自來金陵未及一年三辱手書示問重叙河汾之㑹以及瑄之出處藹然忠厚之意溢于言辭為荷不淺但前後所推許者皆不敢當瑄本世俗之學中年稍知理趣而卒有所未得亦僅置于心而不忘耳承喻所學之正進修之篤敬羡敬羡苐别紙所録釋毁賦多用騷意竊惟古人為己之學于人之知不知與夫毁譽之言皆不足以動心若此賦之詞似有激發不平之意得不為此心虛眀之纍乎所望一切除去此意日求吾所未至使反身誠而樂莫大則彼毁譽之言烏足以動吾心哉第二書又謂學徒告以微妙茫然若夏蟲之疑氷是誠然也夫以子貢之髙識猶僅克悟性天道于晚年况他乎哉程子終身不以太極圖示人者正謂是耳故教人之法最宜謹其先後深淺之序若不量所至驟語以髙妙不止不能入彼將輕此理為不足信矣其他書辭不能盡答惟所學之正進修之篤他日所就殆未可量固非老拙日退者之可望也所求文獻通考叢藁二書叢藁所未見通考家故有之慱而不約殆非理學之所急良輔亦有二書見寄尚未奉答茲因鄉人薛生之便率此奉復尚冀心照不宣答曹安司訓書書復廣文曹司訓近得書厯叙遊宦鄢陵見慕之切且極稱道區區行已出處之義以愚老豈敢當其萬一且區區素與廣文未識面特以鄢陵前後風聲相接之故遂荷此厚愛足見廣文好善之心無間于踈數也所要作殷少師比干集序又見廣文景仰忠賢之心然區區思之至再以稱許少師之仁己見于先聖孔子之言後人雖欲重纍其辭諒無以出其一言之外者以是果于不敢作非有吝也以厚意不可虛特具小簡以復惟廣文裁察妙甚答閻禹錫書廣文閻先生足下别來數年以氣味之同未嘗少忘于懷兩年連得兩書乃知足下之見愛亦如愚老之思足下也但前後所稱道者皆不敢當耳承喻升清秩得以所學勵英才樂可勝道邪又喻取朱子文集語類諸書掇其精者題曰晦菴要語云欲寄示此正欲快覩早寄為妙所要讀書續録但愚老自偹遺忘耳亦何足觀也近讀近思録程子謂方道輔曰經以載道誦其言辭解其訓詁而不及道乃無用之糟粕耳覬足下由經以求道異日見卓立于前有不知手之舞足之蹈竊謂因經以求道乃進學之至要蓋凡聖人之書皆經也道則實理之所在茍徒誦習紙上之經而不求實理之所在則經乃糟粕如程所云也以足下之眀敏于程子要語從事必熟特以愚老敬慕之切故敢瀆言之更希留意妙甚率此奉復缺偹惟心照不宣敬軒文集卷十二
