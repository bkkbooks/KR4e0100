body:
  text: 敬軒文集卷五明薛瑄撰絶句朝回行堤上御溝行處早春回春水平堤不起埃桞緑蒲青無限好客邊襟抱一時開簡焦李羅劉四侍御五首緑桞紅葵滿憲臺幾陪簮笏共徘徊昨朝一别長官去直到新年院裏來末用韓句文明門外水悠悠妓子歸來雨打頭却笑道人心似鐵久無飛夢到青樓鐵扇都門鎮日開無風車馬也塵埃雷公不吝連朝雨洗盡炎蒸一快哉每憶清談對數公别來無日不從容少陵自是能詩者却笑樽中酒屢空黃榜同年雙進士青氊並榻兩先生四君髙論應難及别後深知鄙吝萌讀劉靖修黃金臺詩賢者何曾為此來黃金空復壘髙臺先生志節超千古一曲清風溢九垓再懷沅州五友五首沅陽清氣滿烏臺為有修篁繞戶栽兩載好風明月夜新詩誰對此君裁無端詩興逺誰添紅白雙梅倚畫簷千里中州風雪夜一忩清月憶湘南簾捲秋風繞砌花沅陽幾對昔年華關山白露三千里誰采金英泛紫霞持贈曾同驛使梅紉香聊爾意徘徊當時九畹花應在幾向光風爛漫開薜荔闌邊緑錦池竹亭深坐晚涼時忽成逺道空勞想秀色天香發向誰汾上春行清汾信馬踏春酣汀草萋萋隴麥蔪正是暖風啼鳥日水村花塢似江南驟寒曉起題詩硯有氷苦寒端欲訴玄冥却思持節荆南道臘月湖山草色青河南將歸我憶汾南田舍好緑槐如蓋擁髙門南園舊種雙桐樹應有孫枝到碧雲忽憶忽憶鞏東峰子嶺入雲遙見大河流中原勝槩皆堪賦攬轡還當遂壯遊汾河南岸看杏花二首兩載東風看杏花汾河南岸水西斜幾回駐馬憐穠艷只恐春流泛落霞汾水南邊錦作堆連朝相報杏花開東風好景休虛擲一日須來一百回過夀陽用韓文公韻征騎雞鳴發大安山深五月尚風寒夀陽舉目孤城近東嶺金烏爛曉團憲臺齋宿憲臺齋宿幾連宵絳燭銀爐伴閴寥斗帳夢回更漏永只聼忩外冷風飄喜雨雜詠簡院長諸公八首聖明端拱太平時好雨當春細若絲應是柏臺添氣象旋滋花桞更催詩正是陽和溥萬方知時好雨潤羣芳趣朝共覩天顔悅應喜斯民樂泰康霏霏朝雨潤彤庭恭逐鵷行謁聖明白玉橋邊鳴珮過御溝春水一時生御溝新桞濕鵝黃佩馬朝回雨露香柏府文書春日靜相過唯覺和詩忙柏臺春靜晝厭厭好雨如絲不捲簾最是東君能借力間庭草色一時添雨過西山翠欲流蔥蔥佳氣滿神州書生莫笑今霜鬢駿馬看花已償遊聖主龍飛第一春天垂雨露萬方勻蒼生坐見躋仁夀自昔賡歌有舜臣萬國同心奉至尊斯民重見飲衢樽欲知和氣薰天地只在三春雨露恩發通津驛三首六月官船發潞陽水村煙樹共微茫天門忽已如天上秪見青山一帶長新捧天書帶紫泥又承恩旨按三齊通津南下波連海渺渺風帆去似飛五色天書出禁中儒臣將命按三東滄波南下通洙泗魚躍鳶飛總帝功宿臨清薇省行館薇垣瀟灑九秋天風葉敲忩夜月圓有客乘驄來借宿新詩留作賃房錢泉林寺日午停驂暑氣收參天古木亂蟬秋絶憐好景添清興為寫新詩紀勝遊夢與陳侍御話舊分司相見是京華風節山東向駭誇邂逅不知身是夢覺來秋兩濺忩紗菊開憶去秋同官臺中共賞去年客裏遇重陽曾與同官摘晚香今日分符行郡邑獨將逺意看秋芳嘉祥分司元宵行臺北面是蒼山古柏風生分外寒又值元宵春一度謾燒紅燭伴清歡巨野道中巨野茫茫逺際天春風春雨淡春煙河流尚自成陳迹俯仰千年事落然題汶上分司二小柏霜臺對植長新枝翠葉交承雨露滋直幹總應無曲處稚年俱有棟梁姿聞蛙有懷春晚乘驄駐德平古城墻外有蛙鳴却思青草池塘夜三載湖南厭此聲暮春道中見桃花尚開馬穿新緑過園林已恨穠芳誤賞心猶有小桃花未落獨留餘艷到春深鄒平分司雜詠二首行臺獨坐聼鳴鳩喬木參天五月秋舉目好山青未了應隨馬足遍東州樹繞行廊散碧隂鶯啼小圃送清音葵花無數開如錦解是傾陽共此心臨淄道中平郊漫漫樹依依人物千年總已非多少荒臺芳草合不知何處是三歸青州分司榴花石榴小蕚未開時渾似紅櫻壓翠枝照日含風千萬朵故園千里正相思穆陵關夜雨萬山絶頂穆陵關一上山樓五月寒煙樹滿川浮瞑色晚風吹雨濕闌干膠州幾點青螺海上山參差樓閣海天寬行臺五月不知暑秪覺侵人海氣寒栖霞見青桃來日紅桃尚有花青桃如彈過栖霞無端馬首還東去直看青山到海涯栖霞行臺夏日四山環繞柏臺深緑樹濃交戶外隂還似湖南持憲節坐聽山鳥弄清音望嶽攬轡西來過泰安拂空青靄掠征鞍東還算是初冬日擬上天門次第看萊蕪懷古清節誰能似范丹清名千載重人間萊蕪縣裏停驂日坐對南山秋色寒再詠汶上分司二小柏一回相見一回髙夾砌行看翠葉交偉器定如房與杜相期聳壑更昻霄魚臺分司翠竹紅榴掩映間柏臺清晝鳥聲間情知物理相關處心與乾坤一樣寬三詠汶上分司二小柏髙標離立入簷長已有清隂近畫堂别後又看新子結風生滿院散天香題松鶴圖忽驚虛室起潛蛟雲氣隂森爽氣飄霜雪不知幾千古長年惟有鶴來巢臨朐分司四小柏二首解是平生獨愛材新移四柏後堂栽懸知數百年來後應有清隂滿憲臺四柏移來拱把餘一行分植傍階除故應雨露均培養直幹爭看聳碧虛簡黃仲芳大參三首正統四年秋九月天官門下識君時神都第一科中客接踵青雲愧後期雅量每期黃淑度正人應愧薛居州斯文四海知同調且喜京華並轡遊天衢連日踏塵埃忽聽蕭蕭夜雨來明日况逢重九節好懷應為大參開十二景為衍聖公孔彥縉賦二十四首小亭花雨小結茅亭壘石臺繞亭時雨百花開一襟道氣清如許更挹幽香滿座來曾過君家飲小亭醉看紅雨濕春馨别來生意應如昨長對東風閲聖經夾道槐雲夾道槐根孔世家兩行飛蓋影欹斜要承濃渥千年蔭不愛秋黃八月花數仭宫墻一路深屯雲交翠落青隂紅塵十丈知何處秪引薰風養道心蘭階清露零露瀼瀼帶曉濃繞階晴霽轉光風雲仍對此琴三弄還與宣尼古調同九畹移來遍孔家芳叢時遣石闌遮故應天意憐香潔玉露年年潤好花桐井甘泉千章嘉樹古梧森一窟寒泉碧甃深靜掃濃隂汲修綆清泠長是滌塵心樹環嘉木桐隂合井冽寒泉地脈通彩鳳九霄應有待道源千古自無窮海棠綴錦長笑時人愛海棠芳姿何事近宫牆自緣要識東風面任遣花神綴錦粧緑煙初散錦霞空綽約倦人半醉中莫怪海棠顔色麗等間紅紫盡春風萱草堆金緑帶春深近北堂更看紅錦爛天香國風千古遺詩在對此應知百慮忘自是春風造化機織成錦翠爛相依細看一種生生意真宰無言識者稀松忩皓月拂忩涼籟起秋聲綺席流光皓月明却憶鄒軻談夜氣此時心迹已雙清畫堂松月夜忩虛宴坐澄心一卷書莫道畫前元有易靜中天理亦森如竹塢涼風半畝琅玕出短墉暖煙輕霧碧隂重開門淨掃蒼苔坐細葉蕭蕭引好風戴雨含煙一徑幽每從長夏數追遊濃隂深處不知暑秪覺涼風似水流苔石疊翠山骨移來帶蘚痕層巒疊巘勢飛翻杏花壇裏三春雨疑是岩間一片雲氣通霄漢潤通泉融結還從太古年數點青螺雲起處散為霖雨遍山川花圃繁紅暖雲無力趂東風小圃芳菲一徑通若問人間真太極便應携手看春紅參天喬木聖公家應愛春風滿圃花還似濓溪忩外草一般生意浩無涯古牆秀柏曲阜城中夫子墻墻頭老柏正蒼蒼托根終古同元氣未許掄材作棟梁根蟠厚地幹參天還合宫牆不記年遙想杏壇傳道日唯應此木見三千方沼瑞蓮珍重當年太極翁曾將道筆寫清通孔門自是傳心者還向方池看夏紅玉井空傳太華峯何如方沼看新紅澆培更有如船藕渣滓都歸渾化中行臺雜詠簡黃憲長暨諸憲僚二十首行臺西接大明湖細栁新荷入畫圖海石風光今古意品題殊覺少陵孤獨宿行臺暑氣清清吟已覺動髙情令人苦憶黃詩伯肯許連床聽雨聲楊栁隂隂憲府深讀書因見聖賢心鍾期去後今千載誰復人間是賞音獵獵風蒲水滿塘輕隂微雨芰荷香偶來乘興觀時物徐步芳洲趂晚涼煙籠庭樹水侵階隱隱輕雲細雨來爽氣已添煩暑退好懷千古一時開緑栁紅葵滿憲臺清渠碧沼斷塵埃城頭雨過天無際髙鳥孤雲自往來菰蒲深處水禽鳴雨過林塘晚更清露滿碧荷看不定秪疑仙掌萬珠明柏臺清晝鳥聲間影落髙梧夏日寒且喜輕隂天際斂開門咫尺見南山水滿方塘蓋錦萍軟風髙下揚蜻蜓清宵雨歇蛙聲急却憶湖湘草色青萬朵紅葵折錦苞新粧相倚鬪妖嬈道人獨愛傾陽意併起丹心憶聖朝行臺直北是髙城城外溪流面面清更擬濠梁尋勝事觀魚侈有昔人情明時叨秩意何如秪向行臺讀古書自得自歌還自樂青天白水看鳶魚四月行臺暑雨過方池無數長新荷貪觀物意歸來晚楊栁薰風到面多瀟灑流年老鐡冠鬢毛雖白寸心丹天書重疊叨天寵驄馬長鳴宇宙寬耿耿江湖意不忘頻年草疏奏明光行臺夏日看時物最愛葵花向太陽憶捧天書别九天分符頻與嵗時遷行臺幾度逢佳節五月薰風入舜絃夏雷挾雨急傾盆風色蒼蒼晚更昏清曉行臺看雙沼新荷已沒舊波痕泰山觸石雲初起六合茫茫一雨同試聽康衢應有頌調和玉燭聖明功繞屋葵花錦作圍畫墻墻外栁依依日長庭院逰絲靜乳燕穿簾自在飛萬頃平湖接憲臺紅蓮如錦望中開何當與客凌飛閣更攬山川入壯懷題趙雍畫馬三首逸氣稜稜不受羈蒼林磨癢立多時會應有待王良馭掣電追風始見竒白面驪駒汗血乾風鬃倚樹玉蹄攢誰人為制青絲絡騎出橫門萬衆看玉馬王孫已入周曾將絶藝寫驊騮謾誇有子能傳業不道東陵有故侯讀嶧山碑李斯篆六國平來四海家相君當代擅才華誰知頌德山頭石却與他人戒後車重題臨胊行臺四柏二首四柏移栽已二年重來相對意留連時人莫比甘棠樹淺薄慙無惠化傳憲府重來柏漸髙良材元不困蓬蒿還應老大驚人目香葉團空有鳳巢重題膠州行臺二首六年三按古膠東兩見葵花五月紅却憶端陽霑賜扇曾陪鵷侣覲飛龍留題今是兩端陽海氣仍飄五月涼却愛名花當戶發還將逺意采幽香四景為李通政賦四首石橋流水自東西緑樹連雲翠嶂低却憶當年持憲節扁舟曾泛武陵溪紅塵飛不到青山宛轉橋東水閣寒立盡夕陽橋上客看山看水不知還木落霜青水不波野人茅屋帶岩阿幽林採得憐香潔坐對南山興最多竹林茅屋枕江臯疊玉峯巒夾岸髙似是剡溪清興發獨衝風雪泛輕舠四景為張給事題四首雲滿青山水滿溪百花如錦草萋萋少陵詩思知多少到處嬌鶯恰恰啼百尺清潭萬仭山山圍水閣下虛寒道人已自無焦火况在山光水色間無邊草木不禁霜只有黃花晚更香笑採黃花斟美酒南山咫尺興難忘仙家樓觀鬱嵯峨雪嶺氷溪眼底過驢背探春春信早詩情不必灞橋多齋宿雜詠十首髙堂燈火夜相親點檢詩書憶古人自愧久持三尺法一生長保寸心春霜竹風寒夜向深燈前讀易見天心京華又是逢長至坐憶堯夫子半吟再入霜臺持憲節又承丹詔育菁莪只今理寺通朝籍倍覺天恩滚滚多燈花靜夜結金蟲爐火其如樹杪風小閣有春應自省此心期與萬人同法從追陪二十年寸心期不愧先賢士師自是庭堅職尚憶虞廷詠敕天馬蹄頻踏暮街塵理寺歸來月色新靜室有心空自省忘言相對是何人金門待漏三更月玉陛趨朝五色雲補衮即非樗散質微誠長祝聖明君迹沗鵷行第幾班朝回馬上看西山雪崖氷谷清如許咫尺煙霞未可攀待伴未消忩外雪宜人偏愛竹間風齋居已自心如洗况與寒宵此景同都城鍾鼓夜深沈棘寺燈前有客吟不是少陵耽麗句虛臺元是發清音題陳希夷圖白雲回首是三峯宴坐蒼苔睡正濃人世紅塵渾斷絶野花啼鳥自春風題枯木竹石四首野渚春容荒溪野渚曲流通蒼翠巑岏淑氣中瀟灑一般春意思紛紛紅紫挹髙風臨波春意蒼玉生苔浸緑波新篁老木散枝柯徒勞人世歌招隱淡蕩東風野興多淡靄涼生扁舟幾度泛湘波老木疏篁翠石多涼吹淡煙圖畫裏逺懷清絶奈秋何蕭騷霽雪山間昨夜雪三尺曉雲如拭天無痕怪得清聲滿人世石林凍竹風翻翻絶句三首一室無塵靜有餘清風頻度小忩虛韋編讀罷心如水間看浮雲自捲舒擾擾征途二十年蕭蕭短髮賦歸田青山緑水都如舊得失升沉事落然早知大道心無外始覺身間樂有餘一卷陶詩千載興悔將名利役慵疏絶句四首疏懶經旬不出門炎風暑氣任昏昏飢餐渴飲披書卷髙卧開忩看白雲憶昔曾遊海上山夏雲冬雪滿征鞍如今嬴得身無事一榻清風白晝間長江風起浪如山驛路紅塵幾往還三十年前回首處煙蓑依舊釣磯間年少爭名老可羞青山緑水去來休是非得失何須問已是忘機伴白鷗汾上春日二首道邊桃李緑隂繁花落難招萬片魂只有清汾流不盡年年長是繞孤村汾水春流岸岸深水村新緑滿春林殘紅已逐東風盡不道遊人負賞心宿青橋驛聽江聲青橋驛近黑龍江江上灘聲暗入忩髙枕才眠過夜半驚回旅夢正淙淙草涼樓驛翠華西幸駐山間草閣乘涼動喜顔何似長安歌舞地鳳樓千尺更髙寒朝天驛征驂行盡褒南道又上朝天驛畔舟兩岸雲林青未了嘉陵南去水悠悠盆池魚浮遊南北與西束不出區區斗水中何似巨鱗居大海波涵天地浪搖風泛川江有感雙親未老我童年曾泛岷江六月船今日重來泛江水我衰親沒淚潸然夏夜宿龍瓜驛風樹颼飀雨不休夜眠江館似深秋夢回忽見忩前燭驛吏催人又放舟效竹枝歌三首錦官城東多水樓蜀姬酒濃消客愁醉來忘却家山道勸君莫作錦城遊江上小樓開戶多蜀儂解唱巴渝歌清江中夜月如晝樓頭賈客奈樂何楊栁曨曨天欲明錦江夜雨江水生鹽船無數惡年少間上江樓看曉晴却贈有人情重贈尤多奈我中心義理何縱使盡添齊楚冨一身之外總為他放船野曠天低江面平放船東下好風清江天况值新晴霽雲白山青望眼明江行兩岸好山看不盡一江煙水去無窮誰人為和滄浪曲興在空濛杳靄中平羌望峨眉山峨眉畫出天邊秀青到平羌尚未休山月半輪懷李白扁舟我亦下渝州讀史二首漢唐末事誰能鑑晉宋當年世所知猶有一編青史在悠悠長使後人悲東言來若用言難不用忠言亦等間若信當時江統論定無戎馬到長安除夜又逢除夜客西川銀燭金爐白髮前却憶去年京邸夜朝衣新試候朝天蜀中元夕京華西蜀兩元宵總去家山道路遙來嵗乞歸逢此夕故鄉燈火沸笙簫成都看梨花錦城風暖不生塵開遍梨花萬樹春吹散緑雲簾盡捲廣寒宫裏有仙人看木瓜花杏艷桃夭二月終好花難比木瓜紅回頭總愧青青柏生怕林間一夜風詠史平吳四海盡為家內苑新添萬樹花秪喜羊車遊别院不堪軹道駕牛車戲題則天鄉無端險惡山川氣盡付當時武媚娘淫虐千年遺臭在至今人唾則天鄉紀行口號襄陽曾渡漢江水嶓冢還尋漢水源自笑苦無經濟略道途何事往來煩自朝天驛回京去春舟發朝天驛今夏朝天嶺上回水陸朝天行已遍朝天從此上金臺太常許卿送菜戲簡十首為謝東鄰許太常嘉蔬頻送意難忘呼童帶葉連根煮咬得其中一味長摘送園蔬露未乾虀成新味帶鹹酸幾回放筯詩腸飽絶勝先生苜蓿盤空堂養病似齋居喜送東園幾種蔬喫此久無烹宰事不須仍用逺庖厨白髮青袍老寺丞卜居喜近太常卿故知氣味多相似頻送東園菜把青菜出東園種種新太卿相送意何親平生自是甘清味肉食能無愧古人園蔬新拔帶霜濃爛煮香根放筯空誰識其中有真味不須苦羡紫駝峯自笑官貧氣尚豪黨姬休復論羊羔卿家能送東園菜清味還應厭老叨此色斯民不可有此味廟堂不可無顧我己非調燮手先生相送意何如雅契名卿奈若何嘉蔬頻送意尤多生平味此無厭足恐似當年喫菜魔京華交契似君稀白首相看意不違忽見名園送新菜故鄉老圃倍思歸徐州見黃河吾家正在龍門下流出黃河幾曲長忽向徐州城外見牽情一水正思鄉燕子樓孀妾當時一女流猶知守節度春秋往來忘義忘仁者莫上彭城燕子樓戲馬臺八千兵渡大江來戲馬髙臺亦壯哉何事烏江騅不逝髙臺翻使後人哀陵母墓鹿走中原海起塵獨從草昧識真人紛紛都是人間死母死髙名萬古新吕梁洪長洪幾折奔流急亂石兩崖還疊重被髮行遊渾不見往來舟楫自匆匆過淮陽有感而作武皇側席正求賢直道誰居汲黯前何事不教留禁闥淮陽髙卧度流年髙郵露筋廟二首髙郵女子志何堅假宿寧論性命全甘向荒陂死蚊喙此生元不愧蒼天囋血其如利觜何荒陂一夕死貞娥從教筋骨當年露嬴得清名世不磨渡江儀真北上念三年又上江南濟渡船清曉登艫望京國鍾山倣佛翠雲連望南京虎踞龍蟠入望邊鍾山瑞靄翠相連仰思聖祖開洪業定鼎宜過憶萬年題雙鵲圖梅竹交青映柏枝飛來雙鵲立多時主人翁好無彈射有喜令渠日日知太平門何處清時快往還太平門外好湖山間花野草應無數惟有青松最耐看大理後庭竹林山色二首鍾山雨過翠成堆竹裏清風作陳來愛竹看山有真樂髙人逺矣憶追陪間愛修篁靜愛山清隂秀色座中看老來漸得悠然趣天際浮雲任往還臨終口號土牀羊褥紙屏風睡覺東忩日影紅七十六年無一事此心惟覺性天通青城分司暮春漠漠楊花滿院飛重來又見一春歸去年記得停驂日正月庭前雪作圍題松竹梅圖翠竹青松共白梅幾枝瀟灑出塵埃長年自保風霜節不學春紅向暖開濮州道中口號嵗月多從馬上過勳名未立鬢先皤風霜滿面誰能識極目蒼天一放歌舟發辰溪岸岸腳插江深洄潭搖石影舟行若天遊妙處心獨領靜夜雨滴霜臺靜燈明憲府深新詩吟謾好誰復是知音題墨蘭二首已見光風轉應知九畹深殷勤采香潔持慰美人心既自充楚佩還曾入孔琴寄言采芳者雲谷莫辭深秋夜泠泠碧忩風皎皎疏簾月重門掩秋霜素練搗寒雪荒徑曉行荒徑中瀼瀼草上露日出雲氣收一鳥空中度夜飲李海昌宅重門敞春夕燈燭靄餘輝醉我百壺酒留連夜未歸早起雞鳴耿不寐展轉待明發童子看忩前猶言有殘月早發晨星耿孤色曉月餘清朗舟人解纜行夢覺波聲響野市野市二三家柴門傍水斜溪童賣蒲笋歸路不辭賖率成舟過水無迹雲收天本清外物自紛擾吾心良獨明敬軒文集卷五
