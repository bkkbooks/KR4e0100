body:
  text: 敬軒文集卷二十四明薛瑄撰針謹言針誦謹言之訓習謹言之事將三十年夕悔其失寤寐惶汗而旦或復然殆將漸流於放終不克謹以速尤召愆汝縱不自愛獨不念先人遺體之重降衷秉彛之全誓自今始語不妄發保厥中之靜專至此而猶飾虛詞尚循故態者當指正於蒼天慎行針思厥一身或動或靜日可見者皆謂之行行有天則至明至正云胡小子操履靡定語默或流於羣妄應接復牽於多病是以德業不至於崇廣馳鶩將迷於蹊徑其自今始加夕惕以乾乾欽聖謨而非禮勿動懲忿針在損著象懲忿有教樊昔辨惑孔亦以告蓋觸物易動惟是為先茍勃然而妄發必焚如以自煎德既有乖生亦受賊速禍召尤變故匪測我思我心本自湛如云胡震撼弗克寧虛制之有法必懲必戒懲摧其暴戒思其害惟暴若苗惟忿若稂稂除苗剪事我天君天君既安百職從令怒或當然因感而應應已而休無迎將留雖曰顔樂亦以是求改過針繼善成性天然之中安行者聖纎失曷從降自衆人人有舛駁自心及身靡過不作所貴士賢希聖希天希之之要改過為先如思之邪如事之失既炳其然必去必亟過去善復日進可期尤謹再作迷復斯迷藐豫小子仰賴先業氣質庸愚過兼隱白亦云有覺厥逮不剛頻復厲矣徒發赧惶恐遂頑然將不省憶天畀謂何而乃自棄因是發憤自訟以針風雷宜法大壯宜斂日悔日改期無則止希之之功勿替終始存理針惟天生人惟人有理理為之何物則是矣圓外竅中五性渾全感而遂通四端秩然貌色手足口鼻耳目以及衆體至微之物直溫重恭止肅明聰或動或靜咸有厥中身之所接萬事五品其理昭如各有程凖凡此衆善悉備吾身放之則失操之斯存存之之要明誠有教明炳其真誠踐其道惟此二者功不可偏循之勿失士賢聖天持敬針一刻之謹心在理存一刻之怠心放理昏是知敬之一字乃直內之樞機養性之本根昔在伊洛道繼孔學開示羣迷敬為要約其曰主一無適者欲人必專其念而不雜於多岐其曰整齊嚴肅者欲人必極其莊而不失於怠隳斯實內外交養之法持循之久自不容私其及門之士有曰惺惺法者蓋必有事焉而提撕於頃刻有曰其心收斂不容一物者蓋中虛無物而必極其靜一偉哉晦翁統承二程小大之學一以為宗慨彼前修年代云往豈無瑤琴寶匣絶響在未小子氣質愚頑七情內蠧百妄外干雖曰為學徒侈華慱究厥本真久矣戕斫一日大覺前為可羞蓋昧往訓放心靡收念彼寸膠黃流可碧顛未既陳期守勿失慎微針眇忽之間其動曰幾究其所極千里斯違是以作易君子觀羸豕而著象因地雷而謹微言發乎口雖捫舌其靡及行達乎逺知駟馬之難追惟兢兢焉日嚴乎斯語庶逺悔尤而天理靡虧大理針惟左執法廷尉象焉稽古之職士師庭堅官曰大理歷茲有年其名不一其事則然蓋天之公陽開隂闔立法憲天仁柔義遏不率典彛或過或惡天討以施低昻斟酌乃有凖臬職斯常刑讞厥當否則歸廷平廷平攸執時惟鑑衡鑑灼隱伏衡持重輕持照兩得克允克明罰當民服氣協休徵惟刑弼教聖所欽恤死者弗生絶者弗屬而居而官冝何警肅勿徇貨利勿任憎欲勿偏縱釋勿好刻酷有一于茲靡乎靡燭斁紀瘝官齎痛飲毒譬火銷膏辜亦已速邈哉千載乃有良臣釋之定國持公體仁曰民不宄曰無寃民功光簡册慶及子孫髙山宜仰景行宜遵小子述誡敬朂我人銘悅心齋銘人孰無心心孰無悅悅匪其正為心蟊賊大哉孟氏儒林之綱悅心著訓式炳以彰其悅伊何曰理曰義理則從物義則制事二者匪人實降自天得之而悅天乃斯全卓卓沈君齋居云作扁曰悅心惟孟之學豈無肥旨秖飽以酣弗專弗從道腴是耽齋既作止銘亦書止日居月諸勿替經始勿欺齋銘動而未形此心之幾幾有善惡人莫吾知吾既知矣其將何為賢有明訓而曰勿欺蓋欺之為義不專所持雖曰好善若有所疑雖曰去惡若有所縻謂之勿者庸以禁止於斯故知善可好如嗜甘肥知惡可去如厭糟醨果專專於是道復念念而無違則眇眇之善端可以擴之於天地之涯美哉張君令德是頥勿欺名齋顧以自規庶幾匪懈賢可士希惜隂齋銘大化茫茫斯物斯億人為物靈所貴者德德原於天心會其極其體密微其用周悉云胡氣拘所得者失顧茲百年曾不瞬息弗亟循之將遂迷溺所以往哲晷景是惜惜之惟何明誠致力明則道通誠則道立從事二者遑遑汲汲朝復一朝日復一日靡間毫髮靡懈頃刻于茲卷舒于茲語默慨彼前修瞻望靡及有卓君子希慕軌則爰作齋居爰圖進益古訓是名古法是式由學而仕勤勵夕惕豈曰道悠由近可即豈曰髙山由下可陟敢贊一言以朂無斁恆齋銘有海之瀕有岱之麓挺生儀公質負魁篤公始知學旦夕孶孶顧此彛德思厥保持乃博其方乃要其統雷風法義有恆師孔恆者伊何悠久常然立心行已篤此一言遂揭齋楣出入是覩若鑒神明若臨師父爰自筮仕屢擢屢升官有內外齋無二名夷考厥迹昭哉歷歷持鐸教尊剖符民輯溥彼旬宣江漢是式允于出納喉舌是職晚亞南宮朝推耆碩啓沃經筵忠忱彌積載承恩詔懸車故鄉乘化消息孰不榮光繄公之賢惟恆之幹夷險一德終始靡倦公雖逝矣名永長存風流奕世子子孫孫孝思維則安則安倣匪曰髙山恆齋是仰思儀堂銘昔有令伯祖母成之更相為命以孝以慈百世之下人感其詞嗟哉陶君災屯少罹怙恃兩失孑然孤遺皤皤祖母收拾保持就燥避濕驚癎渴飢孫笑祖悅孫啼祖悲祖孫一氣同安共危逮茲成人伊誰之思惟祖母氏邈不可追乃作髙堂肖貌在斯溫溫笑語宛宛容儀致慤則著動息無違令伯是式令聞是垂銘以告之永久勿隳孝思堂銘有巍者堂伊誰居之居惟王君式是孝思思之云何曰恃曰怙匪怙曷生匪恃曷顧生我顧我實惟我尊怙既先亡恃罹艱屯乃績乃紡乃誨乃養憫茲藐孤矢德無爽嵗月既邁孤亦有成天胡不弔恃亦先零遂藴遂發亟踐顯達祿位日增孝心彌切惟此一身父母肢體獨享光榮孝養已矣而獨何心安厥敷遺深居是堂其有弗思思之之至如臨庭户如聞笑語如見喜怒振振王君孝思孔昭有通於天有徹于朝帝曰孝子豫惟汝錫錫汝考妣如汝之秩御史孺人有格其神一世之屈萬世之伸王君振振孝思維則載銘其堂永久弗忒存誠齋銘惟天地萬物實理為之樞機本厥一源諒無不齊自稟賦之雜揉紛虛偽之交馳爰有元聖乃曰無為斯太極之全體兼動靜而靡違降聖而賢必由保持視聽言動敬以主之羣邪退伏誠斯不虧溫溫李生往哲是希爰居爰處左針右規弦韋是服絲桐是揮沉酣古訓詠歌古詩斯須動作靡敢怠隳窒欲止水如防如隄庶邪妄之可間冀存誠之在茲美厥志之名齋述法言以勵之世厚堂銘惟人秉德惟始不恌篤邇行逺仁理孔昭云胡昧者楚越人已弗惻弗恫薄亦甚矣吉有君子家以厚傳渴猶已致危猶已顛乃設寒漿大飲行旅乃懸杙索大濟險阻其事雖微其心則仁能以類推旁達無垠爰作髙堂名曰世厚式昭于先庸戒于後給事鍾慶世德是遵譬之水木培根浚源惟厚弗替乃福所自視此堂名欽于永世贊獬豸贊疾惡者天地之正性而人心之所鍾云胡淪胥其類不知其醜而甘與之同有物于此匪兕匪虎非羆非熊名曰神羊曠世莫逢乃能觸回邪而無避合輿論之至公則彼臧否莫辨者覩其狀類寧不為之愧生於中邪又爾形不類爾出不世是蓋稟隂陽之情英具天地之正義心之靈既鑑物以靡差角之剛復觸邪以無避宜其端居而百怪惴伏正視而羣小悚畏故能與麒麟同逰騶虞作配擅執法之英聲為國家之美瑞也無庵贊老氏之無乃無而無吾儒之無乃無而有有非聲色形迹之可求雖無聲無臭而實為造化之樞紐其在人也寂然不動者無聲臭之可窺實萬象森然已具之淵藪卓哉無庵心學是潛所以啓大易之關鍵識濓溪之指南其取號也雖無而實有其體道也雖虛而實涵斂之則約施之則覃或翺翔乎武選或正職於大參凡其著赫赫之顯迹何莫非體立而用兼及其老而休也因人事之乘除悟隂陽之消息斂疇昔之敷舒為所卷之微密順大化而怡然乘白雲以髙適凡其貫始終而不二由其合有無而為一彼以天地為幻妄以萬物為粗迹空諸實有而為反道悖理之邪説以聾瞽斯民蠧害正道者又豈可以比擬無庵之真識邪王先生畫像贊其貌充然其色溫然精心玄思探索乎岐黃之編髙外化焉其為術也通變審密而鄉閭稱焉殆將與張長沙孫思邈劉素異世而同傳也耶畫龍贊能大能小能屈能伸能顯能晦能雨能雲蓋至陽之精為萬物之神故其功在天地功在庶品功在生民可敬可畏可瞻可仰不可得而馴非聖者之至德又安足以比倫歸一老人畫像贊其貌充而全其神粹而完識之正既超軼乎習俗情之適復笑傲乎林泉是宜享簡穰之多福樂期頥之永年然則其孤標時服固丹青之可倣佛而靈臺春意豈筆畫之能盡傳邪拙巢先生畫像贊質純氣和理明心定篤信好古拒邪間正有言有行以淑後人美哉君子輝光日新劉紹僉憲畫像贊東吳之精中朝之英粹乎其質確乎其聲察其操金百鍊而愈固望其儀鶚獨立而無朋推其心蓋欲使善惡之著白要其歸實欲觀惠化之流行是誠所謂有守有為之君子而可為新進晚生之儀刑也御史張勉夫贊東吳之英中臺之傑身也繩直心也玉潔持所見不隨俗以低昻藴其竒每因事而發越宜其徑節挺然忠言剴切身雖歷乎險夷功乃歸於潤澤是猶一鶚之髙騫異乎鷙鳥之纍百也章奏上講學章大理寺右寺丞臣薛瑄謹題為緝熙聖學事切見近日有臣下進言欲開經筵以緝熙聖學者雖蒙聖德允納未見施行蓋欲俟軍旅事平之日以開講也臣愚以為當聖主中興之時天步維艱之日正講論為學為治之道不可一日而緩焉者也昔漢光武躬擐甲胄討除羣凶猶且投戈講藝息馬論道軍旅之間未嘗一日廢學故能舉羣盜如鴻毛復大業猶反掌此講學所以有資於成大功也唐太宗興義兵掃除寇亂一時潛邸從龍之臣皆文學智謀之士日久相與論為學致治之道乙夜之覽身忘其倦故能剗刮僭偽拯濟生民此講學所以有資於戡大難也近者因額森京師雖屢戒嚴而內外禦侮各有其人堂堂天下號令一施風行草偃非至如漢唐草昧之秋也顧可以斯時而少緩講學之事乎伏望皇上命廷臣集議經筵儀式務從簡約不尚奢華仍博選公卿侍從文學之臣有學術純正持已端方謀慮深逺才識超卓通達古今明練治體者一二十人使之更代入直恭遇皇上視朝之暇日御便殿即召各臣進講其所講之書先大學論語孟子中庸兼講尚書春秋諸史則資治通鑑綱目務要詳細陳説聖賢修已治人之要懇切開告帝王端心出治之方以至唐虞三代漢唐宋以來人君行何道而天下治安為何事而天下乖亂與夫賞善罰惡之典任賢去邪之道莫不畢陳於前如此則勸講之臣庶可日修其職講讀官之職既修雖皇上聰明上智之資實由於天錫而朝夕緝熙啓沃之力亦有益於聖心聖學日新聖德日明于以修治道則正心以正朝廷正朝廷以正百官正百官以正萬民而治道有修明之效于以攘外侮則修軍政以簡將帥簡將帥以練士卒練士卒以守封疆而四境有寧謐之期此講學有資於成大功戡大難宜急行之而不宜緩焉者也且漢光武唐太宗一時英主耳猶能勤講學於搶攘之時以收戡靖之績伏惟皇上有唐堯虞舜之聖德將以立殷周中興之大功誠於此時舉行開講之事以緝熙聖學則神功聖德髙出千古矣又豈漢唐二主之可比哉臣猥以衰邁懦柔之資章句迂僻之學自忝科第屢叨法從昔嘗獲罪先朝放歸田里分將終老丘園瞑目溝壑幸沭皇上龍飛九五運啓昌期將以立莫大之治功故不遺草茅之賤士拔臣布衣之中授以清要之職日夜思慮愧無補報故敢昧死妄陳前言伏望皇上開天日之光采而行之不勝懇悃之至緣係緝熙聖學重事未敢擅便謹題請旨乞致仕第一奏欽差大理寺右寺丞臣薛瑄謹題為致仕事節該欽奉詔書官員之中有老疾不堪者並聽自陳致仕如年未七十疾病者亦許自陳欽此切照臣年六十三嵗雖未及七十自幼稟受氣薄常有怯弱疾病早已筋力衰微連年又患眼疾昏花文書字畫不能看視及跌傷臂膊屈伸不便景泰元年六月內在貴州永寧衛感冒山嵐暑氣又患風濕痿痺病症兩足無力動止艱難已成痼疾寒熱不時發作飲食減少肌膚瘦弱至今常服湯藥調理未痊委實老病不堪辦事伏望聖恩憐憫乞照詔書事例放歸田里不勝感戴之至第二奏大理寺卿臣薛瑄為老疾乞恩事臣今年近七十稟受原已怯薄血氣早衰髮白齒豁眼昏聽重加以老病侵尋乃於景泰六年五月初七又因將理失宜邪氣乘虛以入感發舊病攻刺腰腹等處疼痛嘔吐幾至危殆旋蒙聖恩特遣御醫調治已經服藥數日緣血氣已衰卒難平復若不瀝陳愚悃即今不能掌管印信深恐曠官誤事伏望皇上宏天地生成之仁憐臣老病放回田里不勝感戴之至第三奏禮部左侍郎兼翰林院學士臣薛瑄謹題為老病乞恩事切照臣見年六十九嵗氣體既已衰憊疾病連年發作天順元年三月內舊患淋疾并右臂風氣疼痛舉發請醫調治日久稍痊五月初七日前病又發調治至本月二十四稍痊六月初三日前病又發調治至今未痊緣血氣既衰藥力無效疼痛不時已成痼疾及兼齒牙豁落髮鬚盡白肌膚瘦弱眼目昏花委實辦事不前臣切自念委受朝廷升用之恩補報莫伸於萬一老病轉覺於侵尋伏望聖恩憐憫衰朽不堪辦事放回田里俾得歸骸骨於丘原不勝戰栗感戴聖恩之至緣係老病乞恩事理謹題請旨敬軒文集卷二十四
