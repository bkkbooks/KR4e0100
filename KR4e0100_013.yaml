body:
  text: 敬軒文集卷十三眀薛瑄撰序論選序昔真文忠公編文章正宗釐為四體其一議論也議論見於經史者如唐虞三代君臣之言孔曽思孟問答之語以至後世英賢之談辨名臣之章疏儒先之著述或陳經世之要或發天理之微或指切當世之務或剖析理欲之幾雖所言各殊而皆所謂議論之文也然文忠所録自春秋內外傳至漢唐而止於六經孔曾思孟之書則不及者蓋以聖賢大訓不當與作者同録于以示慎重耳我朝設科取士罷詩賦中場易之以論蓋即所謂議論體也文制既新士習亦變由是秉筆締思者咸以古人自期而文章之中程度者蔚有可觀然厯科既多小録散在四方每不得以聚觀為歎鄢陵司訓東魯王惟善氏乃能收集厯科以來小録選其論之精粹者彚為一編余間閲之不惟快吾夙志實足以見我國家德澤涵煦之深人才之盛而議論之純正有不愧于古人也又以見惟善編選之勞庶幾乎文忠公之遺意而可行于後世也于是為之序以冠其端云送白司訓序理之在人心固無先後而人之覺是理者則有先後焉先覺者以斯理覺後人俾暗者眀邪者正故謂之師自鄒魯之教衰而斯理不眀于世所謂師之名雖是而其實則非矣如楊墨許行之學莊列老佛韓谷孫吳之教當時習其事者固各以師稱之矣然迹其所為非徒無益而邪說怪行所以壞人心害仁義貽患于天下後世者可勝道哉至濓溪周元公始以一理二氣五行化生萬物之妙作為圖書以發二程二程復因聖賢遺籍推究而擴大之以覺當世之學者及紫陽朱子上得伊洛之傳以道自任一時及門之士莫不去暗即眀去邪即正由是師之名與實殆不異乎鄒魯之盛其所以眀天理正人心有功于天下後世者豈小補哉皇眀定四方一文治縱橫等家悉皆禁黜內外學校咸以眀經之士為之師經以程朱氏之說為之主蓋謂經之所載者理能通乎經斯能眀理以覺夫人茍經有不通則理有不眀理有不眀則後學無所啓發取正而人將惑于他岐其流弊亦不下于雜學之師矣此校官為職雖卑而關係為甚大也吾鄉白公該博卓偉言直行方以眀經中乙榜兩任校庠克慎所職而學者知奮今以滎陽司訓秩滿將行縣令沈公索豫文以贈豫遂厯道夫師之名實班之眀晦以告公公其益當審所去取而慎所覺哉送王汝霖大尹序余嘗讀西漢書見循吏六人傳又讀東漢書見循吏十二人傳以謂兩漢治最近古何賢守令落落如是耶蓋人才之難自昔然也我皇眀綏萬方興百度凡任民社者尤重其選余生也晚愧不得遍識天下賢豪之士獨於余邑大尹王公幸知其賢焉往年余在河南鄉人至談公之賢不容口當是時余固聞其名矣猶未得其為人也其後公朝京師往來河南道中連得兩見耳其言論目其威儀余又得其為人矣猶未知其政也又二年余歸故鄉謁公于公署退觀其所以設施者肅之以威而敷之以和威故鄉豪市猾破膽滅迹莫敢售其奸和故願民弱姓安于里閭無呼號頓捽之擾至是于公之政始得其詳焉自是别公去逾數嵗今年冬復歸河南之鄢陵則公之威惠在人心者益深於前矣余既隨計不可少留公亦將考績天官余恐公之政將移于他而興吾民之思也遂厯道余之知公者非一日以為公贈且志于私牘以俟夫太史氏之筆焉滎陽送别圖詩序侍御劉公丁內艱服闋豸冠繡衣將歸于朝士大夫相與載酒殽餞于滎水之濵酒三行縣令沈君言于衆曰古人之别或為文以暢情或為圖以狀景皆所以篤交道寓不忘也今茲侍御公之行不有圖而歌詠之又豈古人為别之義哉于是命工繪滎陽送别圖俾序其端余觀圖之所載山之髙水之流烟雲草樹之相滋人物舟車之倣佛其於臨别之景悉矣若夫贈言之重祝規之情則豈圖所能顯哉此既圖而必申之以辭也侍御公少遊庠序有聲及登臺署簡默莊重眀敏寬恕風節固已表著于時矣是行也益當攄誠竭忠登進才賢屏黜奸宄大振風紀俾事業聞望偉然赫然炳如丹青傳之信史則是圖與文併可以為後日之美談矣士大夫之工乎詩者歌以系之贈王給事中序君子之學貴乎擴其量而已量本宏大而拘于有形之器故外有所感則中有所遷所謂本自宏大者蓋亦不勝其小矣不觀諸水乎減之一勺則耗加之一勺則滿者蹄涔也多方引之而不加少衆流趨之而不加多者江海也江海之量固大矣而猶有涯階是而進于無涯之量豈非道之大而無外乎嘗觀之古人其大若江海之量者固亦有之至于小得則喜小失則戚者蓋亦不勝其衆也量之不同乃如是哉今之校官俗訾為冷職恆人處是能無戚容者固鮮或一旦去此而陟于尊顯能無德色者為尤鮮也先人在鄢陵時王惟善先生適為司訓余侍先人側竊觀先生之為人謹於自修勤於教人於凡學宫有所修立盡心盡力若治其私室然蓋將終身安于是而不慕乎外視恆人之戚于是者既有間矣及其考績天官集諸教職而試之將拔其尤者以充近職既而先生之威儀文辭獨穎出一時遂有給事黃門之選余往賀之則見先生之言談舉止與居教職時絲毫無所異所謂自得之色無自而窺焉余因切嘆曰人臣之厯閶闔登玉階載筆紀事恆得瞻日月之光者惟給事中為然自其職親地禁不與他等為顯且榮也眀矣今去冷職而驟處是欲其不自矜也難矣哉先生獨能視榮淡無二致處卑顯為一節非能擴大其量不以外之所得為欣戚者其能然乎由是見先生之量進于道體既未可涯至於處尊顯之地更有大于此者必無所滿矣于是乎言御史針解序御史針者元張文忠公所作也公為御史時嘗著風憲忠告以眀風紀之要又作是針并以致戒焉大義言御史之職關係甚重任是職者當思其重而為所當為戒所當戒其言簡其理偹其詞直其義切誠憲臣之藥石也公既沒而其針盛行于世今內自臺署外及臬司以至憲臣之家靡不列之于屏于几以比韋弦之戒傳曰仁人之言其利溥哉信矣余以菲才承乏風紀恆誦是針以攻其過暇日復述前聞為集解以釋其義雖于文忠公作針之意未能盡得其藴然讀是針者誠能因是訓詁以玩其詞求其意反諸身心而自省則當為當戒者固已不昧所從事又能厯覽忠告全書而有得焉則于風紀職業為可舉矣鄢陵縣志序郡邑之有志尚矣任土作貢見于夏書九州之土九野之星掌之周職方保章氏自漢以來作史者亦皆有志以載當時之土宇雖郡邑之名或仍或革至于上則天文下因地理區宇一定之宜則有非私智所能改易也我皇眀肇一四方極海內外畢載圖籍幅員之廣前未之有也皇上臨御之十六年爰命天下儒臣考郡縣廢置之由與夫山川風土之類編集以進于時鄢陵司訓王惟善實修縣志奉命惟謹乃摘抉經史詢諏故老托遺事于刓碑斷石之間訪陳迹于荒墟廢址之內彼此更定其是非古今互求其實迹提綱舉目細大不遺凡邑之肇置本末與夫分野所屬山川所表溝池土地之綿厯户籍貢賦之盈縮風俗土産之宜宦蹟人物之衆縣治庠序壇堚郵傳創建之始僧寺祠觀橋梁陂池存毁之迹仙釋之有無文士之題詠靡不博采而偹録之再閲月始克成編乃繕寫為帙上之朝復將鋟板邑庠傳之永久遂屬余序余謂蘭亭之㑹茂林修竹崇山峻嶺逰觀之樂耳好事者猶圖而記之以傳于後况兹一邑之志有稽于古有考于今其可尼而不傳哉是書也俾邑之人覩其山川景物則堅其安土樂業之心觀夫忠良孝義則興其去惡向善之志是又豈非政教之一助哉是為序周氏族譜序上饒周秉忠示余族譜一帙求為之序余觀秉忠先世家于上饒者厯年滋多譜所謂元溪者蓋其宗而元溪之分則自學録公始學録公以文學顯于宋而其後蟬聨相繼各以儒吏醫術著稱于時傳六世有安世者號觀復翁于秉忠為髙叔祖乃始纂集聞見以譜其世而傳諸家至秉忠先君子復取觀復翁以降宗系之未登于譜者條别以附秉忠又取其先君子輩行及其昆弟子姪各以序列于後由是周氏之譜克完無漏嗚呼若周氏之祖子孫可謂善于繼承者已余于是因有感焉嘗觀世之人莫不欲蕃昌其宗支殊不知積于前者淺以狹其如後之人何譬之于水捧塊纍石為尋丈之沼所瀦不過咫尺之深决而求其流之長不亦難乎周氏則不然自學録公以來咸有所蓄而未施其積之富殆若長陂巨浸固已汪洋浩渺而廣且深矣今秉忠始復以文學奮迹科目遂有分教之命周氏之積殆發于秉忠乎吾見其沛然奔放而莫之禦也然周氏之積而發者固可驗使秉忠之後遑恤厥源而决之不已則廣且深者亦將有時而竭矣惟能因余言以厯覽其先德之懿以世濟其美焉則源益長周氏之發庸可既乎詩曰子子孫孫勿替引之余于周氏亦云是為序送孟縣令林君致政序聖朝稽古典禮以正百度士之入仕者進有祿秩之加退有引年之令所以始終優禮臣下之意可謂偹至也孟縣令林君一朝以年逾六十將請于朝如引年之令于時郡之交遊來徴詞以贈且言君之厯官久矣然所至必有聲司委積理簿書雖卑必舉其事知大府毗守政雖顯不易其心孟縣號為繁劇自君來治之有法坐以無事上下咸才其為吾輩誠重其能而賢其去願先生一言以張之余惟士君子于進退之際尤所慎重觀林君少而學壯而仕老而罷克保始終無悔吝之及非慎且重者其能然乎是行也不日得請于朝榮歸故里見平昔之交遊集鄉閭之子弟樽酒之間尚當眀告以聖朝養老優賢之意使皆勉于忠勉于孝相率為禮義之俗則林君于退歸之際益可重矣務本堂序務本堂者揭萬英所作也萬英世家撫之臨川作藏修之所盛蓄書史將以講復思繹浚其德之源而導其流遂取有子所謂務本者名其堂永樂甲辰冬萬英來省其兄子覃懷因繪其堂于臨據間以謁余求為之言余遺之言曰子不觀夫穡人之治田乎是穮是蓘不少自懈雖有歉嵗不能為患矣君子之為學亦猶是也耕其理義之田勤力約取不侈乎外惟事乎中凡汲汲於朝夕者惟以修德慎行為務蓋德行者萬事之本也本立而道之行將若水走壑火燎原安往而不達哉或不能務其本而欲道之行猶農夫忘穮蓘之勤而欲有秋成之望烏有是理哉萬英既取古賢者之格言以名堂其必視名思義務所當務勉之又勉不責效于旦夕之間而收夫逺大之獲則穮蓘之積不可一二數矣韓子所謂養其根而俟其實者萬英其深念之送李太亨詩序余往嵗侍先君子逰玉田玉田多四方賢豪之士余皆與之交而親且厚者則濟南王君素亨大梁范君汝舟東萊魏君希文永嘉徐君藴夫安陽苑君仲仁洎今海昌李君太亨而已諸君子皆年德老成余獨以稚昧居其間往來相得歡甚其後素亨以薦舉進余以先君子官滿去太亨之吳汝舟之汴希文南行獨藴夫仲仁尚留玉田而吾六七人者千里相望邈不可即追念往日從逰之樂可勝慨耶今年春余重遭大故居憂覃懷而太亨李君乃自吳抵中州走數千里取酒為文以祭先君子并以慰余于哀次嗚呼徐孺子之行不見于世久矣而李君獨為之嗚呼世豈復有斯人者乎余因念疇昔與諸君子相得甚厚數年以來各縻于事不可驟見而乃獨得與李君相㑹是又足以感余哀荒離索之情矣于其歸遂䘖哀書此以贈而復伸之以詩云送王世寧歸覃懷序古之為士者既自廣其學而充其道矣進而有為也必以其義而推其有于人人至于得失之際初無介于懷焉後之人不然修于已者不力而僥幸于名位之得得則意氣橫肆以矜駭于庸人之耳目以求遂其朵頥之利欲而及人之實未必有也不得則悄然憂爽然嘆立若無所自容人之度量不同有如是哉覃懷王世寧其先業醫嘗有隱德而未之報至世寧乃能篤志于學今年秋以郡庠弟子員一舉而遂登于鄉選人皆謂是故家子能享其報矣及歸道由鄭之滎陽余往與之有舊重其歸因遺之言曰人之學有得焉而或未遇于時不足為歉也學未有得焉而或邂逅利達不足為多也惟學得焉時達焉則於義為合向所謂古人之進止如是耳世寧幸生休眀之時涵泳詩書禮樂之澤一舉而遂得名于薦書其于進而有為之義將階于此矣雖然余將進世寧于道進于道殆未可以是自滿也歸見鄉人有以榮且慶見稱者世寧慎勿信也惟當益增其所當務等而以義進他日推其有于人若髙山出泉而勢莫能禦斯庶幾乎古人矣余請書此以俟送驛丞湯伯瑀序皇眀有天下極海內外咸為編氓內之政教號令頒布于四方萬國外之四方臣妾展覲修貢于天朝肩摩踵接畢出道途以故傳置之設布滿區內川浮陸走逺近分合脉理牽聨雖南北東西岐路若錙銖然而無不川匯雲集㑹同於輦轂之下是則司其事者雖不若顯且尊者之所為而有關于政務之萬一要亦不可少也滎陽索亭驛當東西之衝軺驛尤劇所職或匪其人往往屋宇穿漏弗可居禀餼匱竭薪茭空踈使至無以資馬瘠尫駑老不任乘服而往來壅滯大不稱設傳置之初意湖南湯伯瑀以敏幹給差藩司三年遂來丞兹驛及至顧視室屋之缺穿者繕補之餼饋委積之空虛者充牣之廄茭完富馬息以逸凡百器用無不新好由是使至如得私家其去如馳風雨前之積弊一皆刮去而伯瑀又能事長上以謹慎接過使以卑遜交朋好以然諾故尤得稱于衆今年秋以考績將謁選曹邑之交遊來請文以贈余觀伯瑀之勤事若此其可謂能舉其職而不失傳置建設之初意矣如是而進于選曹焉有不允其績者乎遂書此為考績序送永和湯大尹序余少遊中州則聞大梁為古今名藩文獻之所薰陶耳目之所觀化類多秀特俊偉之才其後余亦與試于河南庚子之秋闈見大梁之士儀觀偉雅言談詳緩及掉鞅埸屋文詞沛發榜出而開封祥符之士于他郡邑倍焉余益信大梁之多竒士非虛語也眀年余忝科第歸遇大梁湯自新于滎陽目其容粹而豐聽其言簡而切扣其中則所出未巳視余庚子同登士蓋莫能先後焉余又知大梁之竒士不止於疇昔所見也自後余歸河津有來自永和者因問湯公之政則稱善不容口余又知湯公習于從仕者蓋有所自也今年余赴京師道出永和入其境見其墾田多在山石險側間坦夷者十無二三問其吏則牛力所不及者皆斫垡以下種余以謂有如此民必艱悴流徙者多及過岩穴山溪之居則見老農父母兄弟妻子毳帽褐衣饘粥菜羮飽暖自足而無一家之外徙者因怪而詢其故則曰吾邑有賢侯焉自來視事刮絶羣弊為農者惟務供租給役而無胥吏漁獵之擾為兵者安于戍役而無軍將徴索之苦凡吾民所以優遊林壑得自力于山田者皆侯之惠也是以田雖險瘠然易治既至故年之所入亦足以自給焉人之所以無轉徙離逖者此也及至其所治則見其為政簡而不煩寬而有法余竊自歎世之有司朘人益已視民之飢寒流亡略不加恤此誠何心哉湯公乃能化磽瘠為豐熟撫疲困為安佚致人稱道先後逺近同然一詞非盡心撫字者能然耶余益以信大梁之竒士不但見于問學儀觀之美而又能措諸行事之實為可羡也湯公今以三載報政天官余見其書最而歸益勵初政九載陟眀可期異日事業成就未必不為大梁人物之秀者也余姑書以贈送盛司訓序人之負魁壘之才抱竒特之志者鮮不欲位通顯以出其中之所有而樹勛業于時有其器而或拘于冷職僻地鮮不戚咨無聊若不能一日安者此人之恆態也余竊以為不然君子誠有是器矣但當隨所遇而安之以盡其當為之分分誠盡矣則其氣益定理益眀消其邁往之鋭而老其宏偉之才所謂顯位達宦雖無幸冀或有時而自至焉于以施其所有則何勛業之不立哉今年冬余與盛君文顯㑹于襄陵司訓丁君廷玉家同處連日夜因觀其為人質貌充碩而議論穎脫蓋所謂魁壘竒特者也問其職則司訓為冷職問其地則嶽陽為僻地他人有是器而處是位則戚咨之意必有形諸聲容者盛君不然方歉然以進修為未足退然以誨人為未至若不知教官之為冷職嶽陽之為僻地蓋能安于所遇而克修其職者也吾意其涵而泳之而氣必完靜而察之而理必熟鋭邁消而宏偉就如是而進於衡鑑之下輕重大小無所移易而顯位達宦或不能辭其必盡發所藴秉仁執義上以忠乎君修政立事下以澤乎民勛名事業垂諸悠久斯足見其魁壘竒特之實矣丁君於盛君為素交蓋亦魁壘竒特而淹于教職者也因盛君考滿之行求余文以贈余遂書此以告并以為丁君朂云送教諭韋穎考滿序士之仕也不難夫職任之崇卑而難夫職任之修舉職誠修矣雖小官卑秩尚可以行其志况崇資巨秩哉校官在衆職中雖曰祿薄秩小然有師之尊世嘗以清職稱之實非泛然小官之可比也以清職而異乎他則居其任而修其職者不其尤難哉河津為邑介乎冀雍之間前汾右黃襟帶合流北則太山隱起延袤萬里以兩州之交河山之㑹氣之靈而鍾於人者比比焉故來教是邑者必能舉其職而後人始得以因其靈以成就廣文韋君頴詩書文雅得之學而㑹之心者宏博涵蓄總統包括士之從遊者如入富室大藏而百物隨所取如遊抵鵲合浦而珍竒遂所求以故騰芳科貢者接踵于時其不捷而退修于初者亦皆以不及前人為自愧是皆先生善教之力而非特山川風土然也然他人篤専教條者視廟學不飭必諉曰此有司事也雖壞圯弗支而不加葺先生又能欽服國典大合羣材一新廟學俾聖祀孔彰而士業有所若先生者可謂兼道與事而一之於職為無忝矣今年春以考滿將詣天官諸生重其善教興學之功因相率求余言以贈之余邑人也雖遊宦四方而近年亟歸連得承顔接辭故於知先生為詳且熟諸生雖不有請尚將强而言况請之勤乎先生行矣聊以已然者卜其未然者則崇資巨秩或可陟焉余又知先生能慎終厥職而無所怠也是為序贈蒲州劉太守序古之所謂賢郡守者非為其能督租賦修簿書謹期㑹而已必其能安民庶宣教條廣德化革弊政使闔境悅服而始得稱為賢焉蒲之為州在山西為巨郡然其間河山間隔土地狹隘多瘠原鹵隰而人之生齒為尤繁以不加多之土地而有日益之生齒耕作少怠則其嵗之所入率不足以給公私之需而重以黠吏奸民舞智乘勢搖毒害政是以瀕年民多失其所延安劉公九成以卓拔之資挾有為之才來守是邦詢咨境內恤民生之如彼知弊政之若茲遂精心勵飭以民事為已任行視境內勞相耕作民食或艱即為之纎悉經紀使有無相資俾無流逋之患暇則集令佐耆老告以國家典章之具德澤之深期與共遵約束以修禮義亷耻之節以興孝悌忠信之俗郡邑之中有猾胥奸民干紀害政者必挫抑而芟除之由是地雖瘠狹作治以時而嵗入倍常教條敷布德澤下降而人安其所奸豪屏迹弊政清雪而民害不作官僚相與稱其賢于庭民庶相與歌其德于野聲名聞望孚于逺近雖古所謂賢守者蓋不多過也今年夏以三載述績大廷天官既最其績而俾之復任蒲士之在太學者咸來徴文以贈之余亦郡人也往年嘗歸故鄉見劉公纍纍焉故知其政為尤詳于是述其循良之蹟有似于古人者以告公且以為公他日陟眀之張本云五友詩序余居沅州之憲署以地極僻逺罕得與名卿碩士相接恆懼有過不自知知而不能改或流于小人之歸也因取凡古聖賢書列之後堂公退則俯而觀仰而思往復熟誦以求其義或言行有未當則質之書以去其非而趨于是視書蓋若嚴師而不敢慢焉堂下有方池池側有竹梅蘭菊四種池中有荷蓮數百本合為五物列植上下更秀迭茂余每讀書覺倦則步廣庭臨清池顧諸花木而樂之既而自謂曰古之君子未有不資師友以成其德者今余亦既取古聖賢書以為師矣獨未得夫良友以自輔焉念彼五物者皆禀天地之氣以生乃植物之君子也茍取其德以自輔豈非僻逺中之一助歟故余之心或曲而未直塞而未通也則友竹之徑直中虛以端其曲而開其塞焉余之德或雜而未純同而諸俗也則友梅之清白絶俗以滌其垢而勵其介焉以至友荷蓮之中立以端余志友蘭菊之芬芳以潔余行是皆五物之有益於余者也若夫友竹之操可以閲嵗寒友梅之味可以調鼎實友荷蓮之娟秀不妖可以發文藻友蘭菊之風致髙閒可以安雅淡又皆五物之有益于余者焉或者疑曰人之取友賴其忠告之益耳彼五物雖有是美而實則無知子或有過彼安能有以勵子乎余曰不然孔子曰知者樂水仁者樂山山水亦豈有知而能勵于人乎哉特取其動靜之性默有契于仁知耳余與此五物者儼然相對因彼識此方將去喋喋多言之煩希心領神㑹之妙兼取博采其德約而總之于心以輔余之不及又豈待發于聲見于詞而後喻耶疑者乃解而退遂與五物者序列拱揖結為良友而求正于書又為五詩以固其交云送孫先生致仕序壯而仕老而歸此人情之所願而今昔之所同也然歸之道雖一而其樂則不能無異焉極田宅之廣麗誇馬僕之盛强槖金珠積錦綺矜器玩美服食窮老年心志耳目之嗜好以自佚于禮法之外此衆人之歸所以樂得其欲者然也有廬可以蔽風雨有田可以給饘粥彈琴於桑樞甕牖之間以歌先聖賢之德音以頌太平之治化老者愛而幼者孝賢者親而愚者化廉讓敦厚之風薰酣乎里閭之間稱為鄉先生而名永長存此君子之歸所以樂得其道者然也先生以碩學耆德給事黃門典厯教職凡三十餘年一旦以年逾七十辭郡博而去朝廷例優之冠服如舊詩書滿載而行槖蕭然持此以歸于吾前所稱者固非先生之所好矣于吾後所稱者非先生又誰望之先生行有日交親重先生之歸者咸圖為詩歌美之而屬余叙送寧海令季復春序侍御張君勉夫與余為同官間語余曰吾鄉先達有季復春公老成士也自永樂初已登名薦書又三年為尚書户部主事已而退返初服者數十年復春公處之泰然不以去官有纎介不豫意其志益篤行益修學益勤聲名侈於時宣德改元詔自廷臣以及外藩臬咸得舉所知無間踈逺時有以復春公名聞于朝者乃徴詣天官而集試之試既徹復春公之作獨拔于衆遂有寧海之命或曰復春公故卿屬也以是來而逺宰海瀕得無介于懷乎釋者曰不然君子出處榮淡逺邇當一安于義命若得利則躍躍以喜不得利則戚戚以悲其能免韓公之譏乎且復春公方返初服時尚淡然若將終身况有百里之地領一邑之民教化于是焉布刑政于是焉修財賦于是焉出民之休戚于是焉係古所謂親民之職蓋莫先乎是而復春公又豈不快于是哉未幾果有以寧海之政傳于京師者始信復春公能安于去就而盡心于民事如釋者之云先是國制才能以拔舉進者秩滿仍一考焉所以重任使也復春公今年春如例集試闕下奮筆渙辭若不經意而語甚驚人既而將歸所治朝之縉紳大夫故與公逰者咸欲文以張之今吾若同官且相好也幸為一言焉余曰君子不茍毁譽于人文辭之宣于紙筆毁譽之章者也吾素與復春不相識茍徒侈詞以諛之不幾于前之所譏乎雖然余有居一于此矣勉夫信人也觀勉夫之不茍則其所稱道必不茍矣遂次第勉夫語為復春還寧海序望雲思親序昔狄梁公登太行顧瞻河陽白雲飛繞親舍凝立者久之後世思親有以望雲自名者遂以為故事蓋慕梁公之風而興起焉余以謂人子愛親之心蓋出于天性之真而不能自已其或至于暌違膝下為時久逺則其思之之切蓋有隨時感發而不可抑遏者又豈必登髙山望白雲之繞親舍然後可以動其念哉然則梁公白雲之思特其一時之興前是無時而不致其思者固可見矣是則後之君子求梁公思親之實可也慕梁公思親之名不可也余友鄭君元吉為其友霍志剛氏求望雲思親序于余造余廬而請者四五至而不厭余竊念素與志剛不相識其思親之慕名與實皆不可知獨所謂愛親之心出于天性之真而不能自已又皆有是非特志剛有是也志剛家山東二親皆安好無恙而志剛遊太學者有年親舍邈在海岱之間音容久曠定省久踈則所以思之之切固宜隨時感發初不待于望白雲之飛揚而後動其念也而猶以是自名何耶豈慕梁公之風而求其實邪志剛其加朂哉他日著忠節建事功而可垂之後世者未必不自于望雲思親之實之心之推也是為叙送林鄭州序余少遊中州每愛其風土之淳厚民俗之簡質最易導之以善鄭之為州當汴洛襄鄧之㑹為中州之名邦其土厚其民淳所謂易導之以善者尤莫易于是先是為之長者或匪其人率多任茍簡自恣之為厲威猛暴悍之氣専尚箠笞而强民以必從民或不堪其擾而至于有言則曰俗之訛漓焉民之刁詐焉甚至薰灼其心相伺如仇敵兩敗俱傷而後已是豈長民寬厚之道哉余友林君文載往年與余同考于春官其資敦厚而深于學其言簡緩而中于理既舉進士髙第又從薦者言遂來知鄭自初視事時余嘗一過之固知其設施蓋以寬厚為主矣又數年過鄭者纍纍間止郊境見田夫野老稱林君之美者不容口問其故則曰租賦之入他郡之急也吾侯則緩之期㑹之集他郡之迫也吾侯則寬之卒之急而迫者民或不堪流而之他緩而寬者從容勸率事亦無不集民亦不告病焉又曰他郡中倅之于民或漫不加喜戚于心吾侯則溫恤之意常溢于色辭又曰吾侯髙大深逺藴于內者固非野夫小子所知其寬厚之政即衆共所知見者灼灼如此蓋不可掩也余惟國家列聖相繼簡任庶僚尤重守令之選近日復詔自三品以上官始得舉可任方面郡守者夫以郡守而儕于方面其任之重也日益加使皆得如林君之寬厚者居是職則雖難治之俗固無待厲威尚猛而事集民安况易導以善者乎今年春林君來考績余素重其人遂告以余之所知者復申以國家任用郡守之重林君其尚思所重而益加勉焉送長蘆陳運副序西蜀多佳山水而名賢偉人繼出其間雖不可以風土拘蓋亦得山水蓄積疏通秀麗之氣居多昔韓栁二子亦謂交嶺竒麗瓌偉之物不能獨當山川鬱積磅礴之氣而必鍾于人如蜀之岷峨連聳大江小水綱紀其間則其産物之盛又豈特丹砂水銀楩楠樟梓之類所能當其秀哉宜其名士代出如相如子雲范蜀公父子之徒不可勝舉我皇眀混一區宇三光五嶽之氣完而賢才盛則蜀之産士是不特山川為然蓋又㑹乎氣運之隆也侍御范公循蜀之良士間語其友人陳君子布發迹鄉閭揚厯大僚其質魁乎其端重其才卓乎其幹給纍官至閩建鹽運司副人不告勞而鹽利足未幾丁內艱起復為長蘆運副人皆謂煮海之利甲于天下陳君此行必能增羡餘加尋常百千等矣陳君愀然曰足用在乎理財理財在乎安人人安矣財用寧有不足者乎况鹽鹺特財用之一端怠其事而匱其用固不可羡其數而病于人尤不可要必人不知擾而鹽利足斯為善于理財吾雖不敏固常奉教于君子矣范公述陳君之語告余因謂其識體復徴文以贈之余謂以全蜀山水之秀國家全盛之時有若陳君者出焉及措諸政事知所重輕而不惑于尋常習俗之見是誠可嘉哉陳君行矣他日以理財而有合于大道可以頡頏于蜀先君子者未必不兆于此云是為序送王克庸知定襄序余十年前侍先君子在玉田時縣庠士子王克庸氏時已嶄然出于衆余與之逰好加密知其為人質厚而行方心平而言真其與人交惟可否是從不以勢利重輕有纎芥厚薄意其有不合雖富盛鄙斥之不少假借余時已知其處心行已近厚矣又數年余中鄉舉克庸充貢士同待試于春官日相㑹處談笑歡然無間既而余沗科第官御史祇命湖南者三年歸而克庸適有定襄之拜玉田士子之官于四方遊于太學者咸推勉克庸而屬余道其行夫以余之知克庸者已十餘年而一旦克庸有官守焉有民社焉則余心之樂為何如哉雖然余之樂非樂克庸之有是位也樂克庸將推其所得於人人也夫士之窮居不茍則其達也亦不茍克庸之不茍于前所稱者固可見之今之為縣蓋必能砥正身心檢察左右眀謹條章流宣豈弟要使方百里之民知聖天子仁愛元元之意異日惠在人心聲流朝右則克庸自立者益不茍而余之知克庸者亦不妄矣茍徒榮其名沒其利而不恤其所當為非所樂于克庸也是為序敬軒文集卷十三
