body:
  text: 敬軒文集巻二十三明薛瑄撰墓表處士牛君墓表古有司冦牛父微子之後也子孫因以父字為氏而牛之姓實出於是隋之𢎞以德量稱在唐豳國竒章公咸階峻顯堪以太學生為昌黎公推道見諸文宋臯以勇畧為鄂武穆部將牛姓者聞者代相望史不絶書今處士興父福淵大父尚輔尚輔之先世居山西潞州有仕至樞密使者代逺不詳其字與世自牛父逮處士亦不知系自何出至處士大父始居鄢陵遂為鄢陵人比三世皆積善行義遯跡丘園處士娶柳氏女生子男四人曰忠曰麟曰景曰良女四人良最季處士視諸子中惟季質魁壘且性開敏宜有立遂遣充學官弟子員讀書日有聞中永樂某年郷舉入太學益廣所聞見天官才之上其名於朝授西安府同知侃侃有操施能舉其職人皆服處士為知其子處士雖不治章句業孝友樂善出於其性子季旣業儒餘三子家居處士教以孝弟和謹戒以勿崇貨勿刻貪服事唯勤厥敷菑不得惰荒嬉慢處士尤急人所無傾囊倒廪無吝色人有負處士者必自引咎弗與之爭以故家庭閭里咸服處士之篤於行子季之為學也處士必使嚴其師擇其友專精其業凡伐性敗德隳業之事絶使不為良之為賢子弟為才舉子為名太學生初仕而得佐大府貴有大夫之秩固皆處士之善教且積慶自其先世來者逺且長而始發於良作善之報耿耿其不可誣福淵娶于氏生三子長處士尚輔娶李氏生五子其一福淵也處士四女皆適大族士人處士與柳氏先後没俱葬其先塋良為同知之五年距處士没若干年矣因念處士墓表未克刻無以顯揚其祖考之潛德懿行以垂示於後人乃詳其世次行實可知者以書投河東薛瑄求為之辭用稱薦述之意則遂刪取其書之所載者刻之墓道俾牛氏子若孫得以覧觀皆知其䝉慶澤者其來有自且永永無怠於為善以思嗣續其世云訓導趙先生墓表故大名府滑縣儒學訓導趙先生正統八年三月初六日以疾卒于家是月二十七日葬於峨嵋山之先塋明年夏其子駪以先生狀走河津求為表其墓謹按狀先生諱􅕔字玉鉉世為平陽蒲州人祖諱伯通考諱良皆以淳質行義稱于郷比兩世隱德弗耀先生生有美質少即端凝不嬉動止異凡兒良視諸子中惟先生可教遂遣受業郡博比長習程朱氏易中洪武二十八年郷舉入太學益從老師儒及四方之英俊以廣其學識端其趍向適天下教職多缺員所司得請合太學六館士考其業精行修者以補其缺先生時在選列授鳯翔府汧陽縣儒學訓導隴俗獷悍諸生事弧矢網罟漁獵以荒其常業先生至即督絶嚴條約以身先之數年諸生遵禮教篤詩書由科目進而仕于時者累累焉官滿調順天府三河縣儒學訓導教人如在汧陽時固無怠九年丁内外艱起復調今任先生年益髙學益進行益修士子頼其造就者益衆正統元年以年逾七十致仕歸僻居鄉里踈逺紛囂安靜自頥雖不出户庭而蒲之人士皆推為先進成德加敬畏焉及卒年八十有一皆曰善人逝矣吾其何如奔走賻祭于其門者相屬焉先生娶楊氏生子男六曰馴曰駪曰􅀈曰駿曰騘曰驥馴傳家學以易經中永樂丁酉科鄉舉先卒餘皆紹其家業無墜女一人適良族孫十人於乎先生為子而能肖其親為師而能淑諸人為父而能善其後少而學壯而仕老而休全歸夀考其可謂卓乎有立克保終始者矣夫有善於當時者宜表見於後世予故刪取其家世行已歴官之㮣表諸墓隧俾來者得有所覧觀焉贈文林郎後軍都督府都事李公墓表公諱士成姓李氏世為定興人大父伯通仕元為保定路總管有惠在人父欽甫亦仕為路官家牒㪚失弗克詳其秩次行實公名家子生質淳茂能脫去貴習恬於紛華乃優游郷里適意山水田園間日以整齊家法訓飭子孫敦美俗化為事公有治人才歛而不施獨成人之善急人之厄周人之乏若饑渴之於飲食為之終身不倦里閭翕然尚其義公娶邑人劉氏女生子男二長福次祐公嘗曰祐子守吾家者也福子可教遂教以讀書綴文服勤儒行稍長遣為邑庠弟子員使從善師友游以卒其學中永樂某年郷貢進士初任行在廣東道監察御史後知滎陽縣改任都督府都事于時公洎劉俱已没世若干年矣值國家舉推恩之典勅贈公文林郎行在後軍都督府都事劉贈孺人咸以子貴福都事官滿任大理評事陞山西按察司僉事福之次子俊任定興訓導九年陞浙江道監察御史於乎有其具而弗克試施其德而不饗其報者必顯揚於後而鍾慶於子孫此人事天理之必然公有可用之才及物之惠乃獨蘊而不出種而弗穫逮其没世未幾果克顯受聖朝褒贈之恩榮其泉壤光耀郷閭而其子若孫又皆以文儒致位風紀兩秉憲節内外相望天於為善之報耿耿其不可誣夫遡其流則知其源之有自以公之子孫咸克衍其流之長則公之承祖考之餘慶者益可見其宏深而有本是宜表見其潛德幽光以垂示罔極以為行義積善之勸云趙孟周墓表有於其親没之久於凡祀事旣以時修又念其親之生平行義著於家庭著於郷邦歴歴在人耳目者不有所託以圖不朽將與嵗月俱逺終於泯泯無聞矣故上自公卿大夫下至庶人而欲顯揚其親之善行於無窮者皆出於降衷秉彛不能自已之良心夫何間哉粤觀漢唐宋以來凡官居野處之人欲顯揚其親之名者必求立言之士述其行實勒之金石以耀無窮所託以圖不朽者宜莫過於是君子尚之蒲州趙仲愽其始得姓為趙城人逺祖有世昌者始家於蒲歴漢英良甫三世至君卿為仲慱曾大父大父文簡生孟周即仲愽父也仲愽於孟周旣没能修凡祀事不怠又欲圖垂其親之名於永久乃走河津進薛氏之庭拜而泣且言曰仲博蒲之編氓也雖世居田里而凡供民事無敢後今竊有請焉吾先人孟周承先祖之業日累月益家計日饒然能不以利自專人有匱乏不足於用者即斥其餘以周之無吝色有貸其物不能償者往往拆其劵性尤孝友謙恭在州里接少長貧富一以和不立崖岸有纎毫乖爭意與朋友交游酒食過從懽笑無倦全交道始終至白首無間言又嘗逰天下名山川陸走陜洛襄鄧梁宋鄒魯之郊舟泛江漢洞庭彭蠡淮泗之波老而歸子婦羅列家庭養無違意杖履東阡南陌朋儕童稚追随徜徉嬉逰以樂其樂竟以夀終於永樂八年正月十九日葬於城古庒之先塋逮今四十年矣雖報本追逺之祀勉修其一二尚念其行義著於郷閭在人耳目者未有所託恐遂湮没無聞於後懼莫大焉竊聞先生篤古而文者倘畧其愚且賤而憫其區區不能自已之心辱賜之言以表諸墓庶先人之善行有所托而名永長存幸莫大焉余按仲博之言其父孟周為蒲之善人行義以没世仲慱旣修凡祀事不怠又圖顯揚其父之行於不朽所謂降衷秉彛之心於仲博見之遂為次第其言以表諸墓俾其子若孫皆知孟周所以承先貽後者一本於善庶有以繼承不怠益衍其善於永久云故贈兵部主事陳先生墓表浙江富陽陳復初先生以宣德十年十月初十日卒于河南汜水之官次又十五年為景泰元年始克表于其墓先生諱原復初其字也其裔出陳太丘之後自漢晉隋唐宋以來陳氏仕於其世者代有顯人以家牒弗存不能詳其世次至先生曾大父子髙大父仲逺父思明比三世皆積善行義於鄉里種而不食其穫施而不求其報思明尤讀書好禮及生先生有異質知其必有立也遂遣逰庠序從良師友以開發涵養其心性時未幾學識驟進不凡流輩咸推服以為不可及後以明經入太學益考業於明師儒且得盡友六館天下英俊之士聞見日益富聲稱日益著值選學行有成者分教四方學校先生遂有山西沁源儒學訓導之命先生旣至官喟曰官無崇卑顧職所盡何如耳且天下莫大於道訓導為人師師道在焉道有不修何以盡其職乃充其學以道自勵早夜懇懇以啓迪諸生者皆經籍所載聖賢所傳三綱五常之道異端誕妄不經之說無以干其念由是學子翕然從其化山右稱善教者皆推先生為最後調閩之興化縣學兩任江西饒州府河南鄭州郡庠皆以舊職合四任秩滿陞汜水教諭又九年將去而陞秩諸生狀其善教之績上章願留以卒業詔許其請竟以疾卒于官享年六十六矣汜人慕先生之德教者不但庠序諸生又延及里閭齊民旣葬先生邑東龍泉鄉之原復留其家占籍於汜焉先生旣有美質又充之以正大之學歴教五郡邑將三十年無倦之心始終一致所至成就人才随其器質弟子名薦書入官躋仕途著聲蹟於世者林立相望若先生可謂無忝於師道而能盡其職矣先生信道旣篤安於所職無絲毫自貶求人知薦意性復樂易寛大接人洞見表裏坦然明白不為防畛崖岸茍賢矣雖貧賤禮之有加茍不肖雖顯者亦視之漠如也居家不問有無尤喜賔客毎客至即呼酒延欵連日夜不厭急於行義嘗斥其餘以賙貧乏人有死無葬具者即助之棺椁其友葉全寄先生以白金百鎰全亡召其子以金還之郷人孫景原戍邊客死汜水先生遣人護其骸骨并妻子以歸嘗道經睢州逆旅張貴家見庭槐羣烏護巢哀鳴問其故貴曰家貧無以自活已售此槐以給食伐者將至烏懼傷其雛故哀鳴若此先生問槐價幾何即如其數探囊金使還市槐者責舉家羅拜槐得不伐羣烏即噤不聲先生平昔舉義甚多此特其一二耳他不能盡述也嗚呼先生自其曾大父以來皆積善行義隱德弗耀至先生始以文儒起家益衍先世之慶又位不滿德而以教付厥子其長子鑑克守家業次子銓登進士第今為兵部職方司主事三子鈍中郷試禮部乙榜任大名府儒學教授銓為主事三年例得推恩於其親於是勅贈先生如其子之官其配呼氏贈孺人光寵赫然動於一時先生雖没亦可以無憾矣夫惟所蓄者久而深故所發者逺而大葢其理有必然也余少從先君子典教滎陽其地介鄭汜間余往來嘗抵宿其館舍先君子没于覃懷官舍先生又遣人致賻復遣銓從余學故余知先生履歴行實頗詳用敢序次其事表於墓左以明先生所以承休於前而貽榮於後者皆本於德善之積不惟其子若孫當永永嗣服無替而世之人亦得以有所觀覧興起焉故嘉議大夫陜西按察使何公墓表何公諱自學字思學其先閩人逺祖諱瓊者仕五季之周為尚書僕射瓊子輝為屯田郎中始家金谿今為金谿人公曾大父諱伯啓大父諱宗哲父諱秉煥號緑水翁比三世皆修已行義晦迹弗耀緑水翁娶曾氏有婦德生二子長即公也公資性夙敏舉止異凡兒緑水翁知其必有立八嵗即遣從鄉先生㳺讀書數遍輒不忘江西按察司僉事行部至金谿選鄉學子弟可充增廣員者得公大喜即抜登邑庠時年十五矣公遂從孟司訓授書經益肆力於學比弱冠已自習熟諸書所謂舉業者綽有餘力間為古文詩章尤渾厚清新有作者步驟公試鄉舉一往即中前列登宣德丁未進士第初任刑部河南司主事公以謂賁之象曰明庶政無敢折獄故折獄於庶政為大於是早夜以中正明達自勵盡心獄事時稱明允如辯寃獄白能等事蹟俱入史館編録值朝廷選刑官之能者分理天下滯獄公首被推擇得閩浙公旣奉勅以往雖山郡海邑惡瘴狂颶有所不憚必親至其地為䟽理其繫囚二藩旣大以逺人得昭雪而䝉其惠者甚衆公竣事還未至而已馳聲京師適歴官三載例得推恩緑水翁封如公之職曾氏封安人公復上章乞歸省詔許之且賜以楮幣公并以所得恩賜白金之類悉歸奉二親一毫不入私室一時之榮慶孝義動於里閈正統三年公為廷臣推舉陞廣西按察僉事其地乃嶺表百越溪峒猺獞不時竊發剽攻甚則獮之以兵雖得少靖而民已病於餉運公於所分巡地必大示威信猺獞雖蠻性亦知畏服因得减征行之擾其編民亦雜夷獠不通道理毎構訟輒為譸張詞不可䆒詰動引百十人連嵗不已公嘗偕奉勅郎審録所部繫囚其勤慎如在閩浙時夷獠積年久滯之獄咸得伸理旣而丁緑水翁憂營葬一如古禮復廬居墓次者三年釋服調除山西按察僉事其憲體益謹而尤能興學以教人表亷以厲貪時大同方宿重兵以防控荒外利害繫於守將公常巡部至其府作書勸其守將當恊和共事者以濟邊功後來事多如公所料人服其先識未幾復丁曾安人憂歸家山西巡撫及三司連章以謂山西邊事方殷古有金革變禮之制宜奪情何某以任事詔從所請公復官未逾月詔陞陜西按察使公旣屢更法司事任益詳閑於大體洞達其細微及長外臬司凡端澄聽折表拔刮剔之政以次行之令修於庭戸風行於方岳事方就績竟以暴疾卒時景泰三年正月二日也享年五十有六矣公初室李氏繼室徐氏封安人俱先逝今室楊氏子男二曰歩勲歩恩女一人皆徐出也孫男二曰源曰溶公在陜西不以家自隨旣卒公之子歩勲自金谿來奔䘮即奉公柩歸以是年十二月某日葬於其邑之某原明年為景泰四年七月歩勳以吏科給事王君所述公事狀來南京謁余求表其墓余猶記往年公過余河汾出二書其一即勸邊將恊和共事者其一與冢宰論進退賢否之法甚備公又語余曾為執政者言當起退休老成者某等用之於乎使此三事得行於時其有補於世亦豈小哉且公自為學歴官舉職忠孝大節灼灼著於當時者固人所共知至於與余所論三事又其所藴而人未知者余旣述狀之所載并附余之所知表於隧道之石俾後之人知公之已試者旣如彼而未用者尚未可量也故奉直大夫絳州知州王公墓表奉直大夫知絳州王公汝績殁之四年為景泰四年其子佐奉汝績狀自江西走京師謁余請表諸墓按狀公先世居鍾陵其大父諱忠宋末為金谿塲官因家焉今為金谿人自曾大父復茂至其考處士仲允比三世皆韜德弗耀處士娶林氏有婦行生公質異凡兒處士識其他日必有立自童時即遣從邑庠良師友讀書砥行為儒者事公果能專心一力進修不怠比長通習經史子集優於舉子業永樂庚子江右大比一薦即榜前列春官㑹試得分教福建政和公以師道自勵勤於誨人出其門而登仕版者甚衆九年教有成績至京師大臣薦其才可治民遂陞知絳州絳在周為晉國在漢為絳侯封邑其地包汾隰土陋民繁産簿稅重人鮮知教而徤於訟前守不數年率以事去未有滿考者公至州以謂人給則教行知教則訟息因行其土利有未興者興之視民業有偷惰者董之不數年民業饒給乃大修孔子廟益廣學宮篤興禮義教養具修絳俗日變爭訟衰息獄至空虚公尤善處事先時事有未集者督以豪猾吏卒因夤縁為奸民茹其毒公即有事但書片紙為期約布告鄉市民相勸趨下不知擾而事亦集州租率嵗逺輸給邊軍旁郡惟徵銀易米公則布帛氊裘諸物任民所賫持取租辦而已人甚便之境有蟲類蝗將害稼公禱諸正神蟲害隨息有行刼者出其境即掩捕如法人服其明其他善政甚多不能悉紀大者如此細者可知公在官九年考績當去耆民相率將詣藩臬乞留公固止之則相與刻石以紀其政蹟行有日暴疾卒其子佐跣絰奉柩歸以某年某月某日葬某原生於洪武丙子三月十七日景泰元年五月二十七日卒享年五十有五公初娶何氏再娶吳氏皆先卒後娶胡氏子男二并二女長政蚤卒次即佐也為縣學生二女皆適人公在絳時先遣其家歸金谿胡氏聞公訃哭泣䘮明妻貞子孝又知公之教行於家也公為人性坦夷不為防畛篤於孝親追逺與人交始終無失其知絳州時嘗校文山東惟視某優於理者取之後登進士榜於是年舉子為多人以公為能因言以知人山右多聲妓官以音樂佐酒取敗者相踵公速客不用絲竹惟禮飲終宴不譁其雅致尤不可尚已於戱人才為難有才而驗諸設施為尤難公之才見於教人治民灼有成效如此謂將逺施而止於斯豈非命耶雖然公自筮仕以來將三十年克致完節以没有子克襄葬事亦可謂無憾也已公二子皆從余學故知公尤詳旣按狀并取所未載者述其行實事業表於墓道以告來者故處士顧君伯常墓表夫士君子之積善行義者不於其躬享厚福於當時必闕慶厥嗣而獲顯揚於後世此理之必然也處士顧君諱闕字伯常别號友石世為常州江隂大族處士曾大父諱仁約妣許氏大父諱夀之妣陸氏父諱誠號晩節翁妣楊氏比三世皆以夫良婦貞齊内明外著聞而又皆能斥已之餘周人之匱施惠利於郷里至處士通敏夙成端方性禀守三世之家法而擴行之不怠其配邢氏荼溪隱君子邢履道之女織紝組紃裁製凡女事無不勤熟而又以其餘力兼習孝經列女傳等書麤通其大義自歸處士盥饋而舅姑胥悅修行而婦道有聞克相處士事親奉祭致謹致孝處宗族隣里禮意踈密隆殺咸有節序處士所以益大其家者邢於内助為多處士旣累世行義不怠遂鍾慶于寺正琳琳之生質厚異凡子處士早卒琳大父晩節翁識其有立遣充校庠弟子員且俾從良師友朝夕講習書史啓迪磨礱以益其學厥後琳以學行有聞充貢太學歴事内臺吏部以其習於法律即除南京右寺副未三年遂陞署寺正琳之讞獄能别白其情而行以平恕三年考滿來京將有推恩之命以及處士與其配琳間持其鄉人何太守所為處士狀謁余且泣而請曰琳三嵗先妣即世十嵗先考亡時大父晩節翁尚無恙則誨琳曰汝父卒時嘗撫汝曰吾家世業儒而未有顯者吾命今不永汝宜自勉力學問以圖顯揚吾地下庶無忝所生汝宜無忘乃父訓琳時雖少已自能記其言逮今二親没世已四十餘年矣琳不肖奉遺教敬懼不怠麤得紹家緒以學以仕而藉餘慶以有今茲之光榮雖有斗斛之禄欲具朝夕之養而已無逮毎念鞠育之勞訓誨之切輒汍瀾弗禁罔極之恩欲報無所獨念古之人有弗克遂榮養於生前者尚圖發揚其實行榮名於後世不有善於辭者莫克揭其詳琳不肖將磨貞石以刻其事惟先生不鄙而辱賜之言得表諸墓道使没者有知亦將無憾於地下而顧氏之子若孫覩茲刻者亦得以知承休委慶有所自敢再拜以請余謝之琳請不已則以謂非前人之善無以貽諸後非後人之孝無以光於前若琳者其先世旣累積行義自家及鄉深厚悠逺所以貽厥後者固有所本矣及始發於琳以儒業致身廷平駸駸乎膴仕乃能深念其二親之早逝欲纂辭鑽石以發揚其潛幽又可謂能盡光前之孝矣遂按行狀次第其家世積善之實俾琳刻諸隧道之石以表著於人人以觀示於子孫以垂耀於永久庶少慰琳追述之心且使琳繼今以往覩茲刻表又當益永孝思益勵名節期無忝於乃祖乃親而益振大其家聲云故處士楊禮墓表凡人子能孝其父母者已鮮能孝其大父母者為尤鮮陜西涇陽縣儒學教諭楊潤中景泰癸酉鄉貢天順四年中禮部乙榜授前職旣分俸本貫以養其父母又迎其大父禮至涇陽官舍娛奉孝養幾一年復求重慶堂文於余以紀其事及禮歸天順七年二月初六日卒於家享年八十矣其子興旣以禮葬之潤追慕其大父之恩不已意謂為孫者能揚祖之名於後世不使與草木同腐庶幾古人之孝於萬一乃狀禮之家世行實并致書於余求為表其墓潤嘗從余學因嘉其篤於孝如此義不可辭按禮之父志文元大都人後徙河津志文雖自他郡僑寓以為人好義故無僧疾之者所娶孫氏生禮禮自少謹厚承順其親無違怠及其考妣繼没葬祭以禮鄉閭稱之禮旣自立行已以質直朴實鄉隣有爭者來質則喻以是非各知曲直感愧而去及年旣髙又有德衆推為耆老毎嵗有司舉行鄉飲邑大夫必延以為上賔潤方童稚時資質可敬禮遣入縣庠從師授春秋與朋儕習舉子業克有今茲成立鄉人皆以禮有知孫之明之所致禮娶靳氏亦柔慈勤儉相禮成家先禮一年卒所生一子二女子即興也女一適太學生臺春興娶張氏生六子長即潤也次滋次澄次濟次浩次瀚女三人皆適良族於戱禮上承考妣之志下享子孫之養克終天年禮葬原域可謂無憾也已遂述其事以表其墓以示永久以伸潤之志云行狀山東按察司僉事崔公行狀公諱碧字仲玉姓崔氏永平昌黎人大父彦名隱德不仕太夫人齊氏父得母齊氏生四子長即公次叔琮叔璘次理公生洪武二十四年十一月二十九日幼有美質其大父母父母遣入縣庠讀書習舉子業中永樂十五年京闈鄉試卒業成均登辛丑進士第宣德初授交阯道監察御史當官謇謇有能聲正統紀元調行在江西道監察御史明年為正統二年為廷臣薦陞山東按察司僉事分巡濟南道勾稽文移欺瞞滯弛摘刮奸猾巧訐中傷大肅以威而以寛濟之民吏咸畏服四年夏蝗生所部公行視督捕立絶時大暑爍蒸遂感疾歸藥石攻砭百端病勢不可敗公病中念太夫人旣先卒大父曁父母逺在故郷且俱老不可見因遣理往迎之獨齊孺人來公强疾迎郊外相見哀感流涕疾益增劇是年十二月二十三日卒于正寢公性孝友喜賔客雖貴不忘故舊故其卒也皆痛悼焉公先室張氏繼室劉氏泰州同知浩之長女公存日嘗謂其弟理曰以而子善聚繼我後公殁理如其命公父封文林郎交阯道監察御史母封孺人先室贈孺人繼室封孺人俱以公貴葬有日謹具公之家世歴官行事狀求作者以圖不朽敬軒文集巻二十三
