body:
  text: 敬軒文集巻四明薛瑄撰絶句銅雀臺銅雀臺高春日明春風無限綺羅情笙歌莫向西陵奏松栢蕭蕭起暮聲春日即事一夜東風柳穗柔曉來紅日在簾鈎少年兩兩鳴鞭過唯見香塵撲馬頭舟中雜興柬韓克和劉自牧王尚文宋廣文十八首公等文章班馬儔偶來聨歩上瀛洲天㤙又許歸鄉里同泛南風五月舟天上同霑雨露多扁舟又喜泛滄波㝠㝠鳥背夕陽暮千里月明聞棹歌霄漢銀河接潞河諸公同此沐恩波於今又遂歸寧願漸近家山喜氣多萬家城郭通州市十里帆檣潞水船清曉登艫望京國鳯凰樓閣五雲邉波光到底見星辰中夜行舟月色新睡覺水村鷄已唱雲帆清曉過天津細草㣲茫間渚沙烟林杳靄暗漁家舟行不辨東西處但倚危檣看月華舟行暑氣正淟涊岸上行人方欝蒸安得長風來萬里頓令煩濁片時醒天高雲影層層出野曠河流曲曲長百丈牽風晴裊裊櫓聲搖月夜茫茫兩堤草色緑無際五月草蟲聲已清自是天機能動物舟中聞此倍多情堤上閒遊眼界寛青天不盡地漫漫此心便覺無拘礙誰信人間行路難天開水面平鋪月風湧潮頭倒捲沙舟過前村迷逺近一堤楊柳數聲鴉夾堤楊柳緑依依傍水人家籬落稀小婦携籃賣蒲笋得錢含笑入荆扉水畔人家舟作屋飄飄身世長兒孫幾回睡足蘆花月又引帆檣過别村參透詩禪漸息機掀髯覔句句還遲櫓聲驚覺船忩夢遥見青天一鳥飛纔罷沿流又遡流關河不盡興悠悠書生别有胷中畧閒㸔横江萬斛舟千年宇宙混輿圖萬里江河接舳艫澤國晚來飛鳥盡海風吹月上天衢蘆葉青青潮水平呉儂揺櫓唱歌聲歌聲櫓韻隨潮去背立江風無限情江北江南一水通往來舟楫自怱怱推篷獨坐渾無語遥見青天日正中酬陳廣文送莱秋圃應知雨露多嘉蔬分送奈情何書生咬得其根味絶勝金盤薦紫駝早度古嶢關四圍山勢欝崔嵬清曉關門傍水開一騎秋風揚策度野花隨路送香來由蓼子谷取㨗路抵鞏黄河北徙有感此路經過已十年重來河水變桑田西風不盡登臨意又見寒鴉下夕烟鞏洛道中嵩高雲氣晚嵯峨清洛西風咽急波水色山光渾似舊宋家陵墓夕陽多王弼墓四聖千年道乆湮誰從羲畫見天真先生埋骨邙山後猶有𤣥虛誤世人宿白馬寺人家白馬駝經事已空斷碑殘刹見遺蹤蕭蕭茅屋秋風裏一夜雨聲鄉思濃函谷關嬴秦烈熖掩全齊誰遣君侯更向西關上月明關下路英雄千古怨晨鷄登平陸城樓四首獨倚危樓日向西洪河風起浪高低中條北去無多路回首鄉關路不迷斷岸奔流萬里風踈林黄葉九秋中畫闌干外斜陽暮併作離愁一段濃客愁偏向九秋多况復登樓望濁河相去𢎞農纔咫尺苦無一葦暫從過中條秋色滿山城一上危樓感慨生天外黄流來滚滚扁舟端擬駕長鯨興讓里岐陽日色正輝輝纔被餘光便息機却把争田為棄土頓令江漢總思歸山水小景四首湖水茫茫浪拍天春風湖上有人烟小樓半在花林内簾捲青山看釣船石上長松落午隂有人松下鼓瑶琴南風過處渾無迹秪見千山萬水深老樹蒼崖滿目秋水明沙浄晚烟收如何萬里長江内只見斯人泛一舟兩崖雪罷樹無風泛泛扁舟水月空疑是山隂尋戴老此時清興正無窮七夕三首絶憐天上有佳期汾水西風獨夜時望斷銀河仙路逺鵲橋不見度星旗身世浮雲無定迹客中二十四囬秋故鄉此夕逢佳節閒看星河徹夜流三處三年逢七夕鄢陵京索晉河汾人生是處堪行樂領取清風對酒樽留别諸友八首留連冉冉已過夏離别怱怱又値秋酒盡玉壺歌舞散月明千里照汾流多情累月重留連惆悵西風送别筵咫尺江山暫分手及歸應在早花前緑樹秋風起夕凉離筵歌舞斷人腸欲知别後相思切明月關山滿路霜樓頭鐘盡曉風清南陌殷勤送我行十里汾流兩岸月祗應總是别離情汾水西風生夕波離筵忍聴唱驪歌男兒不洒相思淚翠袖紅裙奈若何離鸞别鶴不須愁暫向中州訪舊遊待我明年二三月看花同上禹門樓扁舟清曉渡汾河露草風蘆兩岸多却望高城雲霧盡好山一帯列青蛾錦瑟銀筝酒半酣離情幾許舊曽諳却憐後夜相思處三晉山高月正南秋日過洛陽洛陽城西今又來颯颯秋風吹客懷禾黍荆榛蛩韻切昔人曽此起樓臺中秋對月遣興凉露滿天秋氣清月光先到客邉明舉杯對影深相属只有姮娥不世情元夕寄故鄉諸友八首故鄉千里隔關河好景年年客裏過又見元宵春一度紅燈幾㸃月明多鄉人新自故鄉來千里魚書手自開聞道家山風景好玉笙吹月共徘徊寂寂閑門掩月華春街兒女任諠譁窻前坐乆銀燈燼首首詩成只憶家莫道他鄉勝故鄉思歸一日九廻腸元宵忽共鄉人語為寫新詩寄上庠思鄉無日不關情况復春燈對月明欲作家書附回使歸心先過洛陽城舊説歸期已失期更逢佳節倍相思交親若問今何似客裏春來困酒巵中州何事重留連憶别諸公已半年遲我河汾看春色百花深處酒如泉回首鄉關入夣頻馬蹄踏盡幾年春客中膽氣峥嶸甚肯把明珠漫贈人題毋處士畫梅竹二首疑是孤山處士家暗香浮動月初斜千紅萬紫雖無數獨領春魁是此花湘江兩岸鷓鴣啼翠袖天寒日又西可是無人伴幽獨紛紛桃李下成蹊行黄河岸上蒼崖千仭俯黄流滚滚波聲大地浮惆悵靈槎無復見壯懷祗擬付神遊看楊花戱作紛紛拂拂雪花香旋逐囬風過粉墻坐困緑隂看未足無端春思正悠揚題蒲守劉公梅竹二首誰傾金醴醉仙娥綽約朱顔總已酡莫向風前吹玉笛恐驚春夢入江波此君老矣勢猶豪新長孫枝節漸高好似一門賢父子清風相倚逈難招韋廣文送醯鼎鼐何堪欠此生銀瓶携送滿寒清從今肝膈添詩思肯使酸齋擅大名過賈魯宅長平驛是相君家不見當時富貴花只有蒼蒼喬木在至今猶宿夕陽鴉長平行過長平慘舊名路人猶指昔年坑不知當日將軍死地下曽無見趙兵滎陽道中九首老親官定覃懷後遊子南來京索時舟渡濁河高處望太行秋碧繞天涯前途十里即温城暫向村林避欝蒸野老多情能欵客呼兒旋撇甕頭清一年幾度過黄河霽景清風此日多臨流滚滚興無盡直欲遥吞萬里波河水南邉廣武山山頭簇簇故城閒徘徊不盡千年事秋草秋花駐馬看獨尋危坂出高岡蔓草荆榛古道荒谷口人家似仙舘幾間茅屋䕃垂楊一上河濆眼界寛秋風禾黍動秋山敖倉甬道不知處唯見孤雲自往還連村緑樹亂蟬秋禾黍離離正滿疇為愛中州好風景揮鞭不厭往來遊天高地闊鳥雲飛天際凉飈動客衣萬物生成看未足滿懷清思正㣲㣲馬上看書意若何悠悠隨處任經過舉頭忽見南山近爽氣清輝倍覺多次劉僉憲見寄韻四首憶對清隂轉午遲杯行到手欲無辭高山流水今何處鴻鴈南來有寄詩開緘忽見右軍書麗句清詞愜所需何限相思動秋意蟬聲况是晚凉初幾年持節道途間驄馬遥遥意氣閒况有青山隨處好料來詩思未應闌憲府新成小屋居居中惟貯舊琴書希聲古道應何似一榻清風樂自如通鑑千二年來治亂機只從理欲辨安危若將此鑑為心鑑三五如何不並歸禹門連山忽斷禹門開中有黄流萬里來更欲登臨窮勝觀却愁咫尺會風雷渡口兩崖陡起束狂瀾南去沙平勢𣺌漫長有扁舟依渡口行人莫道往來難棧道石巖危柱迭相承閣道縈迴接杳㝠天上黄流來滚滚長風五月灑衣清明徳宫碧瓦朱楹白晝閒金衣寳扇曉風寒摩雲觀閣高如許長對河流出斷山宫前老栢蒼蒼老榦鑄青銅縷縷香毛引細風自是栽培年嵗乆托根長近禹王宫看鶴樓二首石磴盤雲到上頭高風五月已驚秋眼空四海無纎物惟見黄河天際流一柱巍峩勢獨尊鐡崖三面下無根偶登絶頂思前事滿目河山孰與論水閣二首水閣憑空結構牢蒼崖直下俯洪濤轆轤牽綆應千尺還似垂綸釣巨鰲飛樓縹緲架黄流滚滚波聲世界浮遍倚闌干憶前事功成四載幾經秋后土祠一木為橋渡斷溪山風水氣冷凄凄千年古廟蒼崖下萬里河流正在西石龕古屋縱横半畝餘只疑神鬼護隂虛蒼崖直上通元氣㸃㸃寒泉滴露珠靖應姜真人菴靖應真人隠者流聲名往日動宸旒功成不在飛升去禹廟連雲檜栢秋題四景四首雲滿青山水滿溪緑楊紅杏繞幽栖抱琴童子隨師去歸到橋心日未西水心亭子四山青亭下荷花照眼明我欲喚船楊柳岸隔溪終日不聞聲四山木落晚江空江上茅齋爽氣中立盡秋風何處客磯頭日日看飛鴻怪來寒氣襲襟裾忽向高堂見畫圖樹老山空江似練扁舟不受旅人呼題季札掛劒圖心許君侯口未言歸從陵樹掛龍泉生平負諾知何限始信當時公子賢題負薪圖自古詩人詠伐檀山中不道負薪難到家逺近何須問行過溪橋路已寛四皓圖雪鬢蒼髯識者稀功成猶自昧先幾寧知後日紛紛處却道劉侯計已非睡熟睡熟不知風大作到曉猶聞波浪聲起坐覔紙欲題句却憶逺人無限情紀先人舊遊三首壇樹濃隂覆四墻春深好鳥囀笙簧慈親此日不同聽樂意翻成淚兩行西壑南岡景物幽先人曽此數追游重來不似當時興緑草紅芳總是愁先人最愛佳山水每對清流翫翠㣲俯仰忽成今與昨㸔山㸔水淚沾衣檢舊書得先人手迹素帙窻前自巻舒忽㸔先父數行書分明筆迹如平日一字傷心一淚珠題錢舜舉山水小景琪樹秋風生早寒樓臺縹緲暮雲間橋頭有客長無事閒聴溪聲静看山觀太極圖二首歛襟坐乆此心虛静看濂溪太極圖理在象中元不雜莫於象外用工夫一理隂陽及五行乾坤萬物各生成莫言真宰元無迹乆向圖中露此情春興三首客居城市厭喧囂舉目雲林變緑條好景一年都已過何曽散歩到西郊懷抱何由一灑然勞生擾擾故相牽城南山色青如許不到雲林又幾年又是春風換物華静觀芳意浩無涯寄語鶯花休悵望新詩已懶向人誇新鄭學宫夜宿清飈槭槭響林柯夜宿秋堂冷簟波睡醒不禁鄉思切滿庭明月候蟲多劉廣文携酒餞行先人館下老門生三十年來故舊情今日相逢頭已白殷勤載酒問歸程過盧溝河有作烏府新承帝澤覃又持憲節按湖南盧溝橋上瞻都邑金闕連雲倚翠嵐出漢口五首扁舟泛泛野湖平岸轉奔流近漢城滿目江山如畫裏留題多少舊才名萬里長江滚滚來楚山凝碧樹如苔扁舟横渡浪花急一蓆好風何快哉漢江南合楚江流新漲兼天雪浪浮黄鶴不來仙已去舟人猶指舊時樓萬里滄江水自東武昌烟樹晚朦朧獨持憲節怱怱過興憶南樓夜月中人家樓閣枕江烟江上危檣泊萬船欲問當年無故老青山依舊水連天出漢口至大江追憶往事有感而作武昌城對漢陽城城下長江漫漫平二十年前曽過此烟波一望不勝情覽嘉魚圖經閒覽嘉魚縣地圖半為山谷半為湖生民計業知應薄祗賴昇平雨露餘公安詠古古砌長衢滿緑苔踈籬多傍水邉栽欲知何處懷平仲老竹荒祠風雨來蜀江水漲如黄河江北諸山彷彿太行遣興而作蜀江濁比大河黄江北諸山似太行誤喜中原應不逺却聞人語是湖襄澧州秋日秋風澧有蘭碧峰如畫水如環荆南自古多騷思長在閒花野草間常徳百里平川古朗州沅江滚滚向東流竹枝留得唐人句一曲西風碧樹秋武陵萬水千山舊武陵伏波曾此向南征只今無復壺頭險擊鼓謳歌樂太平次同年趙侍御阻雨韻五首秋夜蕭蕭雨未休碧窻欹枕憶神州霜風會見清南徼未必軺車乆滯留天使乘驄此暫休今朝我亦到南州栢臺孤枕銀燈夜還似當年阻雨留瑶樹西風透客懷早秋凉雨壓塵埃行臺壁上留佳句知是同年攬轡來壁上留題見好懷旋將征袖拂塵埃浪遊不得逢知己阻雨今朝獨後來境入桃源喜滿懷分司衙裏絶塵埃繡衣壁上題詩日正是隨車好雨來桃源曉行隔江烟樹曉模糊縱有丹青畫不如且喜桃源風景好山行不厭路﨑嶇宿界亭驛山月娟娟滿戸庭秋蟲唧唧四邉鳴一杯强飲不成樂坐聴山童打二更辰溪次趙子裕韻二首盡日山行不厭遲肩輿隨處愛秋溪路回忽見江頭縣風景清幽興不迷辰陽已覺鴈書遲滿目雲山接五溪秋夜一杯江縣酒醒來鄉思不曾迷益陽山行遇雨雲林漠漠雨凄凄節節危橋曲曲溪可是青騘行處穏滿山紅葉襯秋泥雪中度風門嶺肩輿千仭歴峥嶸朔雪寒雲杳靄中逺近東西渾不辨只疑猶未闢鴻濛靖州道中溪水清駛可愛石淙急瀉響奔雷濺沫跳珠雪湧堆正苦荒山勞降陟且隨流水共縈廻池邉笋生緑錦池塘春已深池邉青笋欲成林貪看物理添新趣不管滔滔嵗月浸遣興永日霜臺與衆踈相親惟有聖賢書緑雲滿院蒼苔合自喜能兼吏隠居黔陽春日雜詠六首滿庭落葉似深秋好鳥鳴時地轉幽坐對青山纔咫尺會登絶頂望中州風起楊花滿院飛翠屏門外送清輝蠻中好景非吾土春燕來時客未歸兩年三度客黔濵前是秋冬後是春新緑滿庭清晝永好風時復送香塵弱柳新梅䕃戸庭好山門外列青屏間關幽鳥鳴春晝宛似家山把酒聴睡起霜臺似水清晚春風日弄新晴笑看蟢子頻頻集却憶人家望客情駐節黔中改嵗華四山重疊繞天涯空庭獨坐聴鳴鳥拂面春風吹柳花黔陽山中十首景好寧知是異邦竹籬茅舎枕滄江吏情更有山林趣緑樹門前畫㦸雙星軺玉節萬山深到處溪流足茂林雨過瘴烟清似洗蠻荒不減壯遊心盡日江行路不迷溝塍水滿稻秧齊參天緑樹茅茨小何處人家呌午鷄山青雲白楚天涯駐節山中白晝遲縱是無邉清興好知音誰與和新詩江村地僻草萋萋小閣閒登日欲西風景不殊雲木秀只嫌中有鷓鴣啼清和時節似中州江遶茅堂盡日幽官况不羈情散誕坐看雲影自悠悠宦情不改讀書情閒愛山林興致清隨意時時寫佳句却嫌行處有虛名竹椽茅屋江邉静永日惟應鳥雀飛雲白天青山萬疊霜臺逺客正思歸花木時光總不窮青山疊疊水重重欲尋真宰元無迹祗見蒼蒼一氣功草閣南風分外凉㸔山面水據胡床宦情蕭散知何益身在江湖憶帝鄉四月望夜院中作月照芭蕉葉上明小闌干外竹林清一襟風露凉如洗似有新秋在戸庭對雨遣興簡陳侍御七首秋雨通宵盡日鳴栢臺雙沼漲皆平緑荷裊裊欹香柄細看明珠瀉未停曲闌干外芰荷香秋雨來時水滿塘喜與同年驄馬客水心亭上共持觴南荒乆與故人踈邂逅同年一月居共指小塘荷葉底水添秋雨欲生魚同年持斧到南荒笑指關山滿路霜一月沅州城裏往聽風聽雨喜連床君恰來時我欲歸沅江秋雨正霏霏鵷班若問新消息為説清霜滿繡衣緑萍如錦蓋青池池面高荷静不移閒愛小亭聴雨坐恰如湘水繫舟時同年喜有繡衣人沅水相逢意氣親我去君留莫惆悵邉氓快覩曉霜新襄陽雪中雜詠六首扁舟南渡漢江來阻雪連朝住憲臺莫道鐡冠官况冷瓊瑶庭下已成堆烏臺南面郡城高城外諸山雪亂飄勝蹟欲追羊叔子會從峴首踏瓊瑶空階宻雪下無聲葉落層層蓋已平盡日㦸門清似水端居誰與論詩情堂臺高敞四虛寒窻外蕭蕭竹萬竿一夜霜風鳴到曉散為清響滿人間襄陽城外雪紛如散入江流片片虛乍有却無迷望眼只疑神女弄明珠少年曾讀浩然詩襄漢風流百世師今日雪中清興好論文翻恨不同時芭蕉夫君本自一心空舒巻如何葉未窮自是根株通大化故教有象顯無蹤靖州月夜雜詠五首一節三年乆在邉天威咫尺玉堦前靖州城裏清宵月應與家山一様圓參差林影受風斜堅坐胡床愛月華凉露在庭清似水不知今夕是天涯城外清江城上樓滿城明月似深秋忽思昌子雖癡小也念阿爺尚逺遊未有涓埃荅九天漫叨官廩過年年静思仕學多違性搔首能無愧往賢三百年來新郡邑七千里外古蠻荒無私好是中天月布滿清輝一様光夏夜聞鐘翠帷籐簟竹方床孤枕慵便五夜凉夣裏不知身作客忽疑鐘響是家鄉盧溪冬夜五首幾度官船過武溪匆匆都未有留題今來駐節當寒夜絳燭紅爐興不迷曲曲清江節節山霜臺分外朔風寒寸心祗與梅争白頗覺蒼顔稱鐡冠江縣蕭條嵗欲除溪山寥落野人居九重時復行寛令使者徵求忍蠧漁夜深風雪響侵門繡被熏來睡正温忽念中林有樵者獨慙餘煖未能分乆客霜風入緼袍壯心猶倚劒吹毛武溪溪上烏臺夜猛虎一聲山月高重題五友五首竹長日無風亦自清踈篁况復滿秋聲幾回睡醒窻前月疑是瑶堦佩玉鳴蘭幾載栽培雨露深好風披拂正關心瑶琴一曲憑誰寫惟有宣尼觧此音蓮朝來㣲雨濕臙脂並倚新糚照緑池莫使香塵涴顔色深情還有正人知梅花正開時節已過祗留清影弄簷阿瀟湘千里客歸去想憶花時思更多菊未到高秋有别情新叢簇簇傍階生歸心不待花重發留與新知作眼明董公二首席捲三秦赤幟東力陳大義討元兇董公籌略應無敵蕭相虛當第一功紛紛豪傑欲興劉縞素應為第一籌何事元功盟帯礪丹書不到董公侯又題五友五首竹三年烏府長琅玕粉籜新梢次第看今日成林足風雨坐聴清響徹雲端梅紅白雙梅戸外横看花看葉興俱清今秋只恐歸期近重疊題詩寄别情蓮鏡裏芙蓉一色開高荷倚醉好風來采芳誰識心如洗持贈聊同驛使梅蘭幾嵗南州老鐡冠霜臺底物可為懽祗應九畹滋新種時采幽香滿把看菊簇簇新叢傍憲臺臺端有客日徘徊歸期若在花前發留向新知次第開懐沅州五友五首竹勁節虛心獨耐看霜臺三載伴清懽今朝朔北遥相憶誰與蕭蕭共嵗寒梅正是花時逺别離綺牕應已發新枝薊南臘月霜如雪相對長吟有所思菊幾簇芳根遍小臺自呼童子看澆培沅江回首深如許縱有清香亦自衰蘭頻除惡草惜佳叢笑采幽香嵗嵗同一自沅江騷佩逺小闌誰倚看光風蓮方塘紅錦日熹㣲絕愛天葩照客衣幾賦新詩去雕飾相思重覺賞心違又懐五友五首蓮誰識當年周茂叔愛蓮别是一般心沅州憲府花如錦囬首蠻山萬疊深菊鐡冠不受晚風寒采得幽香靜處看幸自托根今得所栽培應有露團團蘭九畹曾懷楚客騷不堪沅澧去人遥多情只有當時佩别後清香尚未消梅紅白沅州有二梅年年長是近春開飄廊㸃砌今誰惜祗有東風掃石苔竹栢臺清絶愛踈莖踏影攀枝繞砌行衛水舟中風雪夜夣囬疑是打窻聲博浪沙大眼由來視獨夫懇懷忠義報兇渠英謀已自輸曹沫只恨當時中副車院中楊栁去日庭中始見栽既成林後客歸來春風擺盡輕狂絮留得清隂滿憲臺敬軒文集巻四
