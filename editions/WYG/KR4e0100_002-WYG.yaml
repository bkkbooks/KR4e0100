body:
  text: 敬軒文集巻二明薛瑄撰古詩穆陵關夜雨暝色來遠谷清風動華燭山樓雨聲寒羅帷人獨宿山行山鳥多清音山花有異香但得山間趣寧辭山路長又荒岡斷復連風葉散還集霜落秋澗清烟横晩岫碧作息吟向晩羣動息向曉羣動作羣動作息間乃是先天學東平行臺有竹翳於惡木荒草命僕芟治嘉植乃遂詩以紀之生平苦愛竹義若君子交茲軒忽見之俄頃漆在膠振衣歩其下周覽増欝陶惡木一何多蔓草一何饒翳此破苔笋撓彼凌雲梢命僕恣剪伐得辭斤斧勞除惡貴絶本藴崇及溝壕荒穢旣了了凉風亦蕭蕭修莖遂生植嘉䕃愜遊遨作詩紀顚末庶為同心謡穆陵關危哉穆陵關髙出衆山頂地勢愈覺寛天宇相廻逈林木何蕭森首夏風色冷山樓試一登眺覽恣遐騁沂岱環西隂淮海接南嶺齊州走北川扶桑控東影道里會一門山川挈要領緬思千古前豪伯互吞并齊履空復然秦蠶已侵境干戈被長巒生民困魚鼎于今天道旋四裔守安静山行晝落然水宿夜無警顧我觀風人符節得屢秉作詩紀茲行傳與山將永蘭陵懷古早發郯子國午至蘭陵邑蘭陵乆已荒禾黍帯荆棘惟有古寺存逕入林影宻老僧知我來出門遠候立下馬問往事為我指遺跡蒼茫古城東墓有荀卿石我欲往尋之還為野水隔憶昔周室卑蠻荆凌上國茲邑乃其疆人物殊烜赫寂寞千載餘浮雲空古色如何當日賢重有逃䜛責只今文字存尚為人指摘鞭馬舎之去極目遠天碧敬吟人惟肖天地亦具天地性性無物不存存性惟一敬心敬體不偏情敬發必中頭敬形端直鼻敬氣肅静目敬無邪視耳敬無妄聽口敬不妄言身敬不妄動手敬容必恭足敬容必重瞬息敬存身早作敬致用致用在天倫天倫敬斯定夫敬必先義婦敬必從令子敬孝必隆父敬恩必盛臣敬百軄修君敬萬邦靖兄敬篤其愛弟敬謹其行朋友以敬交然諾必重應敬則倫理明不敬百行病仰惟古聖人一敬更相命堯欽帝之宗舜恭明兩並祗台念禹德日躋有湯聖文王安敬止武王勉敬勝篤敬傳孔業敬德著周政敬惟羣聖樞大訓迭輝暎下逮河洛儒紹綂開迷逕整肅嚴隄防主一謹操柄惺惺不昏昧收歛無餘剰用力在斯須百體孰敢横聖途漸可登聖言良可證一敬茍不存萬欲皆奔縱身心墜卑汚綱常滅天正禽獸將同歸人類孰與共噫嘻敬怠間狂聖越天阱法言述聖謨匪曰小子佞送楊參議三首白露下將夕天宇生凉風之子有所適告别何匆匆羣公盡祖送飛蓋凌長空停驂濼水曲列宴歴亭中秋容澹觴酌髙風急絲桐酒盡儼將發斑馬何玲瓏行當釋塵鞅還應掛飛篷大江轉呉楚重山入天叢錦城有佳色浣溪有遺蹤訪古遂舒嘯觀風足從容坐令全蜀俗觧與鄒魯同茲遊豈云易兩情若為通翹首遲歸鴈應是春花紅右分韻得紅字林木生凉飈臯蘭被清露念子三川行正值九秋暮天空一鴈翔江逺孤舟騖旬宣有佳興載詠甘棠句右分韻得露字岷江瀉東溟岷山倚西極江山古名秀楊君將此適秋風送征帆夜火明水驛相憶瑶華音看取東飛翼右分韻得驛字友鶴軒九皋阻且深潔白有佳鳥中宵忽長鳴清響徹四表開軒一聽之衆理悉明了蚌蛤藏洪淵秀氣浮浩溔良璞在崑岡清輝散巖㟽雅興與茲同至德潜且皎温温聖者孫大道思遠紹友鶴名華軒存誠絶外擾水積成川流水壅盛顚杪功深効豈徹響大聲不小慙非風雅才作詩心自慓冬夜懷魏希文希文名純山東萊州府高宻人時謫戍玉田冬夜氣何厲冰雪輝前楹單居不能寐懷我舊友生行雲去不息賓鴻各時征兩情曠難合欲語誰當聽惟有寒月光見予心宇清展轉遂至旦遠思徒營營余既作此詩至來年三月間有黨厚本者關中士人也先任教職又為縣令後謫戎伍間復膺薦授荆門州幕職道過滎邑黨先與余有故因復問之始知吾友希文亦以薦至京師未及試用而死矣及考其死之冬適余作詩時也嗚呼希文純古君子將謂其不終老於草萊也而乃竟止於斯豈非命歟且余作詩時適與其卒時又相先後亦豈非平昔交遊之深黙有所感歟嗚呼已矣時宣德二年春三月河東薛瑄識荅仰宗岱寺丞見貽韻念子青雲器早渉青雲路行行捧德音睠言省民務風俗廣咨詢幽隱亟告訴來為人所悦去為人所慕皇澤一以敷郡國足膏澍况復崇文儒士林喜披霧心涵玉壺冰氣裊金莖露懷哉明盛時展矣風雲遇而我同官良惟子荷與顧通籍來旬宣各自植嘉譽獨有蘭臭言祗以同心故還應篤忠良更此寫中素何當展良覿相期在秋暮題陳希夷圖三峰亦何峻白雲亦何多中有高世士㝠栖掩松蘿石泉漱寒玉好鳥間青歌歌長一披拂紅紫爭紛羅山隔五季塵年頽萬里波豈無經濟策肥遯矢靡他威鳯不浪集㝠鴻難重過清心探化機瞑目飬天和眞息深在踵利貞静不訛只疑龍蛇蟄不管嵗月梭我欲昇玉井濯手攀嵯峨扣關起公語妙理應如何欲去還自休馬圖今在河永慕堂為楊大參賦大化運不息逝水無停時依依舊居室惻愴中腸悲書殘讀遺編機有餘斷絲斑衣不再舞壽觴寧重持庭前百卉芳但覺隂陽移儀容切寤寐恍惚如見之親心我所安親志我所期心志著且存大節矢靡虧悠哉孝子情朂此終天思遊禹門禹廟在焉春澤周四野閒情樂時和出郊縱逸興緬懷佳山河禹門忽在望峭壁雲嵯峨石磴接飛棧危樓架洪波空山響絲竹虛堂進舞歌父老誠苦心㫖酒神所呵由來非一朝吾意其如何河汾五賢詠五首卜子夏浩浩西河流遥遥東魯山山河逺相隔千里獨遊還升堂奥可入豈曰文辭觀相從陳蔡厄松栢知天寒索居晩歸來侯國師甘盤去之幾千載髙風灑塵寰瞻望不可及青雲映西關段干木㝠鴻不受弋神龍不可羈所以髙世士孤情薄雲霓矯矯段干木志節一何竒珪組豈其願軒冕不吾希踰垣猶弗見况乃趨走之豈徒侯國尊凛為百世師文中子古人不可見古俗寧復淳依依萬春鄉踈属連清汾良時曠莫與鳴鳥寂不聞悠悠禮樂志終與麋鹿羣頽波逝東極寒雲滿西津惜哉經世言淆雜多蕪榛時無伊川子此意將誰論太史公愛有所見忘忠有所見疑古來非一朝人道每如茲悠悠太史公言論適有期謂必情可白寧知事參差竒文雖自觧驟驥諒難追巷伯彼何人千載存其詩東皋子人仕為其名子仕獨為酒一斗衆所稱五斗吾自取猶嫌酒未足棄官歸隴畝葛巾耕東臯烟雨牛一耦種黍學陶翁自釀還給口沈飲得眞味萬事亦何有清風千載餘誰復尚能友古詩天地常不没山河鎮如斯惟有人與物代謝無停時因過咸秦境周覽生悲思渭水自縈帯南山亦參差茲惟帝王宅自古稱雄竒當時宫闕壯摩霄切雲霓千門與萬戸珠簾錦繡帷一朝時事去掃地無復遺城市盡為墟麥秀草離離亦有英雄軰干戈互相持慷慨争土疆終老志不衰只今但丘塜名姓寧可知京都足妖冶高門富姜姬綽約姑射仙鬒髮冰雪肌只今化為土况乃粉黛施休明盛文物旗常畫蛇龜千乘及萬騎雜遝相追隨將相立軒冕聲樂奏英池繁華有萬端一去不可追俯仰千古事有若夢幻為往者既已然將來復如之寄語執迷子當以理自推浩歎浩歎復浩歎寧知親眼見相彼天雨雪必有先集霰蟻穴不知防鯨波今汗漫君子慮兢危小人尚欺誕已矣無與言歸去耕吾畔瀘川古意三蜀古名郡瀘川古名州我來值殘暑偶此數日留新秋忽改節凉風漸颼飀逍遥散前除仰視天宇周征鳥去不息白雲亦悠悠佳人𣺌何許重林蔽層丘秋日復西邁大江自東流良辰不我與古道曠莫酬願聞瑶華音行矣旋吾輈五盤山五盤何艱哉石磴繞山腹詰屈入雲霞囬互下崖谷嗟彼逺道人陟降勞筋骨䟦馬登層巔悠然注逺目惟見山色高似覺地勢促蜀道古艱險茲險甲西蜀憶我去春來山山正芬馥今夏喜北歸四月暑未燠茲山得再過頗快登覽欲前驛望黄壩蒼蒼但雲木登金牛驛樓好山四巃嵸漢水前縈繞小樓試一登山水青未了因思大禹時洪流方浩𣺌乃竭胼胝勞神功彌八表岷山在經紀岷江亦䟽導貢賦分九州梁州已通道世傳金牛誕曽不細搜討山驛賦短章將為愚者曉七盤道中曉度七盤山北行道彌惡峭壁根虛無危棧架飛閣飄飄風吹衣漠漠雲漲壑下有黒龍江亂石何磊落急瀨轉雷轂奔湍散流沫洄潭更隂沉俯視誠可愕茲路属再來即事情已昨艱險難具論惟與存顚末褒斜道中褒斜一何長深谷自迤邐雲木青無邉羣峯各峻峙鳥道縁崖巔危棧架江涘㝠㝠呌子䂓決決響溪水累日山峽中陟降亦勞只古來蜀道難此道難莫儗自我入蜀門今已一年矣既乏督辦能兼負素餐恥而况鬢髮蒼胡寧不知止上章乞觧綬詔許感不已雖云此谷險且遂北歸喜行色宣柔毫庶用傳孫子逺道逺道復逺道驅馳何草草及歸已踰年白髮添不少入門悼先亡痛哭傷懷抱子婦共號咷百感相煎煼拭淚問里閭嘆逝驚莫保衰殺誰使然矯首問蒼昊從此甘息機田野安吾老盂城驛雪中詠竹高沙有候舘闌檻殊幽清檻内足凡木凋萎不可名獨彼凌雲竹欝有冒雪青飄蕭散寒葉修直揺蒼莖靈籟奏清響鏘若金石鳴晴霄吐華月流影亂虛明賞翫竟朝夕似當西南朋乃知嵗寒操匪獨松栢貞矢心又不如愧我為物靈徐州洪亂石何巉巖長堤更宛轉狹岸忽陡起急瀨如注坂囬旋聚流沫駭浪灑雪霰舟行良已難下上勞拽挽翻思遊川峽江石尤險逺瞿塘十二灘波浪激雷電迴視過茲洪反若歷平坦乃知所觀大小者不掛眼淮南謳淮土何漫漫淮水自悠悠小山去已乆桂樹遺巖幽昔有學仙子意欲仍丹丘秋石既烹煉鴻寳亦藏收鷄犬竟莫聞行雲去難留寧慮時事異翻結千古愁舞榭荆棘生歌臺麋鹿遊信知希世事伊豈望外求揖讓有堯舜高風想巢由此道乆已非聼我淮南謳高郵冰泮發舟晩泊高郵城雨雪竟連日念彼役人勞寓此盂城驛扁舟候晴發河冰復鱗積因之累宿留令我心悁悒忽報寒沍觧喜泛春流碧直過大江東此地成追憶冰觧舟發春冰渙然釋春流復溶溶觧纜盂城驛百尺牽東風連翩大舸來峩峩掛飛篷登艫恣春覽烟華正濛濛澤國曠無際重湖𣺌難窮漸覺高郵北行及廣陵東所過足清眺舟人莫怱怱出自城北門出自城北門周覽快心目峩峩鍾阜青漫漫平湖緑木依長堤茂樹隠芳洲曲縹緲天際樓高下林間屋遥遥江上山連連逺岫出江山自雄竒帝里在經復佳麗從古然嘉氣方葱欝官署何巖巖列宇面山麓偶茲吏隠兼頗遂蕭散欲超哉復超哉白雲自相逐晚翠亭為張司徒作花木何紛然各競芳菲時一夕下霜霰憔悴無故姿嚴嚴司徒府後圃殊邐迤而於嵗寒日挺此萬竹枝羣芳盡揺落茲物獨見竒宻葉既不凋勁節亦不移一逕入深處横橋夾清池池亭晝虛敞宴坐生寒颸清影落四簷静與秀色宜適契君子節貞固老不衰為取亭中琴絃我晩翠詩澹菴巻為謝侍郎乃兄題閩山何岧嶤閩水亦清泚中有肥遁人雅志丘壑美山田入雲耕結屋傍流水耕稼有餘閒琴書時復理寄興槁梧中游心竹素裏庭戸無囂塵外物絶珍綺䟽食足充餐絺布良適體朋來無雜言談道而已矣至樂既無假浮榮焉足擬所以忘嵗年足不至州里白雲在高丘鳴鶴在中沚安得躡輕風一訪澹菴子擬古四十一首天地形之大隂陽氣之尊伊誰知此物來自無極門清濁既莫離動静互為根大化去不息至理亦長存彼哉虛寂子已矣無復論悠悠復悠悠水中有行舟四序無淹晷代謝不可留春鳥寂無聲寒蟬號素秋落葉滿阡陌白雲散巖幽去去莫復道潁陽有遺老庭前桂花發清香散凉颸采采黄金英傾筐方自持思欲贈逺人風波阻長岐望望不可反馨潔空自竒吾思古聖心逈出八紘表天理為之大人世為之小堯虞禹相授杯水拱揖了終古駭其事未足稱逹道四時一何神變化不可測隂陽既交代星辰逓羅列孰其主宰之終古不差忒聖人秉明靈動息有貞則吾慕魯中叟矢心以學易端居憶逺遊路經首陽山山有二賢祠青松䕃重關斯人難再得守餓心獨安清風激頽俗高義越人寰去之幾千載可慕不可攀騶虞獸之瑞麒麟獸之仁物性尚不殺而况形為人夫何周轍東王道乆已湮孫呉騁狙詐申商號無恩流毒劇洪水遺黎苦漂淪强嬴滅諸國三戸亡咸秦天道信反覆永為來世陳聖治奠九有禹跡亦茫茫王澤既饒洽彛倫復昭彰以茲熈皥世舉俗躋樂康胡為古道非極意開邊荒征行苦鋒鏑飛輓失耕桑民生既騷屑天和亦乖傷廣土竟何益不救危與亡茲事已千載雄豪有秦皇荆山有美璞巴蜀多名材此物信為竒攻治亦難哉匠石得其良寳就成層臺胡為用匪人坐此斵削乖既自玉之玷還為木之災而况上天工理代必汝諧餗覆良可慮棟撓諒難陪所以虞周聖登庸必賢材湖邉多楊柳山上多松栢松栢存正性不改青青色楊柳易為春隨風發枝節二月絲垂金三月絮飛雪紛紛冶遊子賞翫不知歇松栢寂無言枝幹獨挺特空以木自竒不為時所恱請看霜霰餘榮悴居然别時來行堤上春氣薰人心宛轉湖山曲隠映花樹林芊綿草抽緑蒙茸柳垂金鳴鳥何間關纎鱗或浮沈生物方總總大化亦駸駸當時浴沂者樂意不可尋混沌鴻濛中伊誰作主尸洪河出龍馬清洛浮神龜有文粲以别實惟天所為悟彼隂與陽契此偶將竒大聖發深智運意畫兩儀生生之謂易變化無崖涯宇宙豈云大彌綸靡有遺如何千載餘圖象閟莫知卓哉弄丸子探源遡希夷從茲識姬孔還應見伏羲伊閩有遺編學易真吾師灼灼春庭樹開花漸離披因思唐虞世日方亭午時大禹亦神聖兢兢為保持如何百代下此道久已衰豐亨王格之請看大易辭木腐蟲蠧出氣乖肬贅生曜靈一薄蝕隂曀欝然興道術裂周季縱横亂秦嬴青牛既夙駕白馬亦時征汜濫自涓滴熺赫兆星星多謝宋諸老萬古開昏㝠如何陽光發尚自爝火明寄語行路人勿迷棘與荆萋萋湖邊草榮榮山上花山中有高士探化心靡他天地自槖籥萬物從交加深居不窺牖四海皆森羅我欲見其人捫蘿陟山阿山阿忽回合㝠䝉起烟霞至道復誰語奈此髙士何太虛浩無際何所立天堂坤厚大氣舉地獄置何方此理亦昭哉妄見胡㝠茫萬世為之惑福果僥難量髙標㧞地起飛宇就天翔摶刻土木梗鎔劑金銀糚人力為殫竭財物亦耗傷既自息吹乖焉得寒暑常茲事自前季滔天勢彌張反經如可作興言討彼狂圓象無停運大化不可留征車既西邁行舟復東流轍跡苦相背兩美焉得有青松生澗底白日麗高丘餘光不廻照直幹空蕭颼去去莫復道零露滿春草五陵多俠客三輔足貴豪園池占佳勝高第干雲霄不惜千金重雅意一日遨綺筵鎮水陸清歌間笙匏酒酣視天地泰山一鴻毛中情既昏惑外體亦勞焦誰似林居子神理恒超超在隂鶴相應遷喬鳥當歌琴書滿瑶席良朋亦已多各愛芳菲時共惜光隂過齊心何所求所求保太和壯年不努力奈此老大何白雲在高丘緑蘿在深谷中有𡨕棲士雲蘿蔽茅屋獨抱尚友情緬遂碩人軸古琴時復彈古書還更讀逍遥無外事俯仰長自足沮溺耕在野姜叟釣渭曲伊人豈無心恥衒荆山玉將須鳯來儀朝陽滿梧竹庭前䨇榴樹葉宻枝相交時當四五月吐花紅夭夭人愛花爛漫我愛花始苞堯夫有妙識造化滿即消情知酩酊醉還見離披凋所以大聖人持盈不忘勞吾今老學易看花遂成謡虞帝尚欽恤大禹泣罪人所以聖者心天地同一仁周政失其御侯章僣無倫芻靈既莫施作俑亦不聞秦穆一朝逝殉以三良身臨穴殊懔慄仰天亦悲辛古猶惜纍辜如何殺俊民王誅一以失流毒蕩無垠驪山錮重泉銀海通幽津遂使三秦衆半作地下塵天道本好還嬴族亦沉淪因歌黄鳥詩重為仁者陳廻觀自古來黄金世所急郿塢幾萬斤梁苑億千鎰貪求刻人骨堆積盈家室寧知造化權隨時有消息人無長盛年物無不散日金穴竟荒虛金谷亦空寂發塚尚有儒胠篋豈無力長見聚金人終為大盗積往者既悠悠來者方役役㫖哉莊生言獨無郢中質蒿萊不招鳯梧桐不栖鷄物故各有趣高卑焉可齊伯夷居東海吕望釣磻溪峩峩太行巔薈蔚方朝躋陽光燭四表發軔岐山西二老既云往婦子爭扶㩦固知賢聖人去就關崇卑試聴紫芝歌坐見嬴道隳王良稱善御時方尚詭遇季子洛陽歸張儀關中去佩印誇鄉里驅車塞道路說合從與横而取貴將富孟軻陳王道反為迂闊誤已哉無復言逺矣哲王寤驪珠不易探至理不易論端木稱逹者性道猶弗聞五十知天命𤣥聖有遺言區區事末學役役勞其身葩藻㓕素質聲利迷心源有若亡羊客秪見岐路分何當息𡨕升來復求其根孤桐生龍門檿絲出東國相合為素琴不離君子側清彈何悠揚遺音為發越中涵千古心養彼至人徳云胡變新聲絲竹異古昔繁響難具論哇滛日淪惑舉俗逐時好誰能稱在昔萬事亦復然不獨琴與瑟吾思一氣大渾渾無邊方天機自流轉隨至互低昻寒暑既代序日月亦運行庶物勃然出滿虛各有常萬化定厥基終古為維綱大哉庖羲聖有畫粲以章易道諒斯在請看隂與陽吾思洓水翁志節一何高褰裳辭宥宻視若秋鴻毛古人不可作流俗正滔滔色過夏畦病意甚乞墦勞趨走信機巧茍得還驕豪閒詠青蠅詩載翫碩䑕爻吾思魯公儀㧞葵去織婦傅翼兩其足實惟天道故云胡世君子大得兼小務生殖廣田園販鬻罔泉布牙籌既自執龍斷復登顧彼哉何足言義利各有悟蜩鳩笑大􅉇夏蟲疑寒冰語之斯道大心識何蒙㝠属文篋笥滿讀書棟宇盈徒勞一生力了無寸見明誰言㸃也狂鼔瑟有深情月盈乃生魄隂極陽復來損餘補不足天道良昭哉淳朴日澆散斯理亦何乖既剥猶未已豐亨尚增培君子過佚樂小人窮之災所願均厥施九域登春臺萬鍾固知富於性無加增千駟雖云衆難為身重輕逹人抱大觀不以外物嬰夷齊首陽餓伊摯莘野耕清風激千古賢聖留其名邈哉務光讓鄙矣蝸角爭蠅營徒為爾鴻飛自㝠㝠青山何岧岧白雲自超超雲山日在望開門兩相高既喜山靜止還愛雲飄飄秀色可攬結吾其陟山椒大氣浩無涯厚地大氣舉形氣自依附人物乃中處剛柔生變化隂陽行寒暑自古謂之然滿虛寧可數吾思弄丸翁深情契斯語丹轂既云飾翠蓋亦時張駟馬復在馭鸞和自鳴鏘執綏者誰子升車氣揚揚廻旋逐水曲馳騁登周行行人為之辟誰不羡輝光胡取覆餗誚而置郜鼎章輪輿雖云美致寇安可量所以大易辭負乘著厥祥洪荒日已遠文籍日以繁華僞滅真實汗漫迷本源左氏已浮誇戰國皆詐言班馬揚其波蔚宗助其瀾繼者如蝟毛美惡愛憎間諒非董狐筆盡信誠為難誰哉法宣聖大典垂不刋人生苦不足得隴更望蜀祖龍泛海行劉郎祀竈術仙事俱茫茫百年竟飄忽汲汲復營營何時滿所欲吾慕首陽翁清風在山谷庭樹㣲飄落凉氣始披拂却憶少年時泛舟湖湘曲秋風起波瀾寒霜下林麓日出江上楓霧隠楚岸竹蘭芷亦蕭條芰荷不秋馥靈均舊遊處騷思方滿目忽忽三十年凉意復相觸九歌有遺辭得意在雲谷庭竹生凉飈明月從東上候蟲草根鳴夜静聲愈響逍遥歩階除悠然起遐想三皇五帝時淳樸竟焉往王風降黍離禮樂委榛莽反復千載間霸業雜相長是非垂不泯勝負在俯仰令人意難平撥置聊自廣人巧千萬端莫逃造化巧三王行仁義子孫永相保綿歴百千載順理得終考嬴隋南北朝竊國騁暴狡社稷旋荒墟苖裔悉剪勦天巧必勝人人巧何足道出金陵金陵宿雨霽杲杲秋日明繆承北闕召促裝出西城追隨冠蓋集酌别臨江亭徘徊不能别去住難為情掛蓆曉風發觧纜早潮生抗手謝送者令人意難平所願各努力令徳崇端貞江行三首石城上朝旭宿霧漸已收大江何茫茫柔櫓泛中流鍾阜猶在望白雲散巖幽兩載寧無情湖山憶同遊佳勝邈難即廻想空悠悠順流駕長風掛蓆何快哉青山若相送兩岸猶崔嵬恩召信光渥報稱知非才貞白有君子寧不動中懷我舟既云邁長風起層波天水共𣺌茫雲岫紛嵳峩石城猶在望赤岸還經過逺堤秋樹小水國蒹葭多老遂金陵遊奈此佳麗何北歸已陳跡江行遂成歌過儀眞怱怱過儀真來往已三度茲行復祗召嚴程還北去湖田收晩禾長堤落秋樹已逺金陵山漸近廣陵路乘月宜舟行牽者且莫住夜泊廣陵夜到廣陵城已是三更後官舡少停泊驛吏勞奔走風清月色明河漢粲星斗行思方揺揺懷古復何有高郵又見高郵城連延傍湖水水上紅驛樓登眺憶往嵗昔逢春雪飛今值秋風起嵗華與人事廻換理如此中貞諒自保期不愧行止高郵湖去年冒春雪揚帆過高郵今嵗属秋暮長風送我舟湖心射日氣駭浪蹴天浮觀象卦有渙悟易情悠悠淮陽懐古淮陽古名郡卧治有昔賢禁闥不可留遺想增慨然顧我豈其儔寵擢何連連本乏實徳稱重為虛名牽撫心益自愧懷人遂成篇雨中渡淮風雨渡長淮波浪何𡨕茫兩儀混不分恍若窺洪荒舟人貪利渉片蓆就空翔翩翩入烟霧隨風任低昻北岸泊水驛暮雨益淋浪且喜對官燭粲爛竟夕光清河晚晴向夕起長風秋雲静天宇清波流月光白露下寒渚榜人喜晴霽理楫夜相語早發過鍾吾漫漫見徐土夜上吕梁洪水村夜寥寥秋月流空白牽舟上吕梁逆浪湧寒雪愧彼役夫勞當此灘水澁憶我四方遊江湖飽渉越祗召復茲行恩重知才劣矢心復何如長洪石如鐡過徐州去年春正月南泛彭城舟今嵗值秋暮北上遡長流蹤跡信往復景物愜觀遊風寒堤柳落波减岸石稠白見高城堞蒼出逺山丘何處戱馬臺彷彿燕子樓化遷無停軌事往不可求陳跡竟泯泯虛名但悠悠覽今亦懷昔發聲遂成謳送歐陽憲副凛凛谷中風亭亭山上松風聲亦何勁松自無改容競秀固妍好弱植徒豐茸獨於霜雪餘卓然見高蹤悠悠四十年所遇多尚同歐陽信佳士亮節抱始終蒼蒼嵗寒質展可為國庸適來述所職歸思何怱怱載歌君子篇德期皓首崇雜詩三首洪荒一何遥悠悠幾萬載古跡竟茫然古道復安在巍巍唐帝尊放勲薄四海文明啓中天倫典粲而藹魯叟删述勞于茲立聖軌寥落但陳編撫事增歎慨孰云天地大形勢兩暌絶一氣周流之神理有昭格雍雍虞庭臣穆穆賢聖徳太和良在茲疇咨方未歇所以祥鳯儀不獨大樂闋如何此道非千古空遺跡山龍匪舜樂卑菲真禹心大哉虞夏聖憂民同一深既服四載勞還彈五絃琴九功亦時敘勑天尚遺音如何精一傳載往不可尋獨有簡册光留照猶至今西溪魚躍為樂安楊貢侍御題西溪𣺌何許乃在楊林阿楊林古名族樂安世其家家住溪水曲林木相交加地僻網罟絶溪邃遊魚多濈濈聚弱藻洋洋戱新荷逆水㣲波生仰沫細雨斜跳躍自有適出没静不譁楊族有名士考業咀英華愛此魚性樂契彼道味嘉乃知天機妙萬象皆森羅却鄙中散慢寧效濠梁誇緬懷旱麓詩載賦西溪歌永言繼真躅勝景垂無涯龍江曉望兩岸青山隠隠一江白浪茫茫烟樹高低城郭風帆逺近舟航遣悶二首客中欝欝不自得忽思古人讀古書古書古人亦如此吾懷不放將何如少時都不觧憂喜壯年百慮攪我心我心黙黙向誰説呼酒只對東風斟臨清曲臨清人家枕閘河臨清賈客何其多停舟落落無可語呼酒只對長年歌題墨牛二首青松落隂石苔上雨餘百草芊綿長老叟牧牛牛性馴牛背讀書興蕭爽書中之味深且長髙睨盤古窺皇唐日暮驅牛下山去風清月白天茫茫緑楊芳草被平坡老人騎牛行且歌歌長扣角角欲碎悠悠古意何其多布褐凉風生兩肘幾度歸來月明後夜深遺響入青雲應有知音與携手蠶婦吟采葉者誰婦蓬首面不洗年年絲作人家衣短布裙穿不揜體綺羅不是養蠶人三復斯言情不已偶題磊磊落落塞胸臆推蕩始覺心和平丈夫志量包宇宙細故那得風波生憶繡榮二孫繡孫猶未識阿翁翁在山東一馬驄近别榮孫春又夏相應學語問阿翁歌贈劉僉憲古磬不諧人之耳古瑟不合人之心茫茫天地亦大矣人生豈謂無知音陽春白雪聴者寡巴人下里和如林退之竒崛篇子美爛漫吟謫仙逸氣隘六合一字價抵千南金神遊八極不可見獨留文字幾千巻江河萬古行地中飲者杯勺各滿願我生其後欲追逐蹇若跛鱉趨紫燕良馬名東西南北流覽多公取古詞各矜衒邇來忽遇劉虛菴胸中元氣何潭潭沉酣百子索幽怪模鎔萬象窮川嵐興來落筆亦何壯一日千里馳風帆又若秋溟露毫末明珠大貝相錯參始悟古人今可學嗟我見晚生靦慙虛菴虛菴真竒士磊落聲名固應爾相逢一曲伯牙琴髙山峩峩水清泚茅屋漏辛丑進士河汾客早向中州買居宅宅有茅屋八九間補葺聊以蔽床蓆進士所好惟詩書衣食取足無剰餘朝朝暮暮誦周孔行行坐坐歌唐虞以茲狂僻誤生理老屋支撑幾星紀前月大風撮茅去今月乆雨漏不已移床徙榻那得乾堆書捲被空長嘆文章不足補穿漏翻為兒女生􅌤顔豪家大屋足懽笑已覺紈袴輕儒冠却憶唐朝老工部西蜀草堂幾風雨亦有官居鼎鼐尊欲起樓臺無處所昔賢窮達還復然我何愠此霑濕苦且待天晴飽讀書比屋渠渠不須數太行歌送丁分教之襄陵太行之山何崔嵬鐡崖翠壁萬仭中天開其勢北來吾不知其幾萬里但見横亘遼磧包括秦晉斗起中原之地何壯哉往年吾嘗陟其頂四顧山如培塿樹如苔黄河一線遥遥下砥石奔流直到東海不復廻此時英風浩然洒六合便欲厯覽天上金銀臺其中羊腸九折走峻坂摧輪怪石硱磳磊落而成堆太行之高且險也如此子今逺行令人興難裁倘到昔所登覧最高處為我歌此一曲還徘􅆦西望襄陵迢迢秪幾驛驅車徑須往渡清汾隈願子居易思險慎厥守始終永保令譽慰我相思懷永和雙山歌永和四境千萬山雙山之勢尤㠝岏兩峰對峙若天闕中有一境通人寰南峰突兀半空裏連岫峩峩方並起蒼松古木何蕭森朔風搜攪鳴不已北峰形狀尤竒瑰怪石刻鏤樓與臺上有雲屏立霄漢隔礙星斗廻風雷我來登覽值冬暮攀縁石磴到高處滄瀛碣石覺東傾弱水崑崙在西顧俯瞰纍纍岡阜多巨壑無底如盤渦遠近幽深杳難測寒雲冷霧紛盪摩因思未闢天與地澒洞無涯惟水氣輕陽一隙漸飄浮大塊無邊遂凝滯波濤蕩漾成高低剛為金石柔土泥此山想得陽之極層巒削出天之西獨恨古來壯遊者足迹不到茲山下遂令竒絶委幽窮無由題品繼風雅我才雖非作者流愛此欲去還夷猶摩娑石壁寫長句千古當與山同留鳯凰臺歌次虛菴韻吾聞鳯鳥不與凡禽棲隆周之時曾集豐鎬西鏘然一鳴向人世喧啾百鳥不敢爭與啼昔有名臣黄覇生漢世治民之才逈與時流異潁川出守曾幾何休風數感靈禽至靈禽文彩明山川和音噦噦聞中天遂築高臺表神異臺空鳯去餘千年只今壞埒纔數尺野鳥紛紛競來集簡册空存紀瑞年荆榛不復快覩迹我來䟦馬登高丘荒臺已遠猶囬頭為憶循良心耿耿緬懷瑞物情悠悠鳯臺鳯臺重披訪往事何須空怏悵方今聖明治理登俊良會見一朝飛去青雲上舟中苦熱大江千里流炎日暑氣波光互蒸濕火雲壓風空不來舟中苦熱何太劇坐睡昏昏汗雨流對食欲餐還復休扣舷直欲發狂呌安得少昊囬清秋安得少昊囬清秋一洗煩熱情悠悠洞庭湖歌吾觀庖犧龍馬圖五行惟水居其初自從清濁奠高下山澤通氣無時無荆南之水亦衆矣壯觀惟有巴陵湖世俗相傳八百里足跡未到空躊躇今秋持節來南楚舟泊岳陽訪竒古登樓始得肆遐觀萬頃洪濤際天宇如從東岱窺滄瀛一㸃仙山隔烟雨長風歘起層霄間渤渤洶洶增狂瀾轟天掲地急雷鼓排空炫日堆銀山須㬰風止波濤定涵泳虛空開玉鏡金烏飲淵千丈紅白鷗落影一行動行客喜甚無氛埃連翩大舸争往來我亦飄然下樓去放舟中流何快哉蜀江西來半天瀉瀟湘南接蒼梧野一劍横空有所之丈夫不作悠悠者洞庭洞庭七澤雄鄒魯昔有觀瀾翁我今賦此良不茍乃知有本無終窮沅州春日歌南州二月春來早緑水青山四縈繞城中何處足春光御史臺中富花草牕外青梅結子稀門墻桃李争晴輝暎日紅綃正縷縷漫空白雪何霏霏芍藥錦苞猶未啓蘭蓀露葉光泥泥楊柳風搓碧玉絲芭蕉葉吐青鸞尾苔茵展地萱草長千紅萬紫遥相當竹林好鳥自鳴寂菜畦蛺蝶殊悠揚生意由來滿天地糚㸃池臺足佳致門清祗覺白晝長庭閒况復遊絲細静觀元化深無涯中心黙黙含春熈願効冰霜逹陽氣普期八表仁風吹敬軒文集巻二
