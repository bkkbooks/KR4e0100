body:
  text: 敬軒文集巻九眀薛瑄撰律詩夏日簡焦羅陳張四侍御長夏飛霜几硯清公餘景物稱詩情絲絲緑栁迎風細灼灼紅葵向日傾憲度已應昭典則官僚况復盛才英運開五百時難遇願竭忠忱答聖眀挽李處士鶴去蕪城不可招海天凉月夜蕭蕭誰從載酒尋山寺無復携笻過野橋黄髪交㳺紛雨泣白楊阡壠颯風飈賢郎驄馬推恩日定有鸞封下九霄送林鄭州厚報政三年足好音南歸五馬正駸駸一麾共仰重臨徳累試争誇百鍊金芍藥有風成雅俗甘棠無土翳清隂郡齋晝永多佳思頻寄新詩慰别心樓上都門樓閣倚中天暇日登臨思𣺌然樹繞西山濃著雨地連東海淡浮烟塵消綺陌填車馬香煖歌臺醉管絃獨有道人清似鶴謾從華表記歸年送王士悦浙江憲副推轂年多老豸冠分符吳越見才難横金已覺新恩重衣繡仍為故里還破浪樓船秋水闊飛霜憲節海風寒懸知到處山川好行部應須次第看歸到有感連岡北下是吾廬幾載歸來覔舊居手種孫桐髙院落家傳喬木上霄衢䘮亡已是傷朋軰凋瘵那堪甚里閭獨立秋風看秋色欲將心事問詩書河汾逢王存紀㕘政二首京師一别幾經秋汾水相逢話舊逰栢府乆傳名譽美薇垣今見事功優典衣祗擬通宵飲投轄都無半日留又復匆匆成兩地朔風何處送鳴騶索居殊覺故交稀忽見同官老繡衣霖雨方看薇省作清霜猶憶栢臺飛論詩欵欵傾壺蟻話舊頻頻剪燭輝壯志未酬知已共相期白首莫相違酬辛儼先生見寄先生歸老大河濵三十年來信始聞鄉比鄭公瞻舊徳經傳邵學挹清芬碧鷄傾盖時雖乆錦鯉通書意更真見説門墻桃李盛不知誰占舜城春示勝子勝子行將至立年光隂莫使暫虛延收心切要存天理閉户常須閲簡編玉不磨礲難作器人非問學豈成賢汝親願汝為君子朝夕應須念此言示京子京子年今十七時青春正好力書詩兒童氣象都無異問學薫陶始見竒道大必先行孝弟業荒須切戒逰嬉老來善惡由今日汝父之言汝細思示昌子昌子今雖十嵗餘聖功元自養䝉初莫求俗軰梨兼栗須讀前人詩與書抄手出門毋浪戱正襟掩户要端居汝親願汝身長日頭角峥嶸與衆殊過郭林宗墓幾經滄海變桑田孤塜常留古道邉彩鳳自應鳴曉日㝠鴻終擬没秋烟關河迢逓膺舟隔江漢空茫穉信傳千載有碑應不愧路人猶自識髙賢題張侍御質魯齋混沌那堪七鑿餘紛紛巧智定何如璧完太璞應無價學到希夷始似愚徃哲每能存本領斯人有意篤詩書試論質魯齋中事一唯方能味道腴題何郎中巻粉署郎官詔許歸都門祖席倍増輝九天光逐廻鸞動三峽雲隨畫鷁飛慈竹滿庭浮曉色芳花繞户送春暉一門喜氣深如海萬里江流接帝畿挽王庭遂處士静中應自識先幾寄迹醫門識者稀野質早時經水鑑閒身終老製荷衣交㳺祇擬論心乆生死寜知與願違潞水秋風梁苑月定從白鶴徃來飛挽舒大尹二首江右風流屬老成江天俄復暗郎星乆傳詩禮誇賢子遥想儀刑律後生耆舊空悲當日社循良猶識昔時名懸知斧屋秋烟裏應有髙人為刻銘西風鶴唳楚天蒼憔悴儒林弔白楊花縣辭官悲暮景菊籬歸老慘秋陽空餘舊佩銅章暗不及新頒紫誥香有子秋官霑寵渥豐碑行見發幽光讀易軒為杜御史賦風滿幽軒净晚襟韋編三絶在追尋方看龍馬分竒偶又見羲圖轉古今細草初生春逕淺芳花早落夜庭深畫前有易君知否祇信堯夫最苦心題静學軒書牕萬籟絶囂聲有客牕前味六經止水不波雲影見太虛無翳月華眀亭亭自可觀人物擾擾何由悟性靈誰似南陽老諸葛草廬黙識古今情綵繡堂為張聰御史賦山連滄海是金華華榜青林柱史家鶴髪每看傾夀酒鳳城先已探名花斑衣舞遍三春日繡服裁成五色霞已見髙堂頒紫誥香名留取故鄉誇送康僉憲四川提學萬里長江萬里橋錦城樓閤倚青霄昔賢共説山川秀僉憲寜辭道路遥擬變三巴成雅俗還將五敎布新條好期報政歸來日鳴珮金門候早朝送髙僉憲福建提學天書捧出大明宮拜命南征使節雄舟解御河楊柳緑路經山舘荔枝紅七閩人士沾時雨一代文章復古風未許江山乆留滯還期白首夣非熊送彭琉僉憲廣東提學儒官新出禁林中手捧天書按廣東嶺表只今瞻使節島人從此變華風霜隨白筆蠻烟静馬過青山瘴雨空萬里天威應咫尺五雲囬首鳳樓重留别院中諸友幾年騎馬聽朝雞憲府追蹤愧品題散木自知非偉器青雲何幸陟仙梯已逢盛世無裨補更接英僚惜解携便捧天書天上去五雲囬首是三齊留别趙彬知子于今近十年中間消息兩茫然寜知京國相逢處又是都門惜别筵上苑榴花偏向日官河楊柳正含烟臨岐握手無他語願篤清脩繼徃賢留别姚克脩御史交情方斷昔人金班馬俄聞載路音郡邑行看東魯近衣冠祗隔内臺深朝中鵷侣思同入海上仙山憶獨臨壯志擬磨三尺劍分携寜遣鬢霜侵題薛希璡耕樂巻旭日初升布谷鳴春郊耒耜動春聲清溪引水來時滿緑野為菑望處平田祖有靈開稔嵗天民何幸樂生成東阡南陌相過處撃壤歌中答聖眀祇命山東手捧天書出禁中又乘驄馬按山東秋烟荏苒連滄海曉日熹微見岱宗已沐聖眀新化雨乃瞻鄒魯舊儒風小臣謬沗咨詢職願得英賢佐九重逰靈巖寺靈巖有路入烟霞臺殿髙低釋子家風滿廻廊飄墜棄水流絶澗泛空花青松閲世風霜古翠石題名嵗月賖誰謂無生真可學山中亦自有年華宿靈巖寺梵宇深沉夜景遲僧房禪榻果幽竒竹鳴虛牖風過處霜落寒巖月上時紙帳燭光團白玉石爐香燄靄青絲紅塵馬首眀朝别只恐山靈解勒移秋日靈巖道中路入山門景便幽髙風不斷石林秋照人霜葉紅於染拂袖嵐光翠欲流幾過野橋横絶澗遥從古刹見髙樓北峯直與天相接更擬攀蘿到上頭寄李太亨太守㑹面京華兩過秋又從海岱望揚州澄清志操知吾劣出守聲名覺子優華舘定閒徐孺榻清池誰共李膺舟如何千里音書絶不信交㳺是白頭題李廷珪僉憲嵩洛漁樵巻清門奕世古中州洛水嵩山總舊逰見説斫雲開鳥道還聞遡月泛漁舟自趨紫闥來烏府望使青雲伴白鷗老去披圖思徃事幾囬飛興到林丘松林書舎巻為李方伯題四簷偃盖碧重重挿架牙籖落影中萬谷驚濤滄海近半窻凉月雪山通潤霑瑶席霏霏雨響徹朱絃細細風好結嵗寒搜秘檢莫教飛夣逐塵蹤題楊僉憲思親巻惆悵髙堂罷綵衣空山囬首斷雲飛梧桐井逕秋風老脩竹園林夕露微紫氣天邉鸞下疾白楊隴上鶴歸遲栢臺有子情何似厭聽庭烏呌落暉題觀風圖九重深詔遣星軺使者觀風郡國遥水逐雕輪隨地逺山開錦障㧞天髙嚴城樹杪門初啓候吏花邉馬不驕萬里咨詢皆帝力生民隨處樂耕樵髙唐道中寄李廷珪僉憲西來隨處問先生見説分符到博平滿路風花頻縱目一川烟柳最關情白頭毎羨丹心壯緑鬢誰知素節眀髙論細聽應有日擬分華榻共春燈與孫大叅韓憲副同按部别後寄此分符同出濟南城攬轡東風並馬行逸興細看花柳色髙談深合古今情别來併覺新春暮到處頻看缺月盈絶似當年傾盖者更期樽酒話平生寄孫韓二公憶過春風十里亭二君携酒玉為瓶小桃正吐樽前萼嬌鳥初傳户外聲如此風光留客飲幾多懐抱向人傾行臺此夕忽相憶謾掩重門惟月明懐李廷珪用前詩末句起韻并書于壁擬分華榻共春燈到日先生去博平别鶴行雲那有迹落花飛絮倍多情空憐皓月明朱幌尚自餘香裊畫屏我復東西南北去壁間留語候歸旌次夀鄧郎中母韻二首百嵗星霜是永年七閩閨教最稱賢自期西日堪留挽不信南山可變遷白髪已看封紫誥綵衣時復奉華筵故應志節髙如許贏得人間福夀全秋霜勁節自年年誰似清門鄧母賢半世成家遭感愴一生敎子見超遷恩隨紫誥來華屋春滿紅螺泛繡筵青簡上頭書次第香名留取古今全詠新竹知是乾坤一氣催滿林新笋迸蒼苔抽梢漸欲侵雲漢解籜時應傍憲臺已覺清風連座起更揺踈雨到牕來相看盡日添新興白筆新詩為爾裁樂陵道中樂陵東去古堤長野水村烟共渺茫逺海天空初過鴈大田秋老未經霜鐡冠十載心如昨憲節䨇持鬢欲蒼攬轡悠悠思徃事趨朝曾對御爐香長白山懐古山廽長白重經過十世懐賢意若何飯粥事空荒古寺讀書聲歇暗烟蘿中朝徳業應難及西夏勲名更不磨向晚慿誰話憂樂栢臺清夜月明多金臺送别為李進都指揮賦二首纔將虎旅衞天居又擁雕戈出帝都部伍散行秋野闊旌旗斜捲暮雲孤扶桑分閫封圻近枤杜連歌雨露餘壯節封侯應有日青雲囬首是長途虎將承恩出九重紫泥封帶御香濃離筵濟濟都門酒征馬蕭蕭别路風雄鎮行看滄海近歸旌遥指岱山崇太平分閫渾閒事萬里封侯慷慨中泰安州重寄李太亨去年岱麓題詩寄岱麓逢人又寄詩剖竹已當耆艾日解龜仍及聖眀時青山縱有歸來約黎首其如去後思愧我年年持憲節涓埃無補欲何為海上道中述懐馬首東來嵗月頻西歸猶及艶陽春風烟滿目溪山秀花柳無邉雨露新四海甄陶眀聖主萬家耕鑿太平民勑天千古遺歌在每抱丹心戀紫宸青州府迎詔丹霄快覩鳳㗸書春與天㤙滿八區不獨山東扶杖聽還應海内効嵩呼衣冠濟濟風雲際花柳欣欣雨露餘栢府微臣瞻盛事載馳忠懇戀皇都次黄仲芳韻二首京華偶爾論斯文知是㳺心出聖門風度恍如瞻玉樹清談藹若挹芳蓀薇垣三載時名大花縣多年舊澤存愧我無能叨憲節繆同述職荷天恩薇省分符重黒頭天官考績冠時流趨朝曉日辭丹鳳去路西風躍紫騮自昔藩維求俊傑只今典禮尚虞周都門此别須珍重還擬經邦贊大猷送王秀才省兄歸京師華不注髙秋氣多大眀湖水落霜波山川風景今如此兄弟分携意若何憲府已應持玉節親闈長是近鑾坡眀年三月春光好更憶金臺有鴈過送李永年大叅致仕十首四朝出入受恩多詔許南歸意若何路繞青齊騶騎逺水通淮海畫船過故園到日收禾黍别墅經年長薜蘿父老傾懐看白髪兒童佐酒發清歌七十懸車古亦稀明時乞得健身歸朝廷已自優黄髪鄉里無勞羨錦衣碧水細通栽藥圃青山閒繞釣魚磯江南事事皆堪樂莫遣流年賞興違歴下山川入畫圖西門悵别指征途已知聖代優諸老還似當年餞二疏歸路逺應經鐡柱名山行復見香爐江南江北相思處鴻鴈來時好寄書黄甲聲名四十年薇垣粉署共稱賢方看薦鶚陞三事又乞歸身别九天㤙詔近從丹闕降使車遥向碧山懸耆英莫謾誇中洛江右風流也自傳白髪明時老大臣封章幾上乞歸頻四朝寵覺腰金重三代㤙霑綵誥新花發薇垣成逺夣潮平揚子是通津到家正值秋光好黄菊東籬有故人已向明時早拂衣家山囬首興如飛丹心老去聲名大白髪歸來故舊稀幾處甘棠留畫省繞門楊柳䕃苔磯惟應野老來争席坐翫沙鷗伴夕暉聞道江南景物嘉薇垣有客正思家池塘夜雨翻荷葉籬落秋香散稻花徳譽尚為清論重儀刑應有正人誇歐公曽冩歸田録好繼遺芳播邇遐梁苑登科二十年乘驄頻與嵗時遷忽逢先逹青雲上已是門生白髪前盛世澄清慚我劣眀時歸老羨公賢追隨冠盖城西别心逐行舟入楚天纔捧除書拜好官又承㤙詔許南還人辭歴下山光逺船過真州水面寛松菊未荒三徑在衣冠不改一身閒推恩更有新鸞誥留與家門乆逺看邂逅東藩僅一年先生何事著歸鞭曽聞碧岫雲蔵屋見説清溪月滿船歸老㑹尋山水樂聲名不讓古今賢遥知林下徜徉處猶起丹心憶九天泛舟思親天地無窮水自流髫年已侍二親逰中原道路曽驅馬江漢波濤更泛舟孤藐光榮叨憲節音容寂寞閟松楸千思萬想情何極目送飛雲到故邱送夏希純郎中歸南京雲路分飛二十年相逢鬢髪各蒼然栢臺直指心如舊粉署郎官職又遷北闕九霄瞻曉日南風五兩送歸船帝京到日多佳興虎踞龍蟠入望邉秋日東平道中齊魯西風草樹秋川原髙下過東州道邉白鶴來華表陌上蒼麟卧古丘九曲半應非禹迹三山何處是仙洲經行俯仰成今昔却憶當年賦逺逰過五道嶺峯嶺連連接岱宗路從絶頂度華驄餘寒常帶隂崖雪爽氣仍飄霽壑風春入驛亭嚴候吏雲隨憲節怪山童方廵每嵗叨天寵長見車書海宇同寜陽行臺元夕憶黄憲使曽憶觀燈宴後堂玉杯行酒夜何長新聲已覺隨銀甲逸響還驚繞畫梁東道留賔能閉户諸郎愛客解牽裳别來好景逢元夕空向行臺對月光沂濵書舍為曲阜令孔公堂賦魯城南畔碧溪頭結屋蔵書事事幽入户日光浮野馬隔簾波影漾沙鷗真傳已覺千年逺大道還從六籍求聞説浴沂當此池春風有約事追逰兖州道中敷土名傳舊兖州山川遺跡快追逰泗沂凍解波猶淺鳬嶧春囬翠欲流野火碑餘秦相國悶宫詩頌魯諸侯懸知尼父當年志夣寐長思見盛周和壁間虞伯生皋字韻中書幾秃管城毫盡日抄書未覺勞但得文章如布帛不須詩句比金膏淳龎每憶黄輿厚𤣥鑒深期碧漢髙莫道知音人世少有魚潛渚鶴鳴臯送陳都憲鎮闗中三首四朝風紀受恩深又見西行捧徳音天上神仙知暫别闗中父老喜重臨戍閒部伍清河曲地逺桑麻接華隂到處行臺懐帝闕封章還擬罄丹心中丞斧鉞下青霄重鎮闗中别路遥衛水樓船春解纜崤陵驄馬曉揚鑣諸軍共仰新旌節列郡仍遵舊教條想是歸期應不逺朝元有約聽簫韶九重深念及西人山鎮還須老大臣憲節入闗隨爽氣璽書行郡布陽春山連玉井晴飛雨地接金城逈不塵經濟本為儒者事功成還擬畫麒麟送金都憲鎮寜夏二首大夫承詔出皇州西夏山川是壯逰笳皷盡迎新憲節風霜仍肅舊貔貅乆知河隴諸蕃静又見崆峒二麥收總賴廟謀清四海不須樽爼借前籌西行紫誥帶新泥葱嶺河隍入馬蹄列鎮乆應烽火息連屯惟見稻秧齊逺通貢篚來天外直布皇風到海西萬里成功歸有日青雲滿眼是丹梯送盧都憲鎮守寜夏二首眀時出鎮得才難莫厭經行萬里間玉節初辭青𤨏闥霜風先到賀蘭山闗河控帶黄塵静蕃落耕耘緑野閒入覲天顔應咫尺不須頻看寳刀環同年扵我最相親憲府乘驄邁等倫正是趨朝承雨露又看持節出風塵山川迢逓行時舊旌斾悠揚到日新暫撫西陲歸有日看花須及鳳城春出京師二首孤臣泣血省愆尤詔釋羈縲出鳳州滿目山光迎馬首一鞭歸思繞林丘罷官已是安時命報國空驚不自籌遥想到家春已暮麥黄蠶老稼盈疇乆知樗散是非才卅載超遷歴寺臺松栢每期冬雪茂杏花不逐艷陽開數莖白髪還禁老一寸丹心未覺灰此日為農歸故里河汾嵗晚興悠哉患難中海昌李太守數書問及詩以報之知已情深數寄書問吾行止近何如買車已上山西路結屋還依水北居樂意不忘尋簡帙生涯祇擬付耕鋤感君交義高千古逺道何由致報珠歩朱尚寳送行韻用以留别二首一枕邯鄲夣已醒歸鴻千里拂髙㝠心期皎日均能許歌擅陽春我獨聽别去莫驚頭並白相思終是眼長青河汾故里遺風在争似當時續六經驛路春風酒半醒離情花思兩㝠𡨕穿林乳燕深深去傍柳流鶯細細聽官渡已過滹水碧家山又近太行青龍門舊業應如昨樵谷漁磯取次經晩翠軒為楊大叅賦髙人雅有嵗寒盟笑傲華軒寄逺情最喜竹風當座起絶憐松雪近人清年來勁節心能與春去繁華眼不驚若此秋香還共美擬從良史傳佳名春日逰禹門野服歸來野興幽十年仍遂禹門逰崖廻曲路通危棧峽束洪濤瀉急流樓結飛甍臨絶漢宫髙華榜煥層丘鄉人未必知神意絲管啁啾聒未休哭少子治患難歸來始自憐悲傷何事又相煎一經賴爾傳先業二豎嬰人殞少年遺巻不堪尋舊墨荒岡忍復見新阡傷心問寢寒齋夜鴻鴈行中訝失聮題李麟惜隂巻連城自古出藍田還道驪珠在九淵勤苦方能求至寳放情未必得真傳案頭每見秋螢聚忩裏常知野馬懸年少惜隂真可畏老予鬢髪已星然用舊韻酬海寜李太守四首聞道先生近著書髙懐雅興逈難如蘭栽九畹誰同采竹種千竿自可居溪水每從晴後釣山田多向雨中鋤殷勤逺道裁詩寄絶勝驪龍頷下珠焚香纔暇即披書老去無能得自如青簡尚尋髙士傳白雲還似野人居秋風婢子晨供織細雨兒童晚荷鋤道不逺人真可樂何須象罔索𤣥珠四千里外一封書縱有瓊瑶報不如雲水當年思共歩山川此日已安居霜前棗熟從人打雨後葵荒欲自鋤白雪調髙知和寡强將魚目比眀珠五馬無勞事簡書一生行止自如如㝠鴻有意隨髙逝野鳥忘機伴所居千樹黄柑應自種一忩青草不須鋤門臨滄海秋先覺長見寒光浴曉珠立秋日雨晴新漲落汾黄緑樹風生户牖凉䟦馬空懐登逺道聞蟬還喜是吾鄉離離禾黍東臯近緲緲雲霞北嶺長有酒便堪消暇日流年不管鬢成霜題馮處士巻忽從囂雜見真淳誰道今人不古人四禮每宗朱氏教一門長接孟家鄰椿庭時雨年年潤蘭砌光風日日新青簡㑹須書行義髙名直與董生親次何僉憲自學韻二首阿閤梧桐第一枝朝陽快覩鳳鳴時西江才學推虞集北斗聲名仰退之直道敢抛君子志中情還有正人知青青誰似霜臺栢聳壑昻霄更有期天衢早嵗躡仙蹤金榜紅霞絢海東陳策漢廷推董子眀刑司寇數蘇公一襟氣與秋天杳千古心涵曉鏡空兩見名藩持憲節清霜隨處踏春紅無題浩浩滄浪水自清曽聞漁父扣舷聲四知稀復思楊震千載誰能慕屈平得失真如鴟嚇鳳髙低應似鷽嘲鵬何當挽取天河水一洗人間兩眼眀立春日臘盡殘年冉冉過又逢春日興偏多故應節序經千古自信行蔵老一窩生菜任教纎手送新醪微覺寸心和乾坤俯仰無窮意閒對東風一放歌絳守王汝績新學詩以美之先生為郡冠諸公興學由來有古風青史無勞稱衛颯黄堂今復見文翁化行古水弦歌内道在金臺爼豆中老我河汾遺教逺相思應與此心同次林文載大叅韻嵗暮相逢晉水頭清宵剪燭話同逰齊名黄甲風雲闊接武彤池寵渥稠宦達子應思致澤退閒我亦樂蔵脩却憐出處千年事惟有儒門道徳優對雪雲垂四野寂無聲大雪通宵又徹眀在目已應知皓潔穿簾時復鬬輕盈凍凝水底蛟龍蟄饑厭庭前鳥雀争髙卧不妨書舎冷此心元有嵗寒盟乆不作詩偶賦案頭彩筆倦長吟􅈝覺詩情動不禁湖海盡除當日氣田園深稱老年心種瓜已自連東畛栽漆還應滿北林汾水晉山無限好擬逢清景更登臨秋日忩户凉風似水流河汾八月又驚秋寒蜩嘒嘒鳴何切社燕翩翩去不留飲水難期前聖樂乞墦纔免昔人羞求田問舎安吾老不羨元龍百尺樓謁伯夷叔齊廟荒祠古栢首陽阿再拜仁賢感慨多樓設一堂還儼雅草封䨇塜正嵯峨心存兄弟難能節力挽君臣欲逝波世上争名争利者髙風奈此二公何過汾陽故里名與臨淮徃日齊乗軺今過華山西參天老樹荒祠在遍野新蕪舊宅迷將畧不須窮玉籍王封寜復數躬珪中興唐室如公少回想忠賢首屢低過冦萊公祠功業澶淵冠宋朝古祠松栢晚蕭蕭儀容不冺鄉人祭魂魄何須楚些招忠義垂聲千古在奸諛遺臭幾時消老予持節無英計戀闕思賢首重搔華山馬首嵯峨見華山三峯削玉最髙寒層隂舊接黄河水秀色長連紫氣闗只有烟霞生澗谷總無塵土翳林巒西還更與山靈約擬上雲梯仔細看温泉唐家天子愛温泉故起離宫繡嶺前山上朝元金作閤花中湯井玉為蓮錦鳬曽泛當時水香木頻浮舊日船賜浴未終鼙鼔動苔池留恨自年年華清宫天寳承平奈樂何華清宫殿欝嵯峨朝元閤峻臨秦嶺羯鼓樓髙俯渭河玉笛長飄雲外曲霓裳間舞月中歌祗今惟有温泉水嗚咽聲中感怨多馬嵬號令風行遍九州六軍何事此淹留深情祗擬乾坤乆絶寵寜知咫尺休劍閤西行山寂寂渭河東去水悠悠路邉三尺妖姬土長帶千秋萬古羞連雲棧道中四首陳倉西入一門來疊嶂層巒次第開百折長途盤翠嶺千尋危棧接青崖蒼蒼雲木鳴山鳥决决溪泉㵼石苔持節未應辭路險㑹清蠻徼凱歌廻莫道西行蜀道難老來深喜縱遐觀山從太白連岷嶺水繞嘉陵出散闗石積層崖知地厚路登絶巘覺天寛驅兵過此思諸葛大節長留宇宙間重疊峯巒掩映青不登危棧即溪行氣偏三月山蟬呌境異千林杜宇鳴寥落人家多板屋蕭條郵舎盡茅亭因思唐帝西廵日中夜何堪雨打鈴總角曽從蜀道行今來鬢髪已星星不勝愛國輸忠念無限思親感舊情林外最嫌鸚鵡舌耳邉偏喜杜鵑聲驅馳萬里心何憚但保秋霜分義眀諸葛武侯塜丞相孤墳何處尋褒城西去漢江隂青蕪漠漠烟横野翠栢蕭蕭風滿林尚憶出師當日表空歌梁甫舊時吟中原未復星先墜長使英雄慨古今諸葛武侯廟武侯遺廟漢江南喬木森森雜翠嵐義感居人猶致祭名聞過客亦停驂運謀圖陣曽為八遺恨山河尚是三千載英雄今已矣古碑重讀意難堪過七盤匆匆行役敢求安鞍馬經時歴險難叱馭纔過九折坂揮鞭又度七盤山行當絶頂知天近下盡層梯覺地寛却喜漢中頻在望一川風物自閑閑漢中寓目谷盡褒斜覺眼眀漢中如掌一川平封疆自昔多吞併龍虎當年幾戰争英主築壇曽拜將忠臣討賊舊屯兵雄豪一去無遺跡惟見山髙水自清蒼溪少陵詩裏見蒼溪今過蒼溪日欲西駐節驛亭天色暝維舟江岸浪痕齊風林疑有於莬嘯雲木時聞杜宇啼橘柚過時黄不見峯巒依舊翠髙低閬中聞道閬中山水竒今來始得一見之長江縈帶碧浩渺逺峯環繞青參差竹樹茂宻塵不起天宇空闊雲自移錦屏近郭最眀秀佳句還吟子美詩塩亭道中舟度嘉陵見錦屏西行幾驛到塩亭好山最愛連峯秀佳木偏憐古栢青老志不移方寸赤逺逰寜怯鬢毛星休誇諭蜀相如檄干羽深期舞舜庭送李僉都經界敘播五月樓船發錦江中丞斧鉞靖巒邦一天勝氣隨龍勅千里長風捲繡幢定有竒兵擒孟獲不勞飛將斬王䨇朝廷㤙信更須布苗獠行看到處降與李都憲錦江泛舟津頭打鼓發官船泛泛清波散曉烟岸轉漸移江上樹艫揺頻拂鏡中天岷峨西北山重疊吳蜀東南水接連却艤江亭窮勝觀一樽談笑好風前錦城端午錦官城裏遇端陽好事常年憶帝鄉頒扇不知三伏暑賜衣猶帶九天香却看絶塞孤雲逺閒坐空亭一面凉佳節任從流轉在丹心不管鬢毛蒼答徐廣文二首三冬文史最精眀發軔香名蚤已成政羨有才逢治世却慙無力答昇平鵾鵬還撃三千水鵷鷺終期一字行㑹靣幾何知又别髙談不盡古今情衆中傑出見才賢文采英英骨氣全傾盖已知心不異談經雅覺道無偏擬陳亹亹天人策寜羡悠悠將相權北上有期還送别為君沽取酒如泉發成都夜雨朝來歇怒雷成都江上畫船開髙低竹樹連村合逺近峯巒入望來鼔枻易傷漁父志著鞭難覔祖生才烟波好景空無限逺思撩人未易裁納溪持節南來幾日留納溪小縣納溪頭市衢寥落人何少憲府荒凉境自幽六詔雲山隨地逺三巴烟水接天流只今溪洞猶多梗五月南征憶武侯永思堂為賀太守賦瀘川賀守孝心純一日何曽忘二親已痛音容隨化盡更悲霜露逐時新情深易感無窮恨天大難酬罔極㤙我亦有親俱早世為題詩巻淚沾巾嘉定嘉州曽作少年逰納納乾坤五十秋四野不移山競秀三江依舊水重流天髙華夏風雲闊地入蠻荒草樹稠城郭幾歸遼海鶴白雲今古自悠悠題王醫士東白堂纔見滄溟浴曉珠俄看倒影上天衢丹爐夜火知全伏藥室晨光覺漸虛野馬未穿延客榻陽烏先照活人書在家早起君休厭屨迹朝來滿户除逰青羊宫二首青羊宫觀欝崔嵬逺憶函闗紫氣來雪嶺地應通閬苑錦城江自遶蓬萊萬竿脩竹生𤣥圃三秀仙芝長石苔千古誰能識𤣥牝只疑虛谷有風雷千年舊是青羊肆今日翻為老子家金榜半天標觀閤琅函滿室粲雲霞琪林紅落三秋葉瑶圃黄開九月花有物混成人罕識㑹從真境讀南華諸葛武侯廟十首萬里橋西有古祠武侯遺像似當時孤臣只擬炎光振遺恨猶悲漢祚衰繞砌緑苔經雨色滿林蒼栢冒霜枝祗縁忠義無今古不冺邦人百世思茅廬枉顧即依依猶恨當時見面遲文武才猷天下少君臣契合古來稀南征纔見功初遂北伐那堪願已違尚有錦江遺廟在英名千古自光輝股肱漢室舊宗臣魚水當年意氣親時節如逢逐鹿日風雲還起卧龍人出師前後丹心切討賊頻煩大義伸萬古英名天地在叢祠長近錦江濵王佐雄才乆已聞叢祠今見錦江濆莓苔嵗乆漫碑刻風葉秋髙打廟門每有孤忠興漢室可無長策定中原江山離合寜非數成敗難將往事論南陽躬稼似天民感激元因枉顧頻初識樓桑親帝胃還如白水舊真人已從荆益開王業幾欲咸秦掃寇塵厯數雖窮遺廟在大名長與嵗時新一時魚水風雲㑹千載君臣祭祀同鐘鼓尚存當日廟江山猶繞舊時宫畫簷金榜蛟龍出粉壁丹青户牖通割據奸雄俱泯滅荒丘誰與酹西風茅廬抱膝正長吟忽際風雲許與深草昧每存興漢計艱危肯負托孤心出師表在垂天地八陣圖存慨古今欲問祠堂何處是錦官城外栢森森髙視乾坤志未酬草廬長嘯意悠悠時才總附奸雄勢大老還為漢室謀兩表曽聞辭後主三軍幾欲定中州伐功未就皆天數錦里英風古廟秋赤精帝子真苖裔三顧茅廬起卧龍英論已知分鼎勢長才欲試補天工纔聞遣使通江表又見驅兵出漢中禮樂未興人已逝古祠松栢撼髙風乾坤不復有斯人間氣竒才絶等倫管樂規模難並駕伊周事業可相親紅旗幾出褒斜道緑野還耕渭水濵時去千年猶廟食英風凛凛漢忠臣御書樓為吾昌衍叅政賦古今書賜由中秘藏在君家百尺樓奎耀夜晴通户牖芸香風細散簷幽篇章總是天人學函藏深為釋老留從此黄金不須積子孫勤讀繼前脩蜀中立春遣懐世態炎凉閲已多老懐今日柰春何一年持節金臺客萬里通潮錦水波北塞已聞休士馬南荒行復罷干戈時清若許歸田里願和康衢撃壤歌春日遣興閒舘春深日正長萋萋春草遍池塘溪雲踈雨梨花白煖日輕風柳線黄讀易自能窮宇宙賦詩聊爾記年光錦城風景雖云樂故里關心未可忘北歸有喜而賦駐節西川僅一年北歸㤙自九重天非才豈敢妨賢路無補空慙費俸錢為客載添新白髪到家還閲舊青編急流勇退應難及千載髙風尚凛然送杜員外歸省還京師歸省西川未幾時促裝又復上京師榮親已荷褒封典報國難忘雨露私路夾山花開錦繡棧盤崖樹拂雲霓遥知紫禁趨朝後粉署從容日正遲敬軒文集巻九
