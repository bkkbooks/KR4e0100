body:
  text: 敬軒文集巻十七明薛瑄撰序送歸州尚司訓序天以是理與人雖同而覺有先後先覺者以其所覺覺後人故謂之師師者天理民彛所自出而人之邪正由之是其任豈易云乎哉自古師道廢師之所以覺人人之所以受覺於人或出於異端他岐而不由於天理民彛之正是則師之名雖是而其實則非矣國家建學立師所以教人者粹然一出於天理民彛之至正而異端他岐不得以淆其間師道之復古於是乎在正統元年春聖天子龍飛之初天下士抱負其業來試於春官者于時濟濟僅千人焉主司既取進士百人又取其文學之通粹者四百餘人以補教官之缺員保寧尚志以四百餘人之一擢授歸州儒學司訓監察御史姚君克脩於其行且屬余言以為贈余嘗論為師之道不過以已之所得乎天者以覺乎人而已得乎天者如五品人倫是也師舎是無以教子弟舎是無以學御史君嘗稱尚志之為人資稟篤而學問正夫質以本之文以輔之不雜乎異端不惑乎他岐是可以為人之師矣尚志到官其思無負於御史君之所知必正其身必進其學俾天之所以與我者既求知其理又求踐其理將見歸庠士子皆得以啓其蔽而闢其途豁然獲覩斯道之光明坦然率循乎天理民彛之正他日以若輩人備國家之任用必能推其學以忠乎君而愛乎民于時尚志師道立而善人多可以追蹤於古之為師者矣慎勿為異端他岐所惑哉竹深處序杭之土宜竹郡人朱景暉環其室種之幾萬竿冒烟雨搖星月戛風飈凌霜雪寒暑晦明動息之變千態萬狀皆因竹以得勝而境益清居益邃忽若不知塵􅅝之紛聒也景暉時與一二佳客往其間商確古今道理誨子孫以孝弟廉恥禮義之行治其家以勤儉整肅人倫内外之防脫去習俗之浮靡一還古人之淳朴盖皆自於竹深處思而得之非若昔人有以放逸自髙者往往恣肆於茂宻之間或以博奕翫好為樂或以酣飲歡呼為達否則溺意於詞章圖畵字書技藝之淺事而不知天理人倫之大道甚矣其皆非中庸之行也是豈景暉之用心哉監察御史謝君衡景暉友也常造其處而得景暉之議論知其必有可取者因求文於余遂書此以還之使知所擇焉贈汪徳容致政序少而仕老而歸此人之所至願也至於歸而又得奉其親以盡桑榆之樂又豈非人之至願者歟四明汪徳容先生博學耆徳模範元氏之士子者十餘年士子賴其追琢造就之益進而登仕版著能聲者累累焉繼而陞秩王府教授則又輔翊世子以正道官屬咸推稱之今以年至請於朝得致其政而歸監察御史曹君習古先生友也來徵文以贈之余謂先生遭國家熙洽寧謐崇尚斯文之時而得列清秩著顯蹟被榮名饗厚福者數十年其於少而仕可謂盡其道矣逮兹耄老荷朝廷優渥之恩冠服偉然去歸故鄉於老而歸又豈非得其義乎先生已白首而其母夫人年滿八十尚安好無恙今之歸又將具甘㫖節寒温左右就養怡愉其志欣欣焉愛日之誠盖有不能已者其樂又何如耶雖然先生始終一節得饗全福固為儒者之至幸然又足以見我國家深仁厚澤涵煦之久使凡為人臣者得以從容遂其進退之義尚論治平之氣象又當於此而觀之是為序絳州知州王汝績輓詩序孔子疾沒世而名不稱焉盖謂無為善之實可稱於後世雖聖人猶疾之也然則世有君子雖沒世而猶為人所思慕詠嘆之不已得不謂之賢矣乎金谿王汝績知絳州九年能節儉以自律興學以勸士去弊以養民禱神以弭灾與凡政之善者大小具舉故其任滿將去而小民相率連狀欲保留之不可得則相與刻石以紀其政蹟不獨恵在絳人者久而不忘及汝績既沒而中外士大夫素與汝績交好以及樂道人之善者亦皆作為詩歌以哀述其善行類若古輓者之辭著於集者凡若干首長篇短製渾厚流麗皆足以傳世行後使後之人諷諸口而感於心因以得其實而慕其人則汝績雖沒世而名愈彰者得不亦有賴於此乎汝績二子政佐皆從余學故余知汝績尤深既為備述其行已為政之蹟表諸隧道之石又為序其詩歌哀輓之意以冠其集之端送刑部鄭侍郎序景泰五年夏南京刑部左侍郎鄭景陽以三年秩滿來朝京師既而將歸秋官内臺洎大理諸大夫與景陽厚者咸屬余言以贈之余與景陽為辛丑同年進士景陽為給事中余亦濫官御史後景陽陟亞南京秋官余亦出入外臬大理中間契濶者久之前年冬余又承乏南京大理復得與景陽㑹旦夕過從談經史道舊故懽然無間未幾余復承召備員于兹而重得與景陽㑹夫以同登仕三十餘年之離合如此於景陽行烏得無情士大夫雖不有屬固宜有言以為贈景陽舒人也質貌魁竒性度宏厚少即聰敏過人其尊府侍郎公知其有立也既嚴家庭之訓尤擇善師友使從之逰以講貫礱磨為學行已之道治經之暇尤肆力於史學嘗聴其論既往年代之久近而出不窮若崑崙發源而洪流東注也其論前世人品之正邪而見甚明若巨海涵秋而纎毫畢露也與夫國統之分合書法之抑揚禮樂刑法天文地理之志凡史所當載者莫不挈其綱而振其目間出其餘為詩章亦清新古雅渢渢乎有作者之遺音景陽以如是該博之學故自縣庠弟子員發迹擢髙科官近侍貳秋官事業聲譽與時俱流景陽亦榮遇矣哉景陽初為右侍郎九年轉為左侍郎今又三年矣其學行宦業老成練達允為時望今又來朝也班行之間咸推為偉人碩士而三法從諸大夫尤重景陽之為人故於其行皆不能無眷眷之情是又不特余與景陽有同年好也復有論景陽之去者曰方今聖天子作新政治以得人為急而尤重老成若景陽者真其人也獨不可留以輔理耶余則曰南京為國家根本重地自北視南猶有周視鎬京之與成周在昔保釐尚重其人況南京畿甸以及列郡刑獄之繫皆於其秋官是詰是治是理庶獄清而民心樂則和氣應而有以培固國家之根本景陽之任又豈不重且大邪雖然景陽之在南京也久矣而明刑之績已著於秋官今兩京大臣更迭任用自其常事他日在廷列卿大臣或有缺又焉知景陽之不入賛大猷邪余以諸公之屬既述與景陽有同年之好且備道其學行宦蹟見重於時而又書此以需其或入賛大猷又將樹偉績於當時垂聲光於無窮云廖氏族譜序自古宗子之法廢而世之人類不知所自來往往親未盡而相視如楚越者有焉故士君子有志於復古者必脩其族譜紀世次序疎戚使其為子若孫者得有所考據而知所自來雖五服之漸窮亦不忘水木本源之義而親有未盡者益敦其孝敬慈愛之心此族譜之作亦古宗子之遺法而有闗於家道人倫為甚重也大理少卿廖君安止慮家譜之弗脩無以紀世次序疎戚垂子孫而後世慈孝之風薄乃㫁自始祖以下至於九世列為經緯譜而成書尤必冠以處州廖於譜端者所以推原漁梁之廖所自來以其世代寥逺故書之也略而必起自漁梁之廖為本祖者所以著其世之所自始以聞見所及故書之也詳故即其始祖以下二世以至九世宗枝聨屬整秩不亂如水之有源而脈絡分明如木之有榦而枝柯散達雖自親以及疎漸殺而漸薄然其一氣之流貫則不以疎戚而有間使廖氏之後疎而漸殺漸薄者得而觀之尚能遡流知源循末知本而興起其尊祖之心不忘其親親之意況親且厚者乎是則廖氏之門仁孝之風無間於久近而常存者實有賴於斯譜也安止是作實有得於古宗子之遺法而増重於家道人倫之大矣安止為人坦易寛厚好學不怠自擢進士為給事為大理議論獨能識其逺者大者余嘗與之同官知其為人尤詳安止家譜脩葺既完書來求為之序余既備論其作譜之意於前又附書安止為人梗概於末將使其後之人又知安止用心仁且賢而或有所景慕觀法而益光大其譜牒益振立其家聲於久逺云劉太孺人輓詩序太孺人姓郭氏諱妙清髙祖允明仕元為總管曽祖啓誠韜光弗輝祖徳仕元為萬户父能亦晦跡不仕比四世皆為滁人仕者行其義於時處者脩其行於家皆以積善鍾慶於太孺人故其生而端靜長而柔娩且閑於女教女儀女事擇所適從遂歸於贈兵科給事中橘菴先生劉某為繼室給事先娶李氏生四子曰安道守道存道全道暨女二人太孺人生子清于時諸子女皆幼太孺人裁節飲食衣服撫育慈愛咸適其均人不見其有絲毫疎數厚薄之異以是太孺人尤得善譽於宗族閭里間其後安道守道以醫業將從事於臨棠太孺人謂給事曰君二親皆髙年我當留滁以奉事君可自從二子以往給事以太孺人言為然遂留太孺人偕餘子於家獨與二子行太孺人竭力孝事舅姑年皆逾八十以天年終凡所以送終棺椁衣衾安厝祭祀之禮靡不周備既而太孺人乃盡出其所有付存道全道二子曰爾祖妣既沒葬已襄事我將往汝父汝輩宜以此勉立生業勿墜遂赤手攜子清至臨棠時臨棠事有異給事已覺其㣲太孺人亦勸給事戒其子宜慎靜晦處後竟免大咎獲戍遼東太孺人隨往戍所凡數年艱厄備嘗而太孺人所以克相給事教飭諸子治生業處患難莫不有法故雖在流離窮困中夫婦父子亦相與泰然安於義分不失其正既而給事例以年至偕太孺人攜諸子得歸鄉里給事雅知子清器識不凡太孺人因勸給事遣入滁學從良師友讀經史講道理求所以脩已治人之術數年清竟以學有成就中鄉舉登戊辰進士第又以材俊選為翰林庶吉士授兵科給事中復以智略為知者推薦内以協賛軍機参預宻勿外則叅理戎政殄㓕叛苖事竣還朝䝉恩特陞刑部右侍郎時給事沒已久其贈官與太孺人之受封皆以侍郎為兵科給事中時之秩推恩焉先是侍郎還自貴州道滁奉太孺人來京師就養方且左右承懽日如不及竟以景泰五年十二月十六日疾卒于官舎饗年八十有二矣朝廷既遣禮官致祭侍郎又將奉其柩返葬於滁之北原朝之士大夫與侍郎交游者咸重太孺人為女而克著其賢為母而克盡其慈為婦而克盡其孝為室而克盡其道不惟窮通一節灼灼在人耳目而又相其君子給事公教子有立皆荷國家貤恩有勑命之榮有品秩之貴有褒祭之典其可謂善始善終者矣既相與走吊賻祭又作為詩章將使輓者歌之以相侍郎罔極之悲以發揚太孺人之善於久逺篇什既多編為巨帙余遂序其事於首簡云送王都御史致政序右都御史王景暘奉勑出鎮河南之三年為景泰五年春乃上章引年乞歸詔允所請遂遄驅詣闕拜恩且行有日矣一時同逰法從謂余宜文以道其行猶記景暘為秋官時余亦濫職内臺景暘為山東憲副余先已承乏僉憲而官舎又與景暘為隣余固知景暘之為人久矣厥後余以大理少卿罷歸西河與陜右相接時景暘又自陜西憲副陞布政使轉副都御史余亦起家丞大理復與景暘㑹京師是與景暘為交舊矣今景暘以都憲出鎮河南得致政之命拜恩闕下將去歸其鄉余又適備員大理以數十年之交㳺離合固宜有言景暘少以俊拔之才擢髙科躋顯仕清庶獄於秋官振風紀於憲臬以至旬宣之有恵與今出鎮之有能四十餘年之英聲美蹟固已赫赫在人耳目余皆弗贅獨惟進退乃士君子之大節古固有建豐功偉績於當時而猶或耽嗜榮禄於晚嵗不能剛果引退者亦未免為清議所少景暘乃能以六十之年即自引去無分毫顧惜其賢固加於人一等矣況我聖朝著引年之典所以優耆英養恬退立人臣節義之大防者超出千古而景暘乃能欽若國憲乞老拜恩而去其又可謂得人臣之義矣雖然士君子少而進固有為老而退亦有為也景暘自筮仕以來敭歴内外事功顯著進而有為固歴歴可稽今其退也又當老其學老其徳皆足為鄉里小子後生之儀則使居家者有詩書禮義之風入官者有忠貞廉介之行則退而有為又有在也送趙都指揮協賛序聖天子中興景運文徳誕敷之餘即大詰兵戎分京師操守之士為十營營各有督將總其綱恊賛貳其事皆特進之選景泰五年春果敢營恊賛員缺詔於諸將中擇有才畧者以充之夏官以山東都指揮僉事趙弼良佐者累世將家以名上詔允所請良佐即奉命往賛其營之營之日督將安其賢士卒服其畧營中之事大和其姻友王昌問來求文以序其事余亦識良佐之父於十餘年前且知良佐舊矣良佐之伯祖徳勝公佐太祖髙皇帝芟除羣雄混一四海以功封梁國公享祀功臣廟其祖亦以功任都指揮父任邳州衛指揮陞山東都指揮卒良佐襲授濟寧衛指揮使後為知者薦陞前職遂領士卒分番操守京師良佐雖四世將門生長驕富獨能折節讀書廉靜少欲自奉如寒士視膏粱子田園之利便財産之豐殖是務第宅之崇廣衣馬之鮮好是尚洎夫迷心於珍竒難得之貨溺意於妖翫妨行之物良佐皆能脫去其好而輕之如鴻毛故才畧雖良佐所素習而立行超卓尤為士大夫所稱重是以連被薦擢有今兹恊賛之榮駸駸乎重用其可量哉夫今兹之恊賛他日之重用皆將業也世之擇將者類皆以韜畧才勇為先余獨以仁義為將之本夫能使士卒親之如父母投之所往不避水火而無堅不摧者仁義結其心也不然韜畧雖長其如士卒不同心何才勇雖長其如士卒不同力何如此而欲成將業也難矣良佐能折節讀書儉於私養而脫去膏粱利欲之習庶幾乎知仁義之道矣能由是深求力行以推之於師律必思東征之若何而恤其勞苦古人之若何而受命不問家事若何而庫廩不有餘積若何而分賜不入私家若何而志㓕强冦何以家為若何與下人同其甘苦若此之類悉以仁義之心推行之不怠即自今兹之恊賛他時之重用無往而不得士卒之親愛如是而輔之以韜畧才勇于以行師也其重如岳峯其整如列星其疾如飈風之不可遏浩乎如江河之流行雖甚勁者亦將仆㓕之不暇折衝禦侮殄冦安民隠然為時望將業由是而可成哉受封當時垂聲竹帛不惟有以仰答聖朝選將錫命之榮抑且有光於前烈多矣良佐其尚知所本勉於今而需其後是為序贈太子少師兼工部尚書江公序士君子之所以見重於當時可垂於後世者豈徒以歴顯職負顯名而得於衆人之所樂得者為可貴哉盖以職雖顯而有能以舉其職名雖顯而有實以稱其名故其卓越俊偉之事功見重於當時可垂於後世也茍徒以得衆人之所樂得者為可貴而無其實以副之果足以見重於當時可垂於後世乎今太子少師兼工部尚書江公時用自其先大夫歴官大叅時已自講明聖賢有用之學於家庭其後學益進行益脩才益充遂登庚戌進士髙第即入翰林為庶吉士旋任編脩繼陞侍讀在翰林者久之正統十四年秋超拜刑部侍郎未幾轉戸部侍郎又轉吏部侍郎兼翰林學士復入翰林景㤗五年冬仍以太子少師兼冬官其鄉人之官翰林者合凡交逰偕來徵言以為贈余惟翰林為近地列卿為要職少師為重望今之顯職顯名孰有過於此者乎迹江公之歴此職而得此名也其始入翰林綽有著述討論之能聲及超拜秋官值邊吏報警詔公督師近郊以時殄勦公即戎服鞭馬赴師籌畫方略而動合機宜號令行陣而應時整肅由是將士莫不出竒奮勇爭先摧䧟而遇之者方奔北之不暇遂追逐餘㓂盡境而還又被璽書行視山右邊闗所至措置有方邊備大飭既還轉職兼官復入翰林公既居論思之地大能以扶進正人持守正論恢廣正道為己任既又奉勅巡輯河南山東兩淮乃退貪猾表循良便民之政莫不脩舉又大發所在儲粟以賑活窮饑招集流散使還其土由是中夏東南方數千里之民莫不欣欣然樂生興事以感朝廷一視之仁還朝未久遂陞兼今職而冬官之政又日益脩舉矣以是而觀則公之歴顯職而得顯名者豈徒以得衆人之所樂得者為可貴哉盖能隨所居而舉其職有其實而稱其名宜其俊偉卓越之事功可重於當時可垂於後世也雖然古之君子雖有卓越俊偉之事功皆以為人臣職分所當為無一毫之自滿今公既得顯仕顯名而有其實其卓越俊偉之事功殆去古人不逺矣其必皆以為職分之當為既不自滿又愈勵其能篤其實一念不忘乎忠國愛民之心則方來之豐功偉績益著於當時垂光於後世者又可量乎哉是為序並蔕蓮詩序南京兵部尚書南郡張公志忠以書來曰正統戊午某以監察御史陞行在都察院僉都御史旋奉勅澄汰南京各道御史舉職者留鰥官者去遂即任南臺以蒞事且奉勅兼督操兵正統丁夘夏臺前池荷盛開有並蔕結實者觀者異之明年為戊辰某朝京師遂䝉恩陞右副都御史俾還南臺景泰二年辛未夏池蓮復有並蔕如前者是年冬復被朝命即陞今職叅賛機務某私驗之凡三陞擢皆先有並蔕蓮之兆意者物與人事或有相應之理乎某既自賦詩紀其事士大夫之能詩而屬和者甚衆聨為巨帙焉某與子為同年且相好也丐一言以序其端且使某益勉所當為而荅此嘉兆余惟人與天地萬物之理流通往來初無彼此之間隔故作善降祥如影響之出於形聲亦無毫髪之差爽是以獲榮名之報者必有徳善之積而致諸物之和物之和兆於先而榮名隨其後此理之必然也志忠以名進士官御史由僉都四陞而至兵部尚書位列司馬為六卿之極品然其毎一陞擢必有嘉蓮之兆豈非以徳善之積而致物和以物和之兆而獲榮名之報乎且志忠敭歴顯要將四十年既總風紀又職戎政其存心處事一以恵愛為本嘗議江北軍士越江來操者有資粮乏絶往往私乘小舟渡江以取粮類多遭風濤覆溺而死不若使就操江北既便於粮餉又可以備南京之藩垣且免人於溺死事雖弗克遂行而其籌䇿之良愛軍之心可知又行其議於南京出官米煑粥以食餓者而所全活甚衆恵雖不及逺施而其恤民之意可推嘗選用帥長有非其人而欲幸得者則執議以謂用此人必害此軍衆莫能奪其議而其人卒不用凡有所論列皆軍民利益事多施行又聞其先在鄉里能出所有以濟饑民相傳為故事志忠之大節灼灼可見者如此其餘小者可知所謂徳善之積致物之和而獲榮名之報夫豈偶然哉雖然古之君子以盛徳而居顯位者徳愈盛而心愈下位愈顯而心愈謙志忠以徳善之積而致物和獲榮名固為可驗尤望其不以物之和為可喜而愈脩其徳不以位之顯為可樂而益勉其謙將見徳善之感殆無往而不通事業之脩又與位而俱盛雖古所謂歸禾之書彛鼎之銘亦可馴致其榮名偉烈將垂之無窮又豈特兆和於一物位顯于一時而已哉是為序送按察使黄公之任序聖朝内設都察院為四方之風紀外設按察司為一方之風紀内外風紀舉得其人百僚以之澄肅庶政以之脩舉而政治隆焉故凡選用其人必於科第有學術時望者以任其職而雜才不得以濫預之至於都憲按察之長又必推老練知大體者為之而非新學驟進者所得致是以按察使雖為内臺所轄而實相與為表裏擇是人而居是職不亦重且難哉景泰六年夏四川按察使缺員詔吏部擇其人以任之吏部遂以廣西道監察御史黄公溥名上詔允所擇遂陞前職將行監察御史髙明合凡交逰來請曰溥字澄濟江右弋陽名家之子由進士任御史將七年今兹膺峻擢而有外風紀之重寄求一言以為贈予亦素知其賢不辭而為之言曰外按察司既為一方之風紀庶官之澄肅庶政之脩舉皆係焉澄濟公當若何而盡其職哉然按察御史一體也澄濟公為御史時獨能知大體急先務而不掇拾人之小過不毛舉時之細事其巡歴四方所至能表抜廉良之吏而黜罷其不職之尤者使人得自新効職而不以察察為明與凡利有所當興害有所當去政有闗於時者莫不條陳次第施行之尤能廉公正大自持而為振舉風紀之本由是聲稱大著於一時而有今兹之峻陟今之往也但當充其所以為御史者以施於川蜀之間即一方之庶僚為之澄肅庶政為之脩舉聲稱將日加於前時矣且聖朝簡用在廷之臣往往於方面藩臬中有操持有施設有聲蹟者取焉澄濟公乃篤古好學之君子今之為按察也固能安於所職而無幸進之心然將來川蜀之風紀振舉而聲稱日既洋溢余恐内外公論自有所歸而入膺重用殆不可辭又將樹偉烈於當時垂休聲於悠久夫豈止於専一方而不能哉是為序慶留耕張處士壽誕詩序崑山有處士號留耕者姓張氏諱稹字廷秀實吳中名家子少能安於恬退治别業於淞南課僮僕耕稼其間暇則賦詩鳴琴以自適澹然與時無競盖有肥遯之趣焉且其資性既端良明敏又濡其先世積善行義之澤尤能以孝敬之餘推而為友愛之實廷秀有弟二人曰和曰穆俱有清通温粹之稟廷秀既以家庭相傳之教啓發而薫涵之又為之擇賢師友使從之㳺以講貫聖賢之學由是和穆兄弟大有進遂以明經習舉子業同登乙未進士和又名冠二甲一時翕然有機雲並譽軾轍齊名之稱既而和任南京刑部主事穆任刑部員外郎雖兩京宦迹相望而毎念得以致此成立者皆由其長兄廷秀之賢之教未嘗不詠兄弟既翕和樂且躭之詩而馳情於吳中也今年夏和以考績來㑹穆於京師連床聚首之際相與言曰今兹嵗在乙亥七月三日實為長兄之初度春秋盖五十矣吾二人者既限於所職不得連袂接踵奉觴上壽於家庭中情悵怏曷以自宣重念際兹明盛之世而文運聿昌士大夫之以詩鳴者渢渢乎有隆古之音誠得其長篇短製聫而為巻寄為長兄壽將見諷詠之間金石鑑鏘律呂諧和庶有以慰長兄之懷而吾二人者亦得少紓馳想之私也乃相與遍求名公之詩歌得若干首既録在巻則偕來請序其事於巻端余惟兄弟之友愛乃天理人倫之至但克知克盡者既寥寥而又或為利欲所撓而暌乖焉如和穆二君子既不為利欲所撓而暌乖又克知克盡不忘其兄之友愛教誨乃能求賢士大夫之詩歌以為壽誕之慶其於天理人倫之厚為何如吾想其兄廷秀展是巻也誦是詩也益知其二弟雖道里遼逺而厚於天倫之情則不以遼逺之故而有間殆將又因詩而益興起其友愛之心推而為一鄉一邑之仁愛矣孔子曰仁者壽廷秀既篤於仁愛則自厥今五十之艾等而上之至於耄至於期饗永年之福又可量乎是為序送大理寺李少卿序孔子稱晏平仲善與人交久而敬之盖以常人之情交久則敬衰交久而敬不衰所以為善此晏子所以見取於孔子也今南京大理少卿李公在大理時與余同官者五六年矣交愈久而敬不衰李公不特與余為然凡在同官莫不皆然及今兹有南京大理之行同官諸公皆有戀戀不舎之意且謂余交且久宜有言以道其行夫交友人倫之一而敬則能久推之他事又何往不以敬為本乎李公由名進士始官廷平歴陞大理寺少卿以學問之淹貫推而為讞録之明慎凡事有可者即行之果而無所疑有不可者必虚心平氣精思審處兼取衆論以求至當之歸盖皆以敬為本而不敢易其事也以故忠厚老成明允之譽大彰徹于時考察南京百司之賢否審録南京法司之繫獄皆重事也而李公特為聖天子之所簡知前後兩奉勑以往考察既允愜於公論審録又克盡乎詳明及歸奏悉䝉聖天子俞允施行今之往也其素望已表表在人之耳目吾見其到官也又能推其平日交友任事之敬必謹必恪必明必允無一事之少忽行見南京法司以洎東南列郡武衛之庶獄莫不燭其隠而得其平其老成忠厚明允之譽又將愈盛於前時他日入躋重用宏大所施者又可量哉余儕始重李公得交友之敬者乃其善之一端至推而為立身行事之顯赫如前云以及將來者則敬之效殆未可以涯涘窺也是為序杜安人輓詩序安人姓楊氏成都人金堂處士楊湧之女也安人生有貞靜之性工於女事閑於禮教處士尤所鍾愛嘗曰是女也質巧之徳特異衆女吾不與凡子必擇才可配者妻之今封刑部主事杜君榮與處士為邑人時方年少性度温宏行止端謹雖生於大族富家不為矜驕俊爽華靡逰娛世俗子弟之態在家孝弟恭遜凝然如老成人處士知其為賢子弟遂以安人適焉安人入主事君之門盥饋而舅姑胥悅在室而娣姒交慶克相主事君孝弟行於家庭行義著於鄉里而教道及於子孫時主事君二兄早喪安人偕主事君鞠二兄之孤憫愛保養不異已出安人得鄉人之棄女育之長之具装奩為擇所歸鄉人不知其為養子安人生子五人曰勝剛曰勝海曰銘曰勝能曰勝拳而銘少有聰敏警悟之資安人偕主事君既嚴義方之訓長使為邑庠弟子員從良師以講貫經史子籍習舉子業遂領鄉薦登乙丑進士髙第初授刑部主事今遷郎中階奉議大夫銘方為主事時得荷朝廷推恩之典安人與主事君皆以子貴授勑命之封冠帶命服具慶在堂光耀里閭人咸羨之景泰六年銘奉勑有事貴州便道省二親于家主事君安好康寧而安人病適危殆安人顧銘曰吾與汝暌違幾年且懸隔山河數千里不意垂終而得一見豈非天耶且死生命也毋足道汝能孝以事父忠以報國廉以持身公以處事仁以愛民深思吾與汝父教汝成立艱難使無一行忝所生吾雖死亦無憾矣汝勉之安人言訖怡然而逝是年八月十八日饗年七十矣遂以明年某月某日葬于邑之蟠龍山之原於戯安人為女為婦為母柔良慈孝之行皆可法式遂得生有勅命之封沒盡附葬之禮不惟其善名揚播於川蜀閭里之間雖朝之搢紳士大夫與安人之子銘逰者亦皆哀安人之懿行可法而遽爾長逝遂相率作為詩章使輓者歌之將以發安人之徳之行於永久以相銘之哀於罔極篇什既多萃而為編予遂述安人之始終大畧以冠其端云送蕭都憲公賜誥序景泰七年冬僉都御史蕭公以病乞歸行有日刑部大理諸交逰謂余宜有言以贈之余猶記往年與蕭公同詔至京師時額森假息荒外頗肆鴟張方簡用智謀重臣鎮守城池以彈壓之蕭公遂以山東按察僉事陞都憲奉勅鎮守河間適兵退城堞傾圯武備廢弛公至之日即親巡視指授文武將吏方畧使率士民量工興事曽未幾何即城池樓櫓髙峻完固武備大飭隠然有敵愾不可犯之形朝廷知其有能以居庸尤為防遏保障之重鎮詔公徙居之既而邊備大舉外警屏息遂命公巡撫山西察吏治得失以安方岳之民則又振揚風紀肅清庶僚不數年政舉民安山右稱治公既連奉勅三治重鎮大藩積勞成疾乃曰使外患内警少有未寧吾不敢以疾辭方今朝廷懋隆治政方内清寧四裔賓肅吾在山右不可以無事養疾饕禄自適安逸乃三上章以疾乞歸朝廷輒勉留弗允今年冬輿疾至京師又上章力辭不可以任事朝廷命太醫視疾久未平則又上章懇辭詔乃允所請俾歸養疾於故鄉江西之龍泉公既拜命即戒行有期余惟蕭公自為御史僉憲時已著能聲既而陞重臣任重事所至事業歴歴可紀其辭疾也又當朝廷清明四方乂安之時不敢以疾自安其出處進退可謂賢逺於人矣雖然古大臣之去雖在畎畝之中江湖之逺未嘗一日忘乎忠國愛民之心蕭公既任重職荷朝廷之簡知今之去也尚當以古大臣自期雖養疴丘園其必旦夕拳拳以眷慕闕廷為心以思濟生民為念不可以山水之佳為可樂不可以休退之節為可髙而遂相忘於斯世也矧公之聲實素已揚乎中而播於外行見朝命又將有徵召之期著豐功偉績於晚節者又可量乎哉是為序送王府尹致政序天順元年春順天府尹王惟善上章引年乞歸上允其請行有日其親友禮部侍郎兼翰林院學士許道中合凡交逰賦詩以贈之屬予序予惟少而學壯而仕老而歸斯實古君子進退之大節惟善以篤實之資正大之學中永樂辛夘鄉榜初仕教職繼陞給事旋擢京尹敭歴内外者四十餘年矣迹其所至皆有治蹟其為師也以古聖賢明體適用之學啓迪後進旦夕勤懇不倦士子被其教而登科甲歴仕途著聲譽磊落相望及居近侍封駁議論一出於公道謇然有古名臣風京畿邦屬土地之廣軍民雜處之衆租賦徭役之繁劇而難治倍於方岳外府不可以十百計惟善能潔已率人循理為政干謁之私一皆杜絶事脩於几席之上而人自得於千里之外令行吏畏庶政不勞於文移之督責而自舉府中遂落然無事雖古京尹有聲稱於載籍者殆無以過之惟善尤謹難進易退之義自年未七十時已嘗上章求退至七十累章乞歸朝廷以其年雖老賢而有治才勉留者數四今又力辭不已始拜俞允之命夫以惟善之少而學壯而仕老而歸克全始終無纎毫之玷缺進退之大義誠無愧於古君子矣雖然壯而仕將以有為也老而歸獨無所為乎惟善居鄒魯之邦締姻孔氏飽聞聖賢之遺風今之歸又將尋沂水之勝窮舞雩之樂以詩書禮義之教薫酣其鄉閭之良子弟俾立於家達於邦出處進退皆以惟善為法而能全古君子之大義則惟善雖老而歸猶有及人之功而其聲實之美著於當時垂之後世者為何如哉是為序㑹試録序今皇上膺天命光復寳祚紀元之春適當㑹試之期天下士領薦書而至者盖二千餘人禮部左侍郎臣榦等以考試官請上命臣瑄臣原往蒞其事同考官臣溥臣賢臣泰臣正臣佖臣恂臣世資臣節臣淳臣鏞監試御史臣烈臣鑑暨百執事罔不夙夜祇承凡三試得文之中程式者若干名并擇其文之尤粹者彚而成録臣切惟為治莫先於得賢養士必本於正學而正學者復其固有之性而已性復則明體適用大而負經濟之任細而釐百司之務焉往而不得其當哉故三代小大之學養士之法皆以復性為本其得賢致治之效盖可考矣漢唐以來正學緒㣲養士不本於復性往往溺於雜學術數記誦詞章之習體有不明用有不周雖或有傑出之才亦不過隨所學以就功名而已其視三代之賢才為何如哉至宋道學諸君子出其論養士之法始皆本於復性雖其說不得盡行於當時而實有待於盛世洪惟天眷皇明列聖相繼大建學校慎選師儒其養士之法必以三代孔孟程朱復性之說為本是以九十餘年薄海内外文教隆洽士習粹然一出於天理民彛之正而雜學術數記誦詞章之習剗刮消磨無復前季之陋雖曰科目以文章取士然必根於義理能發明性之體用者始預選列類非詞章無本者之可擬也故其得賢致治之效足以追隆前古今諸士子荷朝廷正學教養之恩既以有本之文得在選列行見對於大廷益當以明體適用自勵隨所器使以忠乎國以愛乎民以賛助皇明重熙累洽之治於無窮俾正學得賢之效有光於前有垂於後顧不偉歟敬軒文集巻十七
