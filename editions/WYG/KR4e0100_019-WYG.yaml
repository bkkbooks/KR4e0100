body:
  text: 敬軒文集巻十九明薛瑄撰記存化書堂記襲封衍聖公孔君彦縉作堂盛積古今書名曰存化書堂盖取過化存神之語以景慕先聖之至徳且以自勵云爾正統辛酉春予至闕里謁先聖退遂登其堂君告予以名堂之意如前所云者且求為之記予惟先聖存神過化之至徳豈易知哉在當時顔氏知之曽氏知之其次惟端木氏幾足以知之及子思孟軻氏沒涉秦厯漢魏晉宋齊梁隋唐之季知者寥寥焉罕見其人至周程張朱四子者作始克探先聖之至徳于千載之上而繼孟氏百世既絶之知而朱子猶謂其過化存神之妙未易窺測顧予何所知而敢記斯堂乎雖然嘗誦先聖遺經以及顔曽思孟周程張朱之言而竊求先聖身心之實矣則其至徳或可彷彿其一二乎盖先聖之心虚靈洞徹萬理咸備而天下之道千變萬化皆由此出但其寂然不動之時初無聲臭可聞無涯涘可測此其所存者神與先聖之耳目口鼻四肢百骸之形雖與人同而踐形盡性則非人所及故其身示至敎如天之垂象凢所經厯威儀辭氣所接即群動無不孚格變易此其所過者化與夫先聖之至徳如是而君以之名堂真知所景慕哉然先聖之至徳非獨先聖有之乃天下萬世所公有者也况君以神明之胄亦既知景慕矣所謂自勵者其可忽乎居是堂讀是書存是心脩是身加之以篤信持乆不息之功將見周程張朱氏之知者不在乎他姓矣山東按察司題名記古者職風紀司諫諍各有其官我皇明有天下凖酌古今定立官制乃罷諫官而以言責付之風紀凢任御史按察者於百司之邪正庶獄之寃疑既得扶抑而伸理之至於國家小大之政生民休戚之情又得條陳其得失而䟽通其壅蔽是其闗擊治道之大類非他比故自祖宗以來著令選任風紀必於端人正士通儒術識大體者取之而雜進之才弗得以厠其間列聖重光咸用兹道今皇上祗若成憲爰自臨御之初即簡飭内外憲臣使各脩其職繼命儒臣考定憲綱成書頒布風紀諸司俾遵行之由是紀綱以之大振庻政為之咸新正統元年夏予自内臺來僉山東憲事又三年為正統四年金谿王公裕亦由御史陞秩憲副嘗與予論風紀之重如前所云者將刻今按察諸公之名于石仍虚其次以俟後來之為是職者并刻焉且屬予記其事嘗觀司馬公之記諫院題名也謂後世將指其名而議其忠詐曲直有可懼者今之選任按察既為國家所重所謂扶正抑邪洗寃澤物論天下之事廣視聽之公闗繫治道之大又非特諫諍之一事而其列名兹石也後之人亦將厯指而議之曰某也賢而舉其職某也否而瘝其官是其可懼殆有甚扵司馬公之所言者矣然則凢我風紀君子其可不自重也夫其可不自慎也夫沂濵書舍記沂舊魯城南水也即曽㸃所謂浴乎沂者水源出平地流而為溪渟泗曲折甘冽潔清可遡可􅆓可酌可飲盖魯地之佳水也曲阜令孔君公堂作室扵其濵盛積古今書於中毎政暇必出逰逰必于是至則水在庭户清泠之聲以潔其耳澄虚之色以潔其目淡蕩之致以潔其心取巻左右俯而讀仰而思天地四時隂陽變化之理古今萬物真常不息之道以至上及邃古禮樂刑政人物世道因革得失賢否升降之由靡不博之扵書約之於心去其非取其是以為脩已治人之資是則沂濵之舍豈徒為觀游宴佚作哉孔君孔聖裔也必不私其所得安得春和景明時尋其室扵清沂之濵讀其書求其志又相與樂古人之樂扵千載之上約齋記約有守約處約以約之不同以約者不自放云耳處約者安儉素也守約則㑹萬為一以一應萬聖賢傳道之器在焉曽子孟子是也山西右布政使楊公嘗治齋居以約名之公自少時砥礪名節以詩經登進士第給事黄門繼為廷臣推薦陞山西叅政三轉而為今職言乎處約公已宦逹矣言乎以約公厯官既乆蒞事滋慎言乎守約公由明經發迹固嘗挹郕鄒之遺風扵三者之義何取邪竊思之公之名齋殆將兼之也恒人之處寒素或不能安履其常而志饕外物者有焉公自為士子確乎不易其操於衆人之營營者無以動其念非能處約之乆者乎自筮仕以至大官謹致其操施而不放非以約者能無失乎二者是固然矣獨惟守約者曽子以是求諸身孟軻氏以是脩扵已施扵人公既挹郕鄒之遺風寕不知探其閫而發其㣲乎明㑹萬為一以一應萬之妙謹脩其身于以著而為忠貞之節形而為旬化之政施之無往不可俾大賢事業偉然見扵數千載之下則郕鄒之風豈徒挹之云乎哉若然則彼二者特守約中之一事耳予故曰公之名齋殆將兼之也唐文學舘學士畫像記四川大叅楊公伯玉家藏唐杜如晦以下十八人畫像一巻各著官爵姓字里居與夫賜品服年嵗并題賛于其左盖太宗為天䇿上將時文學舘十八學士也當髙祖武徳四年太宗以四方冦亂漸迄削平意嚮儒術故置是舘扵宫側以杜如晦于志寕蘇朂薛收盖文逹薛元敬房𤣥齡李守素顔相時蘇世長虞世南孔頴達姚思㢘禇亮蔡允恭陸徳明李元道許敬宗十八人并以本官為學士收卒後以劉季孫補之且命為畫像題賛藏之書府即世所謂十八學士登瀛洲者是也夫瀛洲異書以為海中之洲非仙者莫能到世以得學士之列者若登仙然當時後世孰不企慕之哉夷考諸人始終行事或以相業稱或以經術顯或以忠直著節或以清白砥操與夫文學之長字書之能雖其賢才有大小之分然皆不失為士之行可謂無愧扵登瀛之喻矣獨恨一許敬宗後來以奸言誤主貽禍宗社生靈為唐室之巨賊大蠧而亦得以與此清列何耶且太宗英主也自以十八人者極一時之選矣而猶不能察敬宗之奸邪知人之難固如是哉後之人但知循襲舊迹以敬宗與諸君子並為圖像而品題之然邪正不分賢否同譽何以示敎謂宜作此像者當削去敬宗官稱題賛直以名目之而諸君子之像賛官爵自仍其舊庶幾觀者有所感激懲勸亦世敎之一助也永思堂記人子生扵親之膝下方其幼也其親出入顧復惟恐驚之癎之飢之渴之盖未嘗須㬰㤀其子之身而欲其安也及少長也其親誨諭諄悉示之以孝弟忠信之道陶之以詩書禮樂之方未嘗一念㤀敎其子而欲其入於善也逮其成立處於鄉則欲其子以賢行自著仕於官則欲其子以忠亷自脩是其親之心又曷嘗一日㤀愛其子而欲其始終有所成就哉親之恩如是故其沒世雖逺人子之喘息呼吸即親之遺氣人子之身體髮膚即親之遺體則所以追念其親之撫摩保愛敎誨期願之恩而惻愴悲思之情出於中心之誠自不能㤀扵一息之間與子之身相為始終者是乃天理民彛之至非由外鑠也詩人所謂永言孝思者殆以是歟楊君伯玉江西瑞之髙安人也自在鄉里時已失怙恃每撫遺體感遺氣而追念其二親撫摩愛誨期願之恩泫然憂悲不能自已因取詩人永思之言以名其所居之堂其後伯玉登進士第為御史為按察僉事累官至四川叅議所至官舍必寓以永思之名所謂惻愴悲思之情出扵中心之誠無間扵一息與吾身為終始是乃天理民彛之至者伯玉白首不渝焉其可謂能踐永思之孝者已伯玉兩任風紀荷國家推恩皆得贈其親之官如已之秩榮賁泉壤光動里閭伯玉又足以遂永思之情矣今叅議九年秩滿前後居顯官者三十年所至必舉其職而無纎毫之玷是皆自永思之孝擴而為事上之忠既忠且孝有子如伯玉雖其二親亦可無憾於九原而是堂之名亦將傳之永乆于是乎書蒲州重脩廟學記蒲州廟學得州治東南爽塏之地爰自皇明混一寰區武功既偃文治誕興而廟學實肇建焉今嵗月寖乆大成殿以及兩廡門宇厨庫棟楹杗桷盖瓦級甎丹堊圬鏝悉有腐橈穿漏漫漶缺落之處殿之規制亦迫扵庳隘每春秋釋奠鼎鉶豆邊几案羅列前後稠匝周旋執事殆不可容薦祼興俯不中法式行禮者病焉咸寕張公㢘初以鄉進士累官節判是州未幾民皆安其政之良適州缺守吏民則相率狀其績于朝遂就陞知州事念廟學實國家崇建敎道人才所自出關繫甚大一州之政宜莫先焉為郡而不此之急其何以仰副國家崇重之意即謀諸寮佐量功度費鳩工取材以訓科辛致老人王景叙董其役廣大成殿為間者五東西廡門宇厨庫悉易其木瓦腐折破壊者丹堊圬鏝之弗餙者新之作始於正統十二年二月訖功扵七月百需之出公處之有方民不知費而廟宇落成又視師生堂齋退息庖藏之舍有敝漏者有狹小者將次第完脩而改作之郡博張璁司訓杜翀栁儀以書來求為記其事竊觀春秋凡用民力雖時且制亦書見勞民為重事也當時魯僖公嘗脩泮宫矣而不經見者以學校為政之先務雖用民力不可廢也今郡守張公新理廟學而且民不告勞其知為政之先務者與昔之為吏者類皆以簿書期㑹為急扵敎道人才漫不加省甚至崇廟貌以徼福扵滛昏之鬼侈私居以肆志乎宴安之樂視公之政為何如公他政之善尤多扵此見其大者云遊草堂記景泰元年九月二十五日僉都御史李匡約予洎大理少卿張固監察御史羅俊同為草堂之遊草堂乃唐杜甫子美避地蜀中時裴冕為作扵浣花溪者子美詩所謂萬里橋西一草堂是也當時之草堂廢已乆矣而後世作堂以象之者則累累不廢焉至蜀獻王崇尚子美之忠賢一新其堂且刻子美蜀中諸詩扵板以示景行前哲之意每歳時良辰勝日蜀之衣冠士庻與夫戴白之叟垂髫之童皆知草堂之名而出遊其地人物車馬雜遝道路至填溢草堂不能容由是草堂遂為蜀中之勝跡雖朝之縉紳大夫有事扵蜀者亦必至其地焉予與李張羅四人者皆以事在蜀既為斯約是日早出中和門度萬里橋循錦江西上時霜降水落江流之湍急鏘鳴金石者有以清人之耳其洄澤之澄碧涵虚者有以清人之目與凡近岸之踈篁折葦逺波之浴鳬飛鷺皆足以娱心意而供出逰之觀西行可五六里有橋曰遇仙過橋有宫曰青羊乃道家者言老子降扵蜀青羊肆云後人因即其地以為宫宫西行約一里過溪橋有曰草堂寺者盖因子美之草堂而得名也寺西行僅半里門扁曰杜工部祠以子美嘗為工部郎故以是扁其祠云入門有堂三間以奉子美之神後有中堂三間以為逰者宴息之所最後有堂三間覆之以茅盖象子美當時之草堂也予四人者相與觀子美詩刻中有所謂雪嶺錦江者盖皆在今草堂之西南然江山雖如故而詩中所詠當時之物盖有不同者矣方徘徊間四川藩臬都閫諸公皆至具小酌中堂有絲竹之聲以侑酒焉酒半而起還過青羊宫復留小酌至暮而歸予惟子美草堂不過江村一陋室耳今去唐垂千餘年當時之草堂已化為塵土而荆榛矣後世作堂以象之者年愈乆而名愈新是豈徒以子美詩之工而凌跨古今冠絶百世哉盖唐至中葉為女子小人蠱惑君心竊㺯權柄紀綱大壊逆賊横發黄屋出奔四海潰亂其人臣平日戴髙位食厚祿號為親信而近幸者率多頓顙賊庭受其偽職子美在當時一布衣耳亦嘗陷賊中乃挺然無所汚其視失節之臣已不啻麟鳯之與犬豕矣及其㧞賊中赴行在肅宗拜拾遺未㡬竟以直言去官乃客秦州入隴蜀遂寓居草堂適嚴武鎮蜀奏為檢校工部員外郎或去或來不離草堂者僅五載焉夷考子美平日所作諸詩雖當兵戈騷擾流離之際道路顛頓凍餓之餘其忠君一念烱然不㤀故其發而為詩也多傷時悼亂痛切危苦之詞憂國愛民至誠惻愴之意千載之下讀之者尚能使之憤懣而流涕感慕而興起則子美之忠終始不渝又如此非特不汚賊中之一節為然也夫忠在人心乃天理民彛萬世之所同故後世慕子美之忠則慕其為人慕其為人則併慕其所居之室此子美之草堂所以屢興不廢而名永長存也且自子美草堂以來以全蜀之盛厯代之豪族富家髙甍巨桷歌䑓舞榭蔽雲日而出風雨者不知其幾萬億室也今皆消滅泯盡寂無名稱獨子美區區一草堂而為後世之所景慕興葺逰觀愛賞之不㤀名將與天地相為悠乆孔子所謂誠不以富亦祗以異者子美殆近之與嘗讀子美詩有所謂百花潭者今訪諸草堂之側無此潭豈歳乆而湮塞歟獨浣花溪在今草堂東北即青羊宫西來所過橋下溪是也時同遊者布政使張惠按察使茅椎揚僉事劉福都指揮李榮周貴㢘恭藩臬都閫共六人其餘文武將吏甚衆不能悉書榮飬堂記榮養堂者劉君崇善飬親之堂也劉君為監察御史時凢任京職者皆得分其在官之俸扵故鄉以養親劉君遂如例分俸扵閩之建安以為二親之養人皆以此俸朝廷之賜而劉君之二親乃得月受之官廪以饗其賜榮莫大焉故名其二親所居之堂曰榮養中外士大夫之能為文辭者咸作序記詩歌以美之聫為巨帙焉景泰元年冬予以事在蜀劉君適自御史陞四川按察僉事間以其帙求為之記予惟人子難得者具慶尤難得者以其祿逮養也故曽子有曰吾及親仕三釡而心樂後仕三千鍾不洎吾心悲豈非以人子得祿逮養者尤為難乎劉君種學績文既取進士髙第始仕即得美官身既顯榮其二親皆安好無恙遂分俸以養其親既具慶而又得祿以逮飬人子之難得者劉君得之有曽子之樂無曽子之悲者其惟劉君乎其御史秩滿復荷國家舉推㤙之典封其父如劉君之秩封其母孺人榮名命服皆朝廷之賜而劉君二親身被其賜又豈非榮飬之尤大者歟劉君今復陞秩僉事自是以徃沐朝廷之寵錫方源源而未已其所以榮養其親者又可量乎雖然劉君得祿秩以榮飬其親者皆由扵秉公忠勵清白以盡臣節也使臣節有一未之盡則雖有祿秩以榮養其親人將議以為幸而致雖親之心亦有不安者矣劉君尚益勉其臣之節而無所不盡則其榮飬其親者不惟有以厭服扵人之心亦有以安慰其親之心是堂之名將傳之永乆而榮其親於無窮矣澹庵記澹庵者楊君伯玉退居之所也伯玉發身科弟為監察御史為按察僉事累官至叅議踐厯顯要者三十餘年官榮祿厚所欲可求諳悉世味也多其非澹也明矣而以是名庵何也葢澹者寡欲之謂也伯玉為士子時已自以澹名庵而自勵其學迄今通顯所至官舍必寓以是名而不易其志誠以士君子立心之要莫要於澹而寡欲也寡欲則世味焉得以移易其志哉且貴顯富厚聲色滋味皆世味之可嗜者也古之君子貴於時富於時雖勢足以備所聽之聲窮所視之色厭所嗜之味而莫不饗之有節用之有制不為富貴聲色滋味之所滛溺者澹而寡欲也使一有所欲則凢世味皆得以滛溺之天理滅人心泯將無以自立於世矣此伯玉以澹名庵者實君子立心之要也伯玊起居出入每顧名思義而自警扵心故其官榮矣恒以冲泊自守不知其為榮祿厚矣恒以簡薄自奉不知其為厚所欲可求而遂也扵聲色滋味之不可無者亦屬厭而已未嘗窮於欲也伯玉之立心於澹者如此凡世味皆不得以滛溺之其殆可以追蹤於古之君子歟雖然澹而寡欲固可尚誠能寡之又寡以至於無則進扵君子一等矣㑹當㳺伯玊之庵尚論濓溪之至敎戅庵記戅庵者僉都御史王公退居之室名也公賦性正直剛毅無絲毫詭隨人意自其為給事時值國運中否奸邪柄政公首率諸同官具章䟽廷論其蠱政誤國之罪時有與奸邪為黨者不平其言從旁沮止其論奏公勃然奮其忠直之氣手擊奸黨以死由是萬口稱快而積憤消衆正和應而公道復而公之名遂以聞於天下今聖天子登大寳之初賢公之為首自給事擢陞今職適額森入犯京師遂命公董師以禦之公即戎服鞭馬赴軍號令區畫咸適機宜部伍行陣應時整肅將帥恊謀士卒思奮乃出竒折額森之鋒而奪其氣逮既奔北因驅逐盡境而還京師既觧嚴而逺邇遂以寧謐夫以公之聰敏機辨過人百千等而有為之才著于朝廷著于軍旅者卓卓如此而乃以戅名庵何邪盖直者正道也曲者邪道也戅實直之别名也昔漢武帝以汲黯面折其過乃以戅目之世因以戅為愚戅之稱失其義矣扵乎使漢廷之臣皆如黯之戅必能以直道輔其君而武帝之治其庻幾乎惜乎直者易踈邪者易親曲學阿世子乃至大用而黯卒不得親幸遂使武帝之政多疵議也且公之擊奸黨折勁敵保京師安逺邇皆由其戅直之氣發于中而施扵外者無所屈撓也以是名庵不亦宜乎公今董東南之漕運且廵撫淮甸固為當時之急務重任竊以謂朝廷者天下之本今聖天子方舉羣直以收太平之功行見不日還公于朝又將以其直氣正道輔成治效則其豐功偉烈不但如前日所就而已若然則益有以稱戅庵之名矣瑄雖孱懦亦甞慕直道而行者他日倘得逰公之庵尚當學公之戅而請敎焉忠勤堂記秉盡已之心謂之忠效匪懈之勞謂之勤忠勤者人臣事君之大道也自古以來股肱之良勲戚之賢曷嘗不篤此道以建名節扵當時垂休光於後世哉駙馬都尉趙公昔在太宗文皇帝朝以世臣子弟有才行被選擇尚太祖髙皇帝之賢主厯事五朝逮今垂五十年或奉朝謁於左右或持使節於四方盡心效勞忠勤之行始終如一日遂得以親賢簡在列聖之心受命奉行南京陵廟祀事且兼掌都督府戎政前年額森來侵太上皇親征公上章願奮忠效節以力禦外侮奉迎鑾輿靖安邊境今皇上若曰太上無恙行且復國矣南京祖宗陵廟所在為根本重地駙馬都尉既奉祀事且兼掌戎政豈可又以邊事勞其行逺不允其請特降璽書使仍理舊事復以忠勤之辭褒其意公既拜命於廷乃取璽書忠勤字大書揭於所居之堂于以丕昭皇上褒諭之恩且扵其朝夕仰瞻敬止之間有以接於目警扵心而勉其臣道之當為余嘗登其堂公仰視大書而語其故因請為之記余惟公之勉盡忠勤者垂五十年其聞譽固已表著於邦家今兹璽書褒諭之詞盖即其實以命之公則拜寵光而増懼揭堂名而加勉其忠勤之莭彌乆而彌堅者又可量乎公戚里富貴人也乃能脱去凢近之習卓然以臣節始終自砥礪豈非聞古昔股肱之良勲戚之賢能篤扵忠勤者而興起乎其建名節扵當時垂休光於後世固有所在矣公尚益勉之夫是堂也其内之榱題棟宇髙麗深廣可以肆凢席而陳樽爼外之竒花異木紛葩羅列可以娱觀視而供翫賞余皆不書獨記其名堂之大者以為公勉盡臣道之助云雙桂堂記桂佳木也而秋芳其花黄可愛其香清而尤宜逺聞近世之士子薦名秋闈者往往以折桂喻其一時之榮亦楚辭采菊紉蘭之義也寕陽王大經王大縉兄弟皆登山東景泰庚午科鄉貢進士因以雙桂名其書室之軒間求為之記大經大縉之尊府嘗與先君子為同官今為順天府尹大經其第三子大縉其第四子也京尹公之先世多有積徳乃大發於京尹公自科目進身亟踐通顯敎行扵家諸子䝉詩書仁義之澤而講貫漸磨者有年由是大經大縉兄弟一舉而接武鄉闈在他人不啻足矣而大經兄弟乃以雙桂名軒者盖以謂吾之兄弟已得者固若折秋桂之聫芳然豈可以是自足哉方將退脩于是軒之中扵家庭之敎已知者愈精其知已能者愈習其能深翫潜索之乆强勉力踐之篤必使詩書仁義之道渾融于一心散見扵行實宣著乎文章則他日禮闈之試大廷之對亦惟攄發吾之素藴以應之不惟掇髙科若升階之易亦將有服庻官措之事業大有可觀者矣若然則大經兄弟向之接武鄉闈者又將齊名天下而雙桂名軒之實亦可垂之無窮豈但若世之折秋榮而誇耀于一時者之可比哉是為記唐陸宣公廟記有唐三百年逢時建䇿所以成翊戴𢎞濟之大功者累有其人至扵學術純正事君以格心為先論事以行義為急隠然有王佐之才者余於中唐獨得一人焉陸宣公敬輿是已當建中艱危之際公居近地竭忠藎以籌畫機宜代王言以感召人心雖提兵討賊諸將是賴而其運謀帷幄再造唐室之功居多是皆載之信史天下後世所共知余置不論獨推公有王佐之才者盖三代之佐皆以正君行義為本自漢以來為輔相者鮮克知此而其所論不過人才政事故無以清出治之源明義利之分以致主於王道獨公之告徳宗者有曰一不誠則心莫之保一不信則言莫之行誠信之道不可以斯須去身必慎守而力行之又曰民者邦之本財者民之心心傷則本傷本傷則枝榦凋悴而根柢蹷拔矣夫知誠信不可不存則心必正知財利不可厚歛則義必行人君正心行義使天下萬事粹然一出於天理之公此王道也惜乎公言雖大所告不合入相未乆即有忠州之行而卒不得大行其志遂使後世論唐之賢相曰房杜姚宋而公不與夫豈知公有王佐之才使時君能用其言三代之治可待豈復貞觀開元之盛而已哉故善論相業者當觀其學術䂓模之大小不當以事功成與否而髙下之也史載公蘇州嘉興人即今之嘉興府城北有公遺廟世傳以為公之故宅前代碑誌備載其事景泰二年知府事江西舒君敬上章以公乃唐之名臣忠節著於當時奏議行於後世其遺廟雖存自昔以來官無祭饗宜量給官錢脩舉春秋祀事以褒表忠賢激勵臣節詔從其請又二年為景泰四年舒君以書來求記其事余惟世之為守者類以督辦為能而於世敎風化所關者漠不留意獨舒君卓然以表忠勵俗為急乃論奏公之事蹟于朝舉乆缺之文以秩登祀典廟貌益崇血食不泯其所以為天下後世人臣盡忠盡節之勸而有補於世敎風化甚大是不可不記也遂具述其事俾刻之石使千萬世知崇舉公祀以樹風敎於無窮者自我天朝始寧州重脩廟學記聖朝建内外廟學所以崇聖道飬賢才以臻治道之隆天下之政未有重而光於此者是以列聖相承莫不申重其事寕州為陜右之名郡郡之廟學營建既多厯年漸至敝漏亦有屋宇當建而缺扵始作者前有司類多務因循而莫之重學政因而弗飭今知州事山東黄縣劉謙發身鄉舉厯官來涖是州進謁大成至聖文宣王廟庭周視兩廡神宇學舍俱杗桷棟楹甓瓦腐壊風雨穿漏無以揭虔事神考業育才大懼不能仰副列聖申重廟學之意乃先作大成殿次及兩廡又次大成櫺星門易瓦木而完新之規制悉有加扵前神庫神厨宰牲房亦皆事神之宇不可緩者悉加新理焉明倫堂後堂東西齋生徒退脩之室或仍或増俱作於廟宇既完之後其所需瓦木丹漆鐵石百物及工匠役夫皆處之有法既儲積有素又取之在官不歛一物於民而妨其業始工於天順元年三月畢工於次年四月由是廟學屋宇靡不周備司訓寗鐸乃具其興工竣事之本末專人走千餘里來求文將鑱諸石以垂後夫以國家建廟學有闗於治道重且急如彼劉守乃能知所重而篤意脩建之功如此固可書已而為師為生徒者亦豈可不因是感發而各知其所當務哉故知隆治道必本扵養賢才養賢才必本於崇聖道則為師者必當以道率人為生徒者必當以道治已敎以道立才以道成推之於用斯道之澤無徃不被庻幾有補於治道而上不負國家建立廟學之意亦於劉守興學之政有辭云華州重脩廟學記道之大原出於天而備於聖人吾夫子為出類拔萃之聖孟子推其功賢於堯舜故以王者之禮通祀於天下學校所以崇聖道育賢才開太平也我天朝列聖相承以道治天下稽古王政尤重學校之敎所在郡縣廟學既宏大其初建之規或有乆而弗飭者俾有司以時葺脩務崇祀育才咸底其實今陜西之華州為闗右大郡其廟學之建厯嵗滋乆棟楹瓦甓侵凌於風雨率多敝漏今西安府知府西蜀閬中楊勝賢發身太學前五年來知是州進謁大成殿退視學舍俱有弗飭如前所云者大懼學政之墜弛遂謀諸同知李㻞儲材用集工匠先徹廟宇木瓦腐壊者易之以新好次及兩廡俱葺理之棟楹榱桷盖瓦級甎悉壯固於前時丹雘墁圬之餙輝煌完堅又命工畫厯代從祀諸賢像於廡壁以及奉神之厨庫器用靡不完具天順元年仍改作明倫堂齋房㑹食堂士子退脩之室由是廟貌尊嚴士習有所爼豆絃誦之風延及州里學正張𤣥乃進諸生而告之曰楊公先知是州時祗承國家崇重學政之典克脩廟學咸底完新今楊公雖陞知大府是不可以其去而無所記述以没其善乃具其事遣人來求文於予將刻之石予惟大莫大於道吾夫子備是道為賢於堯舜之聖我朝以道治天下崇重夫子之道俾通祀於内外學校盖欲以道育賢才而資世用也楊守既知興學為重而為師為士子者其可不知所重乎則為師者必當以道率人為士子者必當以道自勵講是道求是道士子之彚進於明時者咸以道忠乎國而愛乎民或至禆大化建大節亦卓然惟道之與歸斯學政大有實效而於楊守興學之功亦有辭焉讀易軒記四川滎縣龔生文淵嗜學好易因取朱子警學賛首讀易二字名其書室之軒求為之記予惟讀易之法朱子之賛備矣尚奚待予言請姑述所聞為文淵朂夫畫前之易竒偶之未形者也伏羲之易竒偶之已形者今先天圖是也自圖隠於異學千百年世之讀易者但知自乾坤以下六十四卦文王之彖周公之爻辭孔子之十翼而已而於伏羲先天之易則莫之聞焉至宋希夷陳氏始以羲圖授穆脩脩授李之才之才授康節邵子邵子乃大為之發揮然後知文王周公孔子之辭皆本於先天之畫由是易之本原復明而朱子本義亦明乎此而已若程子之傳雖未及乎先天之畫而義理精深包括廣大朱子所謂邵傳羲畫程演周經誠皆永著常式彌億萬年也文淵誠能肅容端席扵斯軒之下深探畫前伏羲之易熟玩周孔之辭精究程朱氏之傳義又必以朱子之賛實體之於身心則於讀易之法彼此交盡庻乎有得矣文淵其勉之平陽府儒學重脩記平陽為山右之大郡統屬三十有五而郡學實人才風化之所自出為支屬之所觀法為郡之政固非一端宜莫先於學政今姜守徳政三衢名家子蚤㳺太學出令上元上元為應天劇邑素稱難治姜守厯軄九載事無不舉遂陞禮部郎官又三年陞知是府涖任之初進謁大成至聖文宣王廟庭退見神厨學舍率多敝漏及有屋宇當立而未備者因志諸心及半載間值時豐人和乃區畫埏埴之具斵削之材以及礱雘百需既合矣扵是就工先作神厨次作明倫堂作學門以及師生宅居退室繚垣道途靡不完整平直又表頖宫之扁覆以重屋始事於天順五年二月凡五閱月而工訖學舍為之鼎然一新郡博生徒咸願刻石以紀其事乃來求余文余惟道之大原出於天若古唐虞三代之敎學雖名有不同而皆本於道盖道之明即人倫之明考諸載籍可見矣自孟軻氏沒堯舜禹湯文武周公孔子顔氏曽思之道不傳厯漢唐以來間亦設學立經置師弟子員然道既欝而不傳而其所以為敎為學者徒矻矻於訓誥名物已耳枝葉之謭陋甚至雜於異端惑於功利汨於百家衆技之偏曲支離雖有臨雍拜老増廣生員如漢唐之盛亦不過侈當時之觀美卒莫能究大道之歸而復隆古明道明倫之盛至宋河南二程夫子出始有以接千載不傳之統於是發明性即理也以見道之大原出於天表章大學中庸明古人為學之次第造道之閫奥以讀論語孟子而不知道雖多亦奚以為周子以剛柔善惡中焉而已矣論為師之道張子敎人必欲變化氣質復天地之性至朱子㑹萃周張程子之學以遡堯舜禹湯文武周公魯鄒之道註釋四書為講學之本又集小學為大學之根基以及詩易既有傳義諸經亦發其大㫖資治通鑑綱目則理一天人義兼巨細由是敎人之法大備雖所入之途各異而其要歸皆本於明道明倫如唐虞三代之敎然當時講論極為明備而乃屢為狂言所阨竟莫能施其敎扵學政達其道扵天下逮我皇明統一萬方道隆千古内建國子監外設府州縣學而師弟子之所講習小學四書諸經史之義理皆本於周程張朱之説以求堯舜以來千古聖賢之道而前季訓詁詞章異端功利偏曲支離諸説皆不得淆雜乎其真由是濓洛闗閩之學得以備施於學政盛行於天下而大有以復古昔明道明倫之盛今平陽郡學人才風化所闗姜守知為政之先務而新理之事神育才咸有其所為師為生徒者其必仰思朝廷建學之意篤志講明正學而無怠庻幾人才所出有實用而風化之美亦延及於支屬所謂明道明倫者將不為虚語斯於姜守之興學與有稱焉於是乎書陵川縣廟學重脩記陵川為澤州屬縣廟學自我皇明定天下即䂓建置逮今厯年既乆大成殿兩廡櫺星門以及堂齋諸屋宇皆穿剥弗治事神育才咸適其宜知縣事任通發身鄉舉涖任之初謁廟視學大懼學政不脩乃謀及僚佐以農隙時斧斤山木陶埴瓦甓與凢作屋之不可無者悉具焉乃新大成殿新兩廡新靈星門次及明倫堂東西齋皆新之棟桷覆瓦圬鏝丹碧之飾壯固光彩巍然煥然皆有加於前時以至神庫牲房與士子㑹食退脩諸室悉皆増葺始工扵天順元年二月訖於是年九月敎諭張瑄訓導郭堅陳祐乃具興工竣事之蹟因進士張瓉來求記將刻石以示永乆余惟敎學乃為治之本自唐虞有司徒典樂之官以職敎事至夏商周學政寖備于時有小學大學敎人之序灑掃應對六藝三綱八目為敎人之條要其歸則在乎知性分之固有盡職分之當為而已漢唐厯代以來雖􅂉亦有學校求其如唐虞三代敎人之法則寥寥焉盖唐虞三代之時聖道大明故敎人有其本自孟子沒道既不傳故敎法失其實至宋二程朱子既有以接孟氏之傳乃深探隆古敎人之法必由小學大學語孟中庸以達夫六經之藴奥其歸亦在乎知其性分之固有盡職分之當為其為説雖明值時枘鑿而三君子之道竟不得大行扵學政逮我皇明當文運大隆於是内外建學而敎人之法一本於程朱氏之説由是敎人之法大有以復古道是豈漢唐厯代建學之可擬哉今任尹大新廟學扵事神既竭其䖍而士子之游於斯者必循序以進其學以求知其性分之所固有以盡職分之所當為為子必孝為臣必忠俾大節卓然炳然斯於國家建學為有實效焉于是乎書大寧縣儒學重脩記大寧縣在漢時為北屈縣屬河東郡今為隰州屬邑其地僻在河山之間土皆磽瘠戸僅十里前之為邑者惟租賦簿書期㑹是急漫不留意於學政以故學舍嵗乆侵凌於風雨悉皆穿漏圯壊且無士子退室而師因以弛其敎士因以荒扵嬉大無以副國家崇敎之意天順三年二月知縣王溥主簿梁宏乃儲積材木用度既具遂集匠役即學徹諸屋之敝者大而新之堂凡若干楹齋凡若干楹皆髙敞宏廣可以考業其中是年四月適山西右叅政楊璿行屬至縣謁廟又命重脩靈星門學門及作士子退室二十間廪宇十八間學舍大小由是悉皆完整訓導劉翺具其興役訖事夲末來求文刻石以記之余惟唐虞三代之學其盛不可尚矣自洙泗鄒孟之敎微而道失其傳至暴秦焚儒書禁儒語殄儒生儒敎既廢秦隨以亾雖漢興數十年猶以黄老為治而於唐虞三代之學政莫之興舉武帝雖曰表章六經罷黜百家置博士弟子員而無其本明帝唐太宗養老立學之具雖可觀而無其實至宋道學諸君子講明隆古敎人之法雖極詳備而不得行扵當時是盖將有待也洪惟天朝列聖相承建極於上立學於下自京師延及遐壌絃誦之聲相聞學政之本末具舉盖將逺追隆古彼漢唐之侈虚文者奚足比儗哉今大寕雖極僻陋而學校敎法與通郡大邑無以異其學舍未備與敝漏者大叅既有以成其後縣僚又有以成其前將見敎有成法而可副國家崇學之意矣是可書也于是乎書一樂堂記陜西清水縣儒學敎諭廣文李生㫤平陽觧州安邑人其中鄉舉依親讀書時嘗來河津從余講學及之官清水之三年為天順六年乃以書來曰㫤迎父母就養且有兄弟來隨侍因扵官舍中闢一堂為奉親之所取孟子父母俱存兄弟無故一樂也之言因以一樂名其堂乞記其事將以自警焉余觀孟子又曰仰不愧于天俯不怍於人二樂也得天下之英才而敎育之三樂也先儒林氏曰此三樂者一係於天一係於人其可以自致者惟不愧不怍而已今李生扵可以自致及係於人之樂皆不敢自居獨以父母俱存兄弟無故之一樂名堂者何哉盖彼二樂者皆聖賢之極致故不敢自居惟此一樂幸而得於天安得不以之名堂哉然李生既以是名堂必當盡其實以稱其名可也其事親則必以古君子自期先意承顔左右就養不但養其口體又必養其心志而諭之於道焉其扵兄弟且敬且愛必思父母之子重於已之子不以妻子之言而有間不以財利之私而有争期於詩所謂宜兄宜弟焉夫如是則於堂之名庻乎有實以稱之矣雖然彼二樂者固為聖賢之極致而李生不敢自居然士希賢賢希聖亦學者分内事也李生其必用力於顔子非禮勿視聽言動克已之目朝斯夕斯而勿怠則私可克而禮可復庻幾乎仰不愧俯不怍之樂矣李生敎育一邑之俊秀其必以所學之正推以淑之俾循小學大學之序以及乎論孟中庸六經與凢聖賢之書必涵養本原思索義理篤於實行各因其資質之髙下使循循勉勉不已則士子中豈無可與進於道者乎若然則雖於得天下之英才而敎育之之樂不敢望亦知所從事矣然余又有説焉父母俱存兄弟無故固天倫之可樂使李生不能自致扵克已之功敎人之方則心徳有未脩師道有未立將貽誚於時而父母兄弟之心亦將戚戚然不寕抑何以樂斯堂之樂哉是以余因李生以一樂名堂并舉三樂以告之俾知所警而自廣焉雙桂堂記山西憲副定興李文英之長子翔鳯次子鳴鳯俱以習舉子業同中天順三年順天府鄉榜復家居以俟禮闈大廷之試文英因作堂名曰雙桂俾二子居以日進其業天順六年冬十一月文英調陜西憲副道過余扵河汾因語以名堂之意且求為之記余惟桂乃木之美者也文英以雙桂名堂盖以比二子欲其盡知行之功以美於身耳夫人為萬物之靈誠欲盡知行之功以美其身亦惟求諸經與大學語孟中庸以及濓洛闗閩聖賢之書所載大訓格言學問思辯致知格物則可明其理躬行約禮誠意正心則可履其事為翔鳯者以是自勉以率其弟為鳴鳯者以是自勵以企其兄兄弟篤於知行之正學沉潜玩索勇猛精進勤脩於一堂之上仰追千古之賢至於用力之久積累之深將於身心萬物之理庻幾昭灼無疑扵是體而踐之自人倫之大以至事物之㣲静存動察皆以一敬而貫乎其間則知焉行焉將兩盡而可美其身則所藴者磅礴深厚由是發而為文辭皆自所藴中流出他日試禮闈對大廷文皆有本不但髙第不求而自至又將可措之事業以澤物是豈若口耳記誦枝葉浮華無本之文止扵釣聲名干利祿者可比哉翔凰鳴鳯誠不以愚老之言為迂而用力於斯則所成就必有可觀而於憲副均期望進學美身之意亦不負將見斯堂之名可垂之永乆矣于是乎書敬軒文集巻十九
