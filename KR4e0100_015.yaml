body:
  text: 敬軒文集卷十五明薛瑄撰序送馬司訓之任序正統元年春二月天下士抱負所業來試南宫者僅千人主司既取百人為進士又取四百餘人為乙榜進士與乙榜必其文皆通粹合格始得與其數否則置不取謂之下第然登進士者率多至大官乙榜則悉授以師範大官以其道澤人師範以其道教人是其職雖有崇卑而所以禆贊國家之治則一也尋常之情類多重進士而薄教職其所見亦偏矣哉吾友滎澤馬士賢耽嗜經籍薰酣義理今年春獲與南宫之試遂得在四百人之列有陜西徽州分教之命徽為西偏之郡與邠岐秦鳳連接其俗土厚水深士生其間率多魁梧質厚不為浮薄之習茍率之以正教其負重致逺必多可觀之器士賢以中州之俊秀業庠序澤宫之間歷鄉闈南宫之試名亞進士之列有師之尊有道之重今之往其可不思所以啓迪其人乎德欲其修學欲其進皆啓迪後進之矩範也士賢能留意於是乎異日徽之人士成德達材而備國家之器使者布在百司澤下及人則士賢以道教人之功又將推而為行道澤人之效彼一偏之見輕重乎二者之間又果足為定論哉士賢有英志既得教職而又居西偏之逺郡余故書此以解之使不為偏見所惑云送劉僉憲之任序余與劉均敬為辛丑進士當時同登者蓋二百餘人于今已十六七年矣宦迹升沉出處參差豈非窮通皆有命存其中乎然窮通自為窮通而非人所能為窮通也劉君為御史於余為先進其為人謙謹敏達平居與人處退然不自滿若易可為人所動者及其於義之可否則毅然若萬夫之勇不可以私奪至其所糾彈視其人如何初無所避忌由是徑節能聲大為中臺諸公所稱道聖天子龍飛之初進退藩臬大臣擇人無問秩次惟其人則拔使居之劉君遂升四川按察司僉事蜀人之遊宦京師者咸謂蜀地僻逺民茍不得其直自理為難惟憲臬得人則雖窮州下邑荒山深谷之民皆得伸其抑而達其滯劉君以如是之才而居吾邦之憲臬吾蜀之民又焉有不得直者乎於是相率來請文以贈之余與劉君以同年同官之契雖蜀中諸公不有請猶將贈以言況其請之勤乎蜀自昔稱為沃土大郡知其郡者若趙抃張詠輩皆有聲於當時我皇明混一寰宇篤近舉逺雖遐陬僻壤視之一如輦轂之下況如蜀之大郡乎是宜選用嶽牧必慎其人而憲臬又為綱紀之司非嶽牧者比而劉君以選者居之其必大有所設施滌濯姦汚慰柔良善條章布於几席之上而令自行於萬數千里之溪山劉君聲稱之美將與古人頡頏而蜀人得其直誠如蜀中諸公之所論矣夫以二百人同登升沉出處不齊而劉君得其通者之一乃有內外憲臬之顯揚豈非君子之幸歟然命之通固幸矣使非以義制之則清議將有所指摘吾恐命雖通而亦君子之所弗取也唯劉君不然在內臺時既有聲迹今之往也又將如蜀中諸公之所期望命之通而不失義之正者其惟劉君乎余與劉君有交契之好故於蜀中諸公來請既告之以命復申之以義而因以寓忠告之意云送建昌尹陳繼賢序昔明道為邑嘗書視民如傷四字於座右夫以大賢為政必視民如傷則其慈良惻怛愛民之心出於至誠而自不能已者為可知矣今之為令者曰字民字者養也養民而能以古人之心為心則民焉有不得其所者哉南康為江右之名郡建昌於南康為大邑昔濓溪以道學為二程之倡紫陽以道學接二程之傳二君子皆嘗宦遊其地則其流風餘韻被於里閭入於人心至今必有尚未泯者士君子幸而受聖天子之明命往字其民夫何為哉亦惟景行前哲推慈良惻怛之誠心以及其民焉耳衡陽陳繼賢氏由科目進身初知沛縣後知睢寧皆有惠政今丁內艱起復知建昌建昌張惟明登進士與余為同年為御史與余為同官喜得繼賢氏知其邑也來徵言以贈其行夫明道大賢也其為邑無愈於愛民如傷南康又為道學君子過化之地周程朱氏同一道也繼賢之往復何待於他求也哉亦惟質諸簡册詢問故老求周程朱氏所以施設者如何所以愛民者如何茍能企而慕之又以程子所針戒者書於座右時自省焉則慈良惻怛之心出於中及於民油然而有不可遏者矣余既以是復惟明因以為繼賢之官之規送李廷賢之廣昌序安陽李廷賢少登髙科年未弱冠即為人師初任玉田司訓􅈤􅈤教人於經義或有所疑必辨析其所以然必歸諸至當而後已其門下士由科目進而備任使者前後相望官滿調官真定府庠真為大郡而郡博又為屬邑校庠之所儀觀廷賢能慎所操持教人之功尤加勤於在玉田時今年春天官最其績升授山西廣昌教諭京師之交遊咸來徵文以贈之余昔侍先人教玉田時得與廷賢交情好最密雅知廷賢擁皋比振木鐸者今十八年矣其所至教有成績而人材輩出今又升典廣昌之教廷賢必能移所以教玉田真定者以教其士子行見山右之膺薦書掇巍科者皆出於廷賢之門昔胡安定教授蘇湖間因人成就故弟子見用於當時者或治水利或治算數皆有實用廷賢教人之迹既歷歷在人耳目今之往益當思前賢所以教人者必求實用不事空言使他日弟子散在四方不徒循循雅飭不問可知其為廷賢弟子又皆有實用如安定之門人而廷賢善教之名與之同為永久矣廷賢其勉之送鄞縣張大尹序國家重親民之職數選京官之有才望者出補其缺誠以民之飢寒疾苦守令皆得親察其情而軫恤之為之長者能以父母愛子之心愛其民則民焉有不得其所者哉吾友清江張公始以進士擢官御史嘗按歷江南端謹清白之行洋溢人耳目其在內臺則又議論􅈤切人望其儀刑可知其為君子未幾丁外艱起復方值國家選京官補守令遂知浙江之鄞縣鄞大邑也戶不下數萬家而其俗富者或兼併侵漁小民至不能有以自立所貴乎良有司者為均其利而使豪橫不得以肆其志貧者亦得以遂其生公於南方之土風素所詳悉又以風紀老練之才治此大邑誠欲推父母斯民之心以仁其民必先去其蟊賊如前所云者可也公可不留意於此哉古之將大用其人必試之治民我國家立法用賢必古之稽近年京職之為守令有聲於外任者往往徵補內職公輟風紀之榮膺民社之寄建事功馳聲譽入膺顯擢之漸將兆於此行慎勿以出入逺近介意而怠所事也於是乎書送陳御史致仕序全節人之所難全晚節尤人之所難君子之仕也秩顯於身名加於時而或為外物之紛華幻惑移其素志者有焉此全節人之所難也有能卓然不為前所云者易其心固能全其節矣而或年已至而猶不能忘情於進退之間此全晚節尤人所難也國家著引年之典所以優老養恬厲臣下之節至矣人茍及其年即自引而去豈非能全晚節者然哉陳公少有聲大江之西自登進士即官御史去來不離御史者將二十年其論列時宜推讞疑獄按厯藩嶽疏通明慎徑直之節揚逺照邇而清白之行如良玉瑩潔尤為人所推服不易其心而全其節者陳公真其人哉今陳公官滿九稔年未七十人之於此亦孰不欲少緩須臾以冀所得而償所願哉陳公乃能欽服國章即自引去可謂無愧於養恬退厲臣下之義能全節於晚年者陳公又真其人哉人得於彼或失於此陳公獨能始終一節白首無愧豸冠繡服輝映里閭斯固足以見我國家優禮臣下如天之恩有不可名言之又可見士君子之出處去留必歸之義斯可為晚生後進盡節事君之法於是乎言送太僕馬寺丞致政序正統元年春行在太僕寺寺丞滎陽馬公有容以年將七十拜疏於朝乞致政歸鄉里詔許之行有日矣太僕卿諸公咸謂公生值盛世自弱冠時已奮迹詩書致身顯仕其提刑南邦毗政大府以分符陜右皆有政迹歷歷在人耳目間逮今白首饗其榮名厚祿三十餘年昔受先帝之命封其身及其先又得蒙今皇上之恩俾遂其子孫之養蓋公實荷列聖之寵榮其際遇一何盛哉昔疏廣受楊巨源以年老去歸其鄉當時後世相傳以為盛事況如馬公者仕以義退以禮其事與古人豈相逺哉又曰昔二疏陽城之去也不有班孟堅之傳韓昌黎之詞其事亦將湮沒不傳矣今公當國家全盛之日而得遂歸老之願其事美矣不有篤古者文以張之亦何以垂厥美於不朽哉遂相率來徵辭以道其行余猶記侍先君子遊滎陽時尚少已識公今四十餘年於公為故人是其去也自宜有贈況如太僕諸公稱道公之仕之去得饗其全福而追美於古人如前所云者則余焉得已于言乎雖然太僕諸公所以稱道公者至矣余雖重纍其詞亦安能出其意之外哉獨以余識公者編於太僕諸公美談之後以圖其不朽云送劉僉憲秩滿序正統元年秋山東僉憲劉公九載秩滿憲僚諸公屬筆於瑄以道其行瑄猶記從先君子宦遊玉田時公已自為御史巡歷畿甸瑄時尚少雖未及承顔接辭於公固已耳其風聲之清峻矣及其歸內臺按滇南按吳中按遼左揚歷內外幾十餘年徑氣直節磊磊落落震耀人之耳目而瑄亦得聆其隱隱之餘聲焉其後先君子官滿去瑄亦忝科名濫官風紀時從朝之賢大夫士詢及公之履歷則公已僉憲山東矣而談公之賢者則如出一喙焉今年夏瑄以菲才誤叨寵命來僉憲事乃始獲識公之面接公之談因而察公之心迹公之行則疇昔聞公之名與今兹得公之實若執符契以相合蓋無絲毫之差爽於是益信公之賢為不誣矣第以瑄晚進謭薄方將每事咨訪於公以冀寡過之萬一而公又以考績將行則瑄之慕公得公識公而不得圖所願於公者其情為何如故因諸公之屬筆遂道瑄之重公者如此以為公贈若公之聲績久著於東藩名位行將陟于朝著則有公論在兹不復贅云送劉憲副之任序雲南古南詔地方數千里境與荆蜀百越接連俗尚獷悍自前古號未易治逮我皇明天覆海宇子育蒸黎雲南雖去京師絶逺而擇人往釐一如輦轂之地由是人亦重慎勸勵人有讀詩書習吏事進士與上國士齒者比迹相望獷悍之俗遂變為輯柔之風正統元年冬藩臬狀缺員于朝上命在廷之臣如例薦舉以補其職時山東僉憲劉公士清適考滿待選天官遂為所知薦升雲南憲副或者以謂士清老成士雲南絶逺地是其往也寧無幾微于心哉余曰不然雲南雖逺而其民入版圖沐休澤者七十餘年雪霜時降疫癘不興人之去來乎其間者若東西州焉劉公兹行方將思所以上副聖天子擇賢才任風紀廣視聽決壅滯綏逺人之意夫何以逺近出處較計於其間哉厥今倣古出入均勞之制任外官有重望者往往入補京職況劉公以堅挺之資通敏之識出入風紀者二十餘年今之往固宜年愈增而氣愈壯官彌髙而志彌篤行見樹勛績馳聲譽而有還轅結軫之期又豈久淹於南服哉劉公道出山東憲僚屬余敘余遂釋或者之言以慰其行云楊氏族譜序山東僉憲楊公手其所作族譜一帙求為之言余觀其敘厥次也斷自五世祖榮甫而下家世古今變遷與夫生仕出處始終既皆歷歷可考據而其本支疏戚又各有統屬聫系而不差一舉目而楊氏之世得焉公之用心亦仁矣哉且其五世之上略而弗書闕所疑也五世之下詳而不遺傳所信也疑者闕而信者傳與世之妄擬誇大其宗而援引附會疏略失實者異矣其用心又誠矣哉合仁與誠因譜以示教自五世而至於十世至於百世公之子若孫咸能以公之心為心而儲善衍慶以及無窮則公之宗其有不昌大者乎公以名進士為才御史自在內臺時已荷國家褒贈之恩延及其考妣逮升今職而又誥封其身若家而公之進修方鋭則所以焜耀其宗增光斯譜而貽教後嗣者又可量乎公之家世具見譜系矣兹不復贅姑書公之所以用心而足垂于後者以還之贈僉憲袁茂實考滿序按察古監司也上之疏通壅蔽俾一方之吏治得失生民休戚無微不達下之扶植善柔鋤剃強暴屏斥姦貪表拔貞亷洗雪寃滯無民不安而又籌度天下之政酌以古今之宜茍有所知見必形諸建論是其職與古監司埒而又有言責繫焉任其職者必有剛果正大之德而又輔之以卓特明敏之才始為不負所任使類非依阿淟涊昧於事理不能為時之重輕者所能舉其職是宜國家簡任按察必於內臺秋官中拔其素有望譽者以任其職視他任使尤慎且重山東按察大臬司也袁公茂實由尚書刑部主事有能名擢僉憲事今九年矣所謂剛果明敏之德之才蓋兼有之故其巡歷部屬必嚴必勤搜詰姦慝遏抑豪暴疏滌枉滯洗濯善柔凡可以去害澤物者為之不厭若飢渴之於飲食纍數風紀之事公獨得其近而切者克舉所職真其人哉公考績行有日憲僚諸公屬筆於瑄以贈遂書風紀之重如此而公能無怠於心無墮所事而又進於明銓衡之下其聲績大小輕重自有公論者存進秩將自此始異日畢舉風紀之大而難者非公其誰望李氏族譜序譜牒之作所以重本始别親疏正倫理篤恩愛仁義之道備焉故士大夫茍有所作必慎於傳信而不敢易其事山東僉憲李公廷圭念其先世培浚本源引迪支條者逺有所自懼傳世久逺或失其次而無以篤親親之義於是自其髙祖秀以下凡接於見聞者靡不紀録其用心亦勤矣哉吾因考其世自秀以上世居洛陽至秀始徙居偃師二縣皆洛傍邑也秀生敬瑞敬瑞生希聖希聖生五子昭煥彬明泰泰字文中即廷圭父也文中先生少以經教授鄉里名聲大彰徹一時數為人所推薦或仕或否竟不至於大顯卒老洛涯有詩集傳於家廷圭得家學纍官至今職卓卓有立生子奈奈生清白此其一支也文中先生四兄各以其系具見於譜李氏之世亦盛矣哉是譜也既皆廷圭得於聞見而可信者使其子姓宗族一寓目而咸得其世各親其親各長其長各幼其幼孝敬慈愛之風永久不衰則李氏之世愈逺愈昌所謂仁義之道備于譜者于是益可驗其實矣李氏之子孫其永保之送太守楊廷實序往年余承乏御史丁內艱歸山右側聞知趙城楊君廷實有善政及余上京師道經其邑則見廷實正已馭吏推愛及民興學養士凡為邑之務先後緩急本末巨細靡不具舉益信廷實之善政非虛語及余在內臺廷實考績來天官藩臬以其治狀聞于朝又為所知推薦遂升知南廣方上道聞其母夫人訃弗果之官逮兹制終起復河間郡守秦如圭徵文以贈之余謂廷實登科為名進士出宰為賢令尹曽未幾年而善譽於人人遂有領郡之命廷實雖未到官得試所設施然以其已驗之效推之吾知為邑與為郡地雖有大小民雖有衆寡而治理又豈有二乎哉向使廷實得臨南廣之民則其善政之流行亦何異於為邑而澤可逺施則有加於昔矣方今聖天子厲精圖治簡任賢能惟所宜為不拘秩次廷實之行其見用尚未可量惟始終一節忠乎國而愛乎民偉然為時之名臣則余之知廷實者益無爽矣是為序送黃布政致仕序山東右布政使黃公自吏部郎官升秩而來其為政務恃大體不為苛察曽未踰年而敦厚謹信之行孚于大僚𢎞廣惠愛之風被于民吏衆方仰公久於職而公屬以國慶如京師不謀於朋友不告於左右遂上章乞致所事厥既得請復便道山東將旋歸于大江之南余因面歎曰人於一資之榮斗斛之祿猶不能無縻于心公以郎官之顯膺旬宣之重秩與內六卿相埒祿不下數百石有地方數千里而年又未至七十乃超然引去公之賢其逺於人哉公曰不然自百執抱關擊柝之吏皆有常職職不修不當冒濫祿秩以貽素餐之譏吾年雖未至而聰明筋力漸不逮人恆以位踰于德食浮於事為懼幸逢聖明優禮臣下之恩如天覆地育而不可勝載凡人臣年雖未滿七十有可去之狀者亦聽其去吾是以懇懇焉果獲所願將以尋吾舊鄉之山水丘壑以釣以采以嬉以逰以樂吾桑榆之年得免所謂素餐之誚幸矣尚敢以引去為賢哉余又面歎曰世有不度所能否冒其職而怠其事亦有年已至而尚耽嗜榮祿眷眷焉而不肯去者視公存心為何如而公之賢果逺於人哉公行矣將見士大夫強而方仕者法公位踰于德食浮于事之戒莫不盡其忠而修其職老而可去而進退之義皆可為人之儀矩公之賢逺於人益信矣憲僚諸公咸重公之歸而屬余言遂書此以贈之送李參政致仕序江右古文獻之邦名人巨士習詩書尚行義進足以有為於時退足以表厲其俗繼迹史氏代不絶書若歐陽公陶元亮輩文章政事髙風清節固已名當代而垂後世士生其間襲餘風而景賢範者纍纍焉山東參政李公江右人也詩書是習行義是尚生逢盛時出其所藴奮迹科目歷職郎署參議河南廣東兩大藩曽未終考聖天子采大臣薦舉之公議升擢今職公既祇命就官盡所以報稱之道以年滿七十於義當去遂上章乞致所事詔允其請乃拏舟將歸大江之南憲僚諸公屬筆於瑄以序其行瑄因念始就河南鄉試時公以參議適知貢舉事瑄既忝科名荷公知尤深逮今二十年矣瑄猥以菲才由內臺承乏山東僉憲而公又升秩來參大政每追陪旦夕視公為先輩成德方將事事咨於公而決其可否而公已引去矣是其私情能無望於公乎雖然公之自處審矣績其學出其有進仕于強壯之年于以忠乎君而愛乎民義也慎其止謹其退乞身於耆邁之嵗于以全其名而勵其俗亦義也進退一揆于義而立身求無愧於士君子出處之道蓋由其學有所得聞江右諸賢之風而興起者古所謂豪傑之士公其人歟其名世其垂後固有在矣若夫故鄉之溪山林麓足以資扁舟杖屨之嬉逰賓友琴書足以供風晨月夕之笑樂是皆怡老之佳致而公之歸固自得之兹不贅云送黎參政致仕序逾嶺而南皆古百越之地延袤數千里危峯穹壁長溪大壑相與削拔回環深窈莫測竒草異木生其間者榮凋花實率不以時循嶺東南又皆大海瀰漫旋繞每晝夜晴霽涵星斗浴日月水之百怪靡不軒豁呈露至颶風或作則濤波洶湧噴薄蕩摩霆轟轂擊聲震山谷其霧氣澒洞轇轕茫無畔岸洲島雜國若扶南真臘黃支婆利國之屬動以萬計而四時溫涼蒸爍之氣發作無節故居人行旅將息之道為難今山東大參黎公嶺南清逺人也自讀書筮仕出入中外多厯年所官已達矣一旦引老將歸其鄉藩臬諸公有以嶺表山川風氣之異如前所云者為黎公告且重其歸而勸其擇地以處焉黎公曰不然吾家嶺外舊矣封樹成列先祖之丘壠存焉閭里如昨童稚之交逰在焉今之歸方將薦蘋藻以伸罔極之孝思具樽醪以欵平昔之親故又烏以風土之異移易吾之心哉余謂不忘所本孝也不遺故舊義也合孝與義可謂篤於人倫將不擇地而安矣風土之説誠不足以動念厯亭送别序濟水出太行之王屋山伏流出於濟源又伏流東走數千里散見於岱麓柏崖渴馬之山至濟南遂有泉湧出名曰趵突泉之流或派而為回溪駛瀨或匯而為巨浸平湖經帶城郭北合清河以入於海其南多美山層峯峭立連巒起伏直與梁岱龜蒙徂徠長白鄒魯海上諸山聫絡角立相望泉之北渚有古亭遺址巋然尚存即杜少陵與李北海宴集處所謂歷下亭也逺近山光水色浮搖瀲灔其上下葭蒲荷芰紛披燭耀其周阿蓋濟南得岱麓山水之勝而是亭又得濟南山水之勝以故往來為古今逰觀者之所適正統四年夏金溪王君昌問由監察御史擢升山東憲副其尊府春官學士公之友劉文謹適以事至京師從憲副君來濟南聞是亭之美間往逰焉則愛其山水花草之清麗徘徊終日眷眷然若不能去者既而戒行有日復取道亭下諸公咸賦詩以贈而屬余序余謂文謹行千里而來一無所求獨能訪古迹而適意於山水物象之觀因是知憲副君所與必良士而學士公取人之不茍也篇什既具序以識别送孔節文分教徐州序職無大小皆天工也能修其職斯於天工為無曠顧可以職之崇卑勤怠其心哉闕里孔君節文宏厚而有容簡重而不泄勤於問學敏於文詞有先師之餘韻流風去年秋一舉登名鄉薦今年舉天下士試南宫登進士第者一百五十人節文名列次榜有分教徐州之行節文欣然拜命將就道余往送之曰百職所司既曰天工分教之職有師道焉賢才之成恆必由之以師道而成賢才職雖非崇顯其於天工不亦重乎節文之往當思師之所以為師言必出於道行必由於道教必本於道以是修已以是淑人俾士子非道不知非道不行異日出而為世用必能擇其道以忠乎君而愛乎民夫然節文於天工又何曠哉世有位不滿其望者往往怠其心而慢其職亦莫顧天工之曠否也視節文安於所得而盡心所事為何如余因是知節文蓋能守其先家法益可賢重云送浙江趙大參序今布政司為國藩維即古方伯連帥之職上之朝廷大典禮大政令所以一民俗正民心禁民非者皆欲宣布而遵行之下之方數千里之地連百十郡之民所以察吏治恤民隱固封守者皆欲其飭理而申嚴之而又時與監司戎帥協議濟時之要務以仰副聖天子仁柔逺邇綏安海宇之心是其為國家之倚重繫一方之休戚外百司蓋莫重焉故著令選用藩維必使廷臣推舉通經術知大體公忠亷謹才足有為而又揚歷內外聲績著聞者以擢任之正統八年方嶽狀缺員于朝詔廷臣如例推舉有以給事趙公冕名聞者公素為上所簡知遂命為浙江參議行有日給事諸公謂豫宜有言以贈豫獲與趙公逰舊矣公以明經中甲午河南鄉舉首選篤實寬裕之資潔白修謹之行人所推服其典教山右能舉聖賢教人之法作興士類士服其教出而為時用者甚衆及兩任給事小心慎密事上盡匪懈之忠當官無回互之失經術才行著績內外者克有之是宜有今兹之峻擢焉公行矣宣廣德意修舉庶政與凡濟時之要務皆公之事也尚當推其已試之能勞心焦思知無不為為無不當俾東南連城數千里官知奉法民知樂生內治益修外患不作將隱然為藩維之重臣思不負國家選擢倚任之意是亦諸公之所望也若徒曰有方面之榮耽其祿而怠其事豫知公必不然亦豈諸公之所望哉以豫與公故舊於贈言也前以頌而後以規宜人孫氏壽辭序洪範九五福之疇而壽居其首傳謂有壽而後能饗諸福信哉斯言也嘗觀諸天地之運化人稟厥賦於儲精之始氣之長短而人之修天自焉是以或得其上或得其中或得其下莫得而齊間有值其氣之長者由中壽而至於上壽饗福源源而未巳豈非人之至願哉宜人孫氏東郡良族來配錦衣衛户侯王公鏞克孝克順克慈克教中饋之行日彰户侯沒者若干年矣宜人撫育厥子鍾卓有成立是肖是賢暨厥婦孫備養弗違宜人壽登八十矣而氣貌日強駸駸乎上壽之域得氣之悠長而饗好德富厚康寧之福而未艾者宜人之謂歟子鍾喜其既壽冀其不衰來求辭以祝之則為之言曰賢哉孫母鍾氣之元柔順是則克配名門中饋是修內行彌敦夫荷寵錫厥推惟恩嵗時命服載章其身教子有立行義著聞就養備至洎厥婦孫母年雖邁母顔猶新既壽且祉繁樂欣欣子心既恱子孝孔純祝母遐壽逾百其旬我惟纂辭以相其勤贈萬太守秩滿序余忝辛丑科名今將三十年矣當時同登進士二百人列任廷臣陟居藩郡者前後相望其聲實卓然揚歷愈久而事業愈茂者蓋可數焉今平陽太守萬公以江右文儒之英一舉而進於二百人之列及任南京都察院福建道監察御史能以風紀之節自砥礪其論事急於大體而緩於碎微議法雖輕重不同而必要諸平恕糾治必以實而不過為增飾事長官顧自處如何不隨其意為俯仰遇吏卒端已率下不假與辭色一時臺官雖趨向不同咸推服以為能九年官滿朝廷方選京職之有聞望者以補郡大臣交章薦公遂升知浙江嚴州府嚴東南大府也小民散處下邑懸隔幽逺茍有不得其直鮮能以情自達公至之日推誠以通上下之情令修於几席人自得於海山千里之外皆翕然稱其有古循良風未幾以家艱去官及起復來知是府公因其俗而行之以寬簡府屬僅四十地方千里民以萬計無追呼之擾而事皆集無凌誶之察而訟自清無徵集之煩而民自勤無督促之嚴而士自勵聲稱之美甚於江浙先是屬邑之民聞公滿期將近則皆奔走懇留於藩臬上官不約而同者數千人公固辭焉所謂聲實卓然揚厯愈久而事業愈茂者公其二百人之表表者乎公行有日絳守王汝績以余與公同年也來徵辭以贈之余遂書公之事業著於郡守者如左即是以推陟明之典公論有所在而其揚歷逺大之績又可量哉贈知韓城李居敬序韓城古韓國也居河山之間地廣民衆先時為邑者率多與吏民不相得連以是去人皆謂其風土剛徑民好伺察其長之失而中傷之關陜邑之劇而難治者必曰韓城云今令李公居敬以鄉貢進士來知是邑始拜官時人皆以韓城之難治如前所云者為言居敬不以介意及到官痛刮剔官府里閭宿弊潔身以先之祿食外一毫不以漁民自奉甚儉至馬不食粟淡如也檢飭吏卒非公故不得出縣門人以賄交者悉皆拒絶民有事至縣者必告以孝弟忠信敦本厚俗之道辭氣懇懇出於誠實民為之感動信既在民凡事不待督促而集賦稅以時里閭無事居敬在官始終如一日由是僚吏民庶皆服其亷公聲稱之美著于逺近及九載考績將去民恐失之不約而合辭乞留者千百人藩臬以其狀上朝廷以民之安之也升秩俾還所治居敬固自持不易民之信愛益深豫謂天下古今人心一也謂獨韓城之民難治者豈理也哉吾以誠感其民民亦以誠應吾以智籠其民民亦以智應猶影響之於形聲也切怪長民君子誠之不足而歸咎於民之難治殊不知自求其誠使持身之亷處事之公一出於誠人將信愛之不暇又焉有不可化之民哉韓城之民前日之民也何前日之難治而今日易治乎由居敬知民不可以智籠可以誠感故其持身處事者皆不敢舍此而取彼積其誠信之久民皆愛慕不已將去而猶懇留之尚何難之不易哉以是知天下古今民心皆同有民社者勿謂其難治但當責其治之之誠有未至焉耳如有不信請質于居敬云敬軒文集卷十五
