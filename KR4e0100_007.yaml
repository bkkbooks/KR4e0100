body:
  text: 敬軒文集卷七明薛瑄撰律詩簡楊景端我到城中己五日子在山間不一來應畏風寒歷氷雪想憂澗滑行莓苔石泉繞戶只自語柴門竟日因誰開姑射今朝好晴色相期握手登崔嵬留贈楊景端二首千里歸來訪故人喜聞結屋澗之濱手披青史尋髙士頭戴烏巾學隱倫樽酒細傾延好客斑衣輕舞奉慈親自慙東抹西塗手又促行珂覲紫宸秖聞騰踏上亨衢何事中林又卜居谷口引泉看灌溉隴頭植杖勸耕鋤還同主婦供親膳更課兒童讀古書莫向家山窮此樂好將功業贊唐虞簡孔别駕遊禹門用謝太守韻二首别駕乘春訪勝遊禹門佳處重遲留兩邊翠璧連天起三級銀河入海流變化豈無神異物往來應有濟川舟遙遙明德人知否地闢天成幾萬秋雙旌曾向禹門遊别駕今來亦暫留岸斷雲霞開翠璧天連棧閣駕黃流千金尚想波心瓠萬斛深期渡口舟如此山川元不惡可無詩句記春秋冬至二首九野蒼蒼閟太隂重淵脈脈動天心庖犧易有千年畫康節詩存半夜吟忽向靜中聞虩虩却從無處見森森固知一氣何曾息秪是天根辨古今萬古天開只此時却憐春意正如絲羣生已向無中見一氣還從靜處移匝地寒風徒凛凛行天化日漸遲遲吾心欲説知何似靜裏仍含未動機讀文山傳三首朔氣蕭森嵗向深揮戈抆淚動哀吟艱危已竭回天力慷慨猶存捧日心海水尋常秋月冷塞雲千里暮星沉悠悠往事都如夢只有孤忠照古今丞相聲名二百年分明往事在遺編初離故國悲禾黍再立危邦慘杜鵑大勢已傾寧畏死孤忠自許敢求全當時桃李知何限回首春風盡落然氛祲冥冥暗海波英雄無地用干戈精忠在我當如此成敗由天奈若何渺渺蒼梧西日淡蕭蕭大地北風多睢陽錦里皆祠廟丞相勛名共不磨登南坡土阜層層有萬盤偶來髙頂望人寰滿川宿麥浮青浪一帶晴嵐列翠鬟何處雲霞迷磧石數村桑柘繞綿山唐風晉問慿誰説地濶天髙鴈影間春日懷劉僉憲三首千里關河歸故邑兩年風景憶虛菴郢中白雪知誰和㸑下清琴想自諳君擁霜臺名未巳我傷風木意難堪近來幾欲裁書寄春鴈其如不向南南望中州有所思山川回首嵗華移早春京索銜杯處晚嵗崤函駐馬時月滿覃懷陪欵語霜清河朔寄新詩舊遊一一成追憶此後相逢更有期虛菴事業久礱磨憲府乘驄嵗月多巳見風霜清郡邑况聞詞賦動關河幾回邂逅情如舊兩載相思意若何自古中州多勝迹擬從飛蓋盡經過重登故鎮寺樓重來故鎮己三秋又上招提百尺樓山繞飛甍浮翠黛岸遮逺日斷黃流回溪俯瞰𥻘𥻘玉喬木深藏曲曲丘莫謂此時窮勝槩還期汗漫九垓遊紀先人舊遊三首樹己成林麥滿郊春風春雨自飄蕭孤雲出岫飛還逐衆鳥歸林嘯且招俯仰空驚天地在低迷深覺嵗華遙舊遊山水俱成感抆淚思親首屢搔隂隂夏木繞茅廬曾是先人舊寓居梁上又來前度燕篋中空有昔年書聲音尚想當忩發杖履猶疑隔戶趍五內此時摧裂甚詩成滿紙淚如珠秖願庭椿過百齡寧知奄忽便摧零舊遊山水皆悲思昔住園廬藎慘情菽水有歡成昨夢衣冠無計覩平生孫兒指點經行處清淚如泉散漫傾雨中簡周秉忠三首獨抱離憂罷酒樽更看連日雨傾盆庭除汨汨深流潦几硯層層潤積痕往事一編聊自詫永懷千古向誰論先生最是知音者咫尺何由一扣門兩耳瀟瀟怯雨聲三更起坐到天明小濡自合通宵濕大厦何由不日成傾㵼只疑天漢竭奔流深恐地維傾會須萬里清風至盡掃雲隂放曉晴客居長日少人過况復經旬積雨多自愛忩前生緑草不妨門外注銀河頑雲礙日能為沴流潦因風解起波為問郡庠周博士此時官况定如何贈海昌李太亨四首客裏終天痛有餘感君相慰意難舒細論往日交情厚却訝連年音問疏肝膽舊看如古鑑詩篇今覩勝明珠暫時相見還相别况是關河鴈過初我在中州君在吳幾年寥落鴈書無每思謝氏登山屐長憶黃公賣酒壚忽共青燈談肺腑細看白雪點頭顱英雄不減當時壯耿耿秋空劍氣孤古今身世共茫茫出處無端總是常才俊從來推賈誼功名未必老馮唐幾看上谷秋鴻影忽對中州夜月光聖代只今登俊彥豈容江海久徜徉中州風景正凄清忽與交親話舊情往日襟懷常浩蕩昔年豪傑漸飄零一渠汴水涵秋碧萬仭嵩山露曉青勝地相逢應不偶好將佳句詠耆英簡揭克英府幕聞道徵租日正忙暫移行幕駐僧房紅蓮泛水浮朝彩緑樹搖風引夕涼公暇不妨尋好句講時端復炷名香好將寬政安黎庶留取功名汗簡光雪後寄楊景端雪白山青北望髙相思咫尺興滔滔若人未必傷沈鬱吾道何須嘆寂寥董賈文章鳴治世臯夔事業擬清朝村居不識楊夫子懶慢何心作解嘲讀許魯齋思親詩洪熙元年冬十二月余扶先人柩至覃懷宣德元年春正月啓先母窆合祔於汾陽先塋既卒事因檢元音讀至魯齋先生七月望日思親詩乃悽然有感澘然淚下遂次其韻得詩三首因書先生詩於前以見先賢誠孝之心溢於言表雖百載之下讀之猶足使人興起復書余詩於後以見余不仁不孝不能竭力於始終視前賢大節有愧云思却千思與萬思音容無復見當時草忩夜靜燈前教蔬圃春深膝下嬉將謂百年供色養豈期一日便生離泰山為礪終磨滅此恨綿綿未易衰次韻觸目家山總是思思親况遇早春時日長每聽詩書訓風暖頻隨杖履嬉百載韶華成荏苒終天涕淚感睽離自緣孤子無誠孝不是人生有盛衰風光滿目動哀思春草春花似舊時堂斧已成終古恨斑斕不復往時嬉中宵秖解追前夢隔嵗猶如在逺離却憶髙堂覽明鏡曾將華髮嘆年衰倣佛音容倣佛思衣冠出入憶當時成人未返林烏哺稚子曾騎竹馬嬉椿老暮庭風槭槭草荒春塜雨離離固知罔極恩難報只恐終天孝易衰曲沃道中二首孟秋雨霽過新田緑樹人家斷復連汾澮波光晴泛日絳喬山色曉參天申生大孝留天地里克遺名載簡編何事齊薑墳上草忍將芳意度流年四圍山抱一川平新晉猶傳舊日名汾隰漲消秋色淡虒祁宫老夕陽明歌傳烏鳥空遺恨詩賦椒聊謾有情往事無端何足問且聼父老説秋成滎陽詠古八首京索千年能戰塵空將往事問居民山川逺近皆陳迹道路東西是要津黃屋幾回思義士赤精終古有真人拔山舉鼎知何似馬到烏江感慨頻萬山依舊接嵩丘京索於今不斷流莊假是非留隧道項劉成敗有鴻溝古槐樹厯嵗時久大海寺經風雨秋更上髙原訪遺迹荒城故壘暮雲稠日逈天髙秋氣清登臨懷古倍多情山連廣武故城在路入鴻溝草樹平甬道年深無舊迹索流嵗久只新聲興亡莫道皆如夢終古猶存楚漢名楚漢干戈久己休尚存遺迹在中州幾灣流水風煙暮一片荒城草樹秋力戰可堪離廣武分疆空見指鴻溝當時四百興劉計只在張良一運籌蕭蕭涼吹動秋空千古河山一望中廣武連營秋草碧鴻溝分壤夕陽紅石麟有甲含蒼蘚鐵馬無聲散曉風何限英豪俱泯滅白雲依舊出層峯陵谷髙低控虎牢戰聲消息水滔滔旌旗滿眼無遺迹壁壘連雲只舊壕廣武西原通鞏洛萬山南面接嵩髙悠悠往事皆如此懷古登臨何太勞滎陽景物似當時不見唐朝老畫師隧道莊薑今已矣京城太叔果何為留侯計用炎光振亞父身亡霸業衰多少是非成往鑑莫將遺事使人悲岡巒回合一川平澗壑髙低繞故城千古好山寧改色滿溪流水不停聲留侯總得翕張術漢祖深存駕馭情更莫登髙發長嘯當時豪傑已成名題沈令送别卷雙鳬縹眇上青霄令尹朝天不憚遙密縣於今思卓茂淮南自昔想時苖玉階仗引龍旗合寶殿香浮雉扇髙鴻鴈近秋多健翮佳章早慰此心勞西郊看刈禾二首為農每愛寬平地已向中州住七年莫道功名當早嵗且看禾黍熟秋天蕭蕭滿地收霜穗整整成􅀈積晚煙濁酒一壺勞僮僕素餐深恐愧前賢西原秋氣早生涼禾黍離離被隴黃穫處風煙輕捲席積來鴈鶩整分行大田已見多遺穗客廪應知足賸糧莫嘆書生親稼穡躬耕有客卧南陽酬黃養正韻翰苑香名乂己聞薊門秋晚又逢君孤城木落蟲吟月旅館風來鴈唳雲眼底江山期共賦馬頭岐路惜重分遼西不久留才子昭代如今正右文經王素亨舊居野浦荒村訪舊居鳥啼花落碧忩虛蕪園不復栽紅藥間館曾經看素書對酒每懷陶靖節論文長笑馬相如自從雕鶚因風去水色山光思有餘經玉田挽待詔魯仲輝孤樹山前兩度過懷人搔首重悲歌文章事業今如此别鶴行雲竟若何渺渺夕陽鄉樹逺萋萋芳草旅封多人間俯仰堪惆悵不必臨流嘆逝波都城即事曈曨曉日上蓬萊縹眇祥雲擁泰階旌斾風搖龍虎動簫韶聲奏鳯凰來九衢車馬香塵合萬井笙歌曙色開千古上遊形勝地兩都欲賦愧非才過苑仲仁莊居爽氣澄清暑雨餘乘間信馬到村居桑麻影裏元卿徑楊桞隂中靖節廬縱飲百壺賢聖酒劇談千古帝王書籬邊黃菊煩多種九日還來一訪渠無題四首逸思飄然賦逺遊可堪三島隔瀛州曾聞神女雲侵鬢見説麻姑雪滿頭海上樓臺常似晝山中瑤草不知秋若為借得仙家鶴鳴珮珊珊玩九州桂館瓊扉薜荔墻清修獨爾意難忘已將蘭芷為芳藉更集芙蓉製錦裳洛浦佳人鳴珮玉茂陵才子詠鸞凰應須一卺仙家酒散作人間雨露香風滿珠簾月滿樓瑤臺有路可追遊香生寶鴨沉煙細露滴銀床玉宇秋楚岫三更雲渺渺藍橋千里浪悠悠花箋寫就煩青鳥更為殷勤到十洲絶世青娥二八餘仙容綽約好樓居鮫人夜織綃為帔雲女秋裁錦作裾碧海蘭苕巢翡翠瑶池清水泛芙蕖秖應待得吹簫伴共跨飛鸞躡太虛題舊石橋古橋欹側岸縈回立馬臨流一愴懷鯨獸水沉沙底石蛟螭碑蒔雨中苔闌干幾曲人頻倚華表千年鶴再來擾擾勞生只如此好將襟抱酒中開宿水村二首日暮江頭送客還寂寥清夜不成歡連天海氣當忩白一枕江風入夢寒雞唱逺村皆落月潮生古渡己層瀾披衣久坐待明發白石歌餘興未闌投宿江村日己昏村童還為啓柴門壺觴欲醉黃翁酒盤饌深慙漂母飱夜雪生香蘆被暖晚煙添緑土床溫清宵總是滄波趣莫向人寰取次論春日遣興靄靄春雲度女墻萋萋春草遍芳塘園林風景非吾土庭館鶯花是異鄉野岸波紋浮鴨緑官橋桞色弄鵝黃不知多少相思意秖逐遊絲百尺長秋日寄王嘉靖漁陽秋色動關河遼右天晴一鴈過白社髙人渾懶慢青氊學士久蹉跎西風對酒砧聲切良夜調琴月影多珍重逺書勞問訊相思千里奈情何九日次徐懷玉韻對酒東籬自詠詩逺山晴望轉逶迤秋容淡薄黃花節風景蕭條白鴈時醉閲人寰聊縱目靜思塵事久支頥年年此日無窮意笑把茱萸欲贈誰簡白沈吕三藩府二首雄鎮堂堂相府深爐煙不受曉寒侵調元總屬經綸手下士常存吐握心嵗晚松枝留徑節春來棠葉藹濃隂豐功會見銘鍾鼎應有清光照古今大鹵提封接帝居大藩公相盡名儒觀風嵗久山常靜宣德冬來日漸舒畫省暖雲浮瑞鴨雕闌晴雪照金魚書生亦有扶搖翼更借剛風到碧虛留别文孫王宋四廣文我客并州嵗宴時偶然相見即相知香醪淺酌還深酌佳句朝題復暮題意氣難逢今日好風流不讓古人為嗟豫走馬明朝去雪嶺氷崖有所思早過天津即直沽煙收澤國曉天晴日出扶桑萬里明二水交流東海濶一城雄鎮朔方清連雲風送孤帆逺夾岸潮隨大舶平借問關門來往客不知誰是棄繻生七夕雨天孫不乞人間巧故使秋雲蔽月輝銀漢晚煙迷鶴馭玉霄涼雨濺仙衣更無綵結看蛛綴秪想橋成有鵲飛獨立秋風倍惆悵通津何處問榰機春日懷舊遊簡胥貢士二首薊門春色阻關河汴野東風長緑莎正是懷人煙景暮不堪對酒雨聲多間中謾寫凌雲賦醉裏誰聽白雪歌惟有流鶯相厚意栁溪花徑數來過落落襟懷正黯然早春時節憶前年玉田城外花經雨藍水橋頭栁帶煙千里交遊成逺夢百年蹤迹任皇天髙山流水知音在還對東風理素絃登資聖閣二首梁苑清秋白晝間偶尋名剎扣禪關百盤飛磴身遙上千尺危闌手自攀已見神遊朝貝闕便從羽化出塵寰中天俯仰多時節颯颯天風冷珮環化人樓閣倚晴霄大地山河極望遙秋入淮黃波浩蕩雲開嵩少影岧嶤九天沆瀣寒堪吸八牖星辰近可招十二曲闌渾倚遍一襟涼思正飄飄鹿鳴宴二首揭曉鄉闈日正晴大開藩府會文星繡衣弭節皆英俊章甫持衡盡老成龍管緩吹金縷細鳳笙齊逐玉杯行酒闌歸騎西風穩蟾魄秋髙萬里明古木森森政事堂興賢開宴會金章緋衣送酒傾鸚鵡翠袖吹笙引鳳凰晴日漸移珠箔影暖煙深護瑞爐香秪知醉裏風雲濶袖拂歸鞭滿路霜晚翠軒為李大參賦為嫌紅紫競春風獨愛幽軒晚色濃霜後翠飄千箇竹雪中清藹數株松自緣品彚孤根别解與忠良徑節同畫省公餘看未足一襟清思嵗寒中題滄州丹室卷道人結屋滄州裏四面闌干枕碧湍石榻生寒秋氣潤柴門湧月夜濤寒鸞凰佩影空中見龍虎丹光水底蟠清絶一塵飛不到蓬壺元只在人間送友人下第歸山東殘紅滿地草萋萋把酒都門惜解携秪擬大鵬摶碧落可應騮馬蹶霜蹄天開汶水龜蒙近日轉瀛洲岱嶽低一曲瑶琴休悵别重來雲路有丹梯題溪山嘉趣圖仙人騎鶴去已久猶有畫圖傳世間石林倒浸碧溪裏玉峯秀出青雲端數椽茅屋鎮寥閴一葉扁舟常往還借問此中何所樂萬事不羈山水間送王上舍歸省鳳城南陌栁依依把酒東風送客歸上舍已霑新雨露髙堂重舞舊斑衣文章濟世時應重忠孝傳家古亦稀我亦有親垂鶴髮願承天寵拜庭闈登科後還家省侍萬里鵬程浩蕩飛千年際遇古今稀初從天上看金榜又向人間戲綵衣衛水南旋帆漠漠晉山西上馬騑騑君親恩比滄溟大忠孝深期願莫違洛水道中古道縈回傍險行蕭蕭禾黍晚風清無邊詩思嵩髙色不盡年光落水聲華表柱傾秋草合龜趺碑暗雨苔生往來人世成今古一曲髙歌寄此情狄梁公墓邙山山下重夷猶曠世思公涕淚流荒塜一抔埋義氣豐碑千古表忠謀李唐神器危還正武媚妖氛散復收更賴紫陽華衮筆姦邪聞見總包羞陜州抵沙澗渡重岡髙下近𢎞農北首鄉關喜氣濃三晉雲山秋色裏兩河煙樹夕陽中棄繻誰識當年客操築應無舊日翁逺岸急風吹大舫令人却憶濟川功雨中過條山一夜秋空結晚隂曉來衝雨歷層岑山回靈籟蕭蕭急谷轉雲濤漠漠深最厭潢流淹逺道酷憐霜菊拆秋金却思二十年前路岷水岷山萬里心題蘇大尹具慶卷祿養雙親志不違人生此樂似君稀階前椿樹風長靜屋背萱花露未晞百里忽傳毛義檄三春又舞老萊衣定知移孝為忠日應有聲名達禁闈黃河阻風遣悶逺岸沙飛風浪渾流澌不斷下三門蛟龍凍蟄波心水舟楫寒依渡口村破悶只須吟麗句消愁誰與貰清樽臨流苦憶殷賢相回首傅岩煙霧昏和經武氏舊基韻羽衣曾此侍鑾輿觀闕今為一廢區鸚鵡尚留青帝坐牝雞無復紫宸居已看大象飛寒燼又見天樞偃緑蕪惆悵當年多少事西風回首一長吁送王别駕十五年前是故人還家今見錦衣新麟經共仰淵源學驥足終為鼎鼐臣逺别黃堂當晚嵗遙瞻紫禁正新春河橋分手情無限目送班生滿路塵卜居後簡陳廣文轉蓬天地欲何如又向中州買屋居峴首詩人王粲宅南陽豪傑孔明廬行藏秪想前賢迹事業惟存往日書賴有知音陳掌教時能相顧慰蕭踈和劉僉憲見貽韻明公年妙藴經濟登車攬轡何壯哉昔遊梁苑思一見今在滎陽逢又來知音幸自遇青眼得意便當傾玉杯明日河橋暫分手亨衢有約共徘徊有懷王大尹汝霖昔當賤子還家日政是賢侯赴闕時暫對離樽論出處逺從别路説相思重來只見棠隂滿一去空憐鴈影遲好在當年舊山水登臨誰與賦新詩有懷余廣文先生去此幾經年一度歸來一惘然綺席每思留月醉書忩長憶聽松眠流傳尚有關心句清切難尋入耳絃負却山川無限好把杯吟向晚涼天夏夜邑學士友携酒共話留連不盡意如何良夜相陪笑語多銀燭檢書勞問難玉壺携酒費吟哦樓頭逺鼓催華月天外微風落絳河坐到中宵人客散壯懷猶擊唾壺歌袁王杜三老携酒鱠話舊酬以詩為謝殷勤父老情到門相顧問歸程盤將銀鱠黃河鯉酒挈青絲白玉瓶細話交遊非往嵗劇談閭里異平生從今杖屨頻來往南陌東阡儘送迎有懷魏希文君居薊北我汾陽隱隱雲山道路長每念昔年心事好却慙近日宦情忙一年經世詩盈紙幾度懷人酒滿觴想是龍鍾應有分莫交容易鬢成霜聞蟬夏館秋涼客寓居忽聞簾外一蟬初己知時序相催急併覺天真感激餘楚辨吟秋蛩韻切齊箏彈月鴈行疏裁書為報歐陽子萬響中間有太虛秋日崤沔道中匹馬重經舊路岐西風蕭瑟晚秋時山川閲世無今古花草娛人有盛衰幾道泉鳴幽澗石兩崖蟬響夕陽枝秪應詞客偏多感處處秋光首首詩送馬太守之西安玉階新拜寵恩濃皂蓋西行五馬同秦樹到關開曉色嶽連當路出竒峯好詢民隱周三輔為播仁風答九重青史古稱張趙迹會看勛業繼前蹤呈王大參千年海嶽鍾英俊獨步文章擢茂科執法烏臺留徑節分符薇省布陽和春風隴麥行邊秀時雨棠隂到處多金鼎調元應有日豐功行見被絃歌春郊寓目杏花開後近清明雨過郊原愛日晴風轉緑蕪浮曉色氣催黃鳥變春聲山連少室峯巒秀地入梁園草樹平此景真堪供眺賞恨無知已論詩情登溫縣城古堞攀躋最上層煙蕪渺渺望中平大河波浪排空濁少室峯巒隔岸青巷陌雨餘林影潤城壕風起栁花輕平生最喜登髙賦况有沽來酒滿瓶河陽懷古武王曾此奮天戈繼世其如出狩何兩岸緑楊遮澳水滿汀芳草際黃河郝經墓古聲名大潘嶽花殘嵗月多遮馬堤邊重回首遮馬堤即唐李光弼取史思明馬處紫金山色鬱嵯峨次陳廣文韻留别二首滎陽南望萬山攢萬山滎陽山名偶此成家計未安生意秪慿禾稼好離情惟向酒杯寬詩留東道春將暮馬渡西河夏未殘自笑往來成底事鼎彛勛業定誰刋千里關河百里攢不知何日此身安秪應浩浩風雲闊倍覺茫茫宇宙寬三晉到時蠶已老二陵行處麥將殘人生離合尋常事要使髙名世不刋晚登故鎮寺樓危構峨峨杳靄間登臨不盡壯懷寬千年土地唐風舊一𣲖河流禹迹間鳥載夕陽歸逺樹龍携暮雨過前山此時無限飄然思便欲因風上九關送楊景端赴秋試至寶勝寺有客將為汗漫遊偶過山寺暫淹留門開佛殿金銀麗路入禪房草樹幽市酒飲多還覺醉風蟬響急又驚秋君行若到丹丘上為報羣仙未白頭秋日家山雜詠五首八月家山覺早涼登臨懷古興何長醉鄉樂土輸王績魯國髙文老卜商漢祀汾隂遺廟在殷遷耿邑故城荒樓船簫鼓空流水一曲秋風菊又芳孤城北望萬峯髙禹鑿龍門勢獨豪三晉山河還表裏千年人物舊風騷子安詩在名猶盛太史書成志已勞難覔醉鄉王學士秋來禾黍滿東臯蕭蕭林壑動秋風獨上崇岡四望同九折河流皆禹迹千年疆宇總堯封龍門獻策文中子麟趾成書太史公搔首髙人今逺矣斷雲滿目送征鴻黯淡輕隂結逺天無邊秋色正蕭然蒼崖斷岸西風裏古剎荒祠夕照邊黃菊已隨陶令老丹砂不信葛洪仙豪華靡靡皆如此惟有騷人麗句傳雲山西去接崑崙河水東來下禹門疏鑿但能留勝迹浮沈誰復問真源將軍三箭功何似教授千年道僅存獨立西風看秋色幾多心事向誰論贈澤庠趙廣文三首投宿山城雪打衣廣文情重啓華扉爐開瑞獸能噴焰燈結金蟲解吐輝官况不嫌如我淡交情深嘆似君稀明朝又上羊腸道回首寒雲滿目飛先生事業竟何如濩澤菁莪樂沛濡玩目豈無清獻鶴傳家應有子昻書緗縑歲久藝除蠧堂户年來觀送魚握手臨岐何所祝洪淵還好探驪珠登科輸子只三籌梁苑當年一樣秋往日已曽傾蓋語今朝何必典衣留瓶添􅌬醁頻斟酌唾落珠璣迭唱酬咫尺關河隔南北晉山明月下中州夏溪書舍為劉進士賦髙人臨水築茅堂入牖開風面面涼芳草滿庭交翠色露荷當檻發幽香彈琴石瀨含秋響杖策藜燈耿夜光我欲携笻逺相訪暫從墳典話黃唐題沈令雙桂堂小山人去嵗悠哉移得芳叢夾戶栽緑蔭共隨簷影落清香時逐綵衣來年深應有連枝瑞老大寧非聳壑材總賴髙堂培養力秋風還有幾花開題沈令瞻松卷底處知君憶所天瞻松終日涕漣漣春翻時雨情何極秋灑涼風興慨然鳥語故巢天欲曙鶴來滄海月初圓此情欲問何時盡直到蒼蒼化石年酬師中吉見貽韻老成名譽逺流傳忽寄新詩到客邊玉札丹砂應有訣蒼顔白髮保無愆失雲病鶴翎猶健趂日芳葵色自妍莫向周南嘆留滯丹梯依舊好攀緣送李少府從征相知未久又分襟春色離情兩不禁暫解瑶琴辭汴水還衣晝錦過家林野塘日暖氷消玉官路風和栁嚲金談笑青油有餘興鱗鴻頻為寄佳音和曾僉憲贈劉僉憲韻二首乘軺早嵗赴三川按節中州又幾年天啓貞符欣際遇星明執法羡超遷綱維已見當時振詩卷仍留後世傳邂逅幾回嗟又别好期勛業在凌煙聞築烏臺一室成四圍曉色抱虛明簾櫳雨過琴書潤戶牖風來枕簟清白筆通宵飄爽氣訟庭長夏絶囂聲懸知到處留遺愛賸有棠隂繞棟楹題劉僉憲琴書清處虛菴底處貯琴書聞築幽軒傍所居竹葉分隂侵几席松花和雨點階除調髙㸑尾初離匣帙古藝香正滿厨好在希聲與真意一襟清思逈難如興隆寺百尺髙臺接女墻梵王樓閣白雲鄉忩開北極星光近簾捲西山爽氣涼逺岸風蘆秋瑟瑟滿城煙樹晚蒼蒼因知一氣乾坤大併覺身心入混茫魯齋先生覃懷書院南北風塵􅐓洞中天開人極産英雄幾年力學尊尼父萬里心傳得晦翁自信興王為大道豈知伐國是元功當時歸老情何切為愛西山萬玉峯簡柴同知手持雲錦到天鄉鵷鷺亨衢共頡頏讞法十年推定國分符千里得王祥清聲籍籍傳中土爽氣飄飄接太行政暇好書還自覽新涼昨夜滿黃堂覃懷秋曉作樵樓月落曉鍾清起坐南忩讀聖經道大豈如湖海闊義微何止羽毛輕天開陴堄鴉初散風過園林葉盡鳴便欲出城間極目西風清絶有髙陵覃懷秋夕詠懷客裏覃懷又過秋一樽相對興悠悠論材恥作千人俊投筆寧期萬里侯霜葉滿庭紅不掃月華當户靜還留人生志業無窮在肯學潘生歎白頭寄沈仲安廣文幾度相逢汴水邊好懷偏為客留連北忩夜坐銷銀燭南浦朝遊並錦韀共指黃流經朔漠獨尋廣武暗秋煙與君幸自俱年少莫寄安成內史篇贈袁司訓華胄遙遙代作公先生還此振儒風已從桂籍看清譽又向芹宫識粹容狂飲尚能欺臘蟻放歌誰復感秋蓬追隨駿馬城南别笑拂吳鉤氣吐虹修武懷古二首春過寧邑馬行遲攬轡東風眺望時淬劍池留中散迹承恩鎮駐武王師劉伶醒酒臺猶在漢獻封公冢謾遺七世同居良亦少至今人詠義夫詩寧邑南邊穎水流勒兵周武幾經秋黃崖石古煙雲合青口山深草樹稠百佛謾存岩畔迹七真無復洞中逰循良衛颯今何似猶有髙名播九州敬軒文集卷七
