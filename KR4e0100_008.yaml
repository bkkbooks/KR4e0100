body:
  text: 敬軒文集卷八眀薛瑄撰律詩送王秀才登鄉第歸覃懷文運天開四海清新頒鳳詔屬賔興中州河嶽鍾神秀梁苑風雲集俊英祗見驪珠千鎰重肯同魚目一毫輕看君得意歸鄉里何異當年晝錦榮雪後至西郊二首偶爾間行出近郊新年殘臘氣將交蒼茫逺道風初定寂寞平原雪半消春色漸催山色動天光渾逐水光搖乾坤滿目皆生意何必清宵看斗杓臘到新年才幾日四郊生意已欣然髙低雪色春融液逺近煙光水接連已覺洪鈞回大地更看白日麗中天嵗華人事皆如昨只有思親意惘然題陳僉憲族譜二首華胃誰如陳氏賢一門幾世住蛟川宗分衆派多遺澤家富羣書總舊編蘭玉在庭爭奕燁鵷鴻得路競騰騫新裁譜籍增光耀珍襲應須久逺傳蛟川喬木緑成圍詩禮傳家古亦稀插架牙籖充棟宇分行蘭竹秀庭闈清門接踵雙黃榜烏府連聲兩繡衣積德由來應未己佇看譜牒旋增輝偶坐道傍獨樹下看山獨樹道邉清影密偶來間坐已多時塵勞擾擾于人厭山勢亭亭與客宜逺谷蒸雲能變化亂峰聮碧自逶迤褰衣便欲尋幽勝只恐山靈解勒移雨後寓目天衢廓落放新晴渺渺煙郊四望平嘉樹戰風搖野緑好山經雨洗空青兩間滚滚皆新氣衆水滔滔只舊聲玉燭已調今有象萬家耕鑿荷生成夏日簡陳廣文靜掃書齋坐日長好風時復送清涼焚香讀易添新趣隱几看雲憶故鄉蛻殼已聞蟬響急將雛頻見燕飛忙索居久欲來相訪觸熱其如汗作漿沈廣文送梨榴八月梨榴俱已熟殷勤相送揀珍竒黃如楚國來柑橘紅似瀘戎擘荔枝磊落堆盤香並美酸甜濺齒味皆宜少陵肺渴全消釋只欠瓊瑶答所私新鄭詠古經行鄭國舊山川禾黍秋風駐馬看煙樹幾灣流水在荒城千載暮雲間時門雨歇無龍鬬大隗山髙只鳥還借問當時賢相國幾多遺愛在人間扶溝道中古堤東去路漫漫與客聨鑣縱大觀草木近浮梁苑闊煙霞平入楚天寬清風細細催蟬韻爽氣飄飄近馬鞍行到扶溝詢舊俗大賢千古仰髙山留别鄧司訓偶過儒宫幾日留廣文清義若為酬連床夜聽蕭蕭雨聮句朝吟淅淅秋臨水乍驚新漲急看山還喜逺青浮蟬聲驛路眀朝别回首髙城古木稠秋日遣興簡陳廣文西風連日雨初晴已覺新涼滿户庭玄鳥相將寧見影寒蟬寂寞已無聲能文解動髙人興對酒誰同好客情賴是長沙老詞伯新詩相送小童清秋日王屋道中五首﨑嶇連日太行中王屋名存縣已空濟水難尋潛地脈天壇遙見出雲峯黃花夾道開清露紅樹漫山醉晚風處處登髙重回首客懷秋思浩無窮路轉山回處處迷不登絶頂即尋溪寒泉徹底清人目亂石盤空割馬蹄繞徑黃花猶戲蝶隔村紅樹乍聞雞無端客思匆匆甚好景其如每倦題地闢天開有此山經行祗覺礙人寰久知元氣包空外細看長松走石間有水逰魚還上下無名啼鳥尚間關髙秋不盡登臨興客况何由一日間盡日區區歷險艱山光時為破愁顔一川霜葉翻紅袖幾簇煙嵐綰翠鬟佩玉聲清秋澗急旌幢影落暮雲寒時登絶頂看天地元氣氤氲杳靄寬寥落山家處處稀尋幽陟巘馬行遲滿溪紅葉沉秋水半嶺霜棉吐夕暉雨霽石田收稼了煙深松徑負薪歸詩成只恐山靈笑千仭峯頭一振衣登中條山東頭魏國中條此盡頭登臨暇日興悠悠兩崖勢轉黃流靜萬壑聲寒碧樹秋官舍飛甍臨逺谷琳宫細路繞層丘風光滿目皆吾土逸氣飄然總勝逰戲題紅葉自是霜根獨占先晚秋殘緑變紅鮮胭脂膩染嬋姢女金醴濃薰綽約仙入水忽驚丹伏鼎向陽還訝火生煙秋光宛似春光好搖蕩相思九月前登中條山望大河有懷戴趙二同年登髙遙望大河南木落天空爽氣含細路微茫通沔洛亂山重疊接崤函白雲關塞新過鴈黃葉園林舊駐驂最憶韶陽同榜客往來長是縱清談寄襄陵丁廣文風雪匆匆老嵗華往來三宿廣文家名香泛靄薰瑶席書燭分光照紫霞别路逈驚汾水逺離情長繞晉山斜多君鳳穴風流在擬向鵷班次第誇送湯自新之永和令羡君初拜九天恩銅墨之官喜氣新一路好山迎去馬二陵時雨浥行塵花封舊有唐風厚政績當如漢吏循我亦趨朝應有日佇看名譽逹楓宸神州八景瓊島春雲昨夜東風海上過玉京瑶島得春多數峯秀色分金碧滿谷祥雲絢綺羅映日已增千古瑞隨風頻繞萬年柯祗看出岫為霖處長濟蒼生樂泰和太液秋波仙家島嶼繞瀛洲一鏡波澄淡靄收影浸玉樓先得月光鋪翠簟早生秋九霄氣接銀河逈萬頃風行雪浪浮自是此中涵帝澤年年長向世間流玉泉垂虹山澤從來一氣通山頭飛瀑瀉玲瓏隨雲已作千秋雨映日還為五色虹瑶澗金銀騰寶氣碧霄珠玉濺髙風若為剪取氷千尺一洗塵懷萬斛空居庸疊翠玉峯相向復相連一雨初收霽景鮮橫界曉空青未了平浮春野翠無邉鳳城佳氣通朝靄鰲海晴輝接曙煙自是古今天設險皇圖永奠億千年盧溝曉月一曲清流繞帝畿宿雲收盡曙光微踈星尚照離離影殘月猶涵淡淡暉霜滑石橋征鐸響風清沙渚塞鴻飛經行併覺塵埃盡多少清光上客衣薊門煙樹石門相對一川平嘉樹依依接鳳城密繞溪村雲未斂半遮山寺雨初晴歸鴉向夕穿新緑嬌鳥啼春護落英試向髙原凝望處祗疑韋偃畫初成金臺夕照千年玄社已消沉尚有荒臺僅數尋壞埓只今生翠蘚頽垣不復貯黃金山銜落日留殘照樹擁孤雲帶夕隂駿馬無聲衰草合冷風涼月暮蟲吟西山晴雪皇都一夜散瑶華曉見西山霽景嘉照日凍泉封素練蹴天潮海漲銀沙晴暉近接仙人掌爽氣平浮上帝家多少玉堂揮翰手此時清興正無涯寄舍弟瑭四首同侍先人久宦逰先人沒世葬林丘弟修蘋藻居鄉里兄竊功名上帝州鴻鴈影分思並宿鶺鴒聲逺念相求勉修令德光前緒頻寄書來解我憂先母亡時汝四春先人辭世汝成人二親恩比乾坤大一氣情如手足親荆樹願同珠樹好棠華期與嵗華新故鄉聞道逢艱日生計無忘早晚勤父母生來汝與吾承家付托藉良圖立身莫若親賢士防患應須逺酒徒得善便當銘肺腑敬身寧使損肌膚兄年謾長慙無德併寫斯言列坐隅幾載艱虞西復東正趨眀詔老親終含悲共汝辭河朔輿櫬還家托故封忽憶鴒原千里逺祗應棠萼兩枝濃願叨微祿膺天寵早得焚黃拜祖宗送牛給事領勑命還南京三首趨朝北闕近臣回送别南風祖席開玉佩暫辭鵷鷺侣畫船行近鳳凰臺江山爽氣臨官署星斗清光接泰階此去超遷應有日中朝屬望想重來黃門三載北趨朝又沐天恩下九霄别思暫傾燕市酒好風宜放潞河艘家人蟢子占應近官舍燈花結未消聖代兩京宏治化好持忠謹答軒堯南歸紫誥喜新頒送别都門擁大官鸞紙分題殊浩瀚羽觴行酒任飛翻吕梁浪穩仙舟度京口風清客思間想到秣陵瞻北極便應咫尺見天顔元氏詠古太行西望翠成堆白石諸峯爽氣來元震劍鋒留石刻李躬書院長青苔磨磐南接田文墓槐木東連漢將臺獨羡三公神異久會鍾英傑位台階磁州詠古二首北來行色正駸駸馬傍西山靜客襟滏水源從龍洞出漳河流自發鳩深卓茆亭古無遺響勝景園空罷賞心翹首川原思故老尚留珠玉到如今持節南行過滏陽川原繚繞接衡漳神麕山下河流出牛尾岡頭故塜荒風月舊樓餘斷刻大眀遺剎有名章園林花木南薰細猶似祥蓮九夏香邯鄲贈賈進士使關中接踵青雲滿後塵君于道義最情親寧知握手邯鄲地同是觀風郡國人太華倚天秋氣爽洞庭橫劍曉霜新相思南北須珍重早約回轅覲紫宸留贈沈仲安廣文年來初識沈休文楚楚才名逈出羣學道每能安素履論交端擬薄浮雲幾連華榻眠春曉又共清燈語夜分我向湖南重相憶莫忘書札往來聞鈞州詠古次虛菴韻二首南風攬轡過中州陽翟名邦得縱逰彩鳳臺空芳草合黑龍潭靜淡煙收馬經穎水清無迹路繞黃山翠欲流眺望幾回情未己逺空雲影自悠悠匹馬南行接楚州路經櫟邑遂清逰學仙人去洞猶在鳴鳳臺空聲已收無限好山皆北向幾灣野水盡東流垂鞭不管馬行緩更覺間吟情緒悠鈞州分司槿花盛開戲作分司庭下舜花開清倚雕闌絶點埃坐客正看新朵盛逰蜂仍逐暗香來欲留芳艷眀朱幌忍見殘英墜緑苔縱是鐡冠心似鐡也應花裏暫徘徊襄城詠古連村緑樹近襄城駐馬郊原眼界眀汝水似環流處碧首山如案望中平具茨每笑莊生誕挂劍常髙季札名佳句獨思韓吏部太平今已息天兵葉縣詠古沙河南度草煙平緑樹隂邉見古城湛坂戰爭非義旅昆陽破賊是雄兵鳬來尚説王喬舄龍去空傳葉令名黃柏山前田漫漫己無沮溺舊時耕贈舞陽朱進士甲科選士擢才良喜見天荒破舞陽彩筆昔年同戰藝藍袍今日又還鄉相逢莫厭金樽滿談笑聊便竹牖涼柏府先登應自愧好期他日共飛霜慈氏寺留題次虛菴韻義陽慈氏古叢林風景蕭然靜客心到院好香浮細靄隔簾幽鳥送清音槿花妙有空中色柢樹濃交户外隂持節他年重過此會須細聽穎師琴應山四賢堂次鍾文亮韻平蕪青滿讀書臺為憶前賢故故來一代髙名曽仰德百年陳迹但興哀碑文剝落漫苔蘚棟宇傾頽困草萊欲奠椒漿無處所向風搔首重遲回至武昌口號不須飛蓋逺相迎暫向霜臺弭使旌藩臬盡知周典禮吏民皆識漢官名千年有幸逢熙皡萬國同風樂太平自顧樗材叨寵渥秋毫何以答天眀嘉魚寓目舊時沙羡號嘉魚邑小人家星散居官舍髙低叢異木大江環繞合重湖蜀山駐蹕空傳漢陸口屯兵已罷吳更上層峯肆遐覽晚雲飛盡楚天虛登嶽陽樓四首人間聞有嶽陽樓三十年來快此逰舉目但知天地闊憑闌不管嵗華流江通巴蜀千山漲湖接瀟湘萬頃秋浩想希文話憂樂關河直北是中州髙城粉堞背層山城上危樓俯急湍湖水欲包天地外棹歌只在水雲間湘靈鼓瑟今何在仙子凌風去未還遍倚闌干閲今古白雲渺渺白鷗間玉斧飛霜過洞庭嶽陽樓上寄髙情天涯楚樹千行緑湖面君山一點青今古留題才浩渺往來登覽嵗峥嶸中天徙倚多時節笑挹髙風滿抱清澤國西風淨曉煙登臨暇日興悠然連空海水浮員嶠拍岸江聲送畫船蘭若滿汀懷楚客雲霞終古憶飛仙東南壯觀知應少細讀留題記往年桃源詠古次趙子裕韻雲林兩岸夾江津持節從容得遍巡百里仙源通異境幾家流水斷征塵溪頭翠竹偏宜夏洞口紅桃已放春一自輿圖歸聖化更無人世避咸秦辰陽秋日雄城百雉控蠻荒山翠髙低護女墻萬里梯航通六詔五溪煙水下三湘邉氓久已漸華俗逺客頻應望帝鄉地氣于今同北土早秋時節雨生涼辰溪二首分司門外大江橫怪石參差岸不平眼底秋山無限好坐中涼吹有餘清棗垂翠葉丹砂重蠟滿青林素練眀莫道蠻荒少題詠龍標詩有五溪名辰溪縣裏駐華驄人俗雖殊景物同隔岸好山髙聳玉繞門流水逺涵空雨過晚砌苔痕緑涼入秋堂蠟炬紅為念逺氓情未己夜深欹枕翠帷中沅州簡劉主事瀟灑沅州舊憲臺早秋持節自天來池邉修竹知誰種窗外寒梅待我開永日已應無兩造清宵時復望三台知音更遇鵷行侣客裏如何不放懷送劉主事之貴州三首每憶襄陽孟浩然喜君風致自翩翩聲名重比千鈞鼎藻思深如萬斛泉玉節分光來北極軺車結軫會南壖沅江此别何時會應在春花未發前沅州相送意何如正是秋風八月初蘭芷香來飄客袂芙蓉花發照征車丹砂水碧登天府洞獠林蠻入版圖萬里山川逰覽遍好將風土載成書畫省官僚總俊才早知名譽動金臺細論黃甲聮鑣步同是青雲接踵來邂逅龍標官署靜分携沅水健帆開眀年二月花如錦送子東風上玉階沅州秋夜獨酌江城秋夜畫堂清市酒沽來只自傾繞壁任教蟲響切照人偏喜燭花眀七千里外思鄉邑十二時中望帝京願布仁風滿南極還將逺俗奏彤庭發沅州畫船清曉發沅州送别官曹簇逺洲雙櫓忽隨髙岸轉孤城已隔亂山稠殊風異俗多經覽瘴雨蠻煙任去留向夕燈眀何處泊蒼蒼候館石林秋過沅州見故鄉父老從戎者與道家鄉事多有識先人者因賦此邉城父老舊鄉鄰弭節從容問所因緑鬢已應辭故里白頭猶解識先人衣衫尚有唐風舊童稚皆傳楚語新為説好安耕鑿計只今雨露萬方勻黔陽九日黔陽九日意何如北望神京萬里餘行院已無人送酒故園應有鴈傳書鐵冠不向秋風落黃菊仍霑曉露舒霜滿南天消惡氣錦囊何必佩茱茰黔陽龍標山下古黔陽二水交流萬里長風土往時為異俗車書此日混遐荒棕林帶露毿毿碧橙實經秋顆顆黃清晝柏臺無訟牒旋吟佳句旋焚香龍陽懷古縣城北枕大江頭水國輕煙淡不收星土從來分翼軫雲山何處是金牛濯纓尚有當時水種橘猶存舊日洲極目洞庭波漫漫幾回乘興欲東流益陽詠古澬水西來繞縣流煙波逺接洞庭秋津頭客舫足江貨岸畔人家多竹樓甘壘草荒秋月淡裴亭樹老暮煙稠浮丘仙子何須問我亦當年賦逺逰同侍御張勉夫院宿二首持節俱從逺地回連床兩喜宿烏臺談詩細雨燈前落對酒清風柳下來白雪敢歌當日調青雲未負此生懷霜蹄曉踏香泥去笑指空衢萬里開風雨霜臺集暝煙同官復此對床眠消懷酒味于人好報喜燈花向客妍談困尚誇肝膽壯睡酣不覺鼓鐘傳眀朝定是晴眀候通籍還應覲九天寧鄉遇雨湖南風土異中州嵗暮蕭蕭雨不收黃葉未全凋老樹青林猶自滿層丘傳聞纍嵗都無雪祇覺三冬總似秋却憶故鄉天道正迎霜已著禦寒裘寧鄉詠古二首千家縣樹古黔中四望雲煙鎖翠峯水引溫泉分地利雨來雲洞仰神功朱門道學推張栻宋室忠賢數魏公鬱鬱遺阡今尚在滿山松柏撼髙風風煙渺渺接長沙竹樹蒼蒼繞縣衙入境已知山水秀觀風殊覺士民佳魏公華表橫秋草易袚巖扉掩暮霞更覔南軒讀書處寒梅開遍古祠花長沙喜天色晴霽賦此連旬山雨濕行旌弭節長沙喜晚晴嶽麓斷雲歸洞府瀟湘皎月照江城銀河一派仙槎穩牛斗三更劍氣橫樽酒此時聊自適滔滔不盡古今情長沙四詠湖南清絶有長沙江市悠悠郭外斜水合三湘開浦漵山連五嶺散雲霞鷓鴣踈雨黃陵廟鵩鳥殘陽賈傅家且喜登臨窮勝觀不須懷古重興嗟江城卑濕少塵埃霽景風煙四望開水接洞庭從北去山連衡嶽自南來悠悠八翼陶侯夢落落千年賈傅才自昔為邦多故老總留風節使人哀名郡前賢是舊逰我來回想興悠悠少陵幾醉樽中酒子厚重題驛畔樓嶽麓雲霞常帶雨洞庭波浪逺涵秋為邦誰似朱夫子道與湘灕晝夜流眀時持節按湖南澤國風煙到自諳客舫盡應依水市人家多是住山嵐三苖已見華風逺五嶺應知聖澤覃廊廟只今登俊彥不勞詞賦弔湘潭寶慶喜雪一夜瑶華遍楚壖霜臺曉色正清姸天從北極行時令氣肅南荒壓瘴煙春信喜傳庾嶺樹客懷寧憶剡溪船觀風使者無他祝願與官曹詠有年答何永芳三首星斗東來轉玉衡逺逰時序不須驚邵陽松竹迎寒秀澬水林芳待暖榮政美己如金碗蔗官亷爭比玉壺氷獨騎驄馬經行遍喜見民風處處清邵陽風土接湘衡賢令之官犬不驚此日銅章分氣象往年金榜被恩榮無心真宰初行雪有腳陽春欲泮氷持斧自天行郡邑溪山隨處好風清飛騰還擬秉鈞衡小試牛刀豈足驚滿目山川開壯麗無邉花草待欣榮瘴消楚越山多雪春滿湖湘水不氷笑指梅花賦佳句柏臺風致有餘清武岡山行武岡南去萬山深氷雪峩峩閟太隂石磴盤空飄凍靄板橋橫水急清音前旌婀娜回飛鳥吹角悠揚過逺林玉節壯逰天地大風霜祗保百年心沅州已酉元日二首邉城萬里入提封元日瞻天拜舞同星麗碧霄皆拱極水趨滄海盡朝宗千年舊仰甄陶力三始仍看長養功遙想鵷行峩豸侣繡衣應染御香濃履端宏啓三陽運戀闕遙馳萬里情龍尾仗嚴鞭韻徹鳳池班整珮聲清風霜每抱瞻天敬葵藿寧忘向日誠玉節趨朝應不逺會從鵷鷺紫霄行沅州賀正旦歸院賦此千門結綺遍江城竟夕風傳鼓角聲兵甲森羅嚴虎隊旌旗繚繞簇龍亭車書萬國開元日文武同心仰聖眀歸到臺中添喜氣紅梅花底覔詩情沅州院中紅梅二首冬來都未有羣芳祗見春紅滿後堂新蕚半開含國色繁英爛發散天香宿酲未解風前醉穠艷猶凝雪裏粧幾度巡簷索清笑仍燒絳蠟待昏黃自是人間第一花天教絶色冠羣葩可應洞府神仙質粧點氷霜御史家踈影入杯翻絳雪清香隨手折紅霞詩中帶得江南物歸到鵷班取次誇沅州元夕一年佳節又元宵異域春雲滿眼飄院落梅花凋冷蘂池塘柳色弄新條升平樂事懷中夏老大丹心戀聖朝獨擁霜臺清似水紅燈幾點月眀髙贈别賀侍郎一别經年梅柳新相逢沅水意何親柏臺英俊推先逹桂籍聲名忝後塵又捧天書清部伍幾操憲節逹陽春中朝屬望歸來早佇沐龍墀寵渥頻二月十五夜花柳池臺宿暝煙清宵俯仰興悠然一年好景春才半萬里晴霄月正圓憲節逺依南斗外鳳城遙在北辰邉馬周舊是新豐客呼酒東風憶往年五友詩竹此君風致自踈踈相近相親慰索居玩目每看髙節長留情深托寸心虛清修飽歷風霜久濃渥深承雨露餘好在百年無剪伐賸看新笋上霄衢梅憲府孤根别占春清標瀟灑離風塵南州花思偏留客東閣詩情解動人玉管吹香風力軟氷壺涵影月華新坐令懷抱深如許暗想調羮事業親蘭一自移根逺谷來便添清興滿烏臺羲娥馭日光風轉青女飛霜絶艷開每憶瑶琴翻雅調謾充騷佩慰髙懷同心托契應非淺細看流年雨露栽菊一氣蕭森百草黃獨留此物傲秋光霜從降後殊多艷風不來時亦自香詩客采英秋得句佳人倚竹暮凝糚嵗寒惟有烏臺客共保芳根近畫堂蓮芰荷相並滿青池不受飛塵半點緇髙蓋每看濃露集曲房一任好風吹天姿不假雕鐫力妙色多應造化竒靜立亭亭如有待結交須賦愛蓮詩沅州三月一日思親先人忌日風木摧心已四年沅州春日苦暄姸無邉雨露滋羣物大地陽和浹九泉懲忿敢忘當日訓守身期佩昔人弦光榮不及酬親願俯仰終天涕泫然春日再發沅州又住蠻州似故鄉官船兩度發沅陽貪看獻嵗春山緑却憶髙秋老樹黃宦迹不應辭逺近天遊真可縱徜徉沿流儘有新詩興夾岸風來杜若香黔陽野人有饋魚者詩以酬之幾日山中只飯蔬野人携籠饋雙魚欲懸却怪羊生矯學放猶疑子産愚酬價且傾官廪米割烹恐有故鄉書甘腴悅口斯須味一飽應知不顧餘疊前韻正是行厨薦野蔬多情野老送江魚細詢漁釣知何樂解道綸竿自養愚金錯飛聲初膾玉銀盤放筯且推書殷勤更欲沽僮僕食罷還應問有餘辰陽端午遣懷二首五溪五月當五日時俗猶存舊楚風角黍堆盤人送玉龍舟疊鼓水搖空入簾山色隔江翠照眼榴花向日紅賜扇逺懷鵷鷺侣去年同謁大眀宫辰陽况復遇端陽沅水牽情萬里長鳳闕當年頒扇早龍墀此日賜衣香獨簪白筆叨天寵逺抱丹心憶帝鄉未必蠻中久留滯趨朝應只待秋涼發沅州舟中寄陳侍御二首駐節沅州整一年束書今喜逺朝天久知按部無膏澤自愧居官費俸錢前度江流行思好舊逰山色别情牽西風一夜歸心切北極恩光日月懸捲旗沙上簇雕戈畫鼓催舟發棹歌歸思載瞻黃道近交情將奈繡衣何一江煙水澄秋練兩岸雲山擁翠螺欲問清宵别來意冷猿啼處月明多泊武口驛風濤近接洞庭湖楊柳堤邉水驛孤回首已應蠻徼逺登樓殊覺楚天虛征帆北客依津市貢篚南金引舳艫清夜不眠持憲節歸心先到帝王都洞庭湖阻風四首髙秋木落洞庭寬白筆南征使者還蘭若馨香懷澧浦煙霞縹眇認君山己應湖海添清氣更覺風濤入壯觀枉渚維舟苦留滯嶽陽樓上憶慿闌繫舟無奈北風何遣悶還應一放歌日射湖心翻錦浪煙收山頂露青螺蒼梧水闊秋天逺斑竹雲深暮雨多千載湘纍無復見欲從何處弔英娥海內無如此壯逰髙風木落洞庭秋青山半在波中出白浪渾如天上流騷思難尋澧浦佩客程頻望嶽陽樓江河逺客情何似浩想希文獨未休濤聲連日捲銀沙野渚無聊眺望賖數點雲山湖上出一行風葦岸邉斜老髯難覔仙翁笛白簡還乘使者槎况是中秋眀月夜瀟湘久客正思家湖中阻風望君山一望君山咫尺間不堪連日阻風湍祗愁枉渚維舟楫安得遙空縱羽翰天地盡應浮海水蓬壺自昔隔塵寰會須挂席過林麓石磴攀蘿極妙觀湖中風濤大作正是清秋月色多大風終夜鼓洪波銀山萬疊來髙下鐡騎千羣入蕩摩好夢驚回朝帝闕歸心併起望天河明當少轉封姨力百里平湖頃刻過登小孤山二十年前曽過此今朝重上小孤山九霄旭日清光近萬里秋風爽氣寒南紀諸峯連地脈東流衆水會天關江山不盡登臨興望闕思親正倚闌儀真三詠東南水陸會真州河朔風雲拱上遊潮落瓜洲逺渡出天連揚子大江流迎鑾鎮古名猶在解劍橋荒事已休多少繁華成俯仰萬家煙火不勝秋聞道真州景物多晚秋時節偶來過蒹葭暮雨連滄海楊柳西風落漕河曉岸帆檣南客舫夜船燈火北人歌寓居候館情無限一寸丹心奈爾何大江分派入儀真楊柳人家夾去津舟楫東南來貢賦衣冠西北會星辰雲通赤岸天多雨境接滄溟地不塵欲問東園無故老苦吟搔首向風頻歌風臺二首芒碭雲連古帝鄉歌風臺近泗河傍蚤提三尺安天下尚想羣賢守四方英魄有靈藏地逺威名無比配天長當時赤幟知何似紅葉園林夜有霜故城南畔泗河隈漢祖歌風有舊臺樂飲一時酬父老壯心千古憶雄才新豐桑柘蕭踈盡芒碭雲霞散漫開一自鼎湖龍去後英魂幾復沛中來發通州再往湖南海內江山已慣逰今朝重泛潞河舟初辭天上雙龍表尚想雲間五鳳樓壓岸曉霜眀憲節到船寒雨濕貂裘預期回首當開嵗未必湖南可滯留過流河驛挽王侍御停舟沽酒酹王君忍見寒蕪遍旅墳岐路可無人世别星霜便有死生分青驄騰踏名猶在白鶴旋歸語竟聞俯仰幾回增感慨朔風吹斷海西雲襄陽懷古鄧城才過見樊城舊堞荒涼總舊名廢沼幾行寒鴈下踈林數點晚鴉鳴分茅尚自懷山甫謀國何須羡曼甥更問襄陽千古事峴山依舊漢江清襄陽逢至日襄樊又喜遇陽生士女傾心玉燭眀一畫已占吾道長六符仍覩泰階平朔風吹雪荆山曉化日流春漢水清大地陽和從此布柏臺寧復冷如氷逰嶽陽圓通寺巴陵古寺有圓通寺下平湖接太空禪室靜涵鮫室冷梵樓遙映蜃樓紅諸天只在虛空外萬象皆歸曠蕩中鐡面道人人不識偶來登覽自從容逰君山兩過君山苦未逰今來山下暫停舟雲林一徑蒼苔合佛殿千年古迹留日月每從波底出峯巒常在氣中浮人生志節當如此屹立狂瀾幾萬秋桃源道中三首初聞勝景如天上此日經行已再來水入松篁鳴處急山圍村塢到時開荒溪難覔當時洞廢觀空餘舊日臺謾説人間有仙迹不知天地也塵埃兩日桃源道路中無邉清興每相供雲山過後層層見澗水行來處處同蘿徑煙光籠軟翠松巖雲彩絢新紅何當一覽蠻中小更上淮南萬仭峯桃源景物信幽竒幾度遊觀愜所思丹碧峯巒雲裏見青蒼林木鏡中窺漁舟一去仙源合石洞重來碧蘚滋惟有武陵溪上樹年年花發使人疑沅州元夜同陳侍御觀燈萬里歸來自帝朝沅陽今是兩元宵詩從見月添新興人喜觀燈得俊僚北極星辰垂地逺南天瘴癘到春消柏臺風致清如許梅蕊頒香入凍醪戲詠五友五友留連興趣多相看長是動吟哦梅花酸實垂垂盛蘭畹香風細細過老大竹根生嫩笋輕通藕蒂長新荷不知黃菊花開日已别還應未去何沅州雜詩十二首積雨連朝喜晚晴天開睥睨望邉眀水添沅澧新濤急山洗黔巫宿瘴清奉使每期三尺正觀風快覩萬方平霜臺永日多詩思新笋兒孫次第生駐節三年尚未歸黃梅庭院雨霏霏池荷柄短青錢小露竹梢長粉籜稀大道久知千古在逺懷未信一生違新晴眼界何空闊萬里青霄羡鳥飛正是霜臺弭節時不堪風物動相思庭前緑草飛蝴蝶城外清江呌子規北地關河頻入望南天雷雨自無私預將歸槖酬知已萬里觀風賸有詩逺山重疊繞孤城城下蠻江一曲清溪洞人家猶異俗市廛兒女帶華聲户將烏鬼為生計地産丹砂當嵗征自昔黔中風土惡逺逰那得易為情涓埃無補聖明朝持節南荒嵗月遙幾見闌干生薜荔旋看煙雨綻芭蕉山城每聽鐘聲早金闕常思扇影高為報鵷行舊知已耽書未解子雲嘲𤏡道西連蜀道長五溪風土古蠻鄉相傳遺種多槃瓠見説藏書即酉陽梅雨來時諸水漲野雲飛處萬山蒼鐡冠自是心如鐡一任江如九曲腸剪燭空堂欲二更堂前新雨夏蟲鳴每因時物思劬育未有秋毫答寵榮嵗月不催雙鬢緑詩書祗倚片心眀端居逺想千年事漢室還應召賈生大化無邉嵗月長幾年寒暑歷荆陽衡巫望處天三尺湖海流來水一觴心地平時為福地異鄉好處似家鄉烏臺一夜芭蕉雨賸有新涼入畫堂聖化如天統四溟黔中封界掩荆衡壺頭不復當時險充道無如此日平渺渺荒煙含逺岫悠悠流水帶邉城武陵溪上袁生笛吹盡關山幾許情雙沼荷風颭畫屏一林梅雨洗幽庭日長心緒思家國地逺衷情念鶺鴒細草偏從行處緑好山多在望中青身兼吏隱今如此擾擾塵勞不用爭侵城水色映飛樓樓外晴天屬望悠萬里山連百越逺五溪漲入九江流黃州陳迹知何似赤壁蒼煙久未收法像有廬真草草令人俯仰意難休辰沅風壤帶三苖一望乾坤吐納遙翼軫衆星朝北極岷嶓諸嶺導南條天鄰巫峽常多雨江過潯陽始有潮近日詩懷殊浩渺謾將新句寫芭蕉沅州秋夜忽憶三年前秋夜之作二首獨坐髙堂蠟炬紅宛然秋與昔年同宦情不改來時淡詩思渾如到日濃楊柳影斜簾外月芰荷香老水邉風莫言白筆南征久贏得歸囊一物空黔中今是第三秋又聽蟲聲四壁幽修竹林間天籟發芭蕉葉上露華流知非漸擬髙人化學道寧忘長者謀好在燈花頻送喜沅江幾日放歸舟次王侍御韻憲府乘驄舊有名今秋偶爾會蠻荆虹霓氣接風雲氣珠玉聲隨咳唾聲萬里山川勞跋涉諸蕃部落待澄清愧豫無補空持節賴有丹心久更眀立春辰陽城裏遇新春簫鼓蠻歌動四鄰溪洞總無前世梗猺獞咸仰大眀仁官梅向客開何數江柳催時發更頻春酒一杯聊自勸瞻天未己又思親次王侍御見寄韻二首去年秋晚送君時别後長懷逺道思健筆久推天下士眀珠新得掌中詩官梅帶雪開何早旅鴈穿雲去未遲想在南蕃多暇日春來寧惜寄新詞沅州城裏去秋時忽見髙人慰所思篠竹影邉開縱步芙蓉花底笑論詩已看獻嵗逢春早頗訝經年會面遲折得官梅逢驛使殷勤逺寄重緘詞院中梅花地位清髙逈絶塵官梅相對愈精神風霜拂處枝枝弱霽雪消時蕊蕊新素質不移千古性芳心長占四時春幾回攀折情無限笑比瑶華欲贈人靜得軒為劉僉憲賦二首結屋端居絶垢氛獨懷沖默事天君看從上下機緘露悟到中間造化分細雨緩催幽砌草好風輕卷太虛雲收功欲問知何似縱是無聲也自聞晏坐髙齋白晝間謾將生意靜中看一簾時雨滋花竹繞砌光風轉蕙蘭野馬飛時情自適幽禽啼處樂相關久知萬物非身外欲向無名學弄丸夏日院中遣興荷葉池塘四月初滿庭梅雨正踈踈心間已悟天無際性靜應知樂有餘架上詩書頻檢閲環中光景任盈虛鐡冠御史誰能識隱几無言學養愚睡起口號睡起霜臺萬慮清天時物理獨關情黃梅熟後無風落翠蘚看來冒雨生學向靜中方識味道全身內不干名懸知千古無言子不信人間有六經謝李布政文英以字帖藥方見寄政聞左轄振條綱忽寄書來喜欲狂字向池邉添妙法醫從肘後驗仙方十年契闊情如舊兩地相思意不忘會面湖藩須有日片帆行擬下沅湘辰州喜雪臘月江城不起塵朔風吹雪正頻頻臺端老柏貞心徑墻外踈梅冷蕊新地氣已應清瘴癘嵗華行復見陽春久知樗散無他補祗詠豐年慰逺民登沅州城樓縹眇飛樓面面通霜臺多暇此從容窗含曉日煙霄上城繞秋山錦繡中天壓大荒均雨露地包絶域盡提封小臣弭節裁詩日誕播皇風萬國同寄于侍郎廷益黃甲同年二百人大名飛步獨超倫乘驄正仰風霜肅司馬俄承寵渥頻列郡年豐爭轉粟兩河春暖見歸民天書重疊膺殊寵好布人間雨露新陽武懷古黃河南下是通津縣郭千年枕水濵兵結團城猶有漢車驚博浪已無秦黑陽山晚橫殘照清水潭乾起暮塵立馬幾回思往事宰平誰識社中人襄城道中三持憲節過襄城喜見中州景物眀天倚嵩高霜氣肅地連許潁曉煙橫輿圖渾渾開昌運民物熙熙樂太平萬里觀風良自負逺懷還擬遂平生衛河舟中懷古衰草蕪城淡月輝河流雖是昔人非北門鎖鑰輸平仲南渡兵車數嶽飛汴水風髙霜落木吳山秋晚露霑衣當時故老知何限空抱遺忠賦式微左掖退朝口號寶蓋初收扇影還千官行過石闌干天階好雨霑旌斾洞户清風引佩環鐘響已飄雙闕外香煙猶繞五雲間久陪鴛鷺知無補自訝升平際遇難宿院簡焦羅張陳四侍御楊柳風清憲府深晚涼時節自開襟星橫北斗三更柄月轉東瀛萬頃金握節幾時窮地脈觀書直欲見天心壯懷落落霜侵鬢誰伴單居御史吟送孫俊先生致仕歸鄢陵三首先生七十引年歸送别都門柳絮飛潞水東風斜捲幔金臺晚照逺銜衣收功桃李心初遂行樂桑榆志未違况復潁川多故事到家爭仰德星輝歸老儒官七十餘扁舟唯載舊詩書泥融野岸晴飛燕飯熟行庖曉薦魚花柳風煙新嵗月桑麻雨露舊村墟到家處處堪行樂應有兒童為挽車彭祖岡南古潁川先生茅屋尚依然甘貧已道為官好勇退爭誇引老賢歸路載添新白髮到家唯有舊青氊耆英洛社如堪結留取風流久逺傳遣懷樗材無補聖明時持斧年多鬢欲絲蘋藻久虛先壠薦詩書應有正人知趨朝鳳闕推先逹退食烏臺愧後期幸自此身安蹇拙幾看雲與意俱遲同張侍御宿院柏臺清絶小窗虛間看遙空思有餘眀月有光圓又缺浮雲不定卷還舒初晴爽氣澄襟冷入夜清風到面徐莫笑官貧身老大無名公已悟乘除遣興簿書夏日足官府忽憶少年行樂時髙柳送涼蟬斷續清溪濯足石參差班荆或共髙人語採藥頻從野老嬉逺興無端真在想白雲芳草舊襟期敬軒文集卷八
