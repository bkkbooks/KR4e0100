body:
  text: 敬軒文集巻十八明薛瑄撰記游龍門記出河津縣西郭門西北三十里抵龍門下東西皆層巒危峰横出天漢大河自西北山峽中來至是山斷河出兩壁儼立相望神禹䟽鑿之勞于此為大由東南麓穴岩構木浮虚駕水為棧道盤曲而上瀕河有寛平地可二三畝多石少土中有禹廟宫曰明徳制極宏麗進謁庭下悚肅思徳者乆之庭多青松竒木根負土石突走連結枝葉踈宻交䕃皮榦蒼勁偃蹇形狀毅然若壯夫離立相持不相下宫門西南一石峯危出半流步石磴登絶頂頂有臨思閣以風髙不可木甃甓為之倚閣門俯視大河奔湍三面觸激石峯疑若搖振北顧巨峽丹崖翠壁生雲走霧開闔晦明倐忽萬變西則連山宛宛而去東視大山巍然與天浮南望洪濤漫流石洲沙渚髙原缺岸煙村霧樹風㠶浪舸渺茫出沒太華潼闗雍豫諸山彷彿見之盖天下之竒觀也下磴道石峯東穿石崖横立施木憑空為樓樓心穴板上置井床轆轤懸繘汲河憑欄檻凉風飄瀟若列禦冦馭氣在空中立也復自水樓北道出宫後百餘步至石谷下視窈然東距山西臨河谷南北涯相去尋尺上横老槎為橋蹐步以渡谷北二百舉武小祠扁曰后土北山陡起下與河際遂窮祠東有石龕窿然若大屋懸石參差若人形若鳥翼若獸吻若肝肺若疣贅若懸鼎若編磬若璞未鑿若鑛未爐其狀莫窮懸泉滴石上鏘然有聲龕下石縱横羅列偃者側者立者若床若几若屏可席可憑可倚氣隂隂雖甚暑不知煩燠但凄神寒肌不可乆處復自槎橋道由明徳宫左厯石梯上東南山腹有道院地勢與臨思閣相髙下亦可以眺望河山之勝遂自石梯下棧道臨流觀渡並東山而歸時宣徳元年丙午夏五月二十五日同遊者楊景端也拙巢記自七情熾而混沌鑿人之横奔競􅕽者非私智無所為尚由是巧偽日滋而斯道日隱矣濓溪周元公挺生南服悼末流之若兹一刮群巧作拙賦以見意當時豪傑若程若張相與翕然尊尚之而斯道大明嗚呼盛哉曹均表正世家河南沔池自少讀書即有求道之志遂即闗洛以上遡濓溪因以拙巢名其讀書之室盖取元公賦意以自勉也其後均名薦書典郡鐸所至必以是扁其寓室以示不㤀其初之志今年秋均自蒲庠來河津因語余以名巢之意且屬余記余謂頺乎順處不撓其初不汨其流使大本完而七情節此衆所謂迂僻遲鈍而拙於事者也抑孰知順事厥天不以小知害之而可以為終身安宅也舞智籠物騁詐軋人機變層出莫測端倪此衆所謂辯敏儇㨗而工於計者也然詐窮智屈自嬰其弊又豈可一朝安其身哉今曹均慕元公之學以拙名巢其可謂能擇所處而知所戒者矣則其進道之心又曷有窮極哉雖然余亦拙者徒也他日倘獲登均之巢尚當闢混沌以廣均之居室䟽七情以通均之户牗舉酒相屬而誦元公之賦已而㤀言相對身巢兩㤀復不知巧拙為何物也是為記篤敬齋記千户楊公尚徳作齋于居之側盛積古今書公退必據几吟誦于中若將有志於古人之為者因扁其額曰篤敬盖取聖賢脩已之要以自勵也間求記於余余謂自七情肆而天理微九竅邪而人欲横雖老生宿儒專專於講誦者尚溺於語言文字不知主敬以捄其弊况他乎哉楊公幸生天下太平之時包裹甲兵之日乃能景慕聖賢以篤敬名齋其志誠足尚已顧可無一言以告之耶盖人之為人其理有木火土金水之神其體有耳目口鼻四肢百骸之形其事有五倫百行之備故内焉而敬不篤則心官昧而天理亾外焉而敬不篤則衆欲攻而百體肆内外胥失乎敬則身心尚莫知所措况於應萬事哉此聖門為敎必先乎此也至其所以用力之方内則惺然其心不使有一塵之蔽外則肅乎其容不使有一體之惰以至接乎物則必主於一而無他適之擾如是而守之以堅固持之以悠乆則近而屋漏無所愧逺而天地無所怍所謂七情肆而天理微者可以節而著九竅邪而人欲横者可以返而消内外逺近大小精粗融朗周洽何徃而非天理之流行哉今公之作是齋也游於是息於是誠能不衒其名而必取其實復因余言而力守之則其日益之效殆若積土為山而不覺其山之髙浚源為流而不覺其流之長其自得之妙又有非言語所及者矣其尚勉之哉若夫齋之軒檻可以覩青天而望白雲齋之几席可以琴清風而樽素月則一舉目而得之矣兹不復云友竹軒記山東王惟善先生分敎開封之鄢陵即其居之西偏作堂為藏脩之所環堂之外種竹數百竿毎退自黌序則必徃游其間洞闢軒檻挹清風坐緑隂手披書史心惟訓義顧瞻囬復整肅身心以増益其所未行而勉其所未至遂名其軒曰友竹因以俾余記余聞君子之取友取其徳也直者有以正吾之曲信者有以實吾之妄多聞者有以廣吾之狹陋是皆友之益也茍其所取之不端則為害可勝道哉昔孔子論直諒多聞便柔佞給之損益正謂此也先生儒其中文其外其平昔之所友固能知所去取矣今復以友竹名軒何耶盖昔人既兼友古今之善士猶以為未足又取草木之香潔秀異可愛者以寓其好若騷客之蘭陶潜之菊周子之蓮林逋之梅雖所取不同而各為所適之志則一也况竹之為物直而不曲勁而不凋而又鏘鳴風雨聲聞于逺有似乎直諒多聞之徳以之為友則耳目所接心志所適為益其可一二數耶以是知先生之用心殆庶幾於古人而不違乎孔子之敎矣雖然先生敎有成績行將去此而敭于天朝後之人有至是軒而聞先生之風者能因竹以廣思是亦孔子之徒也慎獨齋記余少讀聖賢書竊有志於慎獨之學尚懼乆而或怠也遂自稱曰慎獨子庶幾顧名思義永乆不㤀逮今三十七年矣而尚不克踐所稱余友周君秉忠分敎覃懐乃即官舍東偏作小齋以居余間徃焉秉忠顧曰吾之作是齋非欲自佚欲自脩也自脩之要誠莫先於慎獨今將取以名吾齋庶幾居處出入俯仰顧瞻有所警發而勉所不逮然若與吾相好也更能為我厯言其用力之要則所以警發我者豈不益有助乎余因蹙然愧曰余固嘗以是自稱矣然持之不力而名實多爽今且自責之不暇尚為秉忠助哉雖然盛意不可咈請姑誦所聞盖一心之理静而無動而有在動静有無之間曰㡬凢天下之善惡皆原于此故曾子子思懇懇示人必曰慎獨獨者人所不知而已所獨知之地盖即所謂幾而慎者則所以謹乎是也故君子於幾之際必精必察果天理耶即扶導而擴充之果人欲耶即摧抑而遏絶之至於暗室屋漏獨居獨為之間而不敢有自欺之心焉則内外隱顯無非一致而天徳之盛渾渾乎無息矣其或不能謹乎是必曰吾心之微人所不見也吾事之秘人所不知也雖滅理敗常之事可以為之而無害殊不知此心之靈炳若日星所謂㣲而秘者人雖可欺而心可欺乎况既有是幾於中則必有是迹於外積之之久則微者著秘者彰所謂滅理敗常者皆將暴白而不可掩其為脩已之累可勝言哉今秉忠以慎獨名齋其自脩之心固已宻矣又能以余之前所聞者為勉以後所言者為戒則他日所至必無愧於名齋之初心固非若余之少志於是而今尚不克踐所稱者之敢望也養志堂記徃年余侍先君子宦游鄢陵始獲與柳生克新交間至其居則生之二親在焉生因謂余曰古人盤盂几杖有銘有戒皆所以為耳目脩徳之助也吾二親幸皆無恙自惟娱侍之禮或怠丐我堂名揭之庶㡬觸乎目而警乎心余以為孟子言飬親之口體不若養志遂請以養志名之既而余忝科名别去二年今歳冬復至鄢陵生復謂余曰疇昔子所以名堂而朂我者甚厚更能為我記其事以書于壁則朂我者不其尤厚與余惟飲食衣服起居寢處凢竭力以事親者皆所以養其口體也要不若養其心志為大焉語曰父母之所敬亦敬之父母之所愛亦愛之即孟子所謂養志也然親志未止此也行欲其脩言欲其謹文學欲其進益道徳欲其成就皆親之望其子者然也生誠能因孟子之言而又深探親之所欲者朝夕悚然以求副厥志則古人可㡬而於斯堂之名無愧矣河内縣清化鎮重脩孔子廟記爰自古初鴻樸茫昧人物蚩蚩群逐雜處莫克相保乃有聖人代起稍為建制作法鋤薙强梗扶植善柔區釐群類使各安其所然後生養遂彛典明此三五帝王有大造於天地生人所以享後世之報於無窮若吾夫子生當周季風漓俗訛諸侯恣横禮法大壞變而易之視古為難及不得位乃上本群聖下開百王刪定賛述脩復典禮以康靖我民彛於悠乆其大徳大功髙出千古盖群聖人得位行道澤被一時夫子又推其道以及萬世是以享天下後世之報為尤盛也我皇明平定四方甲兵既偃文治誕興凢為國子民敎人之道非孔子不行其報祀也太學有廟闕里有廟天下郡邑學有廟俾所司各以時飭正祀事其所以致隆於天子大功大徳永永無極之意可謂盛矣然自公祀之外鄉里士民有能仰慕其道恊力脩復廟貌以寓報祀瞻企之萬一者是亦國家敎化所及人心秉彛好徳之發也河内縣直北三十里曰清化鎮鎮之市北故有夫子廟不知創建始自何時獨厯代廢復之由有石刻可見近年屋老瓦落階亷頽仆樹木摧伐墻垣斷圯牧竪牛羊踐牧不禁神不即享人失曕依鄉士孫惟中洎某等相與勸財僦工因遺墟而脩築之始於某年某月成於某年某月由是覆瓦完固棟楹宏整階有等次樹就封列宫墻周聳庭宇䆳肅廊廡講室以次俱興于以報禮瞻企大慰有衆既而來求余辭將鑱之石或曰夫子之道崇于祀典者不可尚已清化蕞爾一鎮復何為耶余曰不然古者家有塾黨有庠術有序皆所以廣敎化也誠使一鄉一鎮皆有夫子廟庭俾報祀講學者有所瞻企其於敎化豈不為尤廣歟向所謂鄉里士民有能脩復夫子廟貌以寓報祀者是亦國家敎化所及人心秉彛好徳之發也若清化士民所為即其事顧可謂一鎮而小之哉遂書其事使刻之具慶堂記余嘗為鄢陵柳生克新記養志堂後三年生復以書來言曰向所謂養志堂者記猶在壁不敢㤀子之嘉誨前年忝科名歸復得亢爽之地作一室為二親娱老之所既成客有過之者以吾二親之俱安好也遂以具慶扁其額子誠不鄙願仍遺之言將朝夕視以為警余時居大憂志意荒耗不能即為之言後數月生復以書來如前所謂而益堅余乃銜恤而為之言曰生何其幸哉何其幸哉人莫幸於逮事其親尤莫幸於遂所以事之之願也世之人或怙恃早逝或存沒不齊欲養無及或窘扵家事欲養莫遂是皆孝子之至戚也有得逮事其親不為家事所窘而遂所以事之之心豈非幸哉若栁生者其殆近是乎栁生自少即能奮力扵學遂一舉而與于鄉闈之選于時二親方無恙生乃退脩于家率其子弟力耕畎畝以具滫瀡節寒温朝夕躋于斯堂以娱養之或者以具慶名焉是誠足為慶幸之全備者矣雖然人子事親之心曷有窮極生於定省之隙益當因其故學而温廣之期至扵道脩徳立則聲名不求而自彰爵祿不求而自至更以所得之大者以奉其親則其慶幸豈不為尤大而斯堂之名亦可以永存於後矣生其勉之生其勉之余實終天抱戚人也因生之請重有感焉遂書以遺之具慶堂記具慶堂者海昌沈仲安昆弟之所作以奉親也仲安昆弟七人皆有成人之道而二親尚皆安好無恙於是相率恪恭勤孝以供子職猶以二親之髙年居室湫隘不足以安體而頥神也遂更相與别構堂以居之堂之制棟宇簡易而宏廣深静㢘隅莊峭而完堅雅潔軒檻洞闢而夏不知溽暑之蒸爍隩室邃曲而冬不覺嚴寒之凄列毎晨昏定省七子儼侍户外遇良辰佳節則率諸婦孫羅拜階下已則更起為夀愉愉怡怡油油秩秩孝友之風充乎庭户之内不知人間何樂可以易此也仲安昆弟以是樂之難遇也遂名其堂曰具慶盖取孟子父母俱存兄弟無故一樂之意以自慶也既而仲安以邑庠弟子員學明行脩登鄉薦中春官乙榜遂典敎鄭之滎澤雖去家數千里而所為具慶堂者未嘗不發於寤寐仲安雅與余好間以其堂之圖與詩文示余且求為之記余遂為書其作堂與所以名之之意以還之綘州重脩廟學記事有似緩而實急似迂而實切者學校是已絳之學在州治東北林木蓊欝泉流暎帶盖絳之為州得冀域之勝而絳之學又得絳州之勝自我皇明有天下即詔内外興學逮今垂六十餘年絳學雖舊䂓具在而厯載既乆不能無敝缺不飭之處自常情視之鮮不以為迂且緩而若不切於事者殊不知絳之人才盛衰風俗美惡胥由於此則郡之事最急而甚切者宜莫先扵學焉學有敝壊不葺任其責者顧可坐視以就湮欝而不理乎永樂十九年夏金華俞君道英來正是學始至視講堂穿漏湫隘不可以居遂諮郡守尚公志進諸生扵庭合謀出俸資因前搆而興築之堂成視舊制深廣倍焉既又將易大成殿瓦桷之破朽者兩廡俱廢欲重作之時適有監察御史鎮江裴公憲副鳯陽郭公實廵厯是州而嚴其期而郡守撫寜姚公遂任其事兩廡既完乃墁治其壁姚公洎僚屬各以資命工繪從祀諸賢像于左右獨中外二門尚未完脩而適得今太守楊公貳守賈公視政之初即徴工鳩材併力合作兩門以此俱復由是學之廟廡門堂完舊益新宏邃偉麗有加於昔既而俞君遂以預是役者厯以告余求為之辭將鑱諸石以䧟置堂壁余竊惟昔魯侯作頖宫而春秋不書者所以大其事而不以為勞也今絳學之脩俞公既咨之尚公而揭之扵始一時之名憲臣能守倅又皆繼成扵後諸生復始終盡心盡力無懈於其間皆可謂知所重且急而得古人興復之遺意矣自兹以徃絳之人才日以盛俗化日以美而於國家之敎得以紹敷永乆而不墜者未必不自於兹學也是不可不書其事以告後之人俾知所重云思親堂記人之心不能無所思而思則又有邪正之分焉此君子所以必慎其㡬而詩所謂思無邪者此也山東孫君思齊氏以鄉貢士游太學簡拔中學官選遂來掌永和之敎念其二親髙年懸隔山河不得朝夕省侍也毎退居宴室則必深致其思而不能已焉遂名其室曰思親堂因求為記余以謂人心既不能無思思所不當思人欲也思所當思天理也今孫君既能恪盡所職以致忠藎而又能思其二親不置其可謂思得其正而有合於天理之公矣余想孫君之居斯堂也覩春日之暄妍則思其親之坐春風而愛永日也值夏景之炎熾則思其親之凉竹簟而納薫風也秋髙木落則思其親逍遙自得而樂新凉之來嵗華既暮則思其親之擁爐曝日而却凝寒之逼朝而思其親之興夕而思其親之息四時朝暮之景雖不同而孫君之思無不觸景而興懷也其可謂善於思者雖然思之之久誠無不通孫君又將千里迎養吾見其二親怡然而來遂躋斯堂以思親之所為奉親之所平日之思渙然消釋而遂承顔悦志之樂則孫君之心庻乎盡矣於是乎書河津縣重脩廟學記河津縣學在縣治東北其規模制度創于前代興扵國初然厯載久自廟廡神門以及堂齋庖厨率皆漸至敝壞恭惟列聖相承篤意學校屢詔有司以時省脩毋俾廢弛然類多樂因循而務省約或有穿漏茍且易一桷完一瓦以度目前而已廣信韋君頴來敎是庠視廟學日就敝壊大懼無以妥安神靈作興士類乃與司訓大名趙君鳯進諸生於庭而告之曰惟是朝夕游處於斯誦習先聖賢之徳音以脩其身以及於人是皆聖朝崇重儒敎之至意也今廟廡堂齋神門庖厨悉皆如是而乃坐視不理其將何以順揚休顯以永兹敎事於無窮吾軰固欲與爾等謀之於衆大加脩復其各勉之扵是諸生奔走經營諮之有司而有司允其議謀之耆庻而耆庻恊其情捐俸出資惟恐後時聚材而山木委積陶埴而瓦甓完堅工人獻巧役夫展力由小而大由外而内先作學之兩門次新神門次徙膳厨次作兩齋因而大之前為步廊後為退室次新講堂獨大成殿兩廡居衆功之後者盖殿規宏髙而廡宇悠長視諸功用力為最大而難是以作之尤慎而重也始於某年某月完於某年某月工既訖功韋君將圖堅石刻其脩復月日并諸助資相力者示扵後遂推余以為之詞余惟事有當為而為之者為是沮之者為非况學校王政之大端又事之當為而不可緩焉者也而韋趙二君子乃能恊謀合志以完脩為己任而一時之賢大夫良吏民又能樂於資助而無所齟齬其諸生復能思厥報稱而始終盡心竭力無所懈怠皆可謂知所當為而克稱聖朝崇儒勸學之美意矣是不可不書其事以告來者禎槐堂記洛城之東有槐欝然扵庭者進士子儀房君之居也子儀為洛之故家其先世皆有隐徳蓄而未發至子儀之先君子將營居室而一木忽拆甲於庭視之則槐也識者曰凢木之生必曠原深谷山巔水涯人迹所罕到者而後始得以遂其性否則必完根厚植易土深種而始克有以獲其生今房氏所居當市郭闤闠之間而朝夕之所㳺履既匪幽閒之地又非人力之勤氣化所難施雨露所難息而槐乃自生此必房氏徳善所致為異日子孫興盛之兆不誣矣於是其先君子因為䦨檻以䕶其周増水土以養其本自毫末而拱把而尋丈乆則喬柯上聳宻葉四布逮今將三十年而子儀自校庠一舉而為宣徳紀元之鄉魁明年遂登第為名進士及奉恩㫖還家則見槐隂滿庭於是徘徊瞻顧因思其累世積徳之深先人封培之勤而已得䝉其庇䕃乃有今日之光榮遂扁其堂曰禎槐所以志不㤀厥初也又明年春余赴京師道經於洛因獲登子儀之堂子儀指庭槐而語以故且求為記余以謂凡徳善之積無有不報但時之希闊踈逺有似乎落落而難信者及夫天定勝人則若合符契於左右手盖無絲毫之爽焉昔王祐手植三槐於庭曰吾後世子孫必有為三公者已而至其子旦大拜此盖人以事而必之天也子儀之先君子未嘗手植是槐而有所期必而槐乃自生此盖天以禎吉之兆示諸人也究槐之生逮今將三十年而始克有合如識者之言則所謂徳善之報又豈終扵希闊踈逺而落落難信乎然則世之為善者可以無怠矣子儀年力方富而尤篤於進脩積徳行義方自此始吾意其先世為善之報尚未巳也請姑書此于壁以俟邵陽縣重脩廟學記余嘗行天下登名山涉大川覽天地之髙逈極萬物之變化然後有以驗是道之大無不包而細無不入初不以逺近而有間也聖人之道即天地之道其流行充塞扵宇宙間亦豈有逺近之間哉昔吾夫子欲居九夷門人惑之殊不知九夷雖逺固不能外是道以有生聖人所在即道之所在又豈有不化之人哉今去聖人僅二千年不問海内外華邦蠻區愚夫小子皆能道吾夫子之號而起尊信之心由是愈見其道之大而居夷之言非偶設也寳慶邵陽縣舊為邵州在楚越之交去中國數千里古荒服之地厯年既乆風氣漸開俗亦寖變至周元公以道學之倡為駕司員外郎通判永州權發遣邵州事視舊學湫隘遂遷於資水之濵其釋奠祝文曰惟夫子道髙徳厚敎化無窮實與天地參而四時同今觀其處地勢爽塏林木蓊欝襟帶岡阜暎帶激湍誠講學之佳所也當時學者既相與翕然從其敎而流風遺澤更乆不冺逮我皇明大崇儒敎廣建内外學愽取天下之俊秀以敎育之于時縣令薛中克遵明命因元公所遷故址而増築廟學以新敎化逮今六十餘年而殿廡堂齋神門漸至凋敝何永芳以進士來知縣事始至謁夫子廟庭視學舍如是大懼禮典弗飭敎法隳弛遂委群材合甓工以時興脩之百廢以次俱完視兩齋卑陋復廣而大之又肖完夫子及配饗從祀諸賢像工既訖功乃進諸生於庭而告以務學脩已治人之要由是士風一新詩書禮樂之敎延及齊民余至其邑人既交稱其政良而學官復請記其興學之事以告來者余謂永芳不以邵陽僻逺而能欽服國家崇學之美意景仰先哲之遺風作新斯學以興起士類可謂知所務者矣因是以驗聖人天地之道充塞流行於宇宙間者盖莫知其所極也遂書此使刻之退思亭記辰之為府當沅酉之水㑹始之作城者因山水之髙下迂直而立板建堞城中之官署民居亦皆墾削土石夷為等級而立棟作屋焉分司得地勢髙下三之二却顧則連山茂林環其北前視則江南諸峯列峙層出嵐靄林輝逺侵几席左右俯視則市衢屋瓦之鱗此嵐影水光之澹灔皆可坐得其妙盖辰據一方山水之勝而分司又得是府瞻望之美焉公堂之後舊擴為退思之亭亭之左右疏為軒檻外則竒花異木列秀交䕃入其中虚明洞逹爽氣逼人或扁曰退思盖取孔子之言以為我憲職勉也余因廣其意而言曰凢我風紀君子其或衣繡持斧來涖是邦亦既以臨見吏民聽政公堂矣及退而處扵斯也當何而致其思耶盖必理有未明思以明之心有未正思以正之賄源思所以防遏積蠧思所以刮磨聽獄思所以明慎用刑思所以平恤善人在下思以陟之貪暴鴟張思以擊之忠誠思所以効竭惠澤思所以宣布是皆思之所當急而不可緩焉者也其或子女聲色思以樂之金貝珠玉思以攫之訐訟思所以顛倒是非法律思所以巧比條貫君子異已思以術而擯斥邪人附托思以計而援舉虚譽思所以暴揚隐慝思所以盖覆是皆思之不可一日留於心者也思所當思則徳脩職舉澤及生人而榮光將被於無窮焉思所不當思則壊法斁紀而䝉垢玷身者亦將有所不免矣然則思之邪正不同而得失之機兆焉風紀君子可不慎所擇哉復有厚貌深𠂻思為拱黙保持之計不能為有無者亦君子所不取也余以菲才承乏風紀恒懼邪思之淆雜而失其中及觀是亭之扁而重有契扵心遂推其意而書以自警且以告同志君子之至於斯者不惟以江山臨眺之美自適又當覩斯亭之扁而留意焉重脩許魯齋先生祠堂記新鄭縣西山大隗山之左里曰陽緩元魯齋先生許文正公所生之地也先生世家河内金季其先人避兵是邑實生先生於里中金大安己巳嵗也縣學有祠以祀先生其事具於碑今碑存而祠廢士大夫之徃來與鄉民之向學者或嗟嘆以為缺典江西鄧麟訓𨗳邑庠乃即夫子宫墻東隙地營屋三間作先生像扵中以時致祀既而求記於河南僉憲劉公咸公以推余余猶記往年過是邑鄧方謀欲作祠又二年再至祠成久矣鄧之志可嘉哉扵乎先生之道之徳之學所以紹程朱之正傳淑萬世之人心者固不待新學小生之贅賛而獨念是邑乃先生誕生之地顧祠宇乆廢人心缺然無以寓敬鄧能因心興事作新斯宇使凢進謁庭下者如親炙先生若充然有得而退其有補於天理民彛不淺矣遂書其事以告後之人俾無替扵承祀云永思堂記余未二十而失怙未四十而失恃終天之思未嘗一日㤀扵懐是非强然也盖出於天性之不能已也宣徳庚戌春再㑹永嘉陳君廷斌於沅州語及思親之故若出一軌又非强合也盖出於人心之所同然也既而陳君謂余曰吾家故有堂二親平昔所居也親沒而名之曰永思今宦逰四方囬顧斯堂雖邈隔江山而思之之切實發窹寐子幸餉我一言異日倘得便歸將書之壁以朂所思於無窮余曰君之思既得我心之同然者矣尚奚待言哉雖然人子於其親之心志嗜好聲容動作真若常在耳目而思之不㤀者固如向之所云矣至若子之一身皆親之遺體又能愈加敬慎毫髮不損百行不虧以思無忝所生而有以肖親之徳侈親之名則永思之道益無不備焉陳君登䑓為才御史光賁泉壤㑹有期日所謂肖親揚名以全所思者將不在扵此乎請以是為便歸之記并以自朂終天之思云拱北軒記靖州憲署東偏之室有軒北向余名之曰拱北其北有崇岡却倚城堞觀閤周絡其巔林木蔥青嵐靄參錯與夫空衢游雲飛鳥之徃來爽氣清風之披拂朝夕晦明之變化開軒舉在目前可坐而挹也而皆不為是盖此去京師六七千里余來者僅三年仰慕闕庭固已恒在心目間居扵是而瞻望悠然此余之所以名軒者然也且是州古為荒服自列而為郡漸被休明之化者乆矣人亦孰不相與引領而環顧扵内地哉是則人心之拱北者天下皆然又不特余心為然也孔子曰譬如北辰居其所而衆星拱之余得其言而不得其所以言方闢是軒而瞻北辰扵天上宣徳五年六月二十一日記南軒記宣徳五年冬余至辰之溆浦取縣志觀之名士足迹既所不到古今題詠又所絶無盖湖北之窮邊下邑也余特愛其四山攅拱衆溪經復風氣淳樸民物簡少頗有古俗因留旬餘其憲署後堂東屋余嫌其蔽昧不彰遂闢去南壁易之以軒積乆之蔽障豁然頓開晝則日光輝耀夜則月華穿漏焚香讀書其下心神内外融朗洞逹忽若不知吾身之為小天地之為大也因念是屋也向也蔽今也通向也暗今也明是在人焉耳况心為神明之舍為此蔽昧者氣質人欲也去其蔽而開其暗其不在我者乎因治屋而得治心之要且不敢獨私其明也遂書其事於軒端併以啟後之人車牕記河東薛徳温官御史近五年始買小屋兩間於京師僅容几榻床席又苦其東壁暗甚力不能辦一牕小子淳乃取廢鹿車上轅卸去兩傍長木以中方穿櫺類若牕者穴壁而安置之余歸自外來因嘆曰以御史之顯曽不能辦一窻致以此物為之使富者見焉必睨目而哂掩口而走矣御史之拙於生事乃至乎此既而取古書讀其下則旭日漏彩清風度凉心神通融四體超爽忽不知天之逈地之廣而屋之陋也復從而自解曰吾之屋如是可謂陋矣然安之而㤀其陋是居雖小而心則大也彼貪民侈士巍堂綺户可謂廣且麗矣彼方褊躁汲汲若不足以自容日夜勞神憊精思益以擴大之是其居雖大而心則小也小大之説君子必能辨之於是作車牕記慎齋記君子茍得一言皆可以為終身自脩之要太原郭彦璧初中南宫乙榜之同州分敎時便道省其先大夫太守公於開封太守公勉之曰汝以少年得官加有師道之重其慎之彦璧既拜受其敎所至即以慎齋揭其退脩之室今年秋彦璧與余㑹於京師因語其故且求為之記余嘗觀慎之一義而諸經傳取用不同有謂慎厥身者有謂慎厥行者是皆即可見之事而用力焉惟曽子子思慎獨之訓則欲人謹夫人所不知而已所獨知之地即周子所謂幾善惡而慎之用力莫切於此焉彦璧得家庭一言之訓以名其齋固將以為終身自脩之要也又能厯取聖賢之訓擇其尤切者以致其謹使此心之㡬一發於純全之天理而不流於夾雜之人欲則推之言行事物皆得其慎功效之大殆未可量他日立身揚名光大其先大夫之訓於無窮者未必不自於此云藏脩室記尺蠖之伸非屈不可君子致用非精義入神不可故人之為學非致力扵静一之中亦何以為發用之本乎齊安袁廷璧氏自少有志扵學因構室為肄習之地而扁曰藏脩及宦既逹而猶不㤀其故間以求予為之記予嘗觀君子之學發見扵顯明之際者皆由潜脩於幽閒之中室者人之私居而幽閒之地也廷璧方其從事於學也㳺扵斯息扵斯其所脩為何如耶吾意其有圖書箴戒以脩於目有琴瑟詠歌以脩於耳存養以修其心之静省察以脩其心之動至扵脩於今而於當世之務無不講脩於古而扵事物之變無不考凡藏而所脩者無一不致其極必知尺蠖之極其屈精究義理以入於神然後為藏脩之至也廷璧用力扵前者既已然矣及其發而為可見之行措而為當為之事業以至忠乎君而愛乎民者皆求伸致用之事而出於藏脩之際廷璧其可謂篤於自脩而善於所推者矣是其善不可不書也於是乎言慕萱堂記萱㤀憂草也樹之北堂見詠於詩盖所以慰母氏之心也以故後世有慕其母者必因以名堂焉齊安崔廷璧早失其恃而獨見鞠扵父既而名薦書入太學駸駸乎有仕進之榮因念其母氏之沒養有弗克全於是以慕萱名其所居之堂而寓悲思之心焉夫人之誠孝固根於天性而不假於外物然外物觸其目而動其中則於天性之發為尤切故昔曽子不食羊棗以思其親之嗜有瞻望白雲而思其親之居是皆觸物而興悲者况萱之所植毎近於母氏之居母存則萱固為㤀憂之物母沒則萱適足為増悲之具此廷璧以萱名堂者實所以發其天性之真而不可以外物少之也今廷璧已階顯仕矣追想母氏平昔之居懸隔扵數千里之外雖萱草之芬芳如昨而母氏之容音邈然則廷璧端居是堂而感之深思之切盖有須㬰之不能㤀者矣雖然養志君子之所重也廷璧誠能以顯揚母氏之心為心必潔其身必脩其職他日受朝廷之寵錫偉然為時之名臣而斯堂之名因得以傳之永久則廷璧之母雖亾而有不亾者存廷璧其勉之趙城縣徙作縣治記趙城為平陽大邑舊治在城西南汾水上厯載既乆其城為水所圯漸不可居宣徳紀元蠡縣楊君瓉以進士來知縣事顧瞻縣治若斯以謂弗即圖厥改作而㕔堂廨宇之屬更不數歳將悉圯為洪淵矣遂具其事請於朝報可既下楊君乃相方扵城之東北其地負隂面陽髙亢爽朗南北九十舉武東西八十舉武厥既得地則徙舊益新陶埴而瓦甓聚鳩材而山木集徴工召徒計日興役作正㕔作後堂作儀門作鼓樓作六房以至廨宇庫藏犴獄之類靡不具作始工於宣徳八年九月十九日訖工於宣徳九年三月初四日既成屋以間計者得百有五十垣墉整肅棟宇宏邃不侈於前不儉於後髙下大小悉中於度由是徙而居之人得所止物有所栖既而楊君將刻其事於石而求辭於余余聞楊君於邑政之鉅細能盡心其間而凢廟學壇宇育材事神之所既莫不完脩及興是役又能程功計日節財謹用事不愆素民不告勞是皆可書也遂書其事使刻之俾知改作之所始具慶堂記具慶堂者行在浙江道監察御史李公載所作也公載由科目致身風紀内綜憲維外按藩郡敭厯之蹟在人耳目既而二親皆以子貴顯受褒封命服在躬光動閭里公載慶二親之髙年而又得際盛世推恩之竒遇遂作斯堂以奉之每退自憲署即左右就養以盡愛日之誠間以屬余記余與公載為同年進士知公載之為人敏而逹又獲拜其尊府仲儼先生扵家知先生之為人儒而通以父之賢而有子似之是宜徳善之積繼繼一門其所以饗具慶之福荷寵錫之光者夫豈偶然哉且余聞古語有曰徳善日積雖盛而非滿公載以强仕之年駸駸乎榮進之途其益增脩所為無怠吾見二親年愈髙慶愈隆而斯堂之名愈顯矣重慶堂記孟子論三樂而以父母俱存兄弟無故為之首朱子釋之以謂此人所深願今既得之其樂可知然既有此樂且有大父母髙年而重慶者其樂又何如哉涇陽敎諭楊生潤嘗從余學及登鄉舉中乙榜任今職到官乃闢一室扁曰重慶堂遂來迎其大父以就養且楊生大父母俱年近八十其父母皆年未耄老而康强有弟五人俱鴈行少壯所謂既有一樂而又有重慶之樂者楊生也誠為世之所難得矣今其大父既就其來迎行將至涇陽所謂重慶者居之楊生娱侍左右奉觴獻夀而其僚友諸生亦將持酒來以為慶其樂盖有不可勝言者矣然楊生他日又將迎其祖母父母諸弟侍行同㑹于斯堂之上則其樂又何如哉然孟子又言仰不愧俯不怍為二樂得天下之英才而敎育之為三樂楊生所敎雖止一邑之士其間亦不可謂無英才也斯二者又當加勉焉故兢兢業業以從事扵脩省之功於善則實好之於不善則實去之俾自一心隠㣲之處以逹於百行顯明之地皆求存乎天理之公而不汨於人欲之私則仰不愧俯不怍之二樂可㡬矣又能思師道之艱自進其學自脩其徳而以應人無已之求而以為人之矩範至於辨惑授業之際當懇懇告諸生以為學之要必先致其知而後力於行期使至於成立則於敎育英才之三樂可幾矣斯二樂者又能勉焉如此則庻幾有成已成人之道于以奉其大父母父母而皆安其子之賢則重慶之樂殆可全矣其或俯仰不能無愧怍敎人之道有未盡雖欲安其親之心恐有弗能也楊生因迎飬以書來求重慶堂記遂書此以遺之敬軒文集巻十八
