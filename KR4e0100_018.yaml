body:
  text: 敬軒文集卷十八明薛瑄撰記遊龍門記出河津縣西郭門西北三十里抵龍門下東西皆層巒危峰橫出天漢大河自西北山峽中來至是山斷河出兩壁儼立相望神禹疏鑿之勞于此為大由東南麓穴岩構木浮虛駕水為棧道盤曲而上瀕河有寬平地可二三畝多石少土中有禹廟宫曰明德制極宏麗進謁庭下悚肅思德者久之庭多青松竒木根負土石突走連結枝葉踈密交蔭皮幹蒼徑偃蹇形狀毅然若壯夫離立相持不相下宫門西南一石峯危出半流步石磴登絶頂頂有臨思閣以風髙不可木甃甓為之倚閣門俯視大河奔湍三面觸激石峯疑若搖振北顧巨峽丹崖翠壁生雲走霧開闔晦明倐忽萬變西則連山宛宛而去東視大山巍然與天浮南望洪濤漫流石洲沙渚髙原缺岸煙村霧樹風帆浪舸渺茫出沒太華潼關雍豫諸山倣佛見之蓋天下之竒觀也下磴道石峯東穿石崖橫立施木憑空為樓樓心穴板上置井床轆轤懸繘汲河憑欄檻涼風飄瀟若列禦冦馭氣在空中立也復自水樓北道出宫後百餘步至石谷下視窈然東距山西臨河谷南北涯相去尋尺上橫老槎為橋蹐步以渡谷北二百舉武小祠扁曰后土北山陡起下與河際遂窮祠東有石龕窿然若大屋懸石參差若人形若鳥翼若獸吻若肝肺若疣贅若懸鼎若編磬若璞未鑿若礦未爐其狀莫窮懸泉滴石上鏘然有聲龕下石縱橫羅列偃者側者立者若床若几若屏可席可憑可倚氣隂隂雖甚暑不知煩燠但凄神寒肌不可久處復自槎橋道由明德宫左厯石梯上東南山腹有道院地勢與臨思閣相髙下亦可以眺望河山之勝遂自石梯下棧道臨流觀渡並東山而歸時宣德元年丙午夏五月二十五日同遊者楊景端也拙巢記自七情熾而混沌鑿人之橫奔競􅕽者非私智無所為尚由是巧偽日滋而斯道日隱矣濓溪周元公挺生南服悼末流之若兹一刮群巧作拙賦以見意當時豪傑若程若張相與翕然尊尚之而斯道大明嗚呼盛哉曹均表正世家河南沔池自少讀書即有求道之志遂即關洛以上遡濓溪因以拙巢名其讀書之室蓋取元公賦意以自勉也其後均名薦書典郡鐸所至必以是扁其寓室以示不忘其初之志今年秋均自蒲庠來河津因語余以名巢之意且屬余記余謂頺乎順處不撓其初不汨其流使大本完而七情節此衆所謂迂僻遲鈍而拙於事者也抑孰知順事厥天不以小知害之而可以為終身安宅也舞智籠物騁詐軋人機變層出莫測端倪此衆所謂辨敏儇捷而工於計者也然詐窮智屈自嬰其弊又豈可一朝安其身哉今曹均慕元公之學以拙名巢其可謂能擇所處而知所戒者矣則其進道之心又曷有窮極哉雖然余亦拙者徒也他日倘獲登均之巢尚當闢混沌以廣均之居室疏七情以通均之户牗舉酒相屬而誦元公之賦已而忘言相對身巢兩忘復不知巧拙為何物也是為記篤敬齋記千户楊公尚德作齋于居之側盛積古今書公退必據几吟誦于中若將有志於古人之為者因扁其額曰篤敬蓋取聖賢修已之要以自勵也間求記於余余謂自七情肆而天理微九竅邪而人欲橫雖老生宿儒專專於講誦者尚溺於語言文字不知主敬以救其弊况他乎哉楊公幸生天下太平之時包裹甲兵之日乃能景慕聖賢以篤敬名齋其志誠足尚已顧可無一言以告之耶蓋人之為人其理有木火土金水之神其體有耳目口鼻四肢百骸之形其事有五倫百行之備故內焉而敬不篤則心官昧而天理亡外焉而敬不篤則衆欲攻而百體肆內外胥失乎敬則身心尚莫知所措况於應萬事哉此聖門為教必先乎此也至其所以用力之方內則惺然其心不使有一塵之蔽外則肅乎其容不使有一體之惰以至接乎物則必主於一而無他適之擾如是而守之以堅固持之以悠久則近而屋漏無所愧逺而天地無所怍所謂七情肆而天理微者可以節而著九竅邪而人欲橫者可以返而消內外逺近大小精粗融朗周洽何往而非天理之流行哉今公之作是齋也遊於是息於是誠能不衒其名而必取其實復因余言而力守之則其日益之效殆若積土為山而不覺其山之髙浚源為流而不覺其流之長其自得之妙又有非言語所及者矣其尚勉之哉若夫齋之軒檻可以覩青天而望白雲齋之几席可以琴清風而樽素月則一舉目而得之矣兹不復云友竹軒記山東王惟善先生分教開封之鄢陵即其居之西偏作堂為藏修之所環堂之外種竹數百竿每退自黌序則必往遊其間洞闢軒檻挹清風坐緑隂手披書史心惟訓義顧瞻回復整肅身心以增益其所未行而勉其所未至遂名其軒曰友竹因以俾余記余聞君子之取友取其德也直者有以正吾之曲信者有以實吾之妄多聞者有以廣吾之狹陋是皆友之益也茍其所取之不端則為害可勝道哉昔孔子論直諒多聞便柔佞給之損益正謂此也先生儒其中文其外其平昔之所友固能知所去取矣今復以友竹名軒何耶蓋昔人既兼友古今之善士猶以為未足又取草木之香潔秀異可愛者以寓其好若騷客之蘭陶潛之菊周子之蓮林逋之梅雖所取不同而各為所適之志則一也况竹之為物直而不曲徑而不凋而又鏘鳴風雨聲聞于逺有似乎直諒多聞之德以之為友則耳目所接心志所適為益其可一二數耶以是知先生之用心殆庶幾於古人而不違乎孔子之教矣雖然先生教有成績行將去此而揚于天朝後之人有至是軒而聞先生之風者能因竹以廣思是亦孔子之徒也慎獨齋記余少讀聖賢書竊有志於慎獨之學尚懼久而或怠也遂自稱曰慎獨子庶幾顧名思義永久不忘逮今三十七年矣而尚不克踐所稱余友周君秉忠分教覃懷乃即官舍東偏作小齋以居余間往焉秉忠顧曰吾之作是齋非欲自佚欲自修也自修之要誠莫先於慎獨今將取以名吾齋庶幾居處出入俯仰顧瞻有所警發而勉所不逮然若與吾相好也更能為我厯言其用力之要則所以警發我者豈不益有助乎余因蹙然愧曰余固嘗以是自稱矣然持之不力而名實多爽今且自責之不暇尚為秉忠助哉雖然盛意不可咈請姑誦所聞蓋一心之理靜而無動而有在動靜有無之間曰幾凡天下之善惡皆原于此故曾子子思懇懇示人必曰慎獨獨者人所不知而已所獨知之地蓋即所謂幾而慎者則所以謹乎是也故君子於幾之際必精必察果天理耶即扶導而擴充之果人欲耶即摧抑而遏絶之至於暗室屋漏獨居獨為之間而不敢有自欺之心焉則內外隱顯無非一致而天德之盛渾渾乎無息矣其或不能謹乎是必曰吾心之微人所不見也吾事之祕人所不知也雖滅理敗常之事可以為之而無害殊不知此心之靈炳若日星所謂微而祕者人雖可欺而心可欺乎况既有是幾於中則必有是迹於外積之之久則微者著祕者彰所謂滅理敗常者皆將暴白而不可掩其為修已之纍可勝言哉今秉忠以慎獨名齋其自修之心固已密矣又能以余之前所聞者為勉以後所言者為戒則他日所至必無愧於名齋之初心固非若余之少志於是而今尚不克踐所稱者之敢望也養志堂記往年余侍先君子宦遊鄢陵始獲與柳生克新交間至其居則生之二親在焉生因謂余曰古人盤盂几杖有銘有戒皆所以為耳目修德之助也吾二親幸皆無恙自惟娛侍之禮或怠丐我堂名揭之庶幾觸乎目而警乎心余以為孟子言飬親之口體不若養志遂請以養志名之既而余忝科名别去二年今歲冬復至鄢陵生復謂余曰疇昔子所以名堂而朂我者甚厚更能為我記其事以書于壁則朂我者不其尤厚與余惟飲食衣服起居寢處凡竭力以事親者皆所以養其口體也要不若養其心志為大焉語曰父母之所敬亦敬之父母之所愛亦愛之即孟子所謂養志也然親志未止此也行欲其修言欲其謹文學欲其進益道德欲其成就皆親之望其子者然也生誠能因孟子之言而又深探親之所欲者朝夕悚然以求副厥志則古人可幾而於斯堂之名無愧矣河內縣清化鎮重修孔子廟記爰自古初鴻朴茫昧人物蚩蚩群逐雜處莫克相保乃有聖人代起稍為建制作法鋤剃強梗扶植善柔區釐群類使各安其所然後生養遂彛典明此三五帝王有大造於天地生人所以享後世之報於無窮若吾夫子生當周季風漓俗訛諸侯恣橫禮法大壞變而易之視古為難及不得位乃上本群聖下開百王刪定贊述修復典禮以康靖我民彛於悠久其大德大功髙出千古蓋群聖人得位行道澤被一時夫子又推其道以及萬世是以享天下後世之報為尤盛也我皇明平定四方甲兵既偃文治誕興凡為國子民教人之道非孔子不行其報祀也太學有廟闕里有廟天下郡邑學有廟俾所司各以時飭正祀事其所以致隆於天子大功大德永永無極之意可謂盛矣然自公祀之外鄉里士民有能仰慕其道協力修復廟貌以寓報祀瞻企之萬一者是亦國家教化所及人心秉彛好德之發也河內縣直北三十里曰清化鎮鎮之市北故有夫子廟不知創建始自何時獨厯代廢復之由有石刻可見近年屋老瓦落階亷頽仆樹木摧伐墻垣斷圯牧竪牛羊踐牧不禁神不即享人失曕依鄉士孫惟中洎某等相與勸財僦工因遺墟而修築之始於某年某月成於某年某月由是覆瓦完固棟楹宏整階有等次樹就封列宫墻周聳庭宇邃肅廊廡講室以次俱興于以報禮瞻企大慰有衆既而來求余辭將鑱之石或曰夫子之道崇于祀典者不可尚已清化蕞爾一鎮復何為耶余曰不然古者家有孰黨有庠術有序皆所以廣教化也誠使一鄉一鎮皆有夫子廟庭俾報祀講學者有所瞻企其於教化豈不為尤廣歟向所謂鄉里士民有能修復夫子廟貌以寓報祀者是亦國家教化所及人心秉彛好德之發也若清化士民所為即其事顧可謂一鎮而小之哉遂書其事使刻之具慶堂記余嘗為鄢陵柳生克新記養志堂後三年生復以書來言曰向所謂養志堂者記猶在壁不敢忘子之嘉誨前年忝科名歸復得亢爽之地作一室為二親娛老之所既成客有過之者以吾二親之俱安好也遂以具慶扁其額子誠不鄙願仍遺之言將朝夕視以為警余時居大憂志意荒耗不能即為之言後數月生復以書來如前所謂而益堅余乃銜恤而為之言曰生何其幸哉何其幸哉人莫幸於逮事其親尤莫幸於遂所以事之之願也世之人或怙恃早逝或存沒不齊欲養無及或窘于家事欲養莫遂是皆孝子之至戚也有得逮事其親不為家事所窘而遂所以事之之心豈非幸哉若栁生者其殆近是乎栁生自少即能奮力于學遂一舉而與于鄉闈之選于時二親方無恙生乃退修于家率其子弟力耕畎畝以具滫瀡節寒溫朝夕躋于斯堂以娛養之或者以具慶名焉是誠足為慶幸之全備者矣雖然人子事親之心曷有窮極生於定省之隙益當因其故學而溫廣之期至于道修德立則聲名不求而自彰爵祿不求而自至更以所得之大者以奉其親則其慶幸豈不為尤大而斯堂之名亦可以永存於後矣生其勉之生其勉之余實終天抱戚人也因生之請重有感焉遂書以遺之具慶堂記具慶堂者海昌沈仲安昆弟之所作以奉親也仲安昆弟七人皆有成人之道而二親尚皆安好無恙於是相率恪恭勤孝以供子職猶以二親之髙年居室湫隘不足以安體而頥神也遂更相與别構堂以居之堂之制棟宇簡易而宏廣深靜廉隅莊峭而完堅雅潔軒檻洞闢而夏不知溽暑之蒸爍隩室邃曲而冬不覺嚴寒之凄列每晨昏定省七子儼侍户外遇良辰佳節則率諸婦孫羅拜階下已則更起為夀愈愈怡怡油油秩秩孝友之風充乎庭户之內不知人間何樂可以易此也仲安昆弟以是樂之難遇也遂名其堂曰具慶蓋取孟子父母俱存兄弟無故一樂之意以自慶也既而仲安以邑庠弟子員學明行修登鄉薦中春官乙榜遂典教鄭之滎澤雖去家數千里而所為具慶堂者未嘗不發於寤寐仲安雅與余好間以其堂之圖與詩文示余且求為之記余遂為書其作堂與所以名之之意以還之綘州重修廟學記事有似緩而實急似迂而實切者學校是已絳之學在州治東北林木蓊鬱泉流映帶蓋絳之為州得冀域之勝而絳之學又得絳州之勝自我皇明有天下即詔內外興學逮今垂六十餘年絳學雖舊規具在而厯載既久不能無敝缺不飭之處自常情視之鮮不以為迂且緩而若不切於事者殊不知絳之人才盛衰風俗美惡胥由於此則郡之事最急而甚切者宜莫先于學焉學有敝壞不葺任其責者顧可坐視以就湮鬱而不理乎永樂十九年夏金華俞君道英來正是學始至視講堂穿漏湫隘不可以居遂咨郡守尚公志進諸生于庭合謀出俸資因前搆而興築之堂成視舊制深廣倍焉既又將易大成殿瓦桷之破朽者兩廡俱廢欲重作之時適有監察御史鎮江裴公憲副鳯陽郭公實巡厯是州而嚴其期而郡守撫寧姚公遂任其事兩廡既完乃墁治其壁姚公洎僚屬各以資命工繪從祀諸賢像于左右獨中外二門尚未完修而適得今太守楊公二守賈公視政之初即徴工鳩材併力合作兩門以此俱復由是學之廟廡門堂完舊益新宏邃偉麗有加於昔既而俞君遂以預是役者厯以告余求為之辭將鑱諸石以陷置堂壁余竊惟昔魯侯作頖宫而春秋不書者所以大其事而不以為勞也今絳學之修俞公既咨之尚公而揭之于始一時之名憲臣能守倅又皆繼成于後諸生復始終盡心盡力無懈於其間皆可謂知所重且急而得古人興復之遺意矣自兹以往絳之人才日以盛俗化日以美而於國家之教得以紹敷永久而不墜者未必不自於兹學也是不可不書其事以告後之人俾知所重云思親堂記人之心不能無所思而思則又有邪正之分焉此君子所以必慎其幾而詩所謂思無邪者此也山東孫君思齊氏以鄉貢士遊太學簡拔中學官選遂來掌永和之教念其二親髙年懸隔山河不得朝夕省侍也每退居宴室則必深致其思而不能已焉遂名其室曰思親堂因求為記余以謂人心既不能無思思所不當思人欲也思所當思天理也今孫君既能恪盡所職以致忠藎而又能思其二親不置其可謂思得其正而有合於天理之公矣余想孫君之居斯堂也覩春日之暄妍則思其親之坐春風而愛永日也值夏景之炎熾則思其親之涼竹簟而納薰風也秋髙木落則思其親逍遙自得而樂新涼之來嵗華既暮則思其親之擁爐曝日而却凝寒之逼朝而思其親之興夕而思其親之息四時朝暮之景雖不同而孫君之思無不觸景而興懷也其可謂善於思者雖然思之之久誠無不通孫君又將千里迎養吾見其二親怡然而來遂躋斯堂以思親之所為奉親之所平日之思渙然消釋而遂承顔悅志之樂則孫君之心庶乎盡矣於是乎書河津縣重修廟學記河津縣學在縣治東北其規模制度創于前代興于國初然厯載久自廟廡神門以及堂齋庖厨率皆漸至敝壞恭惟列聖相承篤意學校屢詔有司以時省修毋俾廢弛然類多樂因循而務省約或有穿漏茍且易一桷完一瓦以度目前而已廣信韋君頴來教是庠視廟學日就敝壞大懼無以妥安神靈作興士類乃與司訓大名趙君鳯進諸生於庭而告之曰惟是朝夕遊處於斯誦習先聖賢之德音以修其身以及於人是皆聖朝崇重儒教之至意也今廟廡堂齋神門庖厨悉皆如是而乃坐視不理其將何以順揚休顯以永兹教事於無窮吾輩固欲與爾等謀之於衆大加修復其各勉之于是諸生奔走經營咨之有司而有司允其議謀之耆庶而耆庶協其情捐俸出資惟恐後時聚材而山木委積陶埴而瓦甓完堅工人獻巧役夫展力由小而大由外而內先作學之兩門次新神門次徙膳厨次作兩齋因而大之前為步廊後為退室次新講堂獨大成殿兩廡居衆功之後者蓋殿規宏髙而廡宇悠長視諸功用力為最大而難是以作之尤慎而重也始於某年某月完於某年某月工既訖功韋君將圖堅石刻其修復月日并諸助資相力者示于後遂推余以為之詞余惟事有當為而為之者為是沮之者為非况學校王政之大端又事之當為而不可緩焉者也而韋趙二君子乃能協謀合志以完修為己任而一時之賢大夫良吏民又能樂於資助而無所齟齬其諸生復能思厥報稱而始終盡心竭力無所懈怠皆可謂知所當為而克稱聖朝崇儒勸學之美意矣是不可不書其事以告來者禎槐堂記洛城之東有槐鬱然于庭者進士子儀房君之居也子儀為洛之故家其先世皆有隱德蓄而未發至子儀之先君子將營居室而一木忽拆甲於庭視之則槐也識者曰凡木之生必曠原深谷山巔水涯人迹所罕到者而後始得以遂其性否則必完根厚植易土深種而始克有以獲其生今房氏所居當市郭闤闠之間而朝夕之所遊履既匪幽間之地又非人力之勤氣化所難施雨露所難息而槐乃自生此必房氏德善所致為異日子孫興盛之兆不誣矣於是其先君子因為闌檻以護其周增水土以養其本自毫末而拱把而尋丈久則喬柯上聳密葉四布逮今將三十年而子儀自校庠一舉而為宣德紀元之鄉魁明年遂登第為名進士及奉恩旨還家則見槐隂滿庭於是徘徊瞻顧因思其纍世積德之深先人封培之勤而已得蒙其庇蔭乃有今日之光榮遂扁其堂曰禎槐所以志不忘厥初也又明年春余赴京師道經於洛因獲登子儀之堂子儀指庭槐而語以故且求為記余以謂凡德善之積無有不報但時之希闊踈逺有似乎落落而難信者及夫天定勝人則若合符契於左右手蓋無絲毫之爽焉昔王祐手植三槐於庭曰吾後世子孫必有為三公者已而至其子旦大拜此蓋人以事而必之天也子儀之先君子未嘗手植是槐而有所期必而槐乃自生此蓋天以禎吉之兆示諸人也究槐之生逮今將三十年而始克有合如識者之言則所謂德善之報又豈終于希闊踈逺而落落難信乎然則世之為善者可以無怠矣子儀年力方富而尤篤於進修積德行義方自此始吾意其先世為善之報尚未巳也請姑書此于壁以俟邵陽縣重修廟學記余嘗行天下登名山涉大川覽天地之髙逈極萬物之變化然後有以驗是道之大無不包而細無不入初不以逺近而有間也聖人之道即天地之道其流行充塞于宇宙間亦豈有逺近之間哉昔吾夫子欲居九夷門人惑之殊不知九夷雖逺固不能外是道以有生聖人所在即道之所在又豈有不化之人哉今去聖人僅二千年不問海內外華邦蠻區愚夫小子皆能道吾夫子之號而起尊信之心由是愈見其道之大而居夷之言非偶設也寶慶邵陽縣舊為邵州在楚越之交去中國數千里古荒服之地厯年既久風氣漸開俗亦寖變至周元公以道學之倡為駕司員外郎通判永州權發遣邵州事視舊學湫隘遂遷於資水之濵其釋奠祝文曰惟夫子道髙德厚教化無窮實與天地參而四時同今觀其處地勢爽塏林木蓊鬱襟帶岡阜映帶激湍誠講學之佳所也當時學者既相與翕然從其教而流風遺澤更久不泯逮我皇明大崇儒教廣建內外學博取天下之俊秀以教育之于時縣令薛中克遵明命因元公所遷故址而增築廟學以新教化逮今六十餘年而殿廡堂齋神門漸至凋敝何永芳以進士來知縣事始至謁夫子廟庭視學舍如是大懼禮典弗飭教法隳弛遂委群材合甓工以時興修之百廢以次俱完視兩齋卑陋復廣而大之又肖完夫子及配饗從祀諸賢像工既訖功乃進諸生於庭而告以務學修已治人之要由是士風一新詩書禮樂之教延及齊民余至其邑人既交稱其政良而學官復請記其興學之事以告來者余謂永芳不以邵陽僻逺而能欽服國家崇學之美意景仰先哲之遺風作新斯學以興起士類可謂知所務者矣因是以驗聖人天地之道充塞流行於宇宙間者蓋莫知其所極也遂書此使刻之退思亭記辰之為府當沅酉之水會始之作城者因山水之髙下迂直而立板建堞城中之官署民居亦皆墾削土石夷為等級而立棟作屋焉分司得地勢髙下三之二却顧則連山茂林環其北前視則江南諸峯列峙層出嵐靄林輝逺侵几席左右俯視則市衢屋瓦之鱗此嵐影水光之淡灔皆可坐得其妙蓋辰據一方山水之勝而分司又得是府瞻望之美焉公堂之後舊擴為退思之亭亭之左右疏為軒檻外則竒花異木列秀交蔭入其中虛明洞逹爽氣逼人或扁曰退思蓋取孔子之言以為我憲職勉也余因廣其意而言曰凡我風紀君子其或衣繡持斧來涖是邦亦既以臨見吏民聽政公堂矣及退而處于斯也當何而致其思耶蓋必理有未明思以明之心有未正思以正之賄源思所以防遏積蠧思所以刮磨聽獄思所以明慎用刑思所以平恤善人在下思以陟之貪暴鴟張思以擊之忠誠思所以效竭惠澤思所以宣布是皆思之所當急而不可緩焉者也其或子女聲色思以樂之金貝珠玉思以攫之訐訟思所以顛倒是非法律思所以巧比條貫君子異已思以術而擯斥邪人附托思以計而援舉虛譽思所以暴揚隱慝思所以蓋覆是皆思之不可一日留於心者也思所當思則德修職舉澤及生人而榮光將被於無窮焉思所不當思則壞法斁紀而蒙垢玷身者亦將有所不免矣然則思之邪正不同而得失之機兆焉風紀君子可不慎所擇哉復有厚貌深𠂻思為拱默保持之計不能為有無者亦君子所不取也余以菲才承乏風紀恆懼邪思之淆雜而失其中及觀是亭之扁而重有契于心遂推其意而書以自警且以告同志君子之至於斯者不惟以江山臨眺之美自適又當覩斯亭之扁而留意焉重修許魯齋先生祠堂記新鄭縣西山大隗山之左里曰陽緩元魯齋先生許文正公所生之地也先生世家河內金季其先人避兵是邑實生先生於里中金大安己巳嵗也縣學有祠以祀先生其事具於碑今碑存而祠廢士大夫之往來與鄉民之向學者或嗟嘆以為缺典江西鄧麟訓𨗳邑庠乃即夫子宫墻東隙地營屋三間作先生像于中以時致祀既而求記於河南僉憲劉公咸公以推余余猶記往年過是邑鄧方謀欲作祠又二年再至祠成久矣鄧之志可嘉哉于乎先生之道之德之學所以紹程朱之正傳淑萬世之人心者固不待新學小生之贅贊而獨念是邑乃先生誕生之地顧祠宇久廢人心缺然無以寓敬鄧能因心興事作新斯宇使凡進謁庭下者如親炙先生若充然有得而退其有補於天理民彛不淺矣遂書其事以告後之人俾無替于承祀云永思堂記余未二十而失怙未四十而失恃終天之思未嘗一日忘于懷是非強然也蓋出於天性之不能已也宣德庚戌春再會永嘉陳君廷斌於沅州語及思親之故若出一軌又非強合也蓋出於人心之所同然也既而陳君謂余曰吾家故有堂二親平昔所居也親沒而名之曰永思今宦逰四方回顧斯堂雖邈隔江山而思之之切實發窹寐子幸餉我一言異日倘得便歸將書之壁以朂所思於無窮余曰君之思既得我心之同然者矣尚奚待言哉雖然人子於其親之心志嗜好聲容動作真若常在耳目而思之不忘者固如向之所云矣至若子之一身皆親之遺體又能愈加敬慎毫髮不損百行不虧以思無忝所生而有以肖親之德侈親之名則永思之道益無不備焉陳君登臺為才御史光賁泉壤會有期日所謂肖親揚名以全所思者將不在于此乎請以是為便歸之記并以自朂終天之思云拱北軒記靖州憲署東偏之室有軒北向余名之曰拱北其北有崇岡却倚城堞觀閣周絡其巔林木蔥青嵐靄參錯與夫空衢遊雲飛鳥之往來爽氣清風之披拂朝夕晦明之變化開軒舉在目前可坐而挹也而皆不為是蓋此去京師六七千里余來者僅三年仰慕闕庭固已恆在心目間居于是而瞻望悠然此余之所以名軒者然也且是州古為荒服自列而為郡漸被休明之化者久矣人亦孰不相與引領而環顧于內地哉是則人心之拱北者天下皆然又不特余心為然也孔子曰譬如北辰居其所而衆星拱之余得其言而不得其所以言方闢是軒而瞻北辰于天上宣德五年六月二十一日記南軒記宣德五年冬余至辰之溆浦取縣志觀之名士足迹既所不到古今題詠又所絶無蓋湖北之窮邊下邑也余特愛其四山攢拱衆溪經復風氣淳朴民物簡少頗有古俗因留旬餘其憲署後堂東屋余嫌其蔽昧不彰遂闢去南壁易之以軒積久之蔽障豁然頓開晝則日光輝耀夜則月華穿漏焚香讀書其下心神內外融朗洞逹忽若不知吾身之為小天地之為大也因念是屋也向也蔽今也通向也暗今也明是在人焉耳况心為神明之舍為此蔽昧者氣質人欲也去其蔽而開其暗其不在我者乎因治屋而得治心之要且不敢獨私其明也遂書其事於軒端併以啓後之人車窗記河東薛德溫官御史近五年始買小屋兩間於京師僅容几榻床席又苦其東壁暗甚力不能辦一窗小子淳乃取廢鹿車上轅卸去兩傍長木以中方穿櫺類若窗者穴壁而安置之余歸自外來因嘆曰以御史之顯曽不能辦一窗致以此物為之使富者見焉必睨目而哂掩口而走矣御史之拙於生事乃至乎此既而取古書讀其下則旭日漏彩清風度涼心神通融四體超爽忽不知天之逈地之廣而屋之陋也復從而自解曰吾之屋如是可謂陋矣然安之而忘其陋是居雖小而心則大也彼貪民侈士巍堂綺户可謂廣且麗矣彼方褊躁汲汲若不足以自容日夜勞神憊精思益以擴大之是其居雖大而心則小也小大之説君子必能辨之於是作車窗記慎齋記君子茍得一言皆可以為終身自修之要太原郭彥璧初中南宫乙榜之同州分教時便道省其先大夫太守公於開封太守公勉之曰汝以少年得官加有師道之重其慎之彥璧既拜受其教所至即以慎齋揭其退修之室今年秋彥璧與余會於京師因語其故且求為之記余嘗觀慎之一義而諸經傳取用不同有謂慎厥身者有謂慎厥行者是皆即可見之事而用力焉惟曽子子思慎獨之訓則欲人謹夫人所不知而已所獨知之地即周子所謂幾善惡而慎之用力莫切於此焉彥璧得家庭一言之訓以名其齋固將以為終身自修之要也又能厯取聖賢之訓擇其尤切者以致其謹使此心之幾一發於純全之天理而不流於夾雜之人欲則推之言行事物皆得其慎功效之大殆未可量他日立身揚名光大其先大夫之訓於無窮者未必不自於此云藏修室記尺蠖之伸非屈不可君子致用非精義入神不可故人之為學非致力于靜一之中亦何以為發用之本乎齊安袁廷璧氏自少有志于學因構室為肄習之地而扁曰藏修及宦既逹而猶不忘其故間以求豫為之記豫嘗觀君子之學發見于顯明之際者皆由潛修於幽間之中室者人之私居而幽間之地也廷璧方其從事於學也遊于斯息于斯其所修為何如耶吾意其有圖書針戒以修於目有琴瑟詠歌以修於耳存養以修其心之靜省察以修其心之動至于修於今而於當世之務無不講修於古而于事物之變無不考凡藏而所修者無一不致其極必知尺蠖之極其屈精究義理以入於神然後為藏修之至也廷璧用力于前者既已然矣及其發而為可見之行措而為當為之事業以至忠乎君而愛乎民者皆求伸致用之事而出於藏修之際廷璧其可謂篤於自修而善於所推者矣是其善不可不書也於是乎言慕萱堂記萱忘憂草也樹之北堂見詠於詩蓋所以慰母氏之心也以故後世有慕其母者必因以名堂焉齊安崔廷璧早失其恃而獨見鞠于父既而名薦書入太學駸駸乎有仕進之榮因念其母氏之沒養有弗克全於是以慕萱名其所居之堂而寓悲思之心焉夫人之誠孝固根於天性而不假於外物然外物觸其目而動其中則於天性之發為尤切故昔曽子不食羊棗以思其親之嗜有瞻望白雲而思其親之居是皆觸物而興悲者况萱之所植每近於母氏之居母存則萱固為忘憂之物母沒則萱適足為增悲之具此廷璧以萱名堂者實所以發其天性之真而不可以外物少之也今廷璧已階顯仕矣追想母氏平昔之居懸隔于數千里之外雖萱草之芬芳如昨而母氏之容音邈然則廷璧端居是堂而感之深思之切蓋有須臾之不能忘者矣雖然養志君子之所重也廷璧誠能以顯揚母氏之心為心必潔其身必修其職他日受朝廷之寵錫偉然為時之名臣而斯堂之名因得以傳之永久則廷璧之母雖亡而有不亡者存廷璧其勉之趙城縣徙作縣治記趙城為平陽大邑舊治在城西南汾水上厯載既久其城為水所圯漸不可居宣德紀元蠡縣楊君瓉以進士來知縣事顧瞻縣治若斯以謂弗即圖厥改作而廳堂廨宇之屬更不數歲將悉圯為洪淵矣遂具其事請於朝報可既下楊君乃相方于城之東北其地負隂面陽髙亢爽朗南北九十舉武東西八十舉武厥既得地則徙舊益新陶埴而瓦甓聚鳩材而山木集徴工召徒計日興役作正廳作後堂作儀門作鼓樓作六房以至廨宇庫藏犴獄之類靡不具作始工於宣德八年九月十九日訖工於宣德九年三月初四日既成屋以間計者得百有五十垣墉整肅棟宇宏邃不侈於前不儉於後髙下大小悉中於度由是徙而居之人得所止物有所栖既而楊君將刻其事於石而求辭於余余聞楊君於邑政之巨細能盡心其間而凡廟學壇宇育材事神之所既莫不完修及興是役又能程功計日節財謹用事不愆素民不告勞是皆可書也遂書其事使刻之俾知改作之所始具慶堂記具慶堂者行在浙江道監察御史李公載所作也公載由科目致身風紀內綜憲維外按藩郡揚厯之迹在人耳目既而二親皆以子貴顯受褒封命服在躬光動閭里公載慶二親之髙年而又得際盛世推恩之竒遇遂作斯堂以奉之每退自憲署即左右就養以盡愛日之誠間以屬余記余與公載為同年進士知公載之為人敏而逹又獲拜其尊府仲儼先生于家知先生之為人儒而通以父之賢而有子似之是宜德善之積繼繼一門其所以饗具慶之福荷寵錫之光者夫豈偶然哉且余聞古語有曰德善日積雖盛而非滿公載以強仕之年駸駸乎榮進之途其益增修所為無怠吾見二親年愈髙慶愈隆而斯堂之名愈顯矣重慶堂記孟子論三樂而以父母俱存兄弟無故為之首朱子釋之以謂此人所深願今既得之其樂可知然既有此樂且有大父母髙年而重慶者其樂又何如哉涇陽教諭楊生潤嘗從余學及登鄉舉中乙榜任今職到官乃闢一室扁曰重慶堂遂來迎其大父以就養且楊生大父母俱年近八十其父母皆年未耄老而康強有弟五人俱鴈行少壯所謂既有一樂而又有重慶之樂者楊生也誠為世之所難得矣今其大父既就其來迎行將至涇陽所謂重慶者居之楊生娛侍左右奉觴獻夀而其僚友諸生亦將持酒來以為慶其樂蓋有不可勝言者矣然楊生他日又將迎其祖母父母諸弟侍行同會于斯堂之上則其樂又何如哉然孟子又言仰不愧俯不怍為二樂得天下之英才而教育之為三樂楊生所教雖止一邑之士其間亦不可謂無英才也斯二者又當加勉焉故兢兢業業以從事于修省之功於善則實好之於不善則實去之俾自一心隱微之處以逹於百行顯明之地皆求存乎天理之公而不汨於人欲之私則仰不愧俯不怍之二樂可幾矣又能思師道之艱自進其學自修其德而以應人無已之求而以為人之矩範至於辨惑授業之際當懇懇告諸生以為學之要必先致其知而後力於行期使至於成立則於教育英才之三樂可幾矣斯二樂者又能勉焉如此則庶幾有成已成人之道于以奉其大父母父母而皆安其子之賢則重慶之樂殆可全矣其或俯仰不能無愧怍教人之道有未盡雖欲安其親之心恐有弗能也楊生因迎飬以書來求重慶堂記遂書此以遺之敬軒文集卷十八
