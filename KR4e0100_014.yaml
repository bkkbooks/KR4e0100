body:
  text: 敬軒文集巻十四眀薛瑄撰序送憲副王士恱之任序皇上臨御之七年詔廷臣三品以上舉堪任方面者扵時王公士悦以御史秩滿待選於吏部在廷之臣合議舉所聞知以名上而王公與焉遂拜浙江按察司憲副侍御侯君應元泊凡大夫士率先作歌詩以道其行而属余序余惟浙天下之大藩也東南際海以郡邑列者百十數而列職之勸懲庶政之振舉獄訟之推决皆于臬司乎是仰而憲副實恊贊其使挈持其綱紀而整齊之其任之重不言而可知王公以俊拔之資挾有為之才敭歴中外克著能聲遂為大臣之所推舉而膺此顯擢朝命既下輿論攸歸今之往也上為朝廷之所倚任下為列郡之所具瞻所謂激揚百司之亷墨修舉庻政之大小聽理獄訟之締結皆于公之恊贊是頼公宜何如思所報稱哉盖必益端其心益潔其行益平其法以往日敭厯中外已試之才施之扵大臬司使東南列郡之民欣欣然樂生趨事咸安扵官政之清簡而仰戴聖天子知人任使之宜以謳歌太平之盛治斯不負國家之所選擢矣送張鵬逺歸瀘陽序瀘陽張鵬逺來省其兄鵬舉扵京師將歸其友人户部主事王君治合凡交逰徴文以道其行余猶記少年時從先人宦逰川蜀及東歸舟過瀘陽留再宿因得登覽其山水之眀麗風氣之清淑意必有文儒忠信魁竒之士鍾其秀而生其間余雖未及訪亦常志扵心不忘耳後十六七年及得與鵬舉同登辛丑第時鵬舉已傑然為名進士又七八年乃得與鵬舉同官内臺時鵬舉又赫然為賢御史余因竊念鍾瀘陽山水之秀者其在鵬舉乎既而又知鵬舉之尊府志道先生以學行老成厯典教事所至有聲及鵬舉官顯遂棄職就封浙江道監察御史豸冠繡衣退居扵家余復自念鍾瀘陽之秀者又在鵬舉之尊府乎今鵬逺水陸浮走萬里來省其兄於官次暌離之懐既展友愛之情彌篤僅兹一年而又思盡子職扵庭闈之間士大夫咸嘉其孝友欲文以張其歸余又念鍾瀘陽之秀者又在鵬舉之弟乎昔三蘇父子亦蜀人也鍾眉山之秀而其名聞于今不冺鵬舉洎其尊府既有聞扵時而鵬逺方少年一出即獲美譽駸駸乎有聞將漸及于是哉今之歸侍奉之暇其尚益肆力扵正大之學他日以自然之充積振揚其尊府之家聲接武其侍御兄之芳躅則瀘陽山水之秀鍾扵張氏一門而流聲扵後者將與三蘇同乆矣送孫給事序聖朝大舉推恩之令朝士之給誥勅者例得賜歸展省祭之禮盖所以勸人孝勸人忠使遂其天理民彛之至性也士之生斯世際斯㑹亦榮慶矣哉給事西蜀孫公如例將歸侍御趙公其鄉人交友且密遂以書徴詞贈之余惟給事公之父某受知太宗文皇帝擢叅藩省陟貳地官終于位仁宗皇帝臨御之初公自外官入見以公大臣子故慰勞至再遂誥贈地官公禮部尚書且俾扶柩歸𦵏宣徳紀元有薦公學行者乃擢今職又以尚書公之貴封其母夫人嗚呼公之親若子實荷三朝之寵遇存沒蒙恩其榮慶為何如哉今之歸尚書公雖乆沒世而母夫人固無恙覩丘壠而興思拜萱闈而稱慶悲喜交集所謂天理民彛之至性盖有油然不可遏者矣省視之餘尚遄旋期益思國家推恩之意奕世遭遇之榮篤纘勤勞俾忠孝之節萃扵一門者繼繼不忘則不惟有光扵祖考抑且有光于邦家矣送鎮江府推官鄭聰序刑政之大者用之當否民之死生風之哀樂由焉故古今重之必慎擇其人以司其事即如今外府之推司一郡之刑獄其員獨其事専刑茍有所可不可皆决之于已非若他法官獄有所疑者猶有同官可與共議其當否是其任不亦尤難且重哉歸徳鄭希古以貢士問理秋官近有鎮江府推之授其友人趙紳合凡交逰徴辭以祝其行予嘗知希古之為人純篤寛易今又厯事秋官其扵制刑之宜用刑之要講之悉矣以鎮為東南大府江海之民茍有不得其平者咸扵府推乎是直希古之往其可茍乎哉必悉其所習者推之折獄之間而又本之以清修潔白行之以忠厚眀决要使怙奸稔惡者無以肆柔良單弱者得以伸則刑以清止惡之意流衍扵一郡而積樂致和之風可期也吾聞古之治獄平者其後多昌累而為公卿者有焉若史氏之言可信希古能盡心扵獄事其子孫自此昌矣送李給事歸省序當國家全盛之時文運昭眀之日而為士者奮六翮際風雲仕至近侍者載筆紀事敷奏大廷樞轄百司端笏委佩翺翔乎玉階鳯池之間而恒得瞻依日月之光大丈夫官至給事其身固已榮矣而又得推恩褒嘉其父母家室則榮及一門者又何如哉李公允恭給事禮科有年其二親雖逺在汴杞而皆康好無恙今年秋例得捧勅歸省黄門諸公咸作歌詩以歆榮之而屬余序余雅知公之為人温純深厚和毅從容初以冠帶舉人檢校外府既無貶色及拔居今職又無滿容其器識固有過人者是宜有今茲之榮遇焉夫官至給事榮矣推恩及其一門又可謂榮矣而公之父母具慶皆受寵錫今之歸上堂稱夀名徹州郡光動里閭又榮之榮者也展省之餘尚圖所以報厥榮者式嚴入覲益盡心所職以敷贊鴻猷使言行事業卓然有聞則公之榮不但及其身家里閭一時又將及扵天下後世也陳氏族譜後序天之生物一本故人必有祖祖以降雖有親踈之等而一本之傳固自若也故君子謹之必有譜以眀所自而篤愛敬焉莆田陳君渠念其先世積行委慶以及厥躬而有科甲仕進之榮懼年代䆮逺子孫莫克知所自而忽扵愛敬也遂推所知自髙曽以下列其位次行事為譜以傳扵家間閲之其序系有法述載簡實無冒妄傅㑹之尤盖得其譜矣踈戚之等既以是别愛敬之道亦以是篤有補扵家法倫理豈小哉陳君既不忘所本而克謹扵始使其子若孫咸以是為心而繼之以不怠扵後則増重是譜而一本之傳未巳也送陳御史祚歸𦵏序皇眀以天覆之仁涵育萬物凡為臣子盡忠扵國者又使得伸其私恩扵家監察御史陳公永錫以其父乆卒京師未得返櫬故封今年秋得請扵上詔許歸𦵏其同官盧君仲思合凡内臺交逰徴文以道其行永錫初以壬辰進士為太宗皇帝不次之擢拜河南叅議清聲恵政實被中土繼以事謫襄漢間為編氓者十餘年永錫雖在畎畆而慕戀闕廷之心初不少衰茍有所見必貢厥忠宣徳紀元宣宗皇帝臨御之初大新政治收録人才士大夫雖在譴謫之地茍有可用者咸得洗濯登進永錫遂為人所推薦授今職永錫既起自謫中列職内臺益以名節自砥礪持身清苦無一田之宅以庇其身無一金之産以恵其家惟以職有未脩惕厲扵旦夕間旋以言事下獄蒙今皇上曠蕩之恩榮任如舊嘗觀古所謂忠貞之臣屢偃屢起夷險薦更而定力自如故其節行盖扵當時聲名垂之不朽永錫起而仆仆而復起而勁操苦心如金更百鍊無改色殆可匹休扵古人矣今之得請又將盡心扵窀穸之事必誠必信安其親體而妥其神靈其誠孝之所感雖深山之草木鳥獸亦將為之増悲則鄉閭之為人子者孰不為之拭目改觀哉永錫襄事之餘其尚念使已得遂其私恩者皆上之賜而報稱之不可緩也式嚴入覲之期益脩厥職俾忠孝之節始終全盡足以追配古人而交逰之間亦與有光矣送浙江耿僉憲序朝廷設内憲臺與外臬司皆所以綱紀庶政糾察亷貪凡外臬司有所建白惟達諸内臺憲以可否之而與諸司文移絶又為之建分司扵屬部俾憲臣之出獨有所止而他職雖髙且貴不得以雜居其間其尊異也可謂重矣至用其人必由内臺敭厯之乆而又性行修潔有問學知大體者始得以充其員而雜進之士又不得與焉其選擢也又可謂嚴矣夫以臬司之重擇人之精如此則其所闗係為何如而任其職者其可自輕哉行在浙江道監察御史耿公定氣質端方操持謹潔敭厯内臺者十餘年議論鑿鑿精切若布帛菽粟雖非瓌竒紛麗傾駭觀聽之物而實切扵人生日用不可斯須缺者以故見諸建白見諸推讞見諸廵厯見諸糾察皆平正不頗犁然有當扵輿論之公今年冬以滿考待選扵天官大臣有以公之才行聞諸朝者遂授浙江僉憲瀕行同官之士相與屬余文以送之余謂耿公以薦達之公當外臬司之重任宜何如用厥心哉要當推其立朝之言行施扵藩維之間恊贊長貳必以誠動使事事皆出扵正按厯郡邑則當詢問幽隐之情雪其寃而䟽其滯去其惡而㧞其良茍有所知見又當達之宸嚴達之内臺俾無負平日之所學若然庶足以當臬司之重任于以樹勲名扵天地將垂之扵不朽矣禄位云乎哉耿公其勉之送廣西張大叅聰之任序合抱之木足以梁千仭超逸之驥足以致千里宜乎竒人偉士足以勝重而逺到也吾友張公聰與吾為同年進士其為人竒偉卓犖言論滚滚率多根據義理指摘事情而可施扵政治之間余嘗以巨材絶足稱之而必有勝重逺到之用及其為大行人使扵四方果能持身整整有以播朝廷之威徳足聳四方之觀聽未幾為識者所推薦授監察御史其在内臺則操守端慤而風裁凛然其廵厯邊鎮則糾察嚴明而部屬懼服官益清名益著再為大臣所薦遂陞廣西大叅朝命既下皆以得人相賀夫廣西古百粤之地布政司為南服之雄藩其地既逺且大故嘗選用重臣有威望素為人所推服者往踐其任非若他藩岳地易民淳可談笑而治也惟若南廣之逺且大非得竒偉之才則往往有不勝任之患今張公以如是之才膺如是之擢猶層臺九霄而合抱之才不覺其負荷之重長途萬里而超逸之足不覺其騰驤之難張公行見樹功南服馳聲北州而有還轅結軌之期厯階而升尚未可量也公其益以忠貞自朂慎勿以逺且大自沮使余言有不信也送山西大叅王原之序今布政司總方岳之政而其土地之廣人民之衆自縣而屬之州由州而屬之府府則統扵布政司其衆且劇如此故其官品之髙下與内六卿相埒夫以統治之大任使之尊非宏偉特達之才殆不足以勝其任今皇上御極之初作興政治尤重方岳之選爰遵宣宗皇帝成憲詔在廷三品以上咸得舉所聞知無間扵逺邇宣徳十年方岳有以缺員上者廷臣如例薦㧞而監察御史王公原之與其列遂拜山西左叅政内臺交逰相與屬余文以贈其行余觀山西之為境太行起之黄河迤之西北延袤數千里與沙漠為際國家嘗宿重兵以彈壓荒外而將士皆仰山右之儲需雖典禮教化刑政制作出扵朝廷者皆藩垣之所當脩布而不可緩至扵邉儲一事為藩岳重臣者尤宜精思其利弊以紓民力以足邊偹王公以俊拔有為之才典教未乆遽陞風紀及敭厯内臺綽有能聲曽未四載遂有今茲之重選以統治之大任使之尊王公之往可不慎哉向所謂宣廣徳意昭眀教條使所治之民咸得樂生趨事固為方岳者所當務而所謂邉儲一事盖取之扵民取之有法則民不匱而邉偹實征歛無藝則民力竭而邉偹虚民生休戚儲蓄盈縮是又在藩岳之用心何如王公之往協賛大政必當深思其宜而以次施行之斯使軍給饒而民生遂教化以興風俗以厚則能名將有加扵在臺閣時昔漢唐選廷臣有清望者出補外職外官政蹟顯著者復徴入用方今聖眀法古用人王公之往聲實誠有如前所云者則入補内職盖可期矣楊孺人挽詩序徴士楊孟達孺人吳氏御醫楊云之母也徴士世居金華武義實宋龍圖閣學士文簡公邁六世孫徴士胚胎前光涵濡訓典少有令聞扵鄉閭間擇配得里人吳以南之女即孺人也以南故儒家而業醫孺人既受教于賢父母及歸楊氏入門而宗族咸賀盥饋而舅姑胥悦孺人晝修婦功夜習書史雖性酷嗜學而惟以禮訓是飭不為筆札詞章之習及徴士應召至京師以疾卒時孺人方盛年二子曰云曰修俱稚孺人乃以節自持力扵家事無鉅無細必親其勞卒克教誨二子皆有成立及云以醫學訓科被召孺人但勉以忠義而語弗及私未幾云陞今職行將有䟽命之榮而孺人卒扵家矣御醫均聞訃將歸朝之大夫士咸髙孺人之節而哀其少盡其瘁壯罹其屯而晚克與其榮作詩付挽者歌之而俾瑄為之序瑄切嘗觀之古昔雖閨門之間皆有詩歌箴戒以為女範自世道既衰而女師之教無聞孺人幸生休眀之世乃能以詩禮自修以節義自持為婦為母咸盡其道雖弗克與其子推恩之榮而是詩之作舂容璀璨皆足以發其潛徳之幽光而傳之于不朽雖孺人亦可以無憾矣是為序贈吏科張給事中序鄢陵古名邑也先人與今户科給事王公惟善嘗教其邑一時及門之士固多俊秀其頴出者亦無幾而張均志通則居其尤焉時余侍先人逰與志通交志通質粹而不駁氣和而不流學勤而不息與物相接渾然不見崖迹時復毅然有所執而不可奪先人及惟善公固已知其為後來器中之瑚璉彛鼎也時余雖少亦意其必為鄢陵士子之領袖焉其後余先忝科第偹員内臺祇命湖荆人有自京師來者知志通已登庚戌進士第矣又五六年余丁内艱起復則志通先已徴至京師余因抵其家宿對榻談十餘年前事相與握手歔欷慨然念相知之乆固離合之有時也未幾與志通同拜除書志通任吏科給事余亦復官内臺益信先人及惟善公知人之不誣而亦幸余言之偶中也則又撫心相語期効節扵清朝殆不當冒濫榮寵滿其志而驕其氣怠其所當為以貽譏扵清議志通曰子之言是也敢不夙夜以求自刻勵既而交逰之在京師者亦相與慶志通之有成咸來徴詞以贈之余遂書與志通相知相期者如此以贈云驄馬行春詩序春者四時之首而萬物之所從始也陽和之氣充溢旁達初亦何待扵行哉殊不知聖人有作法天子民每扵嵗首恤民生之攸困慮寃抑之未伸故遣使循行郡國拯困雪寃要使逺邇之民咸得暢然遂其性故凡御史出而能廣上徳意者謂之驄馬行春吾友李君公載由進士入持邦憲嘗領節出廵淛右山東兩大藩所至必仰體聖天子法天子民之意燠煦疲癃䟽理寃滯鋤其暴而植其柔伸其㢘而遏其濁使蔀屋窮簷之下咸預覩世之光眀寒谷沍澤之中皆得蒙氣之融扇其扵行春之職可謂無忝矣故一時之賢士大夫咸樂道其善而作詩以美之余與公載為故人故又為之序云送郴州守吕希召還任序皇眀方制萬里雖逺州下邑窮山深谷之民視之率如輦轂之下凡選用民牧必得其人不以輕授郴州為湖廣之屬郡在京師西南數千里外介乎荒服之間其地逺矣吕君希召前自尚書户部員外郎往牧其民不知者皆曰郎官顯秩郴州僻地易此居彼得無幾微扵心乎其識者曰不然聖眀篤一視同仁之徳地雖逺而選授匪輕吕君必能仰體上意而盡心所職矣及今幾年吕君果以課最見考天官而俾之還任朝之大夫士與希召交逰者咸嘉其能相率徴文以贈其歸嘗觀韓昌黎送許郢州崔復州序大意謂為郡者租賦不可不均下情不可不通盖租賦不均則民有流逋之患下情不通則人有鬰抑之憂是二者誠長民者之所當知也今吕君牧逺僻之郡而以課最見稱得非能盡心扵租賦人情間而均且通乎今之歸民戴之愈乆愈親租賦或均矣吕君益當毋憚煩劇視民皆如赤子不使有偏徇之私情或通矣益當詢察疾苦隐伏毋使有一毫之壅漢制治民有勞効者多入補内職吕君出牧逺民即以治狀稱厥今法古用人吕君入仕之顯將漸及扵是哉送通州楊同知還任序吾鄉楊文振同知通州今六年矣通為畿甸之地居水陸之衝素號繁劇難治而文振優為之屢考屢最果何以得此哉盖文振之為人恬靜不務聲譽事至應之而己未嘗先事妄有所為以溷民故通雖劇而治之常有餘力亦猶庖丁解牛而各因其理也其可謂善扵治劇者矣因是觀天下之大好靜者民之情使任守倅令長者皆能因其情而静以治之養之而不閼其生教之而不咈其性熈熈然使各終其天年則俗何憂不古若哉奈何俗吏不知此類皆舞智釣聲煩其令使民不得息厲其威强人所難從至扵極而盻盻然以軋其長則曰民難治有如是哉亦莫克省諸已也余因文振之治通有所感故并書此以為天下長民者勸云送侯編修序昔楊少尹巨源以國子司業年滿七十去歸其鄉昌黎韓公引漢二䟽事序其歸至今其名赫赫在人耳目更乆愈彰是雖楊侯之賢亦由韓之文髙絶古昔故人得以喜稱而樂誦之也今翰林編修侯公初以國子學正陞監丞再陞今軄乃掌前事一朝亦以引年將歸太學六館之士咸嗟其老而惜其去鄉人進士石均瑁率先謁余文以贈其行夫以侯之賢固無愧扵楊而余之文則非韓比亦何足以揄揚侯公哉雖然侯公之徳之才見扵敭厯仕途人所耳熟目識而心醉者固已昭晰于時余皆置弗論姑即古今事論之昔二䟽之去有贈金之恵車馬之送而楊司業之去則有無不可知楊司業之去當時丞相白以為其都少尹不絶其禄而二䟽之去則不聞有是事侯公居太學者數十年官滿有陞秩之典有褒封之勅寵渥優厚及其身家誠曠世之難逢不知䟽楊當時有是事否韓公謂古今人同不同未可知也侯公之歸荷累朝之榮遇足以起為善之心屬七十之引年足以息躁進之志是其可以為法扵鄉閭者又豈特楊少尹不去其鄉之一事歟揭氏族譜序古之氏族或以字或以謚或以官族或以封邑皆所以著其世也逮年嵗緜厯之既乆居處變遷之靡常由是族愈逺而愈分愈分而愈踈甚至緦功之親未絶而相視若途人者有焉此仁人君子不能不慨然扵篤恩重倫之義而譜牒之所由作也監察御史揭君孟哲手其族譜一編示余且曰譜吾所修也吾家故有譜然厯載既乆漸至舛闕今吾因而修之畧扵逺非敢忽也缺所知也詳扵近非有偏也偹所及也又曰原吾所自出一也由一以降支分條布雖天秩有䟽數而流通之脉無異致自三年殺而期期殺而大小功大小功殺緦免絶一之流至此勢不同而理同觀吾譜者可以慨然于中矣余謂天之生物一本人各親其親乃天理也自宗子之法廢而踈戚以淆理以之微也世有能卓然自叙其宗以昭其前而垂諸後者可不謂仁人君子乎觀孟哲之修是譜也缺所知而詳所及一本之傳踈戚之序源委森然使其子孫族姓得有所考于以光祖宗悠逺之徳于以衍嗣緒無窮之傳其扵篤恩厚倫之助豈淺淺哉余姑書此以復孟哲至其氏族之出官閥之顯偹扵首序茲不復贅云送國子生黄勉序農不為艱嵗而怠其藨蓘之功無熟則已一熟則収必倍士不為未達而怠其進修之志無成則已一有所成則就必大自古賢人君子時或未至雖抱負其所為屢進屢抑者有焉如韓退之號為文儒宗主學者仰之如泰山北斗然當其未遇時尚屢挫扵所司况其他乎哉廣昌黄均勉其先大夫嘗贊政大府有聲均既得家庭之教而又逰邑庠從良師友以廣其學既而以其所有進試扵鄉闈屢進屢不㨗恒人處是鮮不形諸色辭而非乎人均則曰我之學實未至也非有司之過焉由是益勉厥所為而不怠逮今年春所司以均充貢大廷一舉而㨗例送南京國子監卒業將行其友監察御史陳嘉謨來索文以贈之余嘗言農不怠所業而收必倍士不廢所學而就必大觀均之為學即勤藨蓘矣始雖未利今則駸駸乎有成之秋太學又英賢之淵藪而均翺逰乎其間殆見耳薫目濡心融神得日増所聞知若聽九奏扵洞庭之野閲狂瀾扵大海之中則他日所獲猶大田登而所獲無算爵禄之來其可辭邪君其益勉之以需其至送房子新歸洛陽序孝友出扵天性之真而人每不能克盡其道者淪扵習俗奪扵物誘也有能卓然盡其道而不為二者所移得不謂之賢矣乎余自為進士時往來洛陽道中嘗經今監察御史房君子儀之舘時子儀尚為進士與其兄子新友愛尤篤一門之間孝弟之風雍如也又七八年子儀拜官内臺子新由洛東下大河北達鄘弼沿衞東騖上潞水以抵京師與子儀㑹扵寓舎晝則道舊故奉觴相酧夜則秉燭相對若不能退寢者怡怡愉愉之情發扵中達扵外既而子儀將西按闗陜而子新又念其母氏倚門之望亦將歸洛矣戒裝在途余與子儀同官諸公追而送之都門之外且告之曰世有帛堆其庾錢積其蔵號為富室大家而乃淪誘扵物欲習俗䖏父子兄弟之間悖爭鬬䦧之聲日聞扵人其獲罪扵名教甚矣是亦何足稱道扵士君子齒頰間哉子新在家庭時既已篤扵孝友子儀㳺宦京師子新又奉其母氏之命浮走水陸來展情好既而復將歸慰其母氏不為習移不為物誘扵房氏兄弟見之子新行矣子儀闗陜之行亦將便道拜其母氏扵堂子新其飭子弟釃酒醪具甘旨以需子儀之上夀送張僉憲之任序監察御史張均叔潤以進士擢官内臺内之振舉風紀外之廵厯郡邑以至奉命仗斧督察山藪之奸㺄妥安里閭之良善率皆秉公直矜恤之心以推行其素所蓄積要使國家仁柔萬物之意默寓扵詰奸禁暴之刑由是在職僅逾兩考而能聲敏行已振耀乎人之耳目今年春藩臬以缺官狀上詔廷臣各舉所知賢以補其員叔潤遂為大臣所推薦授江西僉憲余嘗謂官無崇卑惟得行其志乃士君子之所願况憲僉秩既不卑而又得按劾奸貪扶植善類有秩任之榮而得行其志叔潤兼而有之是其荷受不輕而重也較然矣雖然御史按察雖有内外之分其事則一叔潤為御史既克盡所當為今之往但當持其心如在内臺時加之以恊和使副使意不専而事父愜以至廵厯之方益當如昔人之為提刑雖荒崖絶島窮山深谷緩視徐按剔去牟蠧保恵良善使單民弱婦咸得伸眉吐氣而不為豪横所頓捽遏抑又見叔潤之聲克滿大江之西斯不負國家之所擢用矣叔潤其勉之贈司訓王秉節之任序莫難扵為人師師者所以覺人之暗正人之邪而後學所取法焉者也故夫子曰温故而知新可以為師矣謂之可則非盡扵此者也况於温故知新有未能乎孟子亦曰人之患在好為人師為師非人所當好以眀為師之不易則視之易而冒為之者又非亞聖之所取矣吾觀厥今國家養育人才以需公卿大夫士百司之任用其原則悉本扵學校學校則責在師儒故師儒得人則學子有所取正法式開其識而廣其才由科貢之途進而備國家之器使者累累焉師或非其人則為弟子者貿貿然若問道扵盲借聽扵聾窮年累月矻矻然雖勞其心力而竟無一得欲求其才之成而備諸司之器使難矣哉先人教鄢陵時諸生固多俊秀而王均秉節則為老成之士又居諸生之首焉厥後秉節貢諸澤宫益増其所未至聞見日益廣遂從群士試教職之選扵大廷名出而秉節又為首冠遂授南宫司訓余謂以師道之難而秉節以老成之士居之其尚益思其不易謹其言行而為諸生之儀式勤其講授以啓諸生之蔽惑俾才器之成如金之就範冶木之就䂓矩他日人才之出于南宫者珠聨璧合彚進扵眀時則秉節扵師道之難者克盡所難殆無愧扵孔子之言而不至如孟氏之所譏矣秉節其勉之送陳庭訓歸青田序陳庭訓少從其先君子宦逰四方及其先君子棄世乃與弟四人奉其母夫人歸養扵青田之故鄉庭訓孝友之名聞里閭間藉甚今監察御史陳君庭詢則其弟也庭詢既以文章取髙第得美官而青田去京師將七八千里庭訓與庭詢别又五六寒暑矣一日庭訓奉其母夫人之命拏舟來自大江之南視庭詢扵京師相與論故舊懇懇傾㵼不能已晝不足則繼之以燭或道其先君子之宦迹則因以興無涯之感或道其母夫人之深愛則因以起望雲之思或誦夫鶺鴒之詩則相勉以出處之慎言雖諄複皆出扵友愛真情而卒歸扵天理之至正㑹合曽㡬何庭訓重念母夫人之髙年而歸念動矣戒途有日君子扵庭訓為子而能孝扵其親為兄而能友于其弟既孝且友得人心之同然者感扵人宜其名動里閭而見稱士大夫間昔張仲以孝友見詠扵詩人流譽扵後世况庭訓生逢盛世詩人墨客所在林立庭訓之歸道途所經舟車所掠吾見詠庭訓之美者所至若啓蟄之雷連乎其聲有不可遏殆與張仲之名同傳之乆逺矣歸見母夫人更為道庭詢守官之清慎以慰其倚門之望送陳御史歸祀序親在而欲致其養親沒而欲致其祀此人之至情也國家以孝治天下人臣之仕于朝者親在得歸省親歿得歸祀所謂因人之至情而立教者也監察御史陳君廷斌自拜官來扵今八九年矣一旦請扵朝將歸修祀事扵其家命下廷斌告别扵内臺所往來因相與属余叙以贈之余嘗與廷斌奉使湖南同處者累年雅知廷斌之篤扵其親廷斌嘗謂余曰某不幸二親皆早世今幸藉先徳之庇有列扵朝欲以其禄致薄養扵親固已無及矣此子路所以有負米之嘆也又嘗謂余曰人之不得生盡其養庶幾扵其歿身有所立以其光為父母之光今國家方舉推恩之典他日或得荷寵光以歸賁二親扵九原使歿者有知庶有以伸終天之報俯仰今昔六七年餘及余起復至内臺廷斌已自荷國之光封其親如其秩今既得請以歸修祀事廷斌昔欲報其親之志遂矣然廷斌得遂所願者誰之賜乎盖由我國家天覆臣下因人情而立教使人子生事沒祭皆獲所欲而然也廷斌歸見鄉人幸皆以此告之使為士者各加修勉以膺國家之寵光以報親恩之罔極詩曰孝子不匱永錫爾類余扵廷斌有望焉送栁御史守制序人子事親而至扵終於此不用其誠烏乎用其誠誠者發扵中形於外悲戚哀痛之心出扵天性而不能自已者是也聖人因人心之自然定為中制使賢者不敢過雖不賢而不敢不及故初終有安厝虞祭之禮漸逺有小祥之日終也有大祥之期至扵中月禫而終事畢矣聖人之中制所以為萬世法程者士大夫謹守而不敢易焉栁彦輝氏為進士在京師時常念其母夫人之年每望東南之雲即神魂飛去及擢居御史方思秉忠効節以為榮甫及三月而母夫人之訃音至矣彦輝即毁瘠若不能生者遂匍匐而歸余與同官倪君陳君及内臺諸公既相與致弔又勉其節哀順變以襄大事彦輝遂攬淚就途余觀人之大節無踰扵忠孝未有厚扵孝而薄扵忠亦未有忠而不本扵孝者也彦輝在逰宦時既能思其親不置及遭大故而悲哀疾痛之情有足動人者今之歸也又將盡誠扵窀穸虞祥禫祭之間守先聖之中制而不敢過與不及其厚扵孝者可知矣三年釋服入覲修職業立事功扵時又將以觀其忠焉送趙司訓序沔池趙以澄之先君子由科目進身卓然為人師者數十年以澄得家庭之學余與之同領永樂庚子河南鄉薦眀年為辛丑余忝進士第以澄則退益所學扵家今十七八年矣余自承乏風紀以來徳不加修學不加益以澄則䖏閒靜中涵而蓄之淬而礪之學益積行益進才益鋭以余十七八年日怠之學視以澄十七八年日益之學其相去逺近淺深髙下盖可知矣此余每接真儒碩士未嘗不發愧扵中而重以澄之有成也今年春以澄抱負所業而來獲與千百人偕試扵春闈遂中乙榜有涇州分教之命夫以澄以清修之士積乆之學一旦發而見用扵模範之重涇之士得其所依歸哉雖然余於以澄重有告焉昔之所學以澄之自得也今之為師以澄將推所得扵人也孔子謂雖有周公之才之美使驕且吝其餘不足觀也已竊觀世之為師者己未有得固無以淑諸人或有所得矣又率多負恃其才訑訑然有自足之色否則靳其才而不肯盡心扵教事得非孔子所謂驕且吝乎師道至此良可慨嘆以澄學成已成物之學固不至此然猶願以澄深以是為戒謙虚而恒若不足勤勵而思以及人身教言誨俾涇之士子勉勉不怠所從事他日在門墻者隨其才器皆得有所成就異乎尋常之為師則以澄之學進扵余之十七八年者不惟見其自得又可騐之及人而足以克肖乃先君子之賢其家聲亦將振耀扵永乆矣是為序敬軒文集巻十四
