body:
  text: 敬軒文集巻十一眀薛瑄撰雜著胡氏族譜後僉憲髙唐胡公間出其族譜示余俾余書其後且曰譜吾作也吾家故有譜具載世次行蹟吾少時猶及見之後更散逸不存吾懼先系先徳將遂湮沒無傳扵是斷自吾之所知者創為是編以傳諸家庶後之人得有所考而知所自又曰凡譜所以兼載世美以示諸後也吾自束髪讀書厯官中外僅克有立而幸不失所守者皆先徳之遺也若是譜不作則是自専其休而忘先徳之大豈仁孝之心乎此吾勉就是編而不敢以蕪陋為解也余受而退閱其編觀其序宗系則綱紀不紊論世徳則言行不遺因仰而嘆曰自宗子之法壊而人莫知所自往往親未盡而相視若塗人者有焉幸而士大夫家間有譜牒以紀其世則又或逺附顯者以自重厚加潤澤以失真是二者皆過也僉憲公則不然其紀世次既眀白可考論先徳又典實可推若是以傳之家公之子姓宗族一覽之頃親踈之序世徳之懿舉在目前莫不興其孝弟慈良之心髙山景行之念凡行義藹然扵一門徳善相承扵悠乆者實有頼扵是編也詩所謂孝子不匱永錫爾類者公有焉若公之氏族官閥僉憲劉公序之偹矣兹不敢贅謹擇其一二可言者書扵後以復扵公云書何原眀先生傳後先生三衢之常山人諱初字原眀姓何氏非非齋其號也自少以頴睿聞既從學扵鄉先生三江兄弟即以窮理正心克己為務且兼習舉子業嘗兩舉不第益自奮勵復從程觀先生學易遂以易經領鄉薦任仁和教諭既而元季俶擾文教隳弛乃解官歸鄉里日以讀書談道自樂值國朝開運首訪遺才以任民牧遂以先生為江州湖口丞時軍興多故邑里凋瘵先生調給安定焦勞匪懈以治狀騐白陞知韶州府仁化縣其便民之政可紀者尤多既而丁外艱去官遂以疾家居篤意教事及海内平定詔天下建學養士且求學行老成者為師遂起先生為巴東教諭先生年益髙學益充徳益進聞望彰灼近孚湘藩逺徹朝右困召至闕下預修書傳㑹選書成將歸上考之欲授以近地便養遂除開化教諭禄之終身先生學既有得尤善開發人故後進出其門為名士顯宦者甚衆嗚呼夷考先生之學之傳逺有端緒盖三江先生出許文懿公之門而先生則三江所授也其淵源既逺至於經㫖之微性理之奥宏博精密盖多其自得故其䖏心制行有足動人者至扵著述雖多要皆根本義理而不為浮靡之習若先生之為人可謂有古士風矣及觀其為佐令為教職則其學又以驗諸行事事可考然或者猶謂此特先生小試耳使得盡推其所有則其效當不止是殆未可知也距先生沒後二十五年其孫永芳以進士知邵陽縣時未幾民翕然化固知其學宦家法有所自意者先生之未克盡施者永芳殆能繼其志而擴大之乎其端兆矣永芳持其祖家傳求言以發其潛徳遂芟取先生之學之行見諸行事有未究而將有待扵後人者書以還之河崖之蛇瀕河居者為予言近年有大蛇穴禹門下岩石中常束尾崖樹顛垂首扵河伺食魚鼈之類己而復上入穴如是者累年一日復下食扵河遂不即起但尾束樹端牢不可脫每其身一上下則樹為起伏如弓張弛狀乆之樹枝披折蛇堕水中數日蛇浮死水之漩隈竟不知蛇得水物貪其腥羶不舎而堕耶抑蛇為水之恠物所得欲起不能而堕也余聞之喟曰是蛇負其險毒稔其貪婪以食扵河所恃以安者尾束扵樹耳使樹不折則其生死猶未可知惟樹折身墜遂死扵河此殆天理非偶然也且使蛇得水物貪其腥羶不舎而死固可為怙强貪不知止之戒使蛇為水之恠物所得而死亦可為害物必報之戒蛇惡物所不足道者但其事有近乎理故書以告來者捕虎答辰故五溪地山險多虎近時尤劇往往羣行摶噬無間晝夜既飽肉得氣去愈縱横嗥躍無所顧畏居民行旅悉苦其暴縣吏以聞扵朝命下總戎逐捕之時宣徳五年閏十二月也三日有以虎在近郊來報者總戎率將士往遂殺三虎眀日遣將士往又殺一虎連兩日四虎就殛行者相賀扵途居者相賀扵室將吏以其事來白扵予且曰辰之四境若四虎比者盖不知多少也總戎方發近衛兵將包羅山谷捜剔其窟穴而芟夷之期醜類盡絶乃止夫除惡安民亦繡衣公之志也敢併以為賀予愧乎其言則應之曰夫利五兵結網罟除山澤惡物為人害者自先王之制已然况我皇眀奄甸萬姓仁柔義濡期使覆載逺邇無一民之不獲其生而僻茲蠻方醜類稔惡乃爾則擉刃網繩之施其可後也不兩日而四虎殱期畢舉而羣惡盡是皆將吏能用總戎之令耳予逢掖者無能為也何賀之敢當然予于是盖有感焉彼皮毛之斑炳爪牙之銛利炰烋乎山林摶噬民物以自肥者人皆知其為暴而可殺如前所云者是也抑又孰知于此有不皮毛不爪牙不山林號為靈物而剥人之脂膏以自養者暴不下扵彼而可惡也哉况彼之暴者蠢然强悍力有餘而志則否野夫小子有能髙其垣籬謹其出入猶可避其患也此則以饕餮之資挾翕張之勢或柄一隅或統一軍或任一邑無間癃殘窘富悉被其朝吞夕噬之苦是又孰得避之哉且彼異類也為暴自其性然此則同類也而至扵斯極予又不知此誠何心哉然彼之暴汝總戎軄也行見悉皆殄除而民物全安矣此則予職也國家憲紀素以完具方圖所以少施其方畧以覃恵澤扵逺邇將吏之賀可休矣衆乃相屬以目屏氣促武而去猫說余家苦䑕暴乞諸人得一猫形魁然大爪牙銛且利余私計䑕暴當不復慮矣以其未馴也縶維以伺候其馴焉群䑕聞其聲相與窺其形類有能者恐其噬己也屏不敢出穴者月餘日既而以其馴也遂解其維縶適覩出殻雞雛鳴啾啾焉遽起而捕之比家人逐得已下咽矣家人欲執而擊之余曰勿庸物之有能者必有病噬雛是其病也獨無捕䑕之能乎遂釋之矣已則伈伈泯泯飢哺飽嬉一無所為羣䑕復潛視以為彼將匿形致已也猶屏伏不敢出既而䑕窺之益熟覺其無他異遂厯穴相告曰彼無為也遂偕其類復出為暴如故余方恠其然復有雞雛過堂下者又亟往捕之而走追則囓者過半矣余之家人執之至前數之曰天之生材不齊有能者必有病舎其病猶可用其能也今汝無捕䑕之能有噬雞之病真天下之棄材也哉遂笞而放之跋李氏族譜後余觀吉水谷坪李氏家譜自唐西平忠武王晟第七子憲為江西節度使卒於官子㳺奉其䘮𦵏宜春因家扵宜春五世孫唐自宜春徙居吉水今谷坪李氏皆唐之裔也逮今廿餘世矣而其髙節懿行孝子忠臣竒童碩士顯宦偉績出扵李氏之族者炳燿磊落前後相望今其雲孫茂復以眀經登進士第官大理丞繼西平之往烈衍谷坪之後裔未見其極也不觀諸江河乎出岷崐行乎無垠入乎無門巨派支流浩博綿演愈逺而不息者以其源之洪也西平有大功扵唐室殆岷崐其源乎不然何其子孫流派若是之盛也嘗觀世之君子遑恤其本而惟末之求譬之沼沚尋尺之水决而引之不終日而竭矣尚何望其綿延不絶愈逺而愈盛乎然則李氏有譜不惟其子若孫知源之有自皆力扵善而無怠扵繼承世之君子觀此亦足以矯然而知勸矣韻語丹青之巧摹寫物之形聖言之妙貫穿物之理因丹青之形而求其本真因聖言之妙而求其所以是謂象内求心非聖人安能至此書絳守居園池記後近得樊紹述絳守居園池記石本扵今太守臨川王公汝績記前後刻孫冲何亮序書多論樊記之失偶記舊收元人文集中有是記句解撿得之則灤陽趙仁舉辨疑附其後復深辨孫何之説非是余既未得親考絳之遺跡與樊記合否但以趙説觀之恐今石本中尚有舛誤賢太守更能叅互考正并句解刻之則千載竒文晦而復顯亦可偹絳郡遺事之一端他亦不足深辨云書諸葛武侯出師表後嘗謂義利二者不能並立古之君子能建大功立大業垂大名扵萬世者未嘗不重義而輕利也如諸葛武侯自昭烈枉顧即以身許馳驅其所以勞心焦思謨畫䂓圖者曷嘗頃刻而不以討賊興漢為義哉至其為子孫衣食之計者不過成都之桑八百株薄田十五頃而已外此則别無絲毫取扵人而益其家也其重義輕利如此故能嘘炎光扵已燼之日續漢統於既絶之秋雖弗克遂其攘除奸兇興復漢室還扵舊都之志而大義固已伸扵天下宜其偉烈洪名垂諸萬世而不泯也竊恠後之君子建功立業者莫不慨然以古人自期然其為義之公或有不勝其計利之私故其正大光眀之業有不及古人逺矣愚因讀武侯出師表有感而書此扵其後云書貞節堂詩文後監察御史濟南王允母氏太孺人劉自其年二十有六已䘮其偶時允方五嵗其弟信方三嵗孺人上無翁姑之倚下無僮僕之資惟自力扵紡績以給衣食奉祭祀撫遺孤勤苦勞悴貧約困阨人所不堪而孺人自勵其操愈堅鄉里逺邇咸以王節婦稱之允年七嵗孺人使讀孝經及頗通文義即遣入郡庠使從良師友逰以廣其業允竟登進士第拜今官信亦克成立以幹其家時孺人年已七十矣猶康健不衰值國家舉推恩之典允父某贈監察御史劉封太孺人有司復以孺人之節行上于朝詔所司旌表其門閭由是孺人之節行積扵家庭信于鄉里顯扵國家實有命服之貴旌異之榮焉嗚呼天下古今之理豈有大於節義者哉節義者人道之大防也妻之扵夫猶臣之扵君不幸而遭變故婦多効節扵其夫之死而靡貳其行臣當効節扵其君之死而靡貳其操誠以婦道臣道所全者節義耳又豈可為飢寒禍患所廹貪生畏死自壊其節義哉故程子有言孀婦餓死事極小失節事極大自常情觀之孰肯以死而易生自節義觀之則亷耻根扵天理民彞之固有亷耻䘮則天理亡而彞道泯雖幸得茍且安利扵一時曽與禽獸無以異以是知程子之言非真知節義之重扵死者不能識也婦道如此則臣道可知矣孺人當其盛年䘮偶之時固以死自誓盖不以凍餓殞亡易其心卒能守節四十餘年潔白堅貞之行無纎毫之疵隙夷考從古以來人臣號為讀書知禮義至臨大節而易其守者不如孺人多矣况彼失節之婦摭迹皆是曽何足以彷彿孺人之萬一哉然則孺人所以因其子貴者實由其以節顯固宜垂榮名扵竹帛與天地而同乆矣允嘗作堂以奉孺人士大夫往往作為詩文以發揚其事雄章雅製聨為巨帙允間持其帙求予言遂書此扵其後云書文丞相遺翰後御史張君諫持宋文丞相遺翰來俾予題其後予觀之盖文山與宜春趙宰手帖也張君重之惟甚竊惟古之遺墨所以見重扵後世者不以其人之賢乎當宋室垂亡之秋其守帥憑堅城控强兵望風送欵投誠屈膝者相望也而文山以狀元宰相奮孤忠以報國誓將返濛汜之日扵中天提疲卒當勍敵雖流離顛沛困苦艱危脫身死亡之餘而憤憤興復之志猶庶㡬扵萬一及赤手起兵雖苦戰不支以歸而長揖元之君相不拜盖此身可虀可粉而志不可以威武屈卒之從容就死以成仁其大節炳燿軒轟宇宙間凛凛乎立萬世君臣之大義回視棄滅天常之降臣叛將曽犬豕之不如則其忠賢冠絶千古豈人之所能及哉宜其遺墨僅一幅而為人所悚敬珍蔵垂二百年而新猶一日也嗚呼重其遺墨者本慕其人也張君重此帖固知所慕矣使世之君子得此帖而觀之得不慨然知所重而慕之哉書劉忠愍公遺翰後劉忠愍公與予為辛丑進士正統四年予僉憲山東至京師公時為講官留飲具論邊事將有後來之患又一年為正統六年召為大理少卿又二年為正統八年公上疏言十事其一即前四年所論邊事疏有詆訐權臣語遂為所仇擠以死又六年為正統十四年公所言邊事大驗今聖天子乃别白邪正誅滅權奸追贈公翰林學士加今謚遣官祭以少牢所以褒恤禮儀光榮隆厚而公之名一日震耀天下嗚呼自古以來士鮮全節如公者天地間盖不多見其眀有以燭事幾扵未然其忠欲以救事勢扵將然其直氣正言至扵忤權奸死而不悔是盖天與之以全節足以為人臣之大防立萬世之人紀矣類若予軰之庸碌不足為重輕者何足道哉何足道哉又三年為景泰三年冬得公與張御史手書觀之追想平生三復慨歎書此以志扵其後云書嘉𤓰集後太祖髙皇帝臨御之五年句容民張觀獻其園所産二實同蔕嘉𤓰扵朝既賚之錢遣歸禮官因進言嘉𤓰乃聖徳和同國家恊慶之瑞詞臣亦獻頌以美焉聖祖乃製讚以示不居其瑞之意復諭臣下曰縱朕有徳天必不示以一物之祥且草木之祥生于其土亦惟其土之人應之于朕何預若盡天地間時和嵗豐乃王者之禎也夫禮官詞臣以嘉𤓰為瑞者如彼聖祖則推而弗居以時和嵗豐為禎者如此盖自漢唐宋以來雖英賢之君鮮不為祥瑞之所媚惑惟我聖祖取時和嵗豐為禎不以草木一物為瑞誠足以超越千古垂法萬世矣雖然當斯之時隂陽順序年榖屢登所謂王者之禎既昭見扵太和之世而此嘉𤓰者寔亦和氣所鍾聖祖雖不有其瑞而國家聖子神孫宗支蕃衍繼繼承承億萬斯年豈非嘉𤓰為兆之一端歟而觀之宗族七八十年以來亦漸繁盛今其孫諫由進士為御史籍甚有聲聖祖所諭草木之祥生扵其土亦惟其土之人應之者又足徴也是則國家厚徳深仁培植基本導致休祥固所以饗世扵無窮而御史君益當上體聖祖之大訓下念大父之肇祥奉其親長率其子孫敦行仁義忠孝之道扵不怠庶有以衍厥祥扵悠乆不然所資者多而所積者有限譬之泉焉不數浚其源而流將竭祥其可恃乎哉御史君既摘五倫書所載嘉𤓰事實益以家乗所傳彚而為集名士大夫皆有作間亦求予言遂書此扵其後云題漢武帝迎申公圖余觀漢武帝迎申公圖喟曰兹事不見扵世乆矣當時武帝能以玉帛安車禮聘賢者如此庶幾三代招賢之盛典然申公既至有為治不在多言顧力行何如之對不合雖以為大中大夫尋竟罷歸惜乎武帝有招賢之名無用賢之實也武帝既然抑不知申公所謂力行者何事邪竊意人君力行莫大扵誠意正心修身以行王道扵天下使申公之言果出于此而武帝允廸之則漢之治何三代之不如哉然以汲黯内多欲而外施仁義之言觀之彼既以多欲内蠱其心固無望其能力行所言以致治也漢千載之後有如程朱之真儒所以告其君者皆誠意正心修身以行王道之言當時皆莫之用則不能力行以為治者又不特武帝為然也因是以知三代而下所以治不復古者其原皆出扵此三撫斯圖書此以識其後題騎都尉孔朂誥後右誥一道今給事孔公恂上世祖孔公朂仕宋真宗時特恩所授也朂為宣聖之嗣其家世之慶善顯榮綿厯古今儒者言之偹矣余皆置不贅論獨念自宋以來數百年間數罹變故雖天下之巨蔵重寳大有勢力者或弗能保為己有惟此誥僅一幅而其子孫乃能世謹收蔵宛然如舊豈亦有數存扵間邪抑孔氏之子孫所重者異扵彼耶然則觀者扵此可以矯然而知所警矣書河南叅政陳公詩後永樂初年先君子復任滎陽縣教諭時余年方十五河南叅政陳宗問浙江寜波府鄞縣人以進士任工部主事陞前軄其為人有學有守尤好激勵後進因行屬至滎陽索余詩藁觀遂贈余一律且序之曰觀其所作才充而氣廣不數年間將見問學淹通聲名洋溢禄位不卑非余儕偹員茍禄者之可比矣其詩有知爾晚來成大器願修徳業贊雍熈之句時陳公年逾六十鬢髪皓然而乃奬進余之稚昧復深自謙抑如此可見前軰忠厚之至俯仰今昔垂六十年顧余老而無聞不能副所期望祇增愧耳然公之厚意則不可忘遂書其事扵詩後云魏純傳魏純字希文山東髙密人也其先世多仕者至其父為官江南希文就學於江南初治易後眀春秋詩書大義亦皆知之其父為績溪令時希文客金陵一時達官貴人聞希文名屏勢就見請交因合幣羅致舘中俾訓其子弟未㡬人有所指摘語及希文謫戍邉衛寓薊州玉田縣先君子永樂七年教訓其邑希文復誨諸將官子扵學宫傍瑄因得納交為心友自是往返凡十年議論連日夜不舎瑄之踈劣賴希文䂓輔之益為多先君子官滿去希文徒歩送數十里執手為别别三年嘗一得書自是信音不相聞者又三年其後先君子丁大父母憂起復至北京時希文亦以薦至吏部因同膺薦者有所不合復退扵初又二年為宣徳元年侍從有薦希文學行者復召至京師集試吏部文既合格將上其名于朝以官之而希文竟暴卒扵旅次是年某月某日也眀年春瑄在河南始聞其訃先是瑄有詩懐希文考希文亡日與瑄作詩時皆在宣徳元年冬豈非交情之密黙有感觸扵中而不能自己于言乎嗚呼喧嘗觀古人論富貴貧賤必皆曰有命瑄少猶未之信年來經渉既乆數數考之扵已驗之扵人然後有以見夫富貴貧賤盖皆决然不易之命而非人之私智所能去取也以吾希文觀之其賦質粹而眀其為學正而純其立心必欲一毫無愧扵屋漏其制行必欲一事不悖扵天理是則以徳言之希文之賢固當見用扵時也䖏戎伍僅三十年超然自得不為顯者焜耀而有自沮之色其貧至扵床無完衾身無完褐耕穫薪芻之事靡不偹嘗而操行堅如金石畧不少變其所處盖有古人所難者而希文優處之以時言之希文困極宜通當不至扵終困也至其忠信之行積扵中徴扵外武夫小子皆信其為善人而起尊敬之心縉紳大夫皆知其為君子而咸欲其得位于時是則以人事言之希文名實孚扵逺邇亦當顯於世也三者皆無絲髪可疑而乃卒至于窮死不得一試其有則所謂决然不易之命豈不信哉瑄又竊有疑焉夫所謂命者果何自而然哉盖出扵天也天必貴有徳福仁人希文乃不克䝉其貴與福則所謂天者竟何如哉豈貴徳福善者其常而貴福差爽者不得其常乎果天道自然而然初無心扵其間乎抑人之生也適丁其氣之清濁厚薄不齊而非天之所能為乎是皆不可知也或者又謂天於善人不有以福其躬必有以昌其後是又未可必也雖然古之所謂善人君子者顧自處何如耳固未嘗以命之厚薄為輕重也昔固有貴為卿相富累千金生無益而死無聞者命則厚矣其于道果何如哉以希文之賢雖卒至扵窮死其徳行名譽孚於人人其自處者既已無愧於道矣命之厚薄奚足道哉奚足道哉瑄與希文交最乆情最密始以希文之不遇質之命而自疑終以希文之無愧揆之道以自解又恐希文之潛徳懿行乆而或泯扵世也遂作傳以志扵私篋以傳之悠乆且俾世之君子當力扵為善而無疑于命云蕭都御史傳蕭氏諱中字存中世居江西之龍泉其里曰南園世稱南園蕭氏存中曽大父諱暉甫大父諱福可父諱民逺凡三世俱以徳善承繼一迹逺引弗耀扵時存中賦質剛敏篤志問學大能繼述三父志以増累其徳善在鄉里直言正色是是非非無少假借雖為鄉人之善者敬服歸向卒不恱扵群小以是醜正健訟之徒妄相與鑿空造言意欲搆䧟存中獨先識其㡬微謂其家曰辟言扵行不食古亦有之吾不可不行其戒遂挈家避居外邑者將十五年後知鄉里訟風稍息乃還舊居所謂南園者其鄉里善人老者喜其歸少者仰其徳俗遂變為仁里爭訟殆絶存中乃益治其舊田園課僮僕勤力其中不數年生意益饒扵前時大有所積則斥其餘以周困窶不責所負丁亥嵗臨逺傍郡執役之人伐木歸自湖湘者既飲食不時疲扵道路加以隆暑鬰蒸病者死者扶踣相望居人皆以為疫癘染人閉户無敢出視存中獨曰是有命疫癘安能染人乃大出湯藥分遣所親多方救濟役夫賴以全活者甚衆存中既讀書知義尤篤於宗族無間踈戚逺近有女孤無依者為具粧奩擇所歸使無過時男長不能娶者資給以聘禮使無失配其扵家法閨庭内外秩如雍如嚴而有恩訓其子孫一以道義不及於利其子啓者既得存中家傳之學登宣徳丁未進士第厯官監察御史山東按察僉事陞僉都御史奉勅兩鎮河間府居庸闗其所軄皆風紀戎政大事存中數戒以書俾䖏心以公仁持已以廉慎行事以古人偉節豐功自期待勿為區區小利汨迷身心撓損名節啓能恪守其戒所至守不可奪事無不立人無不悅卓然為時之名臣存中貽教厥子者可謂正且大矣啓鎮守居庸時存中棄世邊務方殷朝廷勉留啓􅅹誠懇乞終制至于再三詔乃許奔䘮奪情起復及至又領勑廵撫山右乆之謝病歸將奉存中之祀扵家唘之既忠且孝則存中教及厥子者又可謂善且美矣啓為監察御史推恩封存中如其官啓既陞都憲又推恩誥贈存中中憲大夫都察院右僉都御史云蕭叙仁字說禮曰已冠而字之成人之道也釋者曰古者童子雖貴名之而已冠而後賔字之以成人之道敬其子也都憲蕭公子榮冠禮請學士劉公為賔因字之曰叙仁劉公復序其字取孟子仁則榮不仁則辱故因其名而字之曰叙仁盖欲其勉扵為仁而行之有序也夫道之至大者莫大扵仁孔子弟子自顔子以下皆未嘗以仁許之誠以仁為萬善之長偏言則一事専言則包義禮智三者故孔子教人惟以求仁為言盖盡仁則四者之性無不盡矣至其為仁之要則其告顔子以非禮勿視聽言動者是也是則仁道雖大有非後學所敢易言然人得天地之理以為性初不以聖愚而有異聖人之所以為教學者之所以為學莫不本扵是焉故雖初學之士凡志扵道者必當從事扵斯也今學士公既以叙仁字榮矣叙仁其可不深思仁道之至大而未易言者以用力扵求之之要哉且施仁之序雖自親以及踈自近以至逺而其本則在乎求諸心而已使心有不仁則以何者施扵逺近親踈之間哉求諸心者無他即非禮勿視聽言動是也叙仁必當念茲在兹無終食造次顛沛之違勉之又勉用力之乆庶㡬克去人欲復全天理而本心無一毫之不仁則施仁之叙無往而不達有安榮之效無危辱之事禮所謂冠而字之成人之道者將扵是乎在不惟無負扵學士公字之之意亦無忝扵都憲公矣若徒尚乎叙仁之名而無為仁之實殆見身心之間尚且迷繆乖紊之無序尚何以施諸親踈逺近而得夫安榮之效哉叙仁其勉之叙仁其戒之試諸生策一道問天地之間理氣而已河圖五十有五之數一六水居北二七火居南三八木居東四九金居西五十土居中竒偶之數固八卦之所由畫也然此皆以氣言而不及於理何歟洛書因一二三四五六七八九之數第而為五行五事八政五紀皇極三徳稽疑庶徴五福之疇固兼以理氣言矣先儒謂河圖洛書相為經緯八卦九疇相為表裏然一以氣言一兼以理言果何以有經緯表裏歟厥後周子作太極圖其曰無極而太極者純以理言也自隂陽五行男女化生萬物則兼以氣言而理為之主也然周子非有河圖洛書之可據而太極圖之作果有合扵羲畫禹疇之㫖歟諸子扵易書周子之學必嘗講之試為我陳其説敬軒文集巻十一
