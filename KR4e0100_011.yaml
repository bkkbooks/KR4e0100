body:
  text: 敬軒文集卷十一眀薛瑄撰雜著胡氏族譜後僉憲髙唐胡公間出其族譜示余俾余書其後且曰譜吾作也吾家故有譜具載世次行迹吾少時猶及見之後更散逸不存吾懼先系先德將遂湮沒無傳于是斷自吾之所知者創為是編以傳諸家庶後之人得有所考而知所自又曰凡譜所以兼載世美以示諸後也吾自束髮讀書厯官中外僅克有立而幸不失所守者皆先德之遺也若是譜不作則是自専其休而忘先德之大豈仁孝之心乎此吾勉就是編而不敢以蕪陋為解也余受而退閲其編觀其序宗系則綱紀不紊論世德則言行不遺因仰而嘆曰自宗子之法壞而人莫知所自往往親未盡而相視若塗人者有焉幸而士大夫家間有譜牒以紀其世則又或逺附顯者以自重厚加潤澤以失真是二者皆過也僉憲公則不然其紀世次既眀白可考論先德又典實可推若是以傳之家公之子姓宗族一覽之頃親踈之序世德之懿舉在目前莫不興其孝弟慈良之心髙山景行之念凡行義藹然于一門德善相承于悠久者實有賴于是編也詩所謂孝子不匱永錫爾類者公有焉若公之氏族官閥僉憲劉公序之偹矣兹不敢贅謹擇其一二可言者書于後以復于公云書何原眀先生傳後先生三衢之常山人諱初字原眀姓何氏非非齋其號也自少以頴睿聞既從學于鄉先生三江兄弟即以窮理正心克己為務且兼習舉子業嘗兩舉不第益自奮勵復從程觀先生學易遂以易經領鄉薦任仁和教諭既而元季俶擾文教隳弛乃解官歸鄉里日以讀書談道自樂值國朝開運首訪遺才以任民牧遂以先生為江州湖口丞時軍興多故邑里凋瘵先生調給安定焦勞匪懈以治狀驗白升知韶州府仁化縣其便民之政可紀者尤多既而丁外艱去官遂以疾家居篤意教事及海內平定詔天下建學養士且求學行老成者為師遂起先生為巴東教諭先生年益髙學益充德益進聞望彰灼近孚湘藩逺徹朝右困召至闕下預修書傳會選書成將歸上考之欲授以近地便養遂除開化教諭祿之終身先生學既有得尤善開發人故後進出其門為名士顯宦者甚衆嗚呼夷考先生之學之傳逺有端緒蓋三江先生出許文懿公之門而先生則三江所授也其淵源既逺至於經旨之微性理之奧宏博精密蓋多其自得故其處心制行有足動人者至于著述雖多要皆根本義理而不為浮靡之習若先生之為人可謂有古士風矣及觀其為佐令為教職則其學又以驗諸行事事可考然或者猶謂此特先生小試耳使得盡推其所有則其效當不止是殆未可知也距先生沒後二十五年其孫永芳以進士知邵陽縣時未幾民翕然化固知其學宦家法有所自意者先生之未克盡施者永芳殆能繼其志而擴大之乎其端兆矣永芳持其祖家傳求言以發其潛德遂芟取先生之學之行見諸行事有未究而將有待于後人者書以還之河崖之蛇瀕河居者為豫言近年有大蛇穴禹門下岩石中常束尾崖樹顛垂首于河伺食魚鱉之類己而復上入穴如是者纍年一日復下食于河遂不即起但尾束樹端牢不可脫每其身一上下則樹為起伏如弓張弛狀久之樹枝披折蛇墮水中數日蛇浮死水之漩隈竟不知蛇得水物貪其腥羶不舍而墮耶抑蛇為水之怪物所得欲起不能而墮也余聞之喟曰是蛇負其險毒稔其貪婪以食于河所恃以安者尾束于樹耳使樹不折則其生死猶未可知惟樹折身墜遂死于河此殆天理非偶然也且使蛇得水物貪其腥羶不舍而死固可為怙強貪不知止之戒使蛇為水之怪物所得而死亦可為害物必報之戒蛇惡物所不足道者但其事有近乎理故書以告來者捕虎答辰故五溪地山險多虎近時尤劇往往羣行摶噬無間晝夜既飽肉得氣去愈縱橫嗥躍無所顧畏居民行旅悉苦其暴縣吏以聞于朝命下總戎逐捕之時宣德五年閏十二月也三日有以虎在近郊來報者總戎率將士往遂殺三虎眀日遣將士往又殺一虎連兩日四虎就殛行者相賀于途居者相賀于室將吏以其事來白于豫且曰辰之四境若四虎比者蓋不知多少也總戎方發近衛兵將包羅山谷搜剔其窟穴而芟夷之期醜類盡絶乃止夫除惡安民亦繡衣公之志也敢併以為賀豫愧乎其言則應之曰夫利五兵結網罟除山澤惡物為人害者自先王之制已然况我皇眀奄甸萬姓仁柔義濡期使覆載逺邇無一民之不獲其生而僻茲蠻方醜類稔惡乃爾則擉刃網繩之施其可後也不兩日而四虎殱期畢舉而羣惡盡是皆將吏能用總戎之令耳豫逢掖者無能為也何賀之敢當然豫于是蓋有感焉彼皮毛之斑炳爪牙之銛利炮烋乎山林摶噬民物以自肥者人皆知其為暴而可殺如前所云者是也抑又孰知于此有不皮毛不爪牙不山林號為靈物而剝人之脂膏以自養者暴不下于彼而可惡也哉况彼之暴者蠢然強悍力有餘而志則否野夫小子有能髙其垣籬謹其出入猶可避其患也此則以叨餮之資挾翕張之勢或柄一隅或統一軍或任一邑無間癃殘窘富悉被其朝吞夕噬之苦是又孰得避之哉且彼異類也為暴自其性然此則同類也而至于斯極豫又不知此誠何心哉然彼之暴汝總戎職也行見悉皆殄除而民物全安矣此則豫職也國家憲紀素以完具方圖所以少施其方略以覃惠澤于逺邇將吏之賀可休矣衆乃相屬以目屏氣促武而去貓説余家苦鼠暴乞諸人得一貓形魁然大爪牙銛且利余私計鼠暴當不復慮矣以其未馴也縶維以伺候其馴焉群鼠聞其聲相與窺其形類有能者恐其噬己也屏不敢出穴者月餘日既而以其馴也遂解其維縶適覩出殼雞雛鳴啾啾焉遽起而捕之比家人逐得已下咽矣家人欲執而擊之余曰勿庸物之有能者必有病噬雛是其病也獨無捕鼠之能乎遂釋之矣已則伈伈泯泯飢哺飽嬉一無所為羣鼠復潛視以為彼將匿形致已也猶屏伏不敢出既而鼠窺之益熟覺其無他異遂厯穴相告曰彼無為也遂偕其類復出為暴如故余方怪其然復有雞雛過堂下者又亟往捕之而走追則囓者過半矣余之家人執之至前數之曰天之生材不齊有能者必有病舍其病猶可用其能也今汝無捕鼠之能有噬雞之病真天下之棄材也哉遂笞而放之跋李氏族譜後余觀吉水谷坪李氏家譜自唐西平忠武王晟第七子憲為江西節度使卒於官子遊奉其喪葬宜春因家于宜春五世孫唐自宜春徙居吉水今谷坪李氏皆唐之裔也逮今草餘世矣而其髙節懿行孝子忠臣竒童碩士顯宦偉績出于李氏之族者炳耀磊落前後相望今其雲孫茂復以眀經登進士第官大理丞繼西平之往烈衍谷坪之後裔未見其極也不觀諸江河乎出岷昆行乎無垠入乎無門巨派支流浩博綿演愈逺而不息者以其源之洪也西平有大功于唐室殆岷昆其源乎不然何其子孫流派若是之盛也嘗觀世之君子遑恤其本而惟末之求譬之沼沚尋尺之水決而引之不終日而竭矣尚何望其綿延不絶愈逺而愈盛乎然則李氏有譜不惟其子若孫知源之有自皆力于善而無怠于繼承世之君子觀此亦足以矯然而知勸矣韻語丹青之巧摹寫物之形聖言之妙貫穿物之理因丹青之形而求其本真因聖言之妙而求其所以是謂象內求心非聖人安能至此書絳守居園池記後近得樊紹述絳守居園池記石本于今太守臨川王公汝績記前後刻孫沖何亮序書多論樊記之失偶記舊收元人文集中有是記句解撿得之則灤陽趙仁舉辨疑附其後復深辨孫何之説非是余既未得親考絳之遺迹與樊記合否但以趙説觀之恐今石本中尚有舛誤賢太守更能參互考正并句解刻之則千載竒文晦而復顯亦可偹絳郡遺事之一端他亦不足深辨云書諸葛武侯出師表後嘗謂義利二者不能並立古之君子能建大功立大業垂大名于萬世者未嘗不重義而輕利也如諸葛武侯自昭烈枉顧即以身許馳驅其所以勞心焦思謨畫規圖者曷嘗頃刻而不以討賊興漢為義哉至其為子孫衣食之計者不過成都之桑八百株薄田十五頃而已外此則别無絲毫取于人而益其家也其重義輕利如此故能噓炎光于已燼之日續漢統於既絶之秋雖弗克遂其攘除姦凶興復漢室還于舊都之志而大義固已伸于天下宜其偉烈洪名垂諸萬世而不泯也竊怪後之君子建功立業者莫不慨然以古人自期然其為義之公或有不勝其計利之私故其正大光眀之業有不及古人逺矣愚因讀武侯出師表有感而書此于其後云書貞節堂詩文後監察御史濟南王允母氏太孺人劉自其年二十有六已喪其偶時允方五嵗其弟信方三嵗孺人上無翁姑之倚下無僮僕之資惟自力于紡績以給衣食奉祭祀撫遺孤勤苦勞悴貧約困厄人所不堪而孺人自勵其操愈堅鄉里逺邇咸以王節婦稱之允年七嵗孺人使讀孝經及頗通文義即遣入郡庠使從良師友逰以廣其業允竟登進士第拜今官信亦克成立以幹其家時孺人年已七十矣猶康健不衰值國家舉推恩之典允父某贈監察御史劉封太孺人有司復以孺人之節行上于朝詔所司旌表其門閭由是孺人之節行積于家庭信于鄉里顯于國家實有命服之貴旌異之榮焉嗚呼天下古今之理豈有大於節義者哉節義者人道之大防也妻之于夫猶臣之于君不幸而遭變故婦多效節于其夫之死而靡二其行臣當效節于其君之死而靡二其操誠以婦道臣道所全者節義耳又豈可為飢寒禍患所迫貪生畏死自壞其節義哉故程子有言孀婦餓死事極小失節事極大自常情觀之孰肯以死而易生自節義觀之則亷耻根于天理民彞之固有亷耻喪則天理亡而彞道泯雖幸得茍且安利于一時曽與禽獸無以異以是知程子之言非真知節義之重于死者不能識也婦道如此則臣道可知矣孺人當其盛年喪偶之時固以死自誓蓋不以凍餓殞亡易其心卒能守節四十餘年潔白堅貞之行無纎毫之疵隙夷考從古以來人臣號為讀書知禮義至臨大節而易其守者不如孺人多矣况彼失節之婦托迹皆是曽何足以倣佛孺人之萬一哉然則孺人所以因其子貴者實由其以節顯固宜垂榮名于竹帛與天地而同久矣允嘗作堂以奉孺人士大夫往往作為詩文以發揚其事雄章雅製聨為巨帙允間持其帙求豫言遂書此于其後云書文丞相遺翰後御史張君諫持宋文丞相遺翰來俾豫題其後豫觀之蓋文山與宜春趙宰手帖也張君重之惟甚竊惟古之遺墨所以見重于後世者不以其人之賢乎當宋室垂亡之秋其守帥憑堅城控強兵望風送欵投誠屈膝者相望也而文山以狀元宰相奮孤忠以報國誓將返濛汜之日于中天提疲卒當勍敵雖流離顛沛困苦艱危脫身死亡之餘而憤憤興復之志猶庶幾于萬一及赤手起兵雖苦戰不支以歸而長揖元之君相不拜蓋此身可虀可粉而志不可以威武屈卒之從容就死以成仁其大節炳耀軒轟宇宙間凛凛乎立萬世君臣之大義回視棄滅天常之降臣叛將曽犬豕之不如則其忠賢冠絶千古豈人之所能及哉宜其遺墨僅一幅而為人所悚敬珍藏垂二百年而新猶一日也嗚呼重其遺墨者本慕其人也張君重此帖固知所慕矣使世之君子得此帖而觀之得不慨然知所重而慕之哉書劉忠愍公遺翰後劉忠愍公與豫為辛丑進士正統四年豫僉憲山東至京師公時為講官留飲具論邊事將有後來之患又一年為正統六年召為大理少卿又二年為正統八年公上疏言十事其一即前四年所論邊事疏有詆訐權臣語遂為所仇擠以死又六年為正統十四年公所言邊事大驗今聖天子乃别白邪正誅滅權姦追贈公翰林學士加今諡遣官祭以少牢所以褒恤禮儀光榮隆厚而公之名一日震耀天下嗚呼自古以來士鮮全節如公者天地間蓋不多見其眀有以燭事幾于未然其忠欲以救事勢于將然其直氣正言至于忤權姦死而不悔是蓋天與之以全節足以為人臣之大防立萬世之人紀矣類若豫輩之庸碌不足為重輕者何足道哉何足道哉又三年為景泰三年冬得公與張御史手書觀之追想平生三復慨歎書此以志于其後云書嘉瓜集後太祖髙皇帝臨御之五年句容民張觀獻其園所産二實同蒂嘉瓜于朝既賚之錢遣歸禮官因進言嘉瓜乃聖德和同國家協慶之瑞詞臣亦獻頌以美焉聖祖乃製讚以示不居其瑞之意復諭臣下曰縱朕有德天必不示以一物之祥且草木之祥生于其土亦惟其土之人應之于朕何預若盡天地間時和嵗豐乃王者之禎也夫禮官詞臣以嘉瓜為瑞者如彼聖祖則推而弗居以時和嵗豐為禎者如此蓋自漢唐宋以來雖英賢之君鮮不為祥瑞之所媚惑惟我聖祖取時和嵗豐為禎不以草木一物為瑞誠足以超越千古垂法萬世矣雖然當斯之時隂陽順序年榖屢登所謂王者之禎既昭見于太和之世而此嘉瓜者實亦和氣所鍾聖祖雖不有其瑞而國家聖子神孫宗支蕃衍繼繼承承億萬斯年豈非嘉瓜為兆之一端歟而觀之宗族七八十年以來亦漸繁盛今其孫諫由進士為御史籍甚有聲聖祖所諭草木之祥生于其土亦惟其土之人應之者又足徴也是則國家厚德深仁培植基本導致休祥固所以饗世于無窮而御史君益當上體聖祖之大訓下念大父之肇祥奉其親長率其子孫敦行仁義忠孝之道于不怠庶有以衍厥祥于悠久不然所資者多而所積者有限譬之泉焉不數浚其源而流將竭祥其可恃乎哉御史君既摘五倫書所載嘉瓜事實益以家乘所傳彚而為集名士大夫皆有作間亦求豫言遂書此于其後云題漢武帝迎申公圖余觀漢武帝迎申公圖喟曰兹事不見于世久矣當時武帝能以玉帛安車禮聘賢者如此庶幾三代招賢之盛典然申公既至有為治不在多言顧力行何如之對不合雖以為大中大夫尋竟罷歸惜乎武帝有招賢之名無用賢之實也武帝既然抑不知申公所謂力行者何事邪竊意人君力行莫大于誠意正心修身以行王道于天下使申公之言果出于此而武帝允迪之則漢之治何三代之不如哉然以汲黯內多欲而外施仁義之言觀之彼既以多欲內蠱其心固無望其能力行所言以致治也漢千載之後有如程朱之真儒所以告其君者皆誠意正心修身以行王道之言當時皆莫之用則不能力行以為治者又不特武帝為然也因是以知三代而下所以治不復古者其原皆出于此三撫斯圖書此以識其後題騎都尉孔朂誥後右誥一道今給事孔公恂上世祖孔公朂仕宋真宗時特恩所授也朂為宣聖之嗣其家世之慶善顯榮綿厯古今儒者言之偹矣余皆置不贅論獨念自宋以來數百年間數罹變故雖天下之巨藏重寶大有勢力者或弗能保為己有惟此誥僅一幅而其子孫乃能世謹收藏宛然如舊豈亦有數存于間邪抑孔氏之子孫所重者異于彼耶然則觀者于此可以矯然而知所警矣書河南參政陳公詩後永樂初年先君子復任滎陽縣教諭時余年方十五河南參政陳宗問浙江寧波府鄞縣人以進士任工部主事升前職其為人有學有守尤好激勵後進因行屬至滎陽索余詩藁觀遂贈余一律且序之曰觀其所作才充而氣廣不數年間將見問學淹通聲名洋溢祿位不卑非余儕偹員茍祿者之可比矣其詩有知爾晚來成大器願修德業贊雍熙之句時陳公年逾六十鬢髮皓然而乃奬進余之稚昧復深自謙抑如此可見前輩忠厚之至俯仰今昔垂六十年顧余老而無聞不能副所期望祇增愧耳然公之厚意則不可忘遂書其事于詩後云魏純傳魏純字希文山東髙密人也其先世多仕者至其父為官江南希文就學於江南初治易後眀春秋詩書大義亦皆知之其父為績溪令時希文客金陵一時達官貴人聞希文名屏勢就見請交因合幣羅致館中俾訓其子弟未幾人有所指摘語及希文謫戍邉衛寓薊州玉田縣先君子永樂七年教訓其邑希文復誨諸將官子于學宫傍瑄因得納交為心友自是往返凡十年議論連日夜不舍瑄之踈劣賴希文規輔之益為多先君子官滿去希文徒步送數十里執手為别别三年嘗一得書自是信音不相聞者又三年其後先君子丁大父母憂起復至北京時希文亦以薦至吏部因同膺薦者有所不合復退于初又二年為宣德元年侍從有薦希文學行者復召至京師集試吏部文既合格將上其名于朝以官之而希文竟暴卒于旅次是年某月某日也眀年春瑄在河南始聞其訃先是瑄有詩懷希文考希文亡日與瑄作詩時皆在宣德元年冬豈非交情之密默有感觸于中而不能自己于言乎嗚呼喧嘗觀古人論富貴貧賤必皆曰有命瑄少猶未之信年來經涉既久數數考之于已驗之于人然後有以見夫富貴貧賤蓋皆決然不易之命而非人之私智所能去取也以吾希文觀之其賦質粹而眀其為學正而純其立心必欲一毫無愧于屋漏其制行必欲一事不悖于天理是則以德言之希文之賢固當見用于時也處戎伍僅三十年超然自得不為顯者焜耀而有自沮之色其貧至于床無完衾身無完褐耕穫薪芻之事靡不偹嘗而操行堅如金石略不少變其所處蓋有古人所難者而希文優處之以時言之希文困極宜通當不至于終困也至其忠信之行積于中徴于外武夫小子皆信其為善人而起尊敬之心縉紳大夫皆知其為君子而咸欲其得位于時是則以人事言之希文名實孚于逺邇亦當顯於世也三者皆無絲髮可疑而乃卒至于窮死不得一試其有則所謂決然不易之命豈不信哉瑄又竊有疑焉夫所謂命者果何自而然哉蓋出于天也天必貴有德福仁人希文乃不克蒙其貴與福則所謂天者竟何如哉豈貴德福善者其常而貴福差爽者不得其常乎果天道自然而然初無心于其間乎抑人之生也適丁其氣之清濁厚薄不齊而非天之所能為乎是皆不可知也或者又謂天於善人不有以福其躬必有以昌其後是又未可必也雖然古之所謂善人君子者顧自處何如耳固未嘗以命之厚薄為輕重也昔固有貴為卿相富纍千金生無益而死無聞者命則厚矣其于道果何如哉以希文之賢雖卒至于窮死其德行名譽孚於人人其自處者既已無愧於道矣命之厚薄奚足道哉奚足道哉瑄與希文交最久情最密始以希文之不遇質之命而自疑終以希文之無愧揆之道以自解又恐希文之潛德懿行久而或泯于世也遂作傳以志于私篋以傳之悠久且俾世之君子當力于為善而無疑于命云蕭都御史傳蕭氏諱中字存中世居江西之龍泉其里曰南園世稱南園蕭氏存中曽大父諱暉甫大父諱福可父諱民逺凡三世俱以德善承繼一迹逺引弗耀于時存中賦質剛敏篤志問學大能繼述三父志以增纍其德善在鄉里直言正色是是非非無少假借雖為鄉人之善者敬服歸向卒不恱于群小以是醜正健訟之徒妄相與鑿空造言意欲搆陷存中獨先識其幾微謂其家曰辟言于行不食古亦有之吾不可不行其戒遂挈家避居外邑者將十五年後知鄉里訟風稍息乃還舊居所謂南園者其鄉里善人老者喜其歸少者仰其德俗遂變為仁里爭訟殆絶存中乃益治其舊田園課僮僕勤力其中不數年生意益饒于前時大有所積則斥其餘以周困窶不責所負丁亥嵗臨逺傍郡執役之人伐木歸自湖湘者既飲食不時疲于道路加以隆暑鬱蒸病者死者扶踣相望居人皆以為疫癘染人閉户無敢出視存中獨曰是有命疫癘安能染人乃大出湯藥分遣所親多方救濟役夫賴以全活者甚衆存中既讀書知義尤篤於宗族無間踈戚逺近有女孤無依者為具粧奩擇所歸使無過時男長不能娶者資給以聘禮使無失配其于家法閨庭內外秩如雍如嚴而有恩訓其子孫一以道義不及於利其子啓者既得存中家傳之學登宣德丁未進士第厯官監察御史山東按察僉事升僉都御史奉敕兩鎮河間府居庸關其所職皆風紀戎政大事存中數戒以書俾處心以公仁持已以廉慎行事以古人偉節豐功自期待勿為區區小利汨迷身心撓損名節啓能恪守其戒所至守不可奪事無不立人無不悅卓然為時之名臣存中貽教厥子者可謂正且大矣啓鎮守居庸時存中棄世邊務方殷朝廷勉留啓􅅹誠懇乞終制至于再三詔乃許奔喪奪情起復及至又領勑巡撫山右久之謝病歸將奉存中之祀于家啓之既忠且孝則存中教及厥子者又可謂善且美矣啓為監察御史推恩封存中如其官啓既升都憲又推恩誥贈存中中憲大夫都察院右僉都御史云蕭敘仁字説禮曰已冠而字之成人之道也釋者曰古者童子雖貴名之而已冠而後賔字之以成人之道敬其子也都憲蕭公子榮冠禮請學士劉公為賔因字之曰敘仁劉公復序其字取孟子仁則榮不仁則辱故因其名而字之曰敘仁蓋欲其勉于為仁而行之有序也夫道之至大者莫大于仁孔子弟子自顔子以下皆未嘗以仁許之誠以仁為萬善之長偏言則一事専言則包義禮智三者故孔子教人惟以求仁為言蓋盡仁則四者之性無不盡矣至其為仁之要則其告顔子以非禮勿視聽言動者是也是則仁道雖大有非後學所敢易言然人得天地之理以為性初不以聖愚而有異聖人之所以為教學者之所以為學莫不本于是焉故雖初學之士凡志于道者必當從事于斯也今學士公既以敘仁字榮矣敘仁其可不深思仁道之至大而未易言者以用力于求之之要哉且施仁之序雖自親以及踈自近以至逺而其本則在乎求諸心而已使心有不仁則以何者施于逺近親踈之間哉求諸心者無他即非禮勿視聽言動是也敘仁必當念茲在兹無終食造次顛沛之違勉之又勉用力之久庶幾克去人欲復全天理而本心無一毫之不仁則施仁之敘無往而不達有安榮之效無危辱之事禮所謂冠而字之成人之道者將于是乎在不惟無負于學士公字之之意亦無忝于都憲公矣若徒尚乎敘仁之名而無為仁之實殆見身心之間尚且迷繆乖紊之無序尚何以施諸親踈逺近而得夫安榮之效哉敘仁其勉之敘仁其戒之試諸生策一道問天地之間理氣而已河圖五十有五之數一六水居北二七火居南三八木居東四九金居西五十土居中竒偶之數固八卦之所由畫也然此皆以氣言而不及於理何歟洛書因一二三四五六七八九之數第而為五行五事八政五紀皇極三德稽疑庶徴五福之疇固兼以理氣言矣先儒謂河圖洛書相為經緯八卦九疇相為表裏然一以氣言一兼以理言果何以有經緯表裏歟厥後周子作太極圖其曰無極而太極者純以理言也自隂陽五行男女化生萬物則兼以氣言而理為之主也然周子非有河圖洛書之可據而太極圖之作果有合于羲畫禹疇之旨歟諸子于易書周子之學必嘗講之試為我陳其説敬軒文集卷十一
