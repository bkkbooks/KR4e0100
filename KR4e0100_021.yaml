body:
  text: 敬軒文集巻二十一明薛瑄撰碑漢伏波將軍馬公廟碑古有功葢於一時名垂於後世享生民之祀於無窮者豈非大丈夫抱非常之材識本之以忠誠行之以悠久而有以通神明貫金石達古今而無間者乎漢伏波將軍馬公援天與魁竒器識宏邁當漢統中微新莽竊命四海横流之日乃逺迹邊陲混身田牧時人弗之識也獨其兄况謂曰汝大才當晩成且良工不示人以朴且從所好公亦嘗曰大丈夫為志窮當益堅老當益壯公之所立固已見於此矣及其盡散財蓄志清時難遨逰隴蜀擇所適從知崛起草竊之徒皆酣豢富貴於一時不足以計安生民於萬世也遂謁光武於洛陽一見之頃即以恢廓大度同苻高祖稱之因委質臣事効忠戮力以匡復漢室若聚米之開示山川銅柱之威服殊俗皆公之竒謀偉績其他蕩除戡靖維調贊翊之䇿尤多中興之功公無與讓及天下底定朝廷清明雖剖符受封爵列五等榮寵並極而公不以是自佚嘗奮不顧身志欲効死邊疆以盡臣節及武陵羣蠻撓邊公遂請行兵至臨鄉蠻即摧破師次壺頭伐功未就而公卒先是有以兵事聞于帝者時遣來監軍之人素有憾於公及至軍而公已没遂厚加誣毁以快其䜛而薏苡之謗亦與焉嗚呼若公之所立卓偉竒特駕一世之横騖挺百代而獨出猶不免巧夫之唇舌他尚何言議者又以不從充道而從壺頭為公失計夫曠日老師而費糧與㨗徑出竒以制勝二端利害甚明而公之慮審矣設使如或者之言從充而進又安能必保蠻寇之無齟齬乎是又不得為公失計也夫以宗均之常才矯一節以入羣蠻猶足以致其震懾來服若公少緩死當有他䇿以致蠻矣又豈云云者所能測哉夫其韜晦自養散財濟難公之大志也鄙斥奸豪獨歸真主公之大識也竒謀勇烈光輔中興公之大功也不懷宴安以死勤事公之大節也世之人臣四者有一焉猶足以名當時而垂竹帛公乃兼而有之而又本之以忠誠積久之心宜其功蓋一時名垂後世而血食無窮焉向之謗者風休電㓕漠無蹤跡曾何損於公之忠賢哉今辰即五溪故地距公没垂千年而野夫女子猶知道公之威名在在有廟以祀公斯又足以見忠義之感人心不以古今而有間也我皇明大秩羣神公廟之在辰者獨登祀典有司以時行事無敢怠弛人有水旱疫癘則禱焉廟故有亭或以為神出逰之所址存而亭廢辰人合志興構并他屋宇門牆之弗治者悉完理焉余少讀公傳嘗壯公之為人及往來武陵江中親見所謂壺頭山者壺頭距辰水行可一日至彼亦有廟而修祀事於辰者便於人之瞻依云耳廟亭旣新余遂刪取公之大節俾辰人刻之并系以詩曰矯矯馬公惟志之偉志在功名氣不少萎貧堅老壯公言則然懷竒藴朴罕識其賢雲乎欝欝雷乎震震紫色蠅聲炎輝斯燼公晦于時爰牧爰蓄飈氛九縣顧瞻安之曰述曰囂狼貪豕飽鄙不少留聿求漢道來覲真主應對䟽通謂帝大度髙祖則同遂委臣質遂効臣節聚米討羗悍虜蕩越四方底平人懷安娛公不晏佚許國以軀滔滔武陵蠢蠢雜種梗化撓邊負險恃勇公曰茲役老臣馳驅堅請于行秉節舒舒不驚不亟旣安且式試兵臨鄉蠻即摧辟扼于壺頭匪公之尤天少須假孰測厥猷公雖没世因則成事乃招乃來羣蠻無貳云胡巧夫䜛言朋興豈不暫翳事久滋明迄茲千載有顯愈赫名徹聽聞功載史册壺山之南辰江之滸公蹟如新公廟惟古逮我皇明祀典秩申行事以時委在守臣惟公忠精厥德不爽疫癘旱澇應求如響民感公惠欽服國章廟亭完構其敢廢荒乃圖永久乃磨良石我纂其詞為示無極絳州大成廟碑臨川王汝績以儒官陞知山西之絳州始至進謁大成至聖文宣王顧瞻廟貌庳陋年久杗桷腐撓大懼弗恭明祀及薦更釋奠薦献周旋迫於狹隘且風雨穿漏不足以揭䖍妥神益深悚惕遂下北山之材聨為巨筏順流而至擇土埏埴瓦甓完堅百用具備衆工齊作撤去腐壞易以新好廟舊以間計者三廣而為七厥制崇髙峻整宏闊深邃巍然堂座聖像益尊顔曾思孟四公作配十哲位次序列左右禮殿旣成改作從祀賢儒兩廡而擴大之門宇堂齋率皆壯麗深廣克稱類宮之度工旣訖功釋奠備禮儀之盛士習有絃誦之勤風化之美延及民庶汝績乃進諸生而告之曰昔周元公有言夫子道髙德厚教化無窮實與天地參而四時同我聖朝所以極尊崇之禮天下通祀而罔間内外者其不以是與惟是絳學祀典人材所闗汝績大懼學政墜弛有愆彛憲是用恊力一新財用民功皆國家有所興事底功惟祗若崇祀育材之意而已迄茲有成誠不可不知所自爾諸生考業於斯師法先聖當以唐虞三代學校士習自勵勿以俗學詞章聲利汨其心尊道綂之正黜百家之非居仁由義竭忠盡孝庶幾身有古人之學才為用世之良斯實聖朝建學之意諸生旣旋唯而退學正劉章等遂以其事來徴文將刻之石余謂汝績能新廟學以祀神育才而不自以為功又勉諸生以正學是可書也為之銘曰惟茲廟學爰始爰作厥制陋庳禮儀靡度亦窘風雨圮漏弗支神罔攸格士習以嬉時維汝績文儒是職有藴有施潭潭秩秩適求民牧陟俊㧞尤大廷有命來守郡符守來自東人士咸喜不以崖威而尚豈弟進謁先聖廟貌罔稱退謀厥役靡安靡定遂鳩羣材遂興陶埴百工献巧齊心一力撤舊益新丹堊斵礱翼翼禮殿有赫斯崇周廡堂齋悉廣其宇神有妥安士有常處工告訖功汝績有云茲惟成憲祗命在臣乃進多士敢有誠告師是聖賢篤茲正道明體適用允罔不休髙視萬古忠賢可述彼哉俗學實頗實側治已治人鮮不為慝惟順所始惟端所趨舍曰無知不有聖謨士感守言匪獨我惠神人具依守無我替乃纂其事乃來徵辭麗牲有石刻以永垂永夀縣大成廟碑乾州之永夀縣實古豳州之地縣學大成至聖文宣王殿創自前代我皇明混一寰區首崇儒教大詔天下建學立先師廟俾所司以時致祭母俾廢怠于時宣聖殿以及兩廡固嘗新理之然歴年旣久漸迄敝漏及創始之際又卑陋不足以展禮事神今縣令山西髙平郭質以鄉舉發身來知是縣始至進謁聖廟瞻顧大懼無以仰副國家崇明祀育賢才之意退而即欲興修然以邑民僅千室力單財寡所需之物無自出遂行視縣城内外逺近官宇園塹隙地得數百畆督令有役于官者假借耕具給與種子俾以時種穫其間積凡三嵗得穀麥若干斛復借民車輸至咸陽渭水之次易木以歸且先於農隙時以餘穀僦工埏燒瓦甓覆葢墁飭諸物百用旣具乃於天順元年七月吉日洎其丞馬騏典史宋凖恊心鳩工興作擴舊大成殿三間為七間兩廡舊各五間今俱增四為九以至㦸門靈星門神厨神庫次第改作之皆髙廣壯固有加于前始事於七月某日訖功於次年七月明倫堂兩齋生徒退習之室用力小而先已葺修獨殿廡神宇鼎新之功為大於是教諭薛澄訓導安廣進諸生而告之曰惟是廟學因循敝漏者數十年矣今郭令以學古入官之才於為政知所重雖居小縣民寡事務叢劇之際能出謀儲用不勞民力不取民財而克底廟貌之成髙廣嚴翼有盛於昔以及他宇亦皆葺理事神育才咸盡其道實有以仰副國家崇重儒教之意雖古良有司之興學者殆無以過之夫令之有善政不可使無聞於後世乃具其事之本末遣生員張俊岳凱來求文於予將刻諸石以示永久為之銘曰惟此永夀惟有廟學十百其年爰始爰作或度孔庳或宇寖隳神不顧饗士荒於嬉有令學古式臨茲土乃怵於心乃惕于覩顧茲小邑式寡於丁睠言興之孰資於成我思其方有田斯植乃耕乃耘有年有積輸之百輛清渭之涘以有貿無萬木委止工献其巧人執其勤廟廡改作撤舊益新葺理之周爰及百宇神祀孔彰士有攸處師曰斯役惟令之功欽服國典教道日崇不有纂述將泯其實我銘是求勒示真石濟南府重修舜廟碑有大聖人之道而功被於天下萬世者固宜為天下萬世之所崇奉如濟南府之有舜廟是已舜耕於歴山史記以山在河東今濟南府歴城縣亦有歴山故後人因以立舜廟焉夫歴山之地不足深辯獨舜以大聖人之道功被天下萬世人得而知之則濟南立廟以致崇奉者夫豈過哉正統初瑄以菲才濫官山東憲司嘗進謁廟下因追仰聖道於數千載之上今去濟南垂三十年矣方以老病退居河汾山西憲使王允郡人也以書來曰吾濟南故有舜廟歴年滋久木瓦腐漏殆不可妥神揭䖍天順二年都察院左副都御史年富巡撫山東因謁神廟見其圮剥之甚退謂藩臬官僚曰舜大聖人也是郡之人旣立祠宇以致崇奉而乃弗治如是幾於慢神矣盍圖所以新葺之于時嵗值少豐不可興事又二年為天順四年嵗旣連稔民生亦紓於是都憲洎藩臬以濟南知府陳銓才可集事俾董其役銓量材計工皆取之帑餘在官而民不知擾自殿寢廟廡以及外門次第俱新宏廣壯固皆有加於前時且擴其隙地繚以周垣樹以名木幽䆳清肅允稱神栖始事於是嵗之正月踰月而工訖由是官民小大咸愜瞻依斯役也寔乃崇奉聖神而有闗於世教不可無辭以紀其事敢丐文俾刻之石以垂諸後瑄因念數十年前旣嘗謁聖廟而追仰聖道今茲之舉固宜有言夫舜之所以為大聖者以其為人倫之至而精一執中乃萬世道統之源禹湯文武之君臯陶伊傅周召之臣孔曾思孟以及周程張朱之聖賢雖行道明道之功不同而其相傳之法實皆遡其流是其功被天下萬世者曷有窮極哉今聖朝方以有虞之道治天下薄海内外咸底休風然則是廟之新匪徒崇聖道於往古實有以仰若聖朝為治之意是誠大有闗於世教也遂書其事俾刻之東嶽泰山廟重修碑東嶽泰山之神故有廟在山之陽朝廷有大典禮大政務則遣使告焉廟屋歴年旣久類多圮漏弗治先是守臣嘗奏請修建而未克底完天順已卯泰安州復以其事達之濟南因以上請詔允修葺于時都憲年公富方議興役而去左副都御史賈公銓繼來巡撫乃洎巡按藩臬恊議旣擇有幹幕職以董其役復俾濟南知府陳銓月一往以綜理焉銓始至泰安州以謂修葺嶽廟所以祗若朝命致謹大神然尤當以省民財重民力為本財匱民疲事亦非可因詢及守廟者具言數十年所積禮神之物甚富遂遣人持市木之巨細與其他修屋之不可缺者及旣合而匠役皆在官之人而農民不知有役銓旣綜理有法董役者亦因其意不亟不徐功日就緒始事於天順庚辰秋七月次年辛已春三月訖工殿宇周廊門觀繚垣悉皆完治不陋於前不侈于後咸願刻石以紀其事山西按察使王允濟南人也因以書來求文於瑄惟孔子有曰必也正名乎夫明則有禮樂幽則有鬼神其理一也然則祀神之道其可不以正名為先乎如嶽鎮海瀆其在古昔帝王之世皆以名山大川稱之初無封號之加葢以其為天地儲形萃秀神氣流通能興雲雨以惠物能出財用以濟民故雖載在祀典而不可加以封號自前季以來道學不傳幽明之理不明於天下邪誕諂妄之說日作於是有封五嶽為王為帝者有封五鎮為公者有封四海四瀆為公為王者而又各加以美號夫嶽鎮海瀆其形峙而流其氣神而靈古禮五嶽視三公四瀆視諸侯而乃崇其號人其神名旣失正神豈顧享洪惟我太祖髙皇帝定有天下之初即稽古祀神之典乃頒大明詔㫖於嶽鎮海瀆諸神曰考諸祀典知五嶽五鎮四海四瀆之封起自唐世崇名美號歴代有加瀆禮不經莫此為甚今依古定制凡嶽鎮海瀆並去前代所封名號止以山水本名稱其神仰惟詔㫖所載大洗前訛隆復古制其所以達幽明之理嚴上下之分允宜表正斯世垂法將來而為萬古不易之大典孔子所謂正名者於斯見之猗歟盛哉今東嶽泰山之神為衆嶽冠聖朝旣正其名秩其祀而廟有弗治又俾所司以時修葺而巡撫憲臣洎藩臬得綜理其役如銓者不竭民之財力而克底完新皆可謂祗若朝廷之丕休顯命而致謹於大神者矣遂序其事而銘之曰一理宰幹二氣互根清浮無際濁墜斯存柔行剛峙川洪嶽尊惟此泰山造化鍾萃巃嵸太虛磅礴厚地匪魯邦瞻實衆嶽最其蓄罔測其施靡量𤣥雲守石甘雨八荒功旣載溥厥報宜章有廟在陽奉命新葺重臣是承守臣是職民不匱勞事底完集殿宇廊觀聳立縈迴髙下中度不騫不卑神氣欝欝流通在茲昔古山川明祀有體夫何前季封號薦起儕嶽于天紊三公禮逮我聖世道復古隆斥絶僭誕率循大中嶽鎮海瀆悉正其名惟岱宗神神稱允格迄茲有役咸願石刻述理纂辭以示無極韓城縣重修學碑韓城即古之韓城襟帶梁山大河為今陜右大邑邑學大成至聖文宣王廟及學舍創建旣久皆有弗治處河南湯隂王鼎以貢士來知縣事旣勤庶務尤重學政自大成殿以及兩廡神門神庫神厨有圮漏者悉完理之重作明倫堂東西齋俱增舊兩間擴明倫堂後地作退堂一所生徒退室悉脩葺焉土木葢瓦級磚繪飾壯固鮮彩經始於天順五年正月至八月訖工廟學旣新又申舉教條以勵生徒咸願刻石以紀其事乃來求余文余惟爰自隆古神聖御極未嘗不以學政為先葢以人之性出於天而性即理理無不善其氣質則有清濁之異故不能皆知其性之所有而全之以復其初聖神君師億兆必施治教俾氣質清濁不齊者皆有以變化之而復其性若唐虞之司徒典樂夏商周之庠序學校皆教人之政也是以當時治化人才極其隆盛時至東周學政不修有若孔子之大聖雖不得位以行其道而其教人之法曰仁曰性與天道之類則皆本於復性故顔曾思孟皆宗其教而與乎斯道之傳及孟子没性學不明漢唐間雖或建學立師而教人之法則異乎古矣至宋周程張朱真儒繼出大有以發揮堯舜三代洙泗教人之法雖亦不得施之學政而性理以之大明我皇明統一寰區大興文治内自國都外薄四海莫不建學立師其學政則純用聖賢教人之法治化人才之盛聿追隆古夫豈漢唐所能彷彿其萬一哉列聖相承咸重斯道數申敕天下以時修舉學政勿禆廢弛今韓城王尹祗若上命克舉學政如此為生徒者其深體聖朝隆古教法䆒濓洛闗閩之學以上遡洙泗堯舜禹湯文武周公之道必由經以窮理窮理以復性為臣盡忠為子盡孝與凡職分之所當為者無不盡斯於人才風化有禆於萬一而於王尹之興學與有辭焉於是旣叙其事復詩以系之曰惟梁有山惟邑有韓韓城之學王尹是完完之伊何葢瓦棟宇神有妥棲士有息處釋奠考業旣飭且釐媚學之子惟道是資道體於穆曰命曰性性該萬善全畀神聖神聖在昔極建教敷唐虞肇迹典樂司徒延及三代教法隆備聖賢相傳千載一致葢人之禀理一氣殊明誠兩盡斯復其初夫何前季性傳晦昧學名則同學實非是逮我皇明道際嘉亨學建内外復性是崇兹韓之校有成斯役磨石纂辭以朂無斁蒲州廟學重修碑蒲州儒學著令釋奠大成至聖文宣王仲春仲秋上丁凡一其弟子以及歴代有功於聖門之諸儒皆配饗從祀於殿廡焉廟後列堂齋為生徒講習之所事神育才各有其宇然或敝於久或缺於初皆學政之不可緩者今徐守孚浙右台之黄巖人家世業儒旣由庠序中鄉舉㳺賢闗歴事春官於神典民政熟於講聞及來知是州凡政事先後次第修舉因進謁大成殿庭以大成門東西廡神庫神厨牲房皆事神之宇大成門嵗久穿漏乃葺而新之兩廡迫隘不足以周旋禮節遂擴增其楹數復外為周廊以障風雨神庫等屋悉加修治生徒雖有講習堂齋舊乏退息之室因創增號房數十間又樹扁學門以壯觀仰其材皆儲之於素匠役取之在官民不知擾而役底於成始事於天順四年月日凡幾閲月訖工於是神宇學舍巍然莫不峻整又訪郡之先達可為鄉先生者尸而祝之以勵後進師生樂其崇學好禮而役之成也咸願有辭以鑱諸石乃來求記余惟古之學政考之載籍可見已葢自夏商周以上之教法皆可以復人性之善孟子所謂學則三代共之皆所以明人倫者是也漢唐歴代雖或建學而道學不傳又為異端雜術所淆而知以復性為教者鮮矣至宋道學復明朱子序大學有曰治而教之以復其性如唐虞司徒之職典樂之官以及三代小學大學教人之次第節目皆所以復其性故又曰學焉者無不有以知其性分之所固有職分之所當為而各俛焉以盡其力者此也洪惟我天朝道隆前古治底文明内外建學其所以育天下之英才者皆以復性為教故凡五經四書小學性理書自周張程朱之說以達乎堯舜禹湯文武周公孔子顔曾思孟之道學校之講學者旣一於是科目之取人者亦一於是推之禮樂政治者莫不一於是是以學政粹然一出於正而異端雜術不得以淆乎其間豈漢唐歴代之學而鮮知以復性為教者之可擬哉今徐守旣克舉學政諸生瞻依宣聖諸賢之廟廡有所興起必由所謂五經四書小學性理諸書周張程朱之説以求古聖賢之道以求復其性以追古俛焉盡力之君子庶幾於學政有實效矣於是旣序其事而復繫之以詩曰惟此蒲學守克新之新之伊何道化在茲有神之宇靡不完葺有士之居靡不增立春秋釋奠禮必䖍誠朝夕礲琢業必專精於道自天全畀神聖繼天立極治教斯盛昔在唐虞典樂司徒三代法備學則有區區以小大慮百致一爰䆒其歸復性是極延延鄒魯心法相承曰命曰性一以貫通孟氏往矣正緒邈絶術裂多岐理難同轍宋儒勃興道統是接皇明運泰道隆古先學建内外正教是宣其經有五其書有四性理真儒發揮詳至于以表章于以作人人知復性化底熈淳兹賴有政政旣理治朂哉明誠聲實永世安邑縣修孔子廟碑皇明定有天下之初即隆古聖王之學政設國子監郡縣學廟祀先師大成至聖文宣王及七十二子凡先儒有功於聖門者亦皆從祀廟庭選師儒以育天下之英才由是學政大備於内外列聖相承咸重斯道今皇上治洽重光尤重教事近年復申命憲臣分督天下學政天順七年二月解州之安邑知縣事楊磬乃祗若上命以孔子大成殿及門廡皆嵗久圮剥弗治遂集匠役量工興事撤去棟桷之腐壞者悉易以美材葢瓦亦埏埴堅緻以至繪彩無不完飭又一新聖賢之肖像旣以是月興役不亟不徐至八月工訖師生洎邑之耆庶雜然相與言曰是役也寔楊令祗若上命克有成緒不有所紀何以示後遂來求辭將鑱諸石余惟學政之崇卑實闗世道之隆卑三代學政崇而世道崇固無間然漢唐歴代亦皆以崇舉學政饗國長久惟若秦之廢學政焚詩書其效可見我皇明建學純法隆古旣正聖賢之祀典教人之方則自周子張程朱子以上遡孔顔曾思孟子堯舜禹湯文武周公之道以復性為先明倫為本而異端雜學皆不得以淆乎其間是其學政又非漢唐歴代可儗今以安邑一縣楊磬能舉學政觀之則自畿甸以達方岳為守令者孰不祗承德意以各舉其學政而天下之英才被朝廷教育之恩陶聖賢禮義之澤皆將以正學自勉古人自期思有以培植國家之洪祚於億萬斯年之久世道之隆足以逺追三代矣楊磬陜西靈臺人丁卯舉子涖政有能稱學政尤其首者故咸願有紀遂次第其事復系以詩曰惟此清廟聖賢是栖緜歴嵗久圮剥弗治皇有大命俾時葺理凡在守臣孰不悚靡楊令安邑惟祗惟承乃作周廡乃新大成爰及門宇無不崇舉有翼棟梁有堅甓礎延於肖像聿克就新髙宏儼肅允稱典神濟濟士子爰瞻爰止學仰正傳人倫天理有造其德進釐百工罄竭忠藎仰答盛明匪圖榮肥式篤仁義庶學有光垂實永世敬軒文集巻二十一
