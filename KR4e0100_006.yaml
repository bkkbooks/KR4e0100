吟楚漢髙義得陳雷屢和鏗鏘韻頻傾㶑灧杯未窮詩酒興俄動蓼莪哀荏苒逾三載栖遲愧寸才聊為萍水别近擬故山回秋意方如此交情每快哉應同楚地橘濫比傅岩梅晚節看松桂殊芳異草萊故應嗤樸樕深是重竒瑰意得寜煩語心通不假媒素懐期坦率俗意絶嫌猜白璧寜容垢青銅未可埃我行方浩蕩君意莫徘徊砥柱洪河坼金天華岳開驛亭頻莫桞郵舎㡬陳荄汾水秋浮浪孤山晚作堆兒童應項領父老想樽罍原栢心先折庭梧手自栽昊天恩罔極風木意難裁未遂林烏報頻驚隴鶴催還當訪知已鳴佩覲天階曉登沅州北山頂嵐靄氤氲重溪行咫尺迷漸登層巘上始覺衆山低逺近天無際參差樹不齊川雲平似海石磴峻如梯日出寒烟外風生碧澗倪異禽和露宿快馬度空嘶逺目回三蜀髙懐遍五溪歸朝誇勝槩沅水有新題戯題紅白二梅花落簷外雙梅樹庭前昨夜風新英兼舊蕊墜粉間飄紅已見苔成錦方疑色是空粧娥初㸃額舞女欲迷蹤雨重臙脂濕泥香瑞雪融不知何處笛併起一聲中喜雨四十韻天地開明運風雲各有人道回千古泰氣統一元春合樂來儀鳳編詩詠瑞麟杞楠求偉器瑚璉重竒珍竊抱風霜志榮瞻日月新繆膺三鳳薛敢比八龍荀早嵗心雖壯中年學未醇上書希賈誼著論過嬴秦跡沗鰲頭客官為豸角臣憶從簮白筆寜敢愧蒼旻持節南荒外懸旌北海濱㡬看星轉斗頻見月飛輪疾惡寜留枉存心但有仁股肱恢漢道耳目廣虞詢沅澧時清嵗衡巫景宴辰驕陽嗟乆亢膏澤仰惟均使者應無色官曹想未循黎元疲畎畆巫覡走村隣偪側憂羣志安榮愧此身靈幽寜可必𠂻曲謾潜陳帝徳深涵物天心逺愛民化機回頃刻沛澤匝羣倫婦子皆宜室兒童總孝親甄陶歸廣大笑語極詳諄已卜年皆有還應俗盡淳尫羸躋夀域苗獠變儒紳沴氣全知歇休徵屢覺臻商羊方罷舞尺蠖㑹求伸魚目難容偽明珠賴倚真積䖍纔曠日志喜不逾旬野遍秋前緑衢㳙霽後塵亨豐原有數貞勝豈無因荆俗猶欽鬼黔靈早降神華風人共靡大道子能遵時譽難稱實佳章枉見申功因簣土積學比大田畇物備應知富神充不累貧詞華兼問晉風雅獨傳豳自顧心如雜相期徳在純從容江漢日行見起垂綸寄司封李原徳三十韻磊落青雲士龍門憶共遊蒹葭汾水暮松桂禹宫秋架石千尋閤盤空百尺樓兩山開翠峽萬里滚黄流弱水崑崙外扶桑滄海頭山川窮壯觀物理入冥搜勝地杯同酌清心道共謀真傳推舜禹正學拱軻丘每苦紛紛論誰能坦坦由濓伊勞纉述閩建得尋抽自此陽光發還應爝火收劇談憐繾綣良覿展綢繆日月開皇極風雲㑹帝州一官陪舊侣三俊話前脩待漏金門闢趨朝紫氣浮方期聫彩鳳又見促鳴騶盛典旁求逺天書寵渥稠遷喬登粉署持節騁華輈火改時頻易杓移斗屢周緘書知習坎申意見中孚理大天無外毛輕徳可儔謬推追電足深仰遡源舟一别三年乆重來數日留玉瓶携緑蟻珠唾雜銀鈎又見逢離索那能足倡酬清霜京邸月疎桞禁城溝逺意煩深念髙文可更求士希賢作聖道仰魯傳鄒嵗月雖云邁詩書敢自休論心殊未悉短札暫相投喜雪正統四年十一月十六日予出按所部時不雨者殆兩月矣麥雖出土而根苖浮露遊塵遍野土脉不能凝潤將無以為來嵗發生之機所過居氓行商以及部屬之吏咸戚然有憂色予亦同其憂而時據鞍攬轡閔閔不忘於道途之間是月二十六日抵東昌之博平大風連日天㣲有隂色予意以為將雪之徵二十九日早發博平風止雲合雪遂作中途雪大作至清平連三日夜雪乃止瀰漫千里皓然一色由是民吏釋然大悦相賀以豐年之兆灼灼可驗予亦喜不能已遂賦律詩三十韻以紀其事是冬十二月朔日書憶辭歴下日正值仲冬天衢路開晴色城闉散曉烟地連滄海外山繞岱宗前玉節知頻握鉛刀每學鐫行行周郡邑納納大坤乾戀國心如結憂民志自堅風威連月甚雨雪半冬愆細麥浮乾壤游塵滿大田根荄思潤澤翕合望開旋行旅心相語居民慮共煎慳隂嗟甚矣生理卜終焉謬沗觀風客深期閔雨賢心揺金匼匝念切錦鞍韀悵望雲霞靜驅馳路道偏行臺時徙倚小邑重流連竟夕寒飈作侵晨凍靄懸自天來素節匝地結氷泉平野迷霜蹟遥山聳白巔影窺瑤水鶴人舞桂宫仙庭栢欺寒色林花閗曉妍八荒開瑩潔萬象失蒼𤣥肅肅氛埃歇飄飄沴氣捐己應消螣􅖈重覺伏螟蝝節轉和平候時占大有年𤣥功歸紫極上瑞繼青編禾紀雙莖異雲歌五色鮮鳳麟來曠邈龜馬出淪漣盛事宜方駕貞符足並肩腐儒叨際遇帝力荷陶埏雅頌知非職歌謡竊自傳古人作雪詩禁用體物予詩中於桞絮梨花如銀似玉之類皆置不用亦古人之遺意歟送王秀才歴下山川秀髙亭古製存朱䦨環碧沼綺席擁金樽李杜來賓客機雲列弟昆清言鳴佩玉雅奏雜箎塤自昔稱名勝於今數大藩雲烟通海島峯嶺接天門正是霜空肅那堪葉落繁髙城連粉堞周道駐華軒良㑹今如此髙情可更論芝蘭爭奕煜鴻鴈各飛翻天上歸寜後還來敘作歡曉出東平州十韻憲節凌秋發城門逼曉開溝長流水去野曠逺風來跋馬橋頻度看山客屢回川原行未巳齊魯望悠哉漢檢天門石漢封禪於此秦碑海岸臺秦刻石處淡烟横曲阜旭日上蓬萊遺蹟懐前古觀風慰好懐衢樽湏共飲井税不煩催每見桑麻野深期杞梓材行歌方自得前陟更崔嵬挽徐憲使三十韻梁園春寂寞共嘆哲人凋自是鍾神秀原應降岳喬劬書當早嵗窮易每通宵逺念韋編絶潜觀法象昭數從環内起心向畫前超甲子開文運寅正建斗杓豹斑深積霧鵬翼快扶揺海内時名大闗中教澤饒方看來鸛雀行復降星軺地切神仙府人瞻玉雪標旋應陪馭鶴長是綴班貂啟沃師甘尹開陳仰姒姚緝熈惟一徳誠孝每三朝龍衮登宸極離明麗逺霄周旋觀盛禮寵數冠羣僚又見横英簜遥知格有苖霜臺俄拜命驄馬屢揚鑣路出荆門險封連晉水遥情非鷹隼擊心與鳳鸞要政簡民無擾風清吏不驕兩邦懐舊徳千里守新條魏闕心仍結鵷行首屢翹人期黄髮在鄉有白雲飄列郡愁空劇孤魂去不招野棠還簇簇臺栢自蕭蕭丹旐飛雲逺青山積雨消羊腸髙岌嶪馬鬛鬱嶕嶢客憶曾遊寺人憐舊度橋儀刑傳父老名姓到漁樵事業歸良史豐碑閼伯髙酬李吏部韻秪是尋章句何曾學聖賢寸心徒炯若兩鬂已蒼然汎汎應難及區區只自專妙非探月窟䝉有玩山泉希復勤晨誦多應懶晝眠簟凉紋似水忩寂帳如烟正起端烏帽俄承送錦箋騰空蛟勢矯出海蚌珠鮮述作淹羣籍吟哦盡一篇卦看脩省震天悟性情乾便擬師兼艮誰勞説又𤣥茅心知我塞水智羡君圓徳業勤磨玉功名頻着鞭沉潜知理奥明炳識㡬先自是中情固寜教外物遷晴忩看野馬碧漢仰飛鳶欲識無邊道湏知不外天味深𤣥酒酌聲淡伯牙絃佳士宜紉蕙髙人獨愛蓮化機寜有息雅興自無邊寶瓚湏金飾羔裘有豹縁翺翔還接翼出入最差肩肺腑真傾㵼詩書已貫穿天官留藻鑑匠氏備杗椽䂓矩誠前定方圓自不愆門清真似水道直更如弦榦有千尋聳金更百鍊堅但教孤節茂嬴取大名全自愧方知學深思未可權交情殊滚滚髙論竟連連尚覺中懐劣難勝外慮牽何時除舊習但日竊陳編大意全無見㡬微總未研真誠誇末學寜敢接先傳浩蕩乾坤大推遷嵗月延海波應渾渾蠡挹繆涓涓有藴川光媚深藏寶氣纒珠還寜買櫝魚得可忘筌舊業勞鑚仰新知可棄捐斯文終古在共覩日星懸敬軒文集巻六
