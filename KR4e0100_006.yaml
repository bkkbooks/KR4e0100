body:
  text: 敬軒文集卷六明薛瑄撰律詩送和司訓秋色滿平隂秋聲處處砧離筵對衰草别路繞疏林白日青霄逈紅雲紫極深此行應得意早晚報佳音久雨遣懷六首客居連市井積雨竟朝昏屋漏頻移榻泥深少出門忩風侵座泠簷溜入宵繁賴有詩驅悶無勞問酒樽秋來常苦雨風氣早生寒小鳥投林急髙鴻下食難奔流淹古道密霧隱前山試誦停雲句中懷獨未寬連日對秋雨其如客思何泥塗寧出户流潦欲成河生菌井闌遍積苔墻角多無由訪知己遣興且吟哦泥濘不可出茅齋靜坐時懷賢尋往傳課子誦新詩近悟柔為勝深知巧是非雨聲雜涼吹蕭颯發清機密雨灑如絲涼風散漫吹泥途殊汨沒茅舍久淋漓秋意心先得蟲聲耳獨知田家望收穫何日靜雲霓小忩聼雨坐燈影照孤吟誰識無邊道元同不外心客襟澄夜氣簷溜滴清音詩就無餘和悠悠思轉深寄秉忠周司訓二首良夜對床宿清晨送子行西郊雨新霽古道馬頻鳴執手别時話揮鞭獨往情相思杳難極鴻雁帶秋聲過我衡門下秋宵雨歇初繁星隨漢闕明月到忩虛别數寧辭酒談多不厭書今朝逺相憶陡覺鬢毛疏謾成客裏經年久交遊日漸新名浮真自愧知少不生嗔大道終非外微言總是真悠然無所競轉覺快心神陳廣文見訪愛客情何厚肩輿到所居樽醪携臘蟻盤錯間春魚雅意忘年契髙懷勝日雩劇談移永晝未擬促歸途挽江處士處士好靜者放情丘壑間樽前流水逺忩外白雲間孫子詩書熟交親禮數寬百年今已矣涼月滿柯山盧溝橋沙水相蕩潏晴宵飛彩虹闌干臨極浦華表撼髙風爽氣西山秀祥雲北闕濃南征從北發歸擬駐華驄入湖南界行盡中州地湖南境界初漸聞人語異更訝鳥音殊溪谷多栽稻池塘盡養魚山村聊借宿風月夜堂虛應山道中萬壑嵐光滿曉騎驄馬行茂林交擁蓋修竹送前旌到面溪風冷經心石澗清豺狼應逺迹狐鼠不須驚晚至雲夢雲夢行看近肩輿趂晚涼稻塍新穗吐蓮沼落紅香密樹隱茅屋蕪堤繫野航霜臺絶蕭灑容我得徜徉發雲夢二首鞍馬幾千里又登雲夢舟天圍平野闊水入大江流笑傲傾樽蟻微茫聼棹謳往年懷七澤今日遂清遊昔聞雲夢澤今泛楚人船地逺煙迷樹湖平浪拍天南風清憲節北斗燭龍泉頻向中宵望武昌何處邊大江逢霽景獨酌有作舟行逢霽景逸興杳難羣緑樹江邊影青天水底雲衆山連復斷雙櫓合還分自酌樽中酒微吟到半醺舟發城陵磯急鼓催舟發依稀見嶽陽逺波浮島嶼衆水合岷湘竹瓦居人閣杉脾賈客房且看風景異未覺逺遊傷辰溪曉泛五首沅水一千里辰溪又泛舟山雲合雨暗身世與天遊己覺雞聲逺惟聞櫓韻幽所經多險涉還似解離憂湛湛江流碧層層石岸髙蠻謳催健櫓瘴雨灑輕舠自朂氷霜操寧辭旦夕勞五溪山萬疊何處是龍標怪石雙崖峻秋江一道平榜人皆異語岸鳥亦殊聲洞戶編茅小蠻舟刳木輕雖驚風土異重喜萬方清蒼峽幾千尺天開萬古餘波穿石眼瘦舟壓水心虛歷歷瞻竒秀悠悠想化初所希觀物妙難覔邵堯夫自有煙霞分觀風任所之洞餘槃瓠種江繞伏波祠秋老芙蓉樹雲深薜荔絲欲知消逺思秪是詠新詩舟發長沙四首曉遡湘江水微風漾碧波好山隨岸逺野燒入林多往哲題詩處今豫鼓棹過年來遊覽數天意遣吟哦已覺長沙北猶瞻嶽麓西天浮湘水闊樹入楚山低岸芷餘香草叢篁染舊啼昔賢遊覽地我亦為留題長沙城下驛解纜發扁舟水柵千家市沙村十里洲喜逢晴霽景况值太平秋憲節叨光寵懷賢獨未休十日長沙住登舟憶少陵花飛有底急酒美為誰傾浩浩當年興悠悠此日名幸逢明盛世持斧故南征湘鄉道中湘鄉南去路連日是山行地僻溪潭緑冬和草樹榮野人懸稻把山家以稻作把盡懸於架旋取煮食古戍列旄旌異俗今如此歸當話友生思親二親俱久逝孤子際明時繆沗風霜任深承雨露私光榮寧及養劬育竟何為願竭涓埃報焚黃會有期宿湘鄉道中山亭紀懷又是山亭宿林巒夜杳冥天臨南嶺近風入北忩清開卷求心事傾壺蕩客情二親久辭世不寐想平生沅州新正書景三首楚南時節異正月似深春傍砌萱苖長臨池草色新江山晴景媚庭院暖風頻坐惜梅花落題詩憶逺人頗訝沅州地新正景不同逺山青草瘴深院落梅風角角尋巢鳥喧喧采蕊蜂春衣初試夾和氣滿簾櫳楚地春來早羣花次第開輕黃舒栁線重碧染莓苔永日香凝篆和風酒滿杯端居叨寵渥何以答涓埃正月十三日夜書兩日是元夕山城已試燈謳歌連夜發蕭鼓遍街鳴人喜新風景時逢舊太平柏臺誰是伴梅月正交清遣興庭幽多樂趣向歇愛晴暉緑竹生孫早紅梅結子稀賦詩新有趣讀易漸知幾眼鏡何空闊看雲天際飛曉上草閣通宵雷雨驟曉霽試登樓百鳥聲相和雙江漲合流寧知兾北客來按楚南州滿眼波濤急飄然欲放舟喬口遡流往長沙楚岫無邊翠湘流不盡清香蘭屈子賦苦竹鷓鴣聲風景當年事雲霞萬古情沙頭舊鷗鳥誰肯與尋盟武口守風四首連日北風疾江濤拍岸鳴天垂平野月浪颭近船燈湖與歸心闊秋因客思清不眠聼鼓角髙枕念王程武口叢祠下維舟幾日餘北風增駭浪南客念歸途水逺浮三蜀煙濃暗五湖江村秋雨裏難覔酒家壚歸思方正切北風何太狂江村平隱見湖樹逺微茫浪起魚龍伏天低鶴鸛翔貂裘思更著秋雨早生涼繫舟楊桞驛風雨苦連朝逺岸煙埋樹荒村水沒橋年華身老大湖海興蕭條天意何留滯應憐望國遙舟中偶成舟中如斗室坐卧覺心清閉戶嫌風冷推篷愛日明偶思前世事因見古人情自顧知何益詩書浪得名漢江曉泛城下扁舟發江清宿霧消竹村迎岸出粉蝶背人遙神女無消息明珠久寂寥鹿門看漸近滿耳颯清飈舟中遣悶五日行不盡洞庭青草寬窮隂連旦夕密霧隱湖山詩思雖難竭酒壺行復乾孤舟親愛逺何日暫為歡近日收書漸多戲成元凱真成癖收書日又多靜須頻檢閲忙不廢吟哦得意欲誰語感懷聊自歌忘形到爾汝膠漆豈能過武陵曉泛今朝風日好來泛武陵溪碧水寒依岸蒼林逺護堤沙光搖野鳥人語散鳬鷖二月桃花發還應處處迷院中遣興二首為客知應久池塘夏景深圓荷髙倚蓋新笋密成林山鳥因時語隂蟲應節吟乾坤知帝力自許一生心片雨過山城空階物意清黃梅拾又落翠蘚踏還生幾許催詩景無端望國情蠻方耕事少烏府但橫經夜坐偶書夜夜燒官燭時時讀我書斗牛雙古劒天地一迂儒郡邑三苖外風霜兩嵗餘江湖懷魏闕似覺鬢毛疏舟中三首來往雖云數應無愧此江觀書心見獨揉櫓韻聞雙岸轉山相掩湍奔石互撞裁詩清興發晏坐啓船忩石底明皆見清波淡不流幾年烏府客一葉楚江舟求富知為妄存心得自由所欣安履順未必歎淹留好在黔中地相留過幾年岸經冬嶺樹水宿夜灘船支枕思前事清心憶往賢一陽看漸近吾道故應旋黔江曉泛五月蠻江漲官船泛泛輕波光一道白山色兩邊青只有耽書癖都無報國能中原有家室終日望歸程詩禮堂為衍聖公賦洙泗趍庭日相傳自世家三千惟有敬一語自無邪喬木參天色猗蘭繞砌花遺風從此地花雨被無涯崇恩堂為衍聖公賦赤芾趍朝日彤庭錫勞時宫壼霑寵渥命服被恩私遺澤應無竭深恩勉自持髙臺書盛事行見被聲詩題風木卷秋色滿天地寸心將若何行雲寧返迹逝水絶回波斷織封蛛網殘篇掩蓼莪空餘東嶺樹向夕受風多題瞻雲卷遊子久行役松楸空係情幾經秋草合長見白雲生水映遙空淡煙迷暮壠平鶴歸華表夜滄海月虛明人日立春人日逢春日韶華此又新暫歸持斧客猶是讀書人别久交遊敬年深骨肉親升平占霽景愛國賦詩頻村居喬木荒村古歸來遂所居人情安瓦落機事識舟虛嵗晚霜橫野宵長月照書心田恐蕪沒不敢廢耘鋤讀書俯仰千年道常看萬卷書鬢毛兼黑白事業尚鉛朱庭雨催寒早忩風度月虛撫時寧浪出慨想北溟魚中秋夜諸生持酒至二首憲府乘驄入湖南仗斧遊異鄉饒節序故里忽中秋白月當空度明河入夜流諸生勞載酒堅坐看相酬五見中秋節湘南想北州忽看今夜月忘却昔年愁汾水通河漢龍門近斗牛霜鍾傳永夕髙詠未能休示弟瑭大屋星霜久新年雨雪頻田園知巳薄生計可忘勤喬木宜思祖雞豚莫惱鄰東堂花幾樹應與嵗俱春聞張侍御升大理卿復升都御史聞道張公子頻年被寵光一清廷尉法再肅柏臺霜絶足風雲闊髙門嵗月長所期崇令德汗簡看垂芳夏夜肅肅涼景夕滿懷詩思生蟲鳴新雨霽鍾遞晚風清爽氣浮天極鄉心對月明中州知久客歸興繞汾亭挽吳孺人髙節知誰似終身不二天修篁秋更緑老柏苦尤堅意切和熊處心傷斷織前賢郎今有立紫誥賁幽泉直沽舟中潮來兩岸平風順一帆輕海濶浮雲白天低野樹青久叨持斧客非是棄繻生岱嶽行看近秋髙試一登按部出濟南雨歇西門道微涼草樹秋風雲連北極海嶽接東州聖世方全盛書生得壯遊頻年叨寵渥感激未能休七夕宿郯城郯子國中宿髙堂蠟炬紅滿林驚夜鵲繞砌響秋蛩逺意知誰省長吟未許同去年當此夕京國見西風發長清清曉出南郭南行喜有山入林秋霧薄到面水風寒已覺年華大還應宇宙寬幾回持憲節不改鐵為冠盧主事具慶堂盧子古名族幾年家大梁未為觀國士已作奉親堂喬木侵簷密芳花繞戶香春風長滿座永日但稱觴登州抵福山道中二首岡嶺髙還下荒村斷復連波濤風捲雪島嶼日生煙水坼人間境春融世外天雲霞今古異何處有神仙正是春光好重來海上行輕鷗聨影落旅雁一行鳴徐市三山棹安期萬古名只今俱泯沒惟見水雲平潞河舟中嵗月忽如昨三年又此來水長通御苑山近繞金臺謬擬傳心學慙無濟世才永懷清不寐終夕望三台舟中思親三十年前事舟中忽有思老親遊宦日巴蜀泛江時青嶂兩邊合黃猿萬樹垂只今行海岱忍自受恩私滄州舟中澶漫滄州北舟行逆水遲連林秋桞瘦接翅晚鴉稀原野波濤減人家生理微端居對明燭深念莫相違病齒病齒經時久憂煩屢攪腸吟哦良覺廢誦讀總相妨志切風雷益心懲噬嗑剛古柔無所苦因悟養生方賜紗理寺承恩召宫紗被寵光紅酣升海日濃染自天香省德知輕重裁衣稱短長章身良自愧何以報皇唐賜扇勑賜端陽扇雲箋五色花動搖煩暑退披拂好風斜法語真堪畏湯銘恐未加扇兩面細書皆聖賢訓戒之言身心蒙帝力留與子孫誇登南坡雨霽陟岧嶤涼風作陳飄目隨青嶂逺心與白雲髙野草連岡細家林百尺喬茫茫天宇內倦鳥已安巢漢江源巨峽自天闢峨峨嶓冡尊回環幽谷底清淺漢江源泉古通元氣根深徹后坤朝宗東去意應不廢晨昏嘉陵泛江湛湛嘉陵水沉沉石底明岸翻雲樹影谷響棹歌聲微冷南風細輕隂暮雨晴應難逢此景還慰逺遊情嘉陵江雨官舫泛嘉陵渾如一葉輕灘髙駭浪急岸闊漫流停山木無邊翠人煙幾處青棹歌髙枕聼竟日雨冥冥雨後宿嘉陵夜宿嘉陵岸扁舟雨不休山雲迷澗壑林火射江流久坐思王事難眠動旅愁所期氛祲掃走馬上神州嘉陵喜晴不堪篷背雨直打到天明乍喜朝雲斂俄看旭日晴林分千嶂秀山空一江清泛泛情何極舟人急櫓聲錦城寓館八首寓館冨花竹書齋夏日長芭蕉紅錦秀梔子白花香樹密寧知暑忩開但覺涼逺懷雖暫遣世慮未能忘曲徑通幽處交隂翠竹髙書齋成雅趣花圃愜遊遨石甃涵天影風林作海濤寧知城市內清境勝江臯細雨過空庭纎纎草色青涼風生近戶淡靄散髙冥林外鵑聲急簷前燕語輕錦城雖可樂終是念歸程當戶海榴樹紛紛落綘英竹林新笋出石砌緑苔生小屋知心靜繁花覺眼明少陵今逺矣誰與論詩情偶居錦城館