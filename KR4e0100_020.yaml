body:
  text: 敬軒文集卷二十明薛瑄撰哀辭祭文愚村居士哀辭并序愚村居士諱存善姓劉氏世為江西泰和人居士質貌魁壘談議偉然在鄉里常斥其有以周人之急尤重然諾尚氣節一出言人即信服之由是人咸以巨人長者稱焉居士家故饒財至元季俶擾群盜公行剽掠鄉邑苦之居士慨然歎曰大丈夫不能建功立業垂聲萬世猶當小設計慮保庇一方於是盡散其財糾合鄉民為立約束相與戮力禦冦居士既倡義人皆愛護室家勇於捍守群盜聞之相戒避去而不敢犯鄉邑卒賴居士之謀以克全於難于時有司將上其勞而官之居士愀然曰吾豈以是徼利達哉吾特盡吾心而已遂固止其事而卒不聞逮國朝平定四海搜舉遺才有欲薦居士者甚衆居士曰吾少之時猶無意于進取今老矣筋力智慮耗矣復何能為哉諸君幸相愛使得優遊餘日于太平之世幸矣薦者意猶未已居士乃辭去城郭退居邑南村葺茅為屋編竹為籬決渠以蔬鑿池以魚日與田翁釣叟水陸上下追攀往來酣嬉歌呼一以愚而自混於俗因更其村曰愚村而自號曰愚村居士居士雖以愚而自屏于野然士君子愈賢其愚以為不可及及居士卒鄉邑老稚垂涕曰善人長者沒矣吾其何從居士沒後若干年當宣德二年其孫某以進士第致位僉憲哀其祖生而祿位不顯于前沒而素行或泯於後也遂述其事以書來俾作哀辭以發其潛德之幽光余惟居士早能自立於鄉里散財舉義遏冦保良其心固已厚於仁矣及將録其勞而官之而復固止不從其行又何篤于義邪合仁與義宜享榮名盛福于太平之世而又堅辭薦達退老丘園蓋其讓而不居蓄而未發是宜大有以振耀于後嗣也故僉憲公兄弟連中科甲亟踐通顯居士其可謂不死矣遂作哀辭以托其行以彰其報以傳于後云嗟嗟居士兮誰之賢如稟兹魁竒兮德言舒舒惟義是急兮不有積餘遭時方艱兮鴟梟嘯呼居士孔悲兮聿良厥圖倒囊出廪兮糾兹義夫式遏冦橫兮以安里閭事已則去兮功豈我居淡若無情兮浮雲太虛屬時休明兮群賢攸趨獨守幽貞兮以辭辟書恬然退處兮惟才之愚野老爭席兮鷗鳥與徒婆娑水石兮以樵以漁何積之逺兮其發匪徐賢孫多有兮乃德之符居士雖亡兮不亡者餘流芬永揚兮原末本初嗟嗟居士兮名誰可逾王處士哀辭并序處士王君友直祖通州三河人世多顯者逮元季兵作處士從其二兄避地于兖今為寧陽人處士淳實君子也早失怙恃移其孝於長故事二兄如事二親焉長失二兄移其愛於幼故撫諸孤如已子焉蓄而未發欲推其有於人故賙恤鄉里若已責焉處士既行積於中名孚於外有欲以處士充茂才舉者處士曰凡吾所汲汲者乃任吾性焉耳豈以是釣譽干進哉遂逺迹江湖之上放意山水之間以謝免之及薦者議息乃歸鄉里杜門却掃日以敦行義飭閨庭教子孫為事淡然無所慕於外由是人皆服其真能安分者而遂弗之強其後處士之長子賢今給事公以科目得鄢陵校官來迎養處士既至則懇懇以為人師之難教人所當先為誨給事公之師道立而克遂成就後學者蓋皆得於處士之訓焉及處士歸給事公後以官滿便道省於家而處士病矣處士雖疾革猶以善道誨諸子而語不及他及卒宗族感處士之撫愛者哭處士如哭親父母而哀必盡焉鄉里受處士之賙恤者哭處士如哭其親戚而傷必至焉給事公既以禮葬處士又立石以表于墓及服除入朝擢授今職鳴呼處士其可謂有子矣夫人之生也丁亂離之時鮮克保其生者而處士免亂厄遭理世受子孫之養享太平之福者四五十年是則處士生無所歉也世之人或多行不義至于玷身壞名者而處士力於為善克享天年終於桑梓安於窀穸是則處士沒無所愧也人之子孫或不能顯揚其親至于親沒未久而遂泯泯無聞而處士有子若給事公既表其行義於墓次方且汲汲求名公文士之著述以發揚處士之潛德於無窮是則處士雖亡無所憾也嗚呼處士其可謂不死矣雖然自處士觀之始終皆可以自足而給事公方駸駸於榮進思欲更以所得之大者以奉處士而固已無及則其抱終天之戚曷有窮極也哉余遂作哀辭以述處士之行以慰給事公之悲以傳之久逺云若有人兮稟朴專承顯則兮導清源生草昧兮厯屯艱徙儒邦兮室家安時休明兮尚盤桓篤孝愛兮行實繁聞譽洽兮來薦言徼利達兮吾豈然賦逺遊兮遡江邊陟嶔岑兮㺯潺湲倦遊厯兮乃言旋桑麻圃兮松菊軒掃軌迹兮門常關篤義方兮謹大間子翹翹兮乃儒官來迎飬兮遂承歡悉誨語兮謹師傳樂未究兮返家園乘清氛兮乃大還即窀穸兮卜髙原風蕭蕭兮白日寒鳥獸嘷兮愁空山林木悲兮凋蒼顔石峩峩兮表新阡發幽光兮潛德宣子黃門兮感終天養不滿兮涕汍瀾嗟處士兮人所賢善日逺而日邈兮是亦可攀朱孺人哀辭并序朱孺人贈文林郎監察御史朱公則文之妻監察御史朱鑑之母孺人世襲衣冠詩禮克服訓典允就柔嘉及歸朱氏雖弗克逮事舅姑而能助其夫竭誠於祀事以至處外內親黨踈戚莫不中度雖嫁久而尤不忘父母誠孝所感蓋有異云孺人方盛年而已失其儷乃能苦節勞心自力於衣食教其子曰鑑曰鎛皆有成立而鑑即監察御史也鑑既致身清要遭逢國家舉推恩之典敕贈御史公以及孺人時御史公雖久逝而孺人尚安好無恙鑑得請歸將為孺人榮而孺人亦逝矣嗚呼孺人為女為妻為母各有法式雖早罹艱屯而晚得享福孺人以及御史公皆可無憾哉鑑既襄大事求為之辭辭曰有淑孺人兮德音孔嘉胚胎前光兮歸于其家誠孝振聲兮行浹邇遐所天云亡兮矢德靡瑕勤躬教子兮蘭茁其芽有降自天兮龍光賁加奄逝滔滔兮悲曷有涯辭以慰哀兮孝子其奈何邪祭文告土神文敢昭告于后土氏之神曰曩為先考教諭某卒于官次家逺不能即歸于先塋而旅厝于是實賴坤幽之德是保是庇今將遷柩西歸謹薦庶品用伸報祭遷柩告先考文洪熙元年十一月二十五日孝子某謹以牲醴頓顙流涕告于顯考教諭府君之靈曰自尊容奄違人世九月于兹感時敘之變遷沸五內而興悲曩以倉卒未即歸葬遂權厝于濟水之涯逼側浮淺實非神靈所宜今以吉旦謹啓櫕窆返柩于故山之陂敢告祭先塋文維宣德二年嵗次丁未十二月甲寅朔二十五日戊寅孝孫進士薛瑄敢昭告于髙曽祖考考妣之靈曰嗚呼惟我先世宏大深厚積善衍慶以庇蔭我後人是以藐末不肖得以蒙其福澤由進士以發身逮兹朝命屢降將拜辭先壠而恭覲紫宸區區松楸之戀哀貫衷曲敢因薄奠以僣陳惟我先世幽靈冥德昭昭不昧者其尚鑒兹懇勤祭王侍御文宣德四年十月初十日友生監察御史薛瑄謹以雞酒之奠致祭于年契侍御王公尚文之靈曰惟公中州英俊夙已有聲鄉試春闈實忝共登奉命南旋並舟話情再會梁苑懷抱㵼傾一别九載音信罕通君登柏府可謂顯榮清亮詳雅人無間稱我忝同列有事湖荆君時南按暌違莫逢將謂旋歸接武大廷孰知一逝遂隔幽明今兹便道官船暫停殺雞沽酒以酹旅封君如有知其尚鑒𠂻祭王太守文宣德四年嵗在已酉八月乙亥朔二十一日乙未友生監察御史薛瑄謹以時羞清酌之奠致祭于武昌太守王公大惠曰嗚呼惟公質朴忠信蓋出於天處心制行率由自然在卑不競在髙不騫風紀清峻人視侈焉公任惟久畏慎乾乾卒逺尤悔名祿以全及秉郡符操持愈堅臨事不撓有嚴有寬武昌繁劇剸治實難公為數載屬邑妥安承接中度交口稱賢方兾逺騁胡不少延惟我與公年齒絶懸公不有挾交好篤專昔主公家留連半年乃傾囊槖沽酒割鮮放懷許與揮毫成篇久别一會笑語蟬聫孰謂兹來明幽永捐進拜旅柩公不我言風飄繐帷塵凝几筵追念疇昔有涕汍瀾返櫬何日令子在前義當匍匐愧因職牽有負交道中情曷宣文以自攻酒寫忱悁惟公有知其尚鑒虔沅州禱雨告神文五首維宣德五年九月二十三日巡按湖廣監察御史薛瑄謹齋沐以瓣香告于城隍之神曰今兹之嵗自春徂夏雨暘以時稻之早者已穗而可穫矣而晚稻山田之類尤多皆焦然困於秋雨之愆期重念小民皆賴是以為生若悉稿死則國之租稅神之粢盛尚無以給又何免私室之寒飢惟國家之所以棲神以宇祀神以時者以神能保庇一方之黔黎逮兹旱虐日甚民懸懸有望于神而神之聰明胡不聞知御史來按是方敢以誠告神其無爽明靈膏雨賜以時施謹告維年月日謹差沅州知州李果以清酌之奠告于明山之神凡山之髙大表為一方之望者為其能興雲雨也明為沅之傑然挺出荒服以神為之主也宜乎祀典代承而莫敢去也逮兹秋旱為虐禾將盡稿而民無以處也神司膏澤胡吝不與也御史緘誠遣告神必惠然許也玄雲勃興斯須雨天宇也四野大穰欣欣歡子女也民獲報祀進牲醑也吹擊管鼓式歌且舞也御史當侈神之名播中土也尚饗維年月日謹差沅州判官周恢謹以清酌之奠告于英顯林公之神惟神血食兹土往必有功其靈莫測潛與化通沅旱秋甚百榖悴容神鑒在下胡不憫窮窮莫之繼百需曷供御史來按敢有不公不公降罰民實可矜雨則時賜俾世其承毋作神羞急急如律令維年月日謹差沅州衛經厯岑團以清酌之奠告于漢車騎將軍張公之神曰赫赫炎靈祚四百率土孰非其臣子自東都之政不綱致四海之流橫潰時豈無智謀之竒才而皆遑恤逆順之至理獨將軍之先後數奮忠勇而效之以死雖千古而名永長存聞者孰不為之興起彼姦雄之擾擾于一時遺臭至今其未已固知是非之定於將來豈有力者之所能彼此相隂隂有肅之叢祠臨宛宛東流之沅水在祀典昭然而有稽豈荒怪淫昏之可比兹闔境之雨澤愆期特致詞而祈以清醴尚饗維年月日差知州李果以清酌之奠告于城隍等神曰間者秋旱為虐一何極也是用有祈于群神群神聽果不惑也有雲鬱興一雨滿三日也晚稻將稿神賜以實也山稼將枯神賜以粒也小民將飢神賜以食也百用將竭神賜以給也官宜即罰神賜以釋也凡百有心感神德也何以報神選肥潔也詞以侑之神未格也神惠其繼之承事永無斁也尚饗祭戶部惠員外文維年月日監察御史薛瑄謹差户部辦事人材趙福以清酌庶羞之奠致祭于尚書户部員外郎惠公之靈曰惟公渾厚敦朴狀貌魁然加以學識文質幾全久遊庠序纍陟地官宦成年耋有榮無愆瑄以後進獲陪周旋欵我旨殽悉我誨言交雖未久情則甚專兹南于邁惠問其先謂將促膝以窮素歡孰謂一疾遽爾永捐哀聞甫及悲心遙懸敬遣微奠寓詞柩前公識不昧其惟鑒虔辰州府告神文二首維年月日巡按湖廣監察御史薛瑄謹以香燭告于城隍之神曰國家之所以立祠宇修祀典俾所司行事以時以飭者以神能福一方之民而除其所疾苦也今年夏是府境內不雨者殆逾旬月山稼將盡稿死而下田亦無以成實若更十日不雨則百榖將盡國賦無以供生民無以食神之牲醑亦無以給民之疾苦莫于是乎極御史雖愚無知猶動念于懷豈以神之聰明而不加恤抑長民者之弗告邪果神有待而匪亟也御史來與神言旱已甚矣神其導迎休徴沛布時澤除去厲虐化為豐碩則一方侈神之威感神之德神饗厥報為無忝而民之事神亦無斁尚鑒維年月日監察御史薛瑄謹差辰州府同知余存諒告于漢伏波將軍馬公之神曰公生為名臣沒為明神是皆一念忠誠之鬱積夫豈聲音笑貌矯偽者可得而比倫御史少讀公傳見公行事磊磊落落嘗偉公之為人及領節南按乃得拜公像于壺山之陽瞻公廟于辰水之濵屬兹辰境夏旱百榖將稿民用憂辛御史平生以正直自處豈以是而濫禱于淫昏獨念公之忠賢為祀典之崇重其精爽烈烈固宜與山川之氣流通而常存是用敢以旱告詞以侑禋公其妙運化機大雨兹土以濯辰人之焦稿以慰御史之懇勤尚鑒代陳御史作焚黃文維年月日行在雲南道監察御史陳詔謹以清酌之奠及行在雲南道監察御史勑一通告于考監察御史之靈曰考以孝弟謹厚之行特達敏絶之才爰自國初搜舉遺逸弓旌之聘賁及丘園靈時􅗄起應召厯官雖止佐邑推心逺大以故隱德餘慶是藴是崇是衍是施被及我後人休者廣矣而男詔以孱愚之資荷生成之力克勤克瘁以育以誨考業邑庠發身科目遂任行在雲南道監察御史實有風紀之榮每念音容悟發寤歎逮兹三年遭逢聖天子以孝治天下率祖宗之憲章舉追榮之盛典以謂人臣之盡忠于國者蓋必有教於其家寵光之施及其身者又必上延於其始由是推恩以行在雲南道監察御史之秩贈及先躬以孺人之命命及今夫人恩浹幽明慶兼存沒是皆先德之懿所致其曷敢忘謹以前勑一通用伸告祭若聖天子褒嘉之意則具載於訓詞尚饗祭賈昭司訓文正統三年三月初二日山東按察司僉事薛瑄謹以清酌之奠致祭于司訓賈公之靈曰昔逰覃懷交契最密德言相酬經義與析其歡甚焉無間朝夕我丁先憂返葬河北大雪隆冬泣别沾臆契濶幾年寒暑屢易中得一會暫話往昔為將他年數展良覿寧知生死遽爾永隔兹叨憲節部有所厯道經貴居公已窀穸市酒是沽隻雞是炙奠雖云薄情則孔極公鑒余𠂻其不有識祭刑部侍郎曹𢎞文正統四年正月日山東都布按三司某官等謹以清酌庶羞之奠致祭于行在刑部侍郎曹公之靈曰惟公發迹秋官陟于亞卿奉命巡撫江淮山東持身廡謹臨事寬平民感其惠吏服其公連數千里熙然以寧得人委任惟國之明方兹賴仰一疾俄傾謹遣薄奠以達哀誠尚饗祭魏希文文維正統四年嵗次已未閏二月十八日山東按察司僉事薛瑄以清酌之奠致祭于友人魏希文之靈曰于乎希文好古信道力慕聖賢顛沛困厄心不少遷憶時永樂俱客玉田始獲君友我惟少年君不有挾惠與周旋我即君室至夕乃還君來我屋竟日留連相與誨告皆古格言乃開我愚乃砭我頑往復十載交道篤焉逮我别去君心如煎徒步送我握手拳拳逾三十里解袂長歎寧知一别幽明永捐今來君里密水萊山俯仰疇昔中情慨然問君妻子旅食寒單仁者有後其不有天欲尋君窆道里隔懸遙設一奠君其鑒虔尚饗祭王素亨文正統四年九月十九日友生薛瑄謹以清酌之奠祭于王先生素亨之靈曰忝接交遊實篤古道十餘年間針誨懇到任自湖南抵宿展好中失良朋德孰我造久要不忘敢違聖教聊薦菲儀辭以申告祭少師江時用母夫人文某氏太夫人之靈曰惟靈生于茂族歸于名門內範有自懿德斯存髙堂安其孝敬中閫底于肅溫作配君子參大藩而資其內助貽教厥嗣官少師而鍾其慶源夫何命服在躬方享全福而大化遽及歸于九原悲傷貫其宗姓惻愴動于里鄰令子既奉命而奔其哀訃所司復凖式而營其壙墳掩幽堂之石以銘德樹隧道之碑以刻文存沒榮哀誠鮮與倫某等忝與令子接迹朝紳並陳誠以致奠庶有格於几筵尚饗敬軒文集卷二十
