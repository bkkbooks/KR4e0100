來朝通九譯一朝持節使三韓烟開碣石行邉見日出扶桑馬上看玉燭正調王道盛天書大布逺人歡歸囊不似千金槖留取清名宇宙間送李憲副回山西上林三月柳花飛又送青驄出帝畿别路爭看迎憲節過家應自舞斑衣恩光北極懸紅日行色西山入翠微風紀重臨還自保更馳清譽到彤闈送山東賈參議藩佐于今選俊良霜臺御史獨名揚方承北闕恩光大未覺東州道路長雨過魯郊桑椹熟風來歷下水花香旬宣海岱雖云樂玉鑑氷壺未可忘送人歸閩中天垂雨露萬方同冠帶南歸喜氣濃溪渡檳榔和水暗林穿荔子遍山紅到家定有詩書在對客寧教酒盞空珍重髙年崇禮讓七閩自古尚儒風送張司馬致仕荆南風景古來嘉六月樓船想到家沙市水添三峽漲渚宫雲接五溪霞逢時都憲人皆仰致仕尚書衆所誇還有丹心思報國曲江樓上望京華送張侍郎還河南還家爭看少司徒千里光輝出帝都舊直黃門遺事業新乘彩鷁問征途河分衛水如鋪練山到中州似畫圖結社應多鄉友在論情不盡㵼金壺天順元年六月初十日上章告老未允十一日又請十三日又請至二十一日䝉允出京師舟中賦七首遷轉春官入翰林兩叨清秩受恩深論思未有回天力供奉空懸捧日心六十故知年漸老尋常唯覺病相侵乞歸自是安衰劣俯仰清風愧古今病懷久與世相違疏乞歸田詔許歸辭闕猶霑光祿酒束裝還有尚方衣兩京水陸尋征路三晉山河想舊扉金馬玉堂回首處青霄唯見五雲飛老病何堪汚玉堂乞恩優詔許還鄉歸鴻絶漠情知逺倦鳥投林意覺忙但想溪山行處好不妨園圃到時荒退休自是升平事祗道閒中嵗月長經世誰人志盡酬古今回想興悠悠即非有道身能退自是無才老可休歸騎逺尋天井路輕帆先放潞河舟家山到處知何日汾水西風八月秋早曽拜疏乞歸田羈絆虛名又幾年道德愈難期往哲事功無復望時賢宦情似水年來淡鄉思如旌日自懸老病放還䝉帝力不知何以答皇天魚在洪淵鳥茂林從來誰識古人心五湖髙興應難及三徑清風不可尋希復卿雲光舜日幾調元氣作商霖獨慙愚老歸休晚猶撫遺編慨古今竊第歸登潞水船罷休從此又言旋西塗東抹三千字北去南來四十年欣戚情懷渾索寞升沉聲譽總悠然彤闈紫閣如天上依舊清汾數頃田送王憲使之四川憲使之官雪嶺東錦城樓閣倚晴空莫辭道路三川逺正喜車書萬國同玉節自天隨爽氣軺車到日振霜風深期雅操清如水行看香名逹九重內閣用唐人韻簡徐李許三學士黃閣文章萬丈輝青霄閒看鳥雲飛巍峩鳳闕凌雲逈宛轉鑾坡到客稀屢草黃麻依紫極常聨玉筍侍彤闈却慙老大承天寵一字何曽補衮衣送孫輈之䕫州同知西南䕫府古名州别駕于今遂壯逰霜落江寒經白馬浪平峽靜過黃牛到官綺席宜踈節行部山氓在惠柔發軔長途深有望莫令聲譽頓悠悠新春喜雪立春才是第三朝喜見春空雪亂飄天上瑶臺應錯落人間玉嶺正岧嶤固知吐氣乾坤滿頓覺逰塵户牖消却上小樓閒縱目八紘清思逈難招寄蒲守徐孚積石黃河繞郡流郡城髙興自悠悠逺天雲净仙人掌近郭風清鸛雀樓頻寄鸞箋書可著所需藥物病全瘳衛蘧衛武應難及進德深慚老未休貞節堂為王憲使母賦婦道從來不二天近知王母踐斯言從教白髮三千丈祗保清風五十年頒誥旌門今受賜養姑教子舊稱賢一門盛事歸貞節堂上髙名百世傳讀邵康節擊壤集二十首乾坤清氣産英豪大隱天津道德髙雪月風花閒諷詠溪雲水竹自逰遨畫前有易心能悟删後無詩句獨謡金薤琳琅垂萬世無窮雅興自滔滔𤣥社千年有召封故應華胄産英雄居共舊業留餘韻卜洛新居有定蹤後學難窺擊壤集先天都屬弄丸翁清風百世誰招得望斷嵩髙送去鴻三絶空餘贊易編千年圖象竟寥然人豪真自從天挺羲畫原因到已傳骨髓著書成大卷風花遣興有新篇驪龍頷下眀珠在誰測東溟萬丈淵鳳在髙梧不可招天津清隱結衡茅小車逰處情何適大筆揮時興自豪酩酊酒中心惻惻離披花裏思忉忉空餘首尾詩垂世誰識秋風八月髙壯逰歸到洛陽居環堵蓬茅得自如外物不知軒冕貴此心惟覺性天虛環中日月行無息靜裏乾坤樂有餘首尾詩成情可見何須象罔索𤣥珠六朝全盛太平時卜築東都得自怡每與真儒論大道時從國老和新詩杯傾緑酒寧嫌淺車碾青蕪不厭遲莫道千年清響絶知音還自有鍾期皇極書成識者稀原從羲畫見天機故應消長隨時變一任行藏與世違楊柳堤邉風淡蕩梧桐枝上月光輝無邉清興難收拾毛穎時時聽指揮天津橋上聽啼䳌只是當時已惘然妙意都應窮卦畫餘情聊爾託詩篇太和酒味濃還淡甕牖蟾光缺復圓曽向行窩看兒戲不妨歌枕自髙眠手探月窟足天根悟盡羲圖造化原嘉遁有窩甘偃蹇觀光無意羡飛騫詩成比賦猶堪詠道在希夷信莫言勝日良辰留客處清風滿抱酒盈樽盛時京洛足鵷鸞翁有無名與往還劇論直窮天地外清吟多在水雲間榮枯任物心無繫消長隨時我不關自得人間無味樂好詩留與後來看排風御氣復鞭霆歷覽無邉造化情隨分自能安至樂玩心誰復識髙眀先天圖有年年運皇極書為世世經首尾詩成多寓興調髙白雪少人聽笑傲林泉樂太平洛陽誰不愛先生嚴寒暑雨何曽出溫暖清凉却解行金谷風和吹道服銅駝雨霽隱車聲行窩十二閒遊處父老兒童喜送迎人情物理總分眀七十年來老洛城只向窩中耽至樂却于身外薄浮榮花紅柳緑隨時賞雲白山青取次行還復振衣千仭上都無塵垢半星星嵩山洛水舊神州結屋天津景物幽修竹林中靈籟響梧桐葉上露華流弄丸古意誰人識戲筆新詩有客求春暖秋凉出逰處無邉清興更悠悠始終天地在胸中還似危樓出半空極論每生賢逹敬閒談儘與俗人同巡行堤柳春搖緑㸃檢園花曉綻紅風景滿前皆自得濡毫又見小詩工外臣自昔有由巢不是山人索價髙獨向杯中存燮理每從環內樂逍遙才看園老分斑笋又見端眀送藥苖餘事盡從吟咏見感時懷古興滔滔共愛先生共卜居天津水畔是吾廬隂陽燮理三杯酒皇霸經綸幾卷書儘有清風生几席倍多眀月照庭除生平祗是過人處嬴得雙眉日自舒老去吟多首尾詩賦和比興盡兼之陶鎔物象方知富漏泄天機始見竒水靣生風秋浩浩天心轉月夜遲遲有丸祗向閒中弄肯借髙人試一窺洛陽全盛想當時春暖秋凉任所之金谷名園花綻錦銅駝古巷柳垂絲霜林髙鳥爭歸疾沙浦冥鴻欲下遲萬象有情渾自得詩囊還載小車兒少年應自負雄才老悟𤣥機此意灰嵗月風光情自得山雲水石興悠哉一環理窟閒中見萬古天心動處來寶匣瑶琴遺響在幾何人識伯牙懷次王侍御韻憲府乘驄舊有名今秋偶爾㑹蠻荆虹霓氣接風雲氣珠玉聲隨咳唾聲萬里山川勞跋歷諸蕃部落待澄清愧豫無補虛持節賴有丹心老更明平定州分司次江侍郎韻乘軺萬里越河關報國寧辭道路艱首夏初離巫峽水新秋又過太行山久知鴈塞妖氛掃載喜龍沙鳳駕還白髮已承歸老詔陛辭不日覲天顔寄王用章憲副每從青濟憶同官祗隔滄溟一水寬我捧天書行萬里君持憲節按三韓封章入奏時名大驄馬巡邉將膽寒雙劍有光常夜夜暫回風雨未應難附録所贈二首名利場中一夢醒知君渾不負蒼冥村醪且去隨時飲澗水重來洗耳聽俗眼任他終日白山光還似舊時青從教門外塵如海坐向空齊閲聖經自許孤忠結主知居官寧肯論安危平反不愧張廷尉三黜何慙栁士師已向一身中道立更看千古大名垂到家莫廢韋編業伊洛髙蹤尚可追敬軒文集卷十
