body:
  text: 敬軒文集卷十眀薛瑄撰律詩詠顔魯公蓬利何堪屈大才平原出守亦微哉忽逢動地風塵起不使中流砥柱摧爭坐已難追雅論立朝寧畏忤奸回自騎箕尾歸天上長播英風遍九垓送太守致仕五馬蕭蕭出帝鄉都門祖席倍輝光天恩老覺腰金重客思遙牽别路長龜虎已應辭郡國貂蟬時復憶班行風烟縹眇鄉關近川谷猶疑下鳳凰錦官驛官送櫻桃錦官驛吏送櫻桃紅顆堆盤磊落髙時果已知西蜀美古詩難見少陵豪嘗新暫遣中情悅感物還添逺意勞多少上林鶯啄遍一春歸興正滔滔草凉樓驛看紅白芍藥芍藥花開山驛中小䦨紅白各分叢濃糚獨向風前立素質如從月下逢明媚併超塵世色妖嬈均得化神功誰知傾國傾城者一往滔滔萬古同過武功縣持節西來過武功扶桑日日曉光紅渭河水逺波聲小太白山髙樹影重遺址已無慈德寺居人猶說有邰封東行無限前朝事盡在紅塵緑野中題休休亭中條山下王官谷草木烟霞景物幽仙李固知時靡靡野亭從此號休休座中爽氣常飄灑天際浮雲任去留墜笏已超塵網外髙名千古鎮悠悠贈張僉憲邂逅金陵已七年相逢論舊意欣然江東風紀當時振山右聲名此日傳緑野盡耕春雨後清霜早落艷陽前朝端公道眀如日持憲應知數俊賢挽陳先生歸來烟水釣舟橫雲白其如足下生尚有菁莪經雨茂空餘桃李向春榮髙情祗許鄉人慕遺事誰從太史銘賴有賢甥今宦逹為揚聲譽照蒼冥挽祝處士鴻去青冥定幾年東吳聲譽至今傳髙情未必尋丘壑清隱還應在市㕓竹塢邀賔留舊榻藝窗教子剩殘編黃門底是推恩處紫誥回鸞下九天豫讓橋次陳僉憲韻千年豫讓有遺橋懷古還停使者軺季世忠臣存大節頽波砥柱見孤標吟邉凉吹聲蕭瑟望處秋天影寂寥無限繁華俱泯滅英名終古自難消挽蕭御史共惜西江老豸冠白雲乘去不知還繐帷夜捲霜風冷華屋秋扄曉月寒遺蹟定應歸太史榮名長是在人間明時有子登三事永感終天淚不乾述懷已承恩詔許還山又被虛名繫一官每向班行嗤老醜空耽典籍尚寒酸妨賢政自慙公論竊祿能無愧素餐早晚還應乞身去石田茅屋伴清歡河間獻王墓漢家宗室最稱賢遺事曽經閲簡編偶過河間尋往跡空餘荒塜帶寒烟頻求千古書連帙獨對三雍䇿幾篇雅樂未興人已逝雄歌惟有大風傳過德州山東一别十餘秋白髮重來過德州關市尚開臨水户郡城猶聳入雲樓霜臺駐節思前度憲府乘驄憶舊逰此日又騎官馬去朔風吹雪路悠悠德州除夕昔捧天書按部來之官又上鳳凰臺頻登風紀知庸德屢陟廷平愧菲才寓館眀朝添一嵗晴霄此夕麗三台元正馳賀心何似金殿香浮寶扇開寄髙苑李嗣昌廣文安邑分携幾十年中間㑹合總茫然華燈每憶連珠玉綺席空懷醉管絃顧我已添新白髮知君猶擁舊青氊却慙頻嵗叨天寵悵望豐城劍氣邉兖州人日二首去年西蜀逢人日人日今春客兖州行止可應無定跡嵗華仍復易周流驛亭盡日風頓起官路漫天雪未休南到彭城祗幾驛天晴擬放吕梁舟驛亭忩户總光輝人日紛紛雪亂飛關塞有兵皆凍合園林無樹不春歸風威肅肅朝來靜雲葉飄飄晚漸稀清興此時誰與適論心殊覺故交違孟子祠鄒國叢祠古道邉滿林松柏帶蒼烟逺同闕里千年祀近接宣尼百世傳獨引唐虞談善性力排楊墨絶狂言功成不讓湮洪水萬古人思命世賢彭城懷古二首戲馬臺邉雉堞髙參差樓閣入雲霄漕河控引淮黃近驛路通連海岱遙天府豈知成霸主彭城空復駐英豪大風折木飛沙日想見天心翊漢朝當年禹跡舊分州走馬南來遂此逰地勢縈回環翠嶺關城峭拔枕黃流燒餘豪傑千年塜春老佳人百尺樓周覽未能窮往事官河又放下洪舟雪中過髙郵湖髙郵湖裏雪中過雪片無聲㸃白波天水渺茫遙自接烟雲杳靄暗相和寒蓑滿眼漁翁少畫舫隨風去客多還似滄浪水清濁只應難覔扣舷歌過䢴溝懷古荒陂野水古䢴溝千載曽經煬帝逰暖日輕風牽錦纜垂楊芳草引龍舟春殘故國閒金屋花滿蕪城醉玉樓一自真龍飛晉水亂雲空結海天愁髙郵阻雪髙郵城下維舟楫雨雪連朝阻去程澤國風烟春冉冉野湖波浪晚冥冥凍消踈柳長堤濕響徹修篁候館清南到大江祗幾驛晴霄行覩鳳凰城髙郵大雪河氷已過立春十五日淮南天氣太嚴凝重湖皛皛層氷結千里茫茫積雪平霄漢連朝飛鳥絶官河隨處客舟停東風解凍須臾事波緑粼粼野燒青自儀真入大江儀真南入大江隈江上雲帆向曉開滿目好山青簇簇連天駭浪白皚皚還思二十年前渡又自三千里外來北闕承恩方浩瀚之官今上鳳凰臺寄海寧李太守又是分携十七年寥寥幾度信音傳濫官白髮知吾劣歸老青山覺子賢蠟屐每多登覽興錦囊應有唱酬篇著書更法春秋筆還肯緘情寄一編金陵春望四首錦繡江山一望中金陵佳氣正葱蔥石城尚踞耽耽虎鐘阜長蟠矯矯龍淡靄逺遮三月柳瑞烟深護萬年松風流王謝何須問開國還思舊股肱金陵最好是新春風景無邉入望頻山似洛中浮秀色水從天上泛通津千門垂柳初經雨滿路飛花不起塵深荷發生同萬物兩京回首憶楓宸佳麗層城王氣中春來無樹不青葱湖光湛湛跳紅鯉橋影沉沉卧白龍錦繡園林開艷杏烟霞澗谷挺長松無邉風景皆堪賞千首新詩興未窮皇都又是一年春立馬長堤眺望頻麗日斜眀紅杏塢暖烟輕護緑楊津風來野水微生浪雨過天街逈不塵最愛祥雲呈五色氤氲長是繞楓宸簡張都憲二首榜題龍虎舊聨名宦迹升沉隔兩京離合雖驚頭並白交親終喜眼俱青濫登棘寺知無補峻陟霜臺倍有聲近得髙鄰親孟氏不妨剪燭話平生藉藉朝端有盛名憲臺周厯兩神京封章已見輸忠赤事業還期著汗青風度宛如瞻玉樹辭華真是擲金聲共論三十年前事聨步青雲滿路生周儀賔水筠軒曲䦨干外小方塘塘上蕭蕭繞翠篁一鏡平開涵影細萬竿齊動引風凉根穿近岸藏科斗稍接遙空下鳳凰水竹雙清曽到此金樽相對興難忘春日遣興簡張都憲廖丁二大理春來無日不連隂風物蕭騷思不禁雨急梅花飄白玉天寒柳線勒黃金宦情不與江流競樽酒肯隨人意深况是一年寒食近松楸千里正關心再用隂字韻簡張都憲好風乍起掃輕隂清思撩人不自禁與客便傾花下酒放懷寧惜槖中金髙情肻負年華泰交誼難忘嵗月深春興不知凡幾首長吟因見古人心送倪尚書赴召二首天書逺召舊師臣送别金陵喜氣新莫道分符淹嵗月還應聽履上星辰一江流水催行棹兩岸垂楊夾去津三接深期調玉鼎行看雨露萬方勻尚書承詔上金鑾祖席珊珊擁佩環霖雨舊曽思傅說師臣今見起甘盤江淮緑泛行邉水齊魯青餘過處山入覲定膺新寵鍚調元須竭寸心丹南京端午端陽令節客南京遷擢頻年荷寵榮內扇幾沾當日賜宫衣曽有舊時名從教緑柳含風細且喜紅葵照眼眀為報鵷行舊知已一卿贏得鬢星星暑夜簡趙駙馬大扇頻揮汗不乾那堪酷暑夜漫漫寂無風露徘徊處空有星河悵望間真是流金兼鑠石定應焚澤更焦山清凉只有仙侯府長夕氷傳瑪瑙盤簡張都憲楊尚書鄭侍郎廖少卿丁寺丞棘寺秋官接憲臺山光水色畫圖開青林雲氣當窗見翠浪風煙入座來楊柳影中冠蓋過芰荷香外吏人回好生正仰吾皇德共播仁恩遍九垓再用前韻鍾山南望鳳凰臺山下平湖一鏡開近岸紫騮穿柳去沿堤畫舫采菱來山禽將子飛還止水鳥銜魚去復回無限太平門外景神逰何必訪仙垓再用前韻三首風紀都應屬內臺官清公道一時開科條自是眀天討門館何由有貨來聲譽已知馳峻極文章况復動昭回不須遍攬江湘轡坐見澄清匝九垓廷尉刑曺與柏臺髙門俱對碧湖開天涵波影閒雲度雨雜泉聲爽氣來此日官僚聮轡入往年鵷鷺候朝回近來執法尤宣朗應佐陽光燭九垓刑曺理寺近烏臺坐對湖山畫障開芳草有情還漸長好風無約自頻來移文謾想髙人去聮騎頻同上客回為戀眀時歸未得思親空復誦南垓戲作逰仙用前韻瓊瑶萬仭中天臺珠宫貝闕參差開靈風響下碧虛裏連翩鶴馭仙人來鈞天揮綽九奏畢羽衣搖曵萬舞回後天不老凋三光排風馭氣逰遐垓海中湧出金銀臺陽烏濯耀蒼烟開弱水瀛洲不可到飈輪鶴馭相往來洪濛開闔幾萬古桑田走馬能千回抱一之子可輕舉相期汗漫逰九垓銀屏金屋瑶作臺化人宫殿中天開東見蓬萊水清淺西去幾復青鳥來雲錦之裳文五色倬彼雲漢凌昭回下視九域一毫芒何異蠛蠓飛塵垓仙山中有學仙臺凌虛上接天門開青衢黃道倒影出望舒日馭東西來玉宇無聲彩雲濕雲漢屈注萬里回寥廓無鄰安可極重陽之數歷九垓樵雲野老白頭已與世相違笑指生涯在翠微伐木忽看雲滿斧束薪不覺露沾衣息肩頻向青林歇荷月長從緑野歸一曲浩歌天地闊逺山回首晚霞飛南京十詠鍾山疊翠自是皇都第一山峯巒髙下似龍蟠嵐光翠滿金銀闕秀氣青連虎豹關瑶草不隨秋意老琪林長共曉霜寒年年澗谷蒸雲氣散作甘霖宇宙間𤣥武波澄北湖清濁自天開勢協龍圖一水來百里烟霞環島嶼繞城波浪動樓臺九霄氣逈通銀漢五夜天低轉斗魁絶勝蓬萊山下水洪源終古不塵埃淮清柳色淮清橋下水連空橋畔依依柳色濃香絮有情皆作雪柔絲無力盡含風樓臺掩映深春後市井凄迷暮雨中近水向陽千萬樹年年長是發生同卞壼神祠晉室人才數俊髦艱危深感與時遭君臣義大如天地父子生輕似羽毛昭代旌忠時饗盛豐碑鐫德古祠髙想應當日偷生者才入修門意自勞石城霽景郭外雲開見石城緑苔經雨自層層眀時正是龍飛地終古猶存虎踞形萬里長江通海白三山逺岫入天青登臨不盡千年意擬與丹崖共結盟鳳臺春曉金陵千尺鳳凰臺臺上春雲向曉開緑草雨餘淮甸合青山崖轉楚江回謫仙此日知何在麗句當年未易裁定鼎只今逢有道九苞行復自天來江東古渡江東門外大江頭古渡微茫接逺洲月窟殊方通上國雲帆大舸滿中流垂楊芳草三春暮紅蓼黃蘆兩岸秋顧我濟川才思少幾回臨想興悠悠長江秋色長江浩浩繞神京霜落烟波萬里清灝氣西來通灔澦寒潮東下接滄溟幾行鴈影涵空碧兩岸蘆花映月眀西塞山前秋色裏夕陽惟聽棹歌聲朝陽曉望朝陽樓閣倚天開日馭朝看海上來晴旭乍分龍虎勢清光已滿鳳凰臺御溝水向東華轉仙禁雲從北苑回𤣥圃瀛洲真在望不須方外覔蓬萊雞寺晚鐘上方臺殿翠微中石磴盤崖一徑通客至有風還掃榻僧來不語自鳴鐘竹窗下見浮雲白祗樹斜臨返照紅自笑無生渾未學懶從方外共談空太平堤望太平堤路夾平湖湖上清風面面俱十里波光天上下半空嵐影樹扶踈稻塍草色青無際菱葉荷花净有餘艇子有人閒泛泛釣竿還可拂珊瑚送姚侍郎巡察雲南璽書英簜使遐荒萬里山川草木光霜早楚江楓葉赤雨晴蜀道菊花黃羣芳擬欲除蕭艾百鳥還期識鳳凰六詔遍巡歸奏日定膺殊渥五雲鄉借馬簡趙駙馬鞲來白馬錦鞍韀騎向天街送表箋霜鬛蕭蕭頻攬轡銀蹄剝剝不須鞭滿身香汗生微雪一路清風散曉烟有馬借人今復見神京戚里最稱賢題趙尚書慶夀圖天官白髮老尚書致政歸來樂有餘夀慶七旬新置酒祿辭千石蚤懸車繡衣令子樽前舞蘭茁諸孫膝下趨在席嘉賔何所祝公年更與大椿俱送廖少卿上京二首龍江五月發扁舟大理名卿上帝州千里好山開翠嶂兩堤楊柳䕃清流鳴鑣紫陌思前度簪筆黃門憶舊逰若見中朝知已問丹心不改雪盈頭理寺名卿得俊僚六年又促紫宸朝石城解纜江風細淮浦揚舲海霧消入覲九天瞻日月聮班五夜聽簫